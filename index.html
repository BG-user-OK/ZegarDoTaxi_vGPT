    // ===== notatki =====
    function escapeHtml(s){
      return String(s||'')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }
    function trimNoteSymbol(s){
      return Array.from(String(s||'').trim()).slice(0,4).join('');
    }
    function rememberNoteSymbol(s){
      const sym = trimNoteSymbol(s);
      if(!sym || sym==='•') return;
      recentNoteSymbols = [sym, ...recentNoteSymbols.filter(x=>x!==sym)].slice(0,50);
    }
    const EMOJI_SEARCH_URL = 'https://sitech.com.pl/emotki/';
    let emojiSearchReturnPending = false;
    let emojiSearchOpenedAt = 0;

    function recentNoteSymbolsHtml(){
      if(!recentNoteSymbols.length) return '<span style="color:#777;font-size:15px;">Brak</span>';
      return recentNoteSymbols.map(sym=>`
        <button type="button" class="recent-symbol-btn" data-symbol="${escapeHtml(sym)}">${escapeHtml(sym)}</button>
      `).join('');
    }
    function bindRecentNoteSymbolButtons(){
      overlay.querySelectorAll('.recent-symbol-btn').forEach(btn=>{
        btn.addEventListener('click',(e)=>{
          e.stopPropagation();
          const input = document.getElementById('noteIcon');
          if(input) input.value = trimNoteSymbol(btn.dataset.symbol || btn.textContent);
        });
      });
    }
    function renderRecentNoteSymbolsInEditor(){
      const box = document.getElementById('recentSymbols');
      if(!box) return;
      box.innerHTML = recentNoteSymbolsHtml();
      bindRecentNoteSymbolButtons();
    }
    function focusNoteSymbolField(){
      const input = document.getElementById('noteIcon');
      if(!input) return false;
      try{ input.focus({preventScroll:true}); }
      catch(e){ input.focus(); }
      if(typeof input.select === 'function') input.select();
      return true;
    }
    function looksLikeEmojiSymbol(s){
      return /[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}]/u.test(String(s||''));
    }
    async function tryImportEmojiFromClipboard(){
      const input = document.getElementById('noteIcon');
      if(!input || !window.isSecureContext || !navigator.clipboard || typeof navigator.clipboard.readText !== 'function') return false;
      if(navigator.permissions && typeof navigator.permissions.query === 'function'){
        try{
          const perm = await navigator.permissions.query({name:'clipboard-read'});
          if(!perm || perm.state !== 'granted') return false;
        }catch(e){
          return false;
        }
      } else {
        return false;
      }
      try{
        const sym = trimNoteSymbol(await navigator.clipboard.readText());
        if(!sym || !looksLikeEmojiSymbol(sym)) return false;
        input.value = sym;
        rememberNoteSymbol(sym);
        saveState();
        if(typeof markAutoSyncOverlayDirty === 'function') markAutoSyncOverlayDirty('note_symbol_clipboard');
        renderRecentNoteSymbolsInEditor();
        return true;
      }catch(e){
        return false;
      }
    }
    function markEmojiSearchOpened(){
      emojiSearchReturnPending = true;
      emojiSearchOpenedAt = Date.now();
    }
    async function handleEmojiSearchReturn(){
      if(!emojiSearchReturnPending) return;
      if(Date.now() - emojiSearchOpenedAt < 800) return;
      if(!document.getElementById('noteIcon')){
        emojiSearchReturnPending = false;
        return;
      }
      emojiSearchReturnPending = false;
      await tryImportEmojiFromClipboard();
      setTimeout(focusNoteSymbolField, 120);
    }
    window.addEventListener('focus', handleEmojiSearchReturn);
    window.addEventListener('pageshow', handleEmojiSearchReturn);
    document.addEventListener('visibilitychange', ()=>{
      if(document.visibilityState === 'visible') handleEmojiSearchReturn();
    });
    function defaultNoteAlarmTime(){
      const d = new Date(Date.now() + 3*60*60*1000);
      if(d.getMinutes() >= 30) d.setHours(d.getHours()+1);
      d.setMinutes(0,0,0);
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function normalizeNoteOffsets(offsets){
      const base = Array.isArray(offsets) && offsets.length ? offsets : [15,30,60,120];
      return [0, ...base.filter(x=>Number.isFinite(x) && x>0)]
        .filter((x,i,a)=>a.indexOf(x)===i)
        .slice(0,8);
    }
    function noteOffsetLabel(min){
      if(min === 0) return '0m';
      if(min < 60) return min + 'm';
      if(min % 60 === 0) return (min/60) + 'H';
      return Math.floor(min/60) + 'H' + (min%60) + 'm';
    }

    function openNoteEditor(noteId){
      const ex = noteId!==null?notes.find(n=>n.id===noteId):null;
      const text=ex?ex.text:'';
      const icon=trimNoteSymbol(ex?ex.icon:'');
      const storedAlarmTime = ex && ex.alarmTime ? ex.alarmTime : '';
      const suggestedAlarmTime = storedAlarmTime || defaultNoteAlarmTime();
      const parts = suggestedAlarmTime.split(':').map(x=>parseInt(x,10));
      let noteAlarmHour = Number.isFinite(parts[0]) ? parts[0] : 0;
      let noteAlarmMinute = Number.isFinite(parts[1]) ? parts[1] : 0;
      let noteAlarmEnabled = ex ? !!storedAlarmTime : true;
      const alerts = (ex && Array.isArray(ex.alerts)) ? ex.alerts.slice() : [0];
      const customOffsets = normalizeNoteOffsets(ex && Array.isArray(ex.customOffsets) ? ex.customOffsets : null);
      const currentTimeLabel = formatHHMM(nowMinutes());

      showOverlay(`
        <div class="big-panel note-panel">
          <h3>${ex?'EDIT NOTE':'NEW NOTE'}</h3>
          <div class="note-fields">
            <label>Treść</label>
            <textarea id="noteText" rows="4" placeholder="Np. kupić wodę...">${escapeHtml(text)}</textarea>
            <div class="note-alarm-layout">
              <div class="note-now-display">
                <div class="note-now-label">NOW</div>
                <div class="note-now-time">${currentTimeLabel}</div>
              </div>
              <div class="note-alarm-picker">
                <div class="note-alarm-row">
                  <label style="padding-left:4px;">ALARM TIME</label>
                  <button type="button" class="note-alarm-toggle" id="noteAlarmToggle">Alarm</button>
                </div>
                <div class="note-time-control" id="noteTimeControl">
                  <div class="time-col">
                    <button class="arrow-btn" data-note-act="hUp">▲</button>
                    <div class="time-box" id="noteAlarmHourBox"></div>
                    <button class="arrow-btn" data-note-act="hDn">▼</button>
                  </div>
                  <div class="colon">:</div>
                  <div class="time-col">
                    <button class="arrow-btn" data-note-act="mUp">▲</button>
                    <div class="time-box" id="noteAlarmMinuteBox"></div>
                    <button class="arrow-btn" data-note-act="mDn">▼</button>
                  </div>
                </div>
              </div>
            </div>
            <label>Wyprzedzenie alarmu</label>
            <div id="alertButtons" style="display:flex;gap:6px;flex-wrap:wrap;">
              ${customOffsets.map((off,idx)=>`
                <button type="button" class="alert-btn ${alerts.includes(off)?'on':''}" data-offset="${off}" data-idx="${idx}">
                  ${noteOffsetLabel(off)}
                </button>
              `).join('')}
            </div>
          </div>
          <div style="height:6px;flex:0 0 auto;"></div>
          <div class="note-fields">
            <label>Symbol widoczny na karteczce (1-4 znaki)</label>
            <div class="note-symbol-row">
              <input id="noteIcon" class="icon-input" maxlength="4" value="${escapeHtml(icon)}" placeholder="💧" />
              <button type="button" class="emoji-search-btn" id="emojiSearchBtn">Szukaj emoji</button>
            </div>
            <label>Ostatnio używane symbole</label>
            <div class="recent-symbols" id="recentSymbols">${recentNoteSymbolsHtml()}</div>
          </div>
          <div class="panel-actions">
            <button class="cancel-btn" data-act="cancel">✕</button>
            <div style="display:flex;gap:8px;">
              ${ex?'<button class="delete-btn" data-act="delete">🗑</button>':''}
              <button class="ok-btn" data-act="ok">✓</button>
            </div>
          </div>
        </div>
      `);

      const currentAlerts = [...new Set(alerts.map(x=>parseInt(x,10)).filter(x=>Number.isFinite(x)))];
      const currentOffsets = customOffsets.slice();

      function refreshAlarmUi(){
        document.getElementById('noteAlarmHourBox').textContent = pad(noteAlarmHour);
        document.getElementById('noteAlarmMinuteBox').textContent = pad(noteAlarmMinute);
        const tgl = document.getElementById('noteAlarmToggle');
        const ctrl = document.getElementById('noteTimeControl');
        tgl.classList.toggle('on', noteAlarmEnabled);
        tgl.textContent = noteAlarmEnabled ? 'Alarm ON' : 'Bez alarmu';
        ctrl.classList.toggle('off', !noteAlarmEnabled);
      }
      function enableAlarm(addDefault=true){
        noteAlarmEnabled = true;
        if(addDefault && currentAlerts.length === 0) currentAlerts.push(0);
      }
      function styleAlertButton(btn){
        const off = parseInt(btn.dataset.offset, 10);
        btn.setAttribute('aria-pressed', currentAlerts.includes(off) ? 'true' : 'false');
        if(currentAlerts.includes(off)){
          btn.classList.add('on');
        } else {
          btn.classList.remove('on');
        }
      }

      refreshAlarmUi();
      document.getElementById('noteTimeControl').addEventListener('click',(e)=>{
        e.stopPropagation();
        enableAlarm();
        refreshAlarmUi();
        openSharedTimePicker({
          title:'Alarm time',
          kind:'clock',
          initialMinutes:noteAlarmHour*60+noteAlarmMinute,
          nested:true,
          onDone:(mins)=>{
            noteAlarmHour = Math.floor(mins/60)%24;
            noteAlarmMinute = mins%60;
            noteAlarmEnabled = true;
            if(currentAlerts.length === 0) currentAlerts.push(0);
            refreshAlarmUi();
          }
        });
      });
      overlay.querySelectorAll('[data-note-act]').forEach(btn=>{
        btn.addEventListener('click',(e)=>{
          e.stopPropagation();
          enableAlarm();
          const a = btn.dataset.noteAct;
          if(a==='hUp') noteAlarmHour=(noteAlarmHour+1)%24;
          if(a==='hDn') noteAlarmHour=(noteAlarmHour+23)%24;
          if(a==='mUp') noteAlarmMinute=(noteAlarmMinute+1)%60;
          if(a==='mDn') noteAlarmMinute=(noteAlarmMinute+59)%60;
          refreshAlarmUi();
        });
      });
      document.getElementById('noteAlarmToggle').addEventListener('click',(e)=>{
        e.stopPropagation();
        noteAlarmEnabled = !noteAlarmEnabled;
        if(noteAlarmEnabled && currentAlerts.length === 0) currentAlerts.push(0);
        refreshAlarmUi();
      });

      overlay.querySelectorAll('.alert-btn').forEach(btn => {
        styleAlertButton(btn);
        btn.addEventListener('click', (e)=>{
          e.stopPropagation();
          if(btn.dataset._longFired === '1'){ btn.dataset._longFired=''; return; }
          enableAlarm(false);
          const off = parseInt(btn.dataset.offset, 10);
          const i = currentAlerts.indexOf(off);
          if(i >= 0) currentAlerts.splice(i,1);
          else currentAlerts.push(off);
          styleAlertButton(btn);
          refreshAlarmUi();
        });
        let lp=null;
        btn.addEventListener('pointerdown',(e)=>{
          const idx = parseInt(btn.dataset.idx, 10);
          if(idx === 0) return;
          startHoldWarning(btn);
          lp = setTimeout(()=>{
            stopHoldWarning(btn);
            btn.dataset._longFired='1';
            const cur = currentOffsets[idx];
            openSharedTimePicker({
              title:'Alarm advance',
              kind:'duration',
              initialMinutes:cur,
              minMinutes:5,
              maxMinutes:23*60+55,
              nested:true,
              onDone:(num)=>{
                const oldOff = currentOffsets[idx];
                const wasOn = currentAlerts.indexOf(oldOff);
                if(wasOn>=0){ currentAlerts.splice(wasOn,1); currentAlerts.push(num); }
                currentOffsets[idx] = num;
                btn.dataset.offset = String(num);
                btn.textContent = noteOffsetLabel(num);
                styleAlertButton(btn);
              }
            });
          }, 2000);
        });
        btn.addEventListener('pointerup',()=>{ clearTimeout(lp); stopHoldWarning(btn); });
        btn.addEventListener('pointerleave',()=>{ clearTimeout(lp); stopHoldWarning(btn); });
        btn.addEventListener('pointercancel',()=>{ clearTimeout(lp); stopHoldWarning(btn); });
      });

      bindRecentNoteSymbolButtons();
      document.getElementById('noteIcon').addEventListener('input',(e)=>{
        e.target.value = trimNoteSymbol(e.target.value);
      });

        window.open(EMOJI_SEARCH_URL, '_blank', 'noopener,noreferrer');
      });

      overlay.querySelector('[data-act="cancel"]').addEventListener('click',(e)=>{ e.stopPropagation(); hideOverlay(); });
      overlay.querySelector('[data-act="ok"]').addEventListener('click',(e)=>{

        const t=document.getElementById('noteText').value.trim();
        const i=trimNoteSymbol(document.getElementById('noteIcon').value)||'•';
        const aT=noteAlarmEnabled ? `${pad(noteAlarmHour)}:${pad(noteAlarmMinute)}` : '';
        const alertOffs = noteAlarmEnabled ? currentAlerts.slice().sort((a,b)=>a-b) : [];
        const savedOffsets = normalizeNoteOffsets(currentOffsets);
        rememberNoteSymbol(i);
        if(ex){
          ex.text=t; ex.icon=i;
          ex.alarmTime = aT;
          ex.alerts = alertOffs;
          ex.customOffsets = savedOffsets;
          ex.ackedAlerts = {};
        } else {
          notes.push({
            id:Date.now(), text:t, icon:i,
            alarmTime: aT, alerts: alertOffs,
            customOffsets: savedOffsets,
            ackedAlerts: {}
          });
        }
        saveStateAndMarkOverlayDirty('note_edit');
        closeOverlayToMain('note_edit');
      });
      const del=overlay.querySelector('[data-act="delete"]');
      if(del) del.addEventListener('click',(e)=>{
        e.stopPropagation();
        notes = notes.filter(n=>n.id!==noteId);
        saveStateAndMarkOverlayDirty('note_delete');
        closeOverlayToMain('note_delete');
      });
    }

    // ===== start/stop =====
    function resetTimeline(){
      breakActive=false; currentBreakStart=null;
      breakSegments=[]; exerciseMarkers=[]; breakAdjustMinutes=0;
    }
    function setWorkStart(mins, fromEdit=false){
      // Jeśli poprzednia dniówka jest "zamknięta" (endWorkMinutes ustawiony) - to znaczy że
      // teraz startuję nową dniówkę. Czyścimy wszystkie dane poprzedniej dniówki PRZED startem.
      if(endWorkMinutes!==null){
        // zapamiętaj końcowy licznik na jutro (jeśli jeszcze nie zapisany)
        if(counterEnd!==null && lastCounterEnd!==counterEnd) lastCounterEnd=counterEnd;
        resetDayAfterExport();
      }
      startWorkMinutes=mins;
      endWorkMinutes=null;
      lastExerciseMinutes = fromEdit ? nowMinutes() : mins;
      resetTimeline();
      document.getElementById('workBtn').classList.add('on');
      workDate = todayISO();
      if(!fromEdit) restoreDuePostponedNotes(workDate);
      saveStateAndScheduleAutoSync(fromEdit ? 'work_start_edit' : 'work_start');
      renderAll();
      syncWorkWakeLock();
      if(!fromEdit){
        setTimeout(()=>openStartCounterEditor({ returnToMain:true, startWorkAuto:true }), 0);
      }
    }
    function askEndedWorkdayStartChoice(){
      startEndConfirm({
        variant:'blue',
        mode:'choice',
        title:'',
        hint:'',
        choices:{
          reset:()=>setWorkStart(nowMinutes(), false),
          continue:()=>continueEndedWorkday()
        }
      });
    }
    function continueEndedWorkday(){
      const resumeAt = nowMinutes();
      if(endWorkMinutes!==null){
        const breakLen = diffMinutes(endWorkMinutes, resumeAt);
        if(breakLen > 0) breakSegments.push({ start:endWorkMinutes, end:resumeAt });
      }
      endWorkMinutes = null;
      breakActive = false;
      currentBreakStart = null;
      lastExerciseMinutes = resumeAt;
      _wheelsState.restoring = false;

      if(potStartedAt!==null){
        const rem = potRemainingSeconds();
        if(rem!==null && rem<=0){
          potStartedAt = null;
          potAckedDone = false;
          potUsedToday = true;
        }
      }

      document.getElementById('workBtn').classList.add('on');
      saveStateAndScheduleAutoSync('work_continue');
      renderAll();
      syncWorkWakeLock();
    }
    async function endWork(){
      endWorkMinutes=nowMinutes();
      if(breakActive && currentBreakStart!==null){
        breakSegments.push({ start:currentBreakStart, end:endWorkMinutes });
      }
      breakActive=false; currentBreakStart=null;
      document.getElementById('workBtn').classList.remove('on');
      // zapamiętaj końcowy licznik na jutro
      if(counterEnd!==null) lastCounterEnd=counterEnd;
      saveStateAndScheduleAutoSync('work_end');
      renderAll();
      syncWorkWakeLock();

      // Eksport - dane zostają na ekranie po sukcesie. Reset nastąpi dopiero przy nowym START.
      const url=localStorage.getItem(LS_APPSCRIPT);
      if(url){
        showToast('Eksport...','ok');
        const ok=await doExport(url);
        if(ok){
          showToast('Eksport OK. Dane pozostają na ekranie.','ok');
          saveStateAndScheduleAutoSync('work_end_export');
          renderAll();
        } else {
          showToast('Eksport nieudany. Spróbuj ponownie.','err');
        }
      } else {
        showToast('Praca zakończona. URL eksportu nie skonfigurowany.','err');
      }
    }
    function resetDayAfterExport(){
      startWorkMinutes=null; endWorkMinutes=null;
      lastExerciseMinutes=null;
      breakActive=false; currentBreakStart=null;
      breakSegments=[]; exerciseMarkers=[]; breakAdjustMinutes=0;
      workDate=null;
      PROVIDERS.forEach(p=>revenues[p.key]=0);
      counterStart=null; counterEnd=null; privKmTotal=0;
      potUsedToday=false;
      // Reset garnka - nawet jeśli był w trakcie grzania albo alarmu z wczoraj
      potStartedAt=null; potAckedDone=false;
      // Punkt 7: cel godzinowy wraca do domyślnych 8h
      workTargetMinutes=480;
      syncWorkWakeLock();
    }
    function softReset(){

    function jsonpRequest(url, params){
      return new Promise((resolve, reject)=>{
        const cb = '__tarczaSyncCb_' + Date.now() + '_' + Math.floor(Math.random()*100000);
        const script = document.createElement('script');
        const cleanup = ()=>{
          delete window[cb];
          if(script.parentNode) script.parentNode.removeChild(script);
          clearTimeout(timer);
        };
        const timer = setTimeout(()=>{
          cleanup();
          reject(new Error('timeout'));
        }, 25000);
        window[cb] = (data)=>{
          cleanup();
          resolve(data);
        };
        const query = Object.assign({}, params || {}, { callback:cb });
        const qs = Object.keys(query)
          .map(k=>encodeURIComponent(k)+'='+encodeURIComponent(query[k]))
          .join('&');
        script.onerror = ()=>{
          cleanup();
          reject(new Error('network'));
        };
        script.src = url + (url.includes('?') ? '&' : '?') + qs;
        document.body.appendChild(script);
      });
    }

    function playBeep(freq, duration, delay){
      try{
        unlockSyncAudio();
        if(!syncAudioCtx) return;
        const start = syncAudioCtx.currentTime + (delay || 0);
        const osc = syncAudioCtx.createOscillator();
        const gain = syncAudioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.18, start + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(gain);
        gain.connect(syncAudioCtx.destination);
        osc.start(start);
        osc.stop(start + duration + 0.03);
      }catch(e){}
    }

      const formatSyncTime = (value)=>{
        const raw = String(value || '').trim();
        if(!raw) return '-';
        const m = raw.match(/(\d{1,2}):(\d{2})/);
        if(m) return `${pad(Number(m[1]))}:${m[2]}`;
        return raw.length > 12 ? '-' : raw;
      };
      const syncLine = (s)=>{
        const fallback = syncDateFallback(s);
        return [
          s.snapshotNo || '-',
          formatSyncDate(s.savedDate || fallback.date),
          s.savedDay || '-',
          formatSyncTime(s.savedTime || fallback.time),
          s.phone || s.deviceLabel || 'Telefon'
        ].join(' | ');
      };
      const displayItems = (items || []).filter(s=>Number(s.snapshotNo) > 0 && (s.savedDate || s.savedDay || s.savedTime || s.phone));
      const list = displayItems.length ? displayItems.map(s=>`
        <button class="sync-snapshot-btn" type="button" data-sync-id="${escapeHtml(s.id)}">
          <strong>${escapeHtml(syncLine(s))}</strong>
        </button>
      `).join('') : '<div class="sync-loading">Brak zapisanych synchronizacji.</div>';
      showOverlay(`
        <div class="big-panel">
          <h3>POBIERZ SYNCHRONIZACJ&#280;</h3>
          <div class="sync-list">${list}</div>
          <div class="panel-actions">
            <button class="cancel-btn" data-act="back">X</button>
          </div>
        </div>
      `);
      overlay.querySelector('[data-act="back"]').addEventListener('click',(e)=>{ e.stopPropagation(); openWorkMenu(); });
      overlay.querySelectorAll('[data-sync-id]').forEach(btn=>{
        btn.addEventListener('click',(e)=>{
          e.stopPropagation();
          confirmSyncLoad(btn.dataset.syncId, cfg);
        });
      });
    }
    function confirmSyncLoad(id, cfg){
      showOverlay(`
        <div class="big-panel">
          <h3>UWAGA</h3>
          <div class="sync-warning">
            Pobranie synchronizacji nadpisze aktualny stan tego telefonu.
            <br><br>
            Kontynuowa&#263;?
          </div>
          <div style="flex:1;"></div>
          <div class="panel-actions">
            <button class="cancel-btn" data-act="cancel">X</button>
            <button class="ok-btn" data-act="ok">OK</button>
          </div>
        </div>
      `);
      overlay.querySelector('[data-act="cancel"]').addEventListener('click',(e)=>{ e.stopPropagation(); openSyncSnapshotList(); });
      overlay.querySelector('[data-act="ok"]').addEventListener('click',async (e)=>{
        e.stopPropagation();

      });

    async function loadSyncSnapshot(id, cfg){
      renderSyncLoading('Pobieram stan...');
      playSyncStartedSound();
      try{
        const data = await jsonpRequest(cfg.url, { action:'syncLoad', pin:cfg.pin, id });
        if(!data || !data.ok || !data.snapshot) throw new Error(data && data.error ? data.error : 'syncLoad failed');
        applySyncSnapshot(data.snapshot);
        markCloudSeen(data.snapshot);
        playSyncSuccessSound();
        playSyncStandbySound();
        setAutoSyncIndicatorState('on');
        hideOverlay();
        showToast('Synchronizacja pobrana.', 'ok');
      }catch(e){
        localStorage.removeItem(LS_SYNC_PIN);
        setAutoSyncIndicatorState('frozen');
        showToast('Nie udalo sie pobrac stanu.', 'err');
        openWorkMenu();
      }
    }
    function applySyncSnapshot(snapshot){
      clearAutoSyncSchedule(false);
      const state = JSON.parse(JSON.stringify(snapshot.state || {}));
      const persist = JSON.parse(JSON.stringify(snapshot.persist || {}));
      if(state.startWorkMinutes !== null && typeof state.startWorkMinutes !== 'undefined' &&
         (state.endWorkMinutes === null || typeof state.endWorkMinutes === 'undefined') &&
         state.workDate && state.workDate !== todayISO()){
        const endM = Number.isFinite(snapshot.savedAtMinutes) ? snapshot.savedAtMinutes : nowMinutes();
        if(state.breakActive && state.currentBreakStart !== null && typeof state.currentBreakStart !== 'undefined'){
          state.breakSegments = Array.isArray(state.breakSegments) ? state.breakSegments : [];
          state.breakSegments.push({ start:state.currentBreakStart, end:endM });
        }
        state.endWorkMinutes = endM;
        state.breakActive = false;
        state.currentBreakStart = null;
      }
      applyStateObjects(state, persist);
      clearLocalSyncDirty(snapshot);
      renderAll();
      syncWorkWakeLock();
    }

    async function autoSyncCheckOnForeground(reason){
      if(autoSyncBusy) return;
      if(!isAutoSyncEnabled()){
        updateAutoSyncIndicator();
        playSyncOffNoticeSound();
        return;
      }
      const cfg = getAutoSyncConfig();
      if(!cfg) return;
      autoSyncBusy = true;
      setAutoSyncIndicatorState('checking');
      playSyncStartedSound();
      showToast('Sprawdzam synchronizacje...', 'ok');
      try{
        const list = await fetchSyncList(cfg);
        if(!list || !list.ok) throw new Error(list && list.error ? list.error : 'syncList failed');
        const candidate = findNewestOtherSnapshot(list.snapshots || [], cfg.deviceId);
        if(!candidate){
          if(reason === 'toggle') markCurrentStateForInitialAutoUpload();
          setAutoSyncIndicatorState('on');
          playSyncNoChangesSound();
          playSyncStandbySound();
          return;
        }
        const seenCloudChange = Number(localStorage.getItem(LS_LAST_SEEN_CLOUD_CHANGE_AT) || 0);
        const cloudChange = Number(candidate.lastLocalChangeAt || candidate.savedAtMs || 0);
        if(cloudChange <= seenCloudChange){
          if(reason === 'toggle') markCurrentStateForInitialAutoUpload();
          markCloudSeen(candidate);
          setAutoSyncIndicatorState('on');
          playSyncNoChangesSound();
          playSyncStandbySound();
          return;
        }
        if(autoSyncConflictWithCloud(candidate)){
          setAutoSyncIndicatorState('frozen', 'Nowszy stan z innego telefonu istnieje w chmurze, a ten telefon ma lokalne niewyslane zmiany.');
          showToast('Konflikt synchronizacji - uzyj recznej synchronizacji.', 'err');
          return;
        }
        setAutoSyncIndicatorState('downloading');
        const loaded = await jsonpRequest(cfg.url, { action:'syncLoad', pin:cfg.pin, id:candidate.id });
        if(!loaded || !loaded.ok || !loaded.snapshot) throw new Error(loaded && loaded.error ? loaded.error : 'syncLoad failed');
        const downloadedComparable = comparableSnapshotState(loaded.snapshot);
        const currentComparable = currentComparableStateString();
        markCloudSeen(loaded.snapshot);
        if(downloadedComparable === currentComparable){
          setAutoSyncIndicatorState('on');
          playSyncNoChangesSound();
          playSyncStandbySound();
          return;
        }
        applySyncSnapshot(loaded.snapshot);
        playSyncSuccessSound();
        setAutoSyncIndicatorState('applied');
      }catch(e){
        setAutoSyncIndicatorState('frozen');
        showToast('Auto Sync zatrzymany - sprawdz ustawienia.', 'err');
      }finally{
        autoSyncBusy = false;
      }
    }

    async function performScheduledAutoSyncUpload(reason, keepalive){
      clearAutoSyncSchedule(false);
      if(!isAutoSyncEnabled()) return;
      if(autoSyncBusy){
        if(document.visibilityState === 'visible') scheduleAutoSyncUpload(reason || 'busy_retry');
        return;
      }
      const cfg = getAutoSyncConfig();
      if(!cfg) return;
      if(!hasUnuploadedLocalChanges()){
        setAutoSyncIndicatorState('on');
        return;
      }
      autoSyncBusy = true;
      setAutoSyncIndicatorState('checking');
      try{
        const list = await fetchSyncList(cfg);
        if(list && list.ok){
          const candidate = findNewestOtherSnapshot(list.snapshots || [], cfg.deviceId);
          if(candidate){
            const cloudChange = Number(candidate.lastLocalChangeAt || candidate.savedAtMs || 0);
            if(cloudChange > getLastLocalChangeAt()){
              markCloudSeen(candidate);
              setAutoSyncIndicatorState('frozen', 'W chmurze jest nowszy stan z innego telefonu. Automatyczna wysylka zostala zatrzymana, zeby nie nadpisac danych.');
              showToast('Auto Sync zatrzymany - nowszy stan w chmurze.', 'err');
              return;
            }
            if(autoSyncConflictWithCloud(candidate)){
              setAutoSyncIndicatorState('frozen', 'Wykryto ryzyko konfliktu: inny telefon zapisal stan, a ten telefon ma niewyslane zmiany.');
              showToast('Konflikt synchronizacji - uzyj recznej synchronizacji.', 'err');
              return;
            }
          }
        } else if(list && !list.ok){
          throw new Error(list.error || 'syncList failed');
        }
        const snapshot = buildSyncSnapshot(cfg.device);
        await sendSyncPayload(cfg, snapshot, !!keepalive).catch(()=>sendSyncPayload(cfg, snapshot, false));
        localStorage.setItem(LS_LAST_AUTO_UPLOAD_CHANGE_AT, String(snapshot.lastLocalChangeAt || Date.now()));
        markCloudSeen(snapshot);
        playSyncSuccessSound();
        setAutoSyncIndicatorState('on');
      }catch(e){
        setAutoSyncIndicatorState('frozen', 'Automatyczna wysylka synchronizacji nie powiodla sie. Sprawdz polaczenie albo uzyj synchronizacji recznej.');
      }finally{
        autoSyncBusy = false;
      }
    }

    function flushScheduledAutoSync(reason){
      if(!isAutoSyncEnabled()) return;
      if(!autoSyncUploadTimer && !autoSyncScheduledReason) return;
      performScheduledAutoSyncUpload(reason || autoSyncScheduledReason || 'flush', true);
    }

    async function autoSyncUploadOnHide(reason){
      if(autoSyncBusy || !isAutoSyncEnabled()) return;
      const cfg = getAutoSyncConfig();
      if(!cfg) return;
      if(!hasUnuploadedLocalChanges()) return;
      autoSyncBusy = true;
      playSyncStartedSound();
      try{
        const list = await fetchSyncList(cfg);
        if(list && list.ok){
          const candidate = findNewestOtherSnapshot(list.snapshots || [], cfg.deviceId);
          if(candidate){
            const cloudChange = Number(candidate.lastLocalChangeAt || candidate.savedAtMs || 0);
            if(cloudChange > getLastLocalChangeAt()){
              markCloudSeen(candidate);
              setAutoSyncIndicatorState('frozen');
              showToast('Auto Sync pominiety - nowszy stan w chmurze.', 'err');
              return;
            }
            if(autoSyncConflictWithCloud(candidate)){
              setAutoSyncIndicatorState('frozen');
              showToast('Konflikt synchronizacji - uzyj recznej synchronizacji.', 'err');
              return;
            }
          }
        }
        const snapshot = buildSyncSnapshot(cfg.device);
        await sendSyncPayload(cfg, snapshot, true).catch(()=>sendSyncPayload(cfg, snapshot, false));
        localStorage.setItem(LS_LAST_AUTO_UPLOAD_CHANGE_AT, String(snapshot.lastLocalChangeAt || Date.now()));
        markCloudSeen(snapshot);
        playSyncSuccessSound();
        playSyncStandbySound();
      }catch(e){
        setAutoSyncIndicatorState('frozen');
      }finally{
        autoSyncBusy = false;
      }
    }

    let workWakeLock = null;
    let workWakeLockWanted = false;

    function shouldKeepWorkAwake(){
      return startWorkMinutes!==null && endWorkMinutes===null;
    }
    async function requestWorkWakeLock(){
      if(!('wakeLock' in navigator)) return;
      if(!window.isSecureContext) return;
      if(document.visibilityState !== 'visible') return;
      if(workWakeLock && !workWakeLock.released) return;
      try{
        const lock = await navigator.wakeLock.request('screen');
        if(!workWakeLockWanted || !shouldKeepWorkAwake()){
          try{ await lock.release(); }catch(e){}
          return;
        }
        workWakeLock = lock;
        lock.addEventListener('release', ()=>{
          if(workWakeLock === lock) workWakeLock = null;
          if(workWakeLockWanted && shouldKeepWorkAwake() && document.visibilityState === 'visible'){
            setTimeout(()=>requestWorkWakeLock(), 250);
          }
        });
      }catch(e){
        workWakeLock = null;
      }
    }
    async function releaseWorkWakeLock(){
      const lock = workWakeLock;
      workWakeLock = null;
      if(lock && !lock.released){
        try{ await lock.release(); }catch(e){}
      }
    }
    function syncWorkWakeLock(){
      workWakeLockWanted = shouldKeepWorkAwake();
      if(workWakeLockWanted) requestWorkWakeLock();
      else releaseWorkWakeLock();
    }
    document.addEventListener('visibilitychange', ()=>{
      if(document.visibilityState === 'visible'){
        autoSyncHiddenUploaded = false;
        syncWorkWakeLock();
        autoSyncCheckOnForeground('visible');
      } else if(document.visibilityState === 'hidden'){
        flushScheduledAutoSync('hidden');
      }
    });
    window.addEventListener('pagehide', ()=>{

    });
    window.addEventListener('pageshow', ()=>{

      autoSyncCheckOnForeground('pageshow');
    });
    window.addEventListener('focus', ()=>{

    });

    // ===== event listeners =====

    const HOLD_WARNING_DELAY_MS = 500;
    function startHoldWarning(target){
      if(!target) return;
      clearTimeout(target._holdWarningTimer);
      target._holdWarningTimer = setTimeout(()=>{
        target.classList.add('hold-warning-shake');
      }, HOLD_WARNING_DELAY_MS);
    }
    function stopHoldWarning(target){
      if(!target) return;
      clearTimeout(target._holdWarningTimer);
      target.classList.remove('hold-warning-shake');
    }

    // === Helper: setup long-press na przycisku z akcją 3s + akcja na zwykły click ===
    // - clickAction: krótki klik (uruchomić tylko jeśli długi nie odpalił)
    // - longAction: 3s przytrzymanie
    // - canTrigger: opcjonalna funkcja dopuszczalności (np. nie wchodź w edycję gdy END-confirm)
    function setupLongPress(btn, clickAction, longAction, canTrigger){
      let pressTimer = null;
      let pressStarted = 0;
      let longFired = false;
      let cancelled = false;

      function start(e){
        if(canTrigger && !canTrigger(e)) return;
        if(e && e.target && e.target.closest && e.target.closest('.edit-hint')){ /* hint nie blokuje, jest pointer-events:none, ale zachowawczo */ }
        cancelled = false;
        longFired = false;
        pressStarted = Date.now();
        btn.classList.add('lp-active');
        startHoldWarning(btn);
        if(navigator.vibrate){ try{ navigator.vibrate([15]); }catch(e){} }
        pressTimer = setTimeout(()=>{
          if(cancelled) return;
          longFired = true;
          if(navigator.vibrate){ try{ navigator.vibrate([60,40,60]); }catch(e){} }
          stopHoldWarning(btn);
          btn.classList.remove('lp-active');
          longAction();
        }, 3000);
      }
      function endPress(){
        clearTimeout(pressTimer);
        stopHoldWarning(btn);
        btn.classList.remove('lp-active');
        if(longFired) return;
        if(cancelled) return;
        // krótki klik - uruchom tylko jeśli upłynęło < 3s i nie był to longpress
        clickAction();
      }
      function cancel(){
        cancelled = true;
        clearTimeout(pressTimer);
        stopHoldWarning(btn);
        btn.classList.remove('lp-active');
      }

      btn.addEventListener('pointerdown', (e)=>{ start(e); });
      btn.addEventListener('pointerup',   (e)=>{ endPress(); });
      btn.addEventListener('pointerleave',(e)=>{ cancel(); });
      btn.addEventListener('pointercancel',(e)=>{ cancel(); });
    }

    // === Animacja END - fala + odliczanie 5s. Może być red (koniec dniówki) lub yellow (reset). ===
    let endConfirmActive = false;
    let endConfirmTimer = null;
    let endConfirmInterval = null;
    let endConfirmAction = null;   // funkcja do wywołania przy potwierdzeniu
    let endConfirmMode = 'confirm';
    let endConfirmChoiceActions = null;

    function startEndConfirm(opts){
      if(endConfirmActive) return;
      opts = opts || {};
      const variant = opts.variant || 'red';
      const title = opts.title ?? 'KONIEC DNIÓWKI?';
      const action = opts.action || endWork;
      const mode = opts.mode || 'confirm';
      const hint = opts.hint ?? '';
      endConfirmActive = true;
      endConfirmAction = action;
      endConfirmMode = mode;
      endConfirmChoiceActions = opts.choices || null;

      const ov = document.getElementById('endConfirmOverlay');
      const ctr = document.getElementById('endConfirmCounter');
      const ttl = ov.querySelector('.end-confirm-title');
      const hintEl = ov.querySelector('.end-confirm-hint');
      ttl.innerHTML = title;
      hintEl.textContent = hint;
      ov.classList.remove('hidden','yellow','blue','choice-mode','collapsing');
      if(variant === 'yellow') ov.classList.add('yellow');
      if(variant === 'blue') ov.classList.add('blue');
      if(mode === 'choice') ov.classList.add('choice-mode');

      // restart animacji fali (re-trigger)
      const wave = ov.querySelector('.end-wave');
      wave.style.animation='none';
      wave.offsetHeight;
      wave.style.animation='';

      let secs = 5;
      ctr.textContent = secs;
      if(navigator.vibrate){ try{ navigator.vibrate([40,40,40]); }catch(e){} }

      endConfirmInterval = setInterval(()=>{
        secs--;
        if(secs <= 0){
          ctr.textContent = '0';
          cancelEndConfirm({collapse:true});
        } else {
          ctr.textContent = secs;
        }
      }, 1000);

      endConfirmTimer = setTimeout(()=>{
        cancelEndConfirm({collapse:true});
      }, 5000);
    }
    function cancelEndConfirm(opts){
      const collapse = opts && opts.collapse;
      endConfirmActive = false;
      endConfirmAction = null;
      endConfirmMode = 'confirm';
      endConfirmChoiceActions = null;
      clearTimeout(endConfirmTimer);
      clearInterval(endConfirmInterval);
      const ov = document.getElementById('endConfirmOverlay');
      if(collapse){
        // Zwiń wstecz (animacja), dopiero potem ukryj
        ov.classList.add('collapsing');
        setTimeout(()=>{
          ov.classList.add('hidden');
          ov.classList.remove('yellow','blue','choice-mode','collapsing');
        }, 500);
      } else {
        ov.classList.add('hidden');
        ov.classList.remove('yellow','blue','choice-mode','collapsing');
      }
    }
    function confirmEndAndFinish(){
      if(endConfirmMode === 'choice') return;
      const a = endConfirmAction;
      cancelEndConfirm();  // bez collapse - natychmiastowe ukrycie
      if(typeof a === 'function') a();
    }

    function handleRestartChoice(choice){
      if(endConfirmMode !== 'choice' || !endConfirmChoiceActions) return;
      const actions = endConfirmChoiceActions;
      cancelEndConfirm();
      const action = actions[choice];
      if(typeof action === 'function') action();
    }

    (function setupClockResetLongPress(){
      const clockWrap = document.querySelector('.clock-wrap');
      if(!clockWrap) return;
      const zone = document.createElement('div');
      zone.id = 'clockResetZone';

        if(endConfirmActive) return;  // nie startuj resetu gdy już trwa potwierdzenie
        cancelled=false; longFired=false;
        pressStarted=Date.now();
        startHoldWarning(clockWrap);
        if(navigator.vibrate){ try{ navigator.vibrate([15]); }catch(e){} }
        pressTimer=setTimeout(()=>{
          if(cancelled) return;
          longFired=true;
          if(navigator.vibrate){ try{ navigator.vibrate([60,40,60]); }catch(e){} }
          stopHoldWarning(clockWrap);
          startEndConfirm({
            variant:'yellow',
            title:'POTWIERDŹ RESET',
            action: softReset
          });

      }

        clearTimeout(pressTimer);
        stopHoldWarning(clockWrap);
      }

        clearTimeout(pressTimer);
        stopHoldWarning(clockWrap);
      }
      zone.addEventListener('pointerdown', start);
      zone.addEventListener('pointerup', endP);
      zone.addEventListener('pointerleave', cancel);

    // === WORK button ===

        vt=0;
        const cur=localStorage.getItem(LS_APPSCRIPT)||'';
        const v=prompt('URL Google Apps Script (Web App):', cur);
        if(v!==null){
          localStorage.setItem(LS_APPSCRIPT, v.trim());
          showToast(v.trim()?'URL zapisany':'URL wyczyszczony', 'ok');
        }
      }
    });

    // ===== PWA =====
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('sw.js').then(reg => {
          // Sprawdzaj aktualizacje co 60 sek - automatycznie pobiera nowy sw.js
          setInterval(()=>{ reg.update().catch(()=>{}); }, 60000);

          // Gdy znaleziono nowy SW i jest gotowy do aktywacji - od razu go aktywuj i przeładuj stronę
          reg.addEventListener('updatefound', ()=>{
            const newSW = reg.installing;
            if(!newSW) return;
            newSW.addEventListener('statechange', ()=>{
              if(newSW.state === 'installed' && navigator.serviceWorker.controller){
                // Mamy nowy SW gotowy - poproś o przejęcie kontroli
                newSW.postMessage({type:'SKIP_WAITING'});
              }
            });
          });
        }).catch(()=>{});

        // Gdy aktywny SW się zmieni - przeładuj stronę żeby załadować nowy index.html
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', ()=>{
          if(refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });
    }
    let deferredInstallPrompt=null;
    const installBtn=document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt',(e)=>{
      e.preventDefault();
      deferredInstallPrompt=e;
      installBtn.classList.add('visible');
    });
    installBtn.addEventListener('click', async ()=>{
      if(!deferredInstallPrompt) return;
      installBtn.classList.remove('visible');
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt=null;
    });
    window.addEventListener('appinstalled',()=>{
      installBtn.classList.remove('visible');
      deferredInstallPrompt=null;
    });
    document.getElementById('autoSyncIndicator').addEventListener('click', (e)=>{
      e.stopPropagation();
      if(autoSyncIndicatorState === 'applied'){
        setAutoSyncIndicatorState('on');
        playSyncStandbySound(0);
      } else if(autoSyncIndicatorState === 'frozen'){
        openWorkMenu();
      } else {
        openWorkMenu();
      }
    });

    // ===== init =====
    loadState();
    initializeSyncTracking();
    if(startWorkMinutes!==null && endWorkMinutes===null){
      document.getElementById('workBtn').classList.add('on');
    }
    buildDots();
    renderAll();
    syncWorkWakeLock();
    updateAutoSyncIndicator();
    setTimeout(()=>autoSyncCheckOnForeground('startup'), 900);
    // Pierwszy render rolki może paść jeśli clientHeight=0 przed layoutem.
    // Po pierwszej klatce wymuszamy ponowny render dla pewności.
    requestAnimationFrame(()=>{ renderAll(); });

    setInterval(()=>{ blinkState=!blinkState; renderAll(); }, 1000);

    // 100ms: płynna animacja radaru, ognia garnka, przywracania koła
    setInterval(()=>{
      if(startWorkMinutes!==null && lastExerciseMinutes!==null && getEffectiveExerciseElapsed()>60){
        renderRadarSweep();
      }
      if(potStartedAt!==null){
        renderPotButton();
      }
      // Animacja przywracania koła trwa 2s - aktualizuj klatki
      if(_wheelsState.restoring){
        renderWheels(0);
      }
    }, 100);

    // auto-save co minutę
    setInterval(()=>saveState(), 60000);
  </script>
</body>
</html>
