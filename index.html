      const current = ensurePostWorkVerificationForPayload(payload);
      if(!current || (part !== 'sync' && part !== 'export')) return;
      current[part] = ['idle','busy','ok','error'].includes(state) ? state : 'idle';
      current[part + 'Message'] = String(options.message || '');
      if(part === 'sync' && options.syncId) current.syncId = String(options.syncId);
      current.updatedAt = Date.now();
      postWorkVerification = current;
      savePostWorkVerification();
      updatePostWorkVerificationDom();
    }
    function syncPostWorkVerificationWithExportStatus(){
      if(!hasEndedWorkdayForExport()) return;
      const payload = buildDailyExportPayload();
      const current = ensurePostWorkVerificationForPayload(payload);
      if(!current || current.export === 'busy') return;
      const status = normalizeDailyExportStatus(dailyExportStatus);
      if(status.date !== String(payload.date || '') || status.signature !== dailyExportSignature(payload)) return;
      if(status.status === 'confirmed' && status.verified === true && current.export !== 'ok'){
        setPostWorkVerificationState('export', 'ok', { payload, message:'Eksport potwierdzony w Arkuszu.' });
      } else if(status.status === 'blocked' && current.export !== 'ok'){
        setPostWorkVerificationState('export', 'error', {
          payload,
          message:status.overwritePromptDismissed
            ? 'Nadpisanie eksportu anulowane. Eksport oczekuje na ręczną decyzję.'
            : 'Dane dniówki istnieją w Arkuszu. Wymagana decyzja o nadpisaniu.'
        });
      } else if(status.status === 'paused'){
        setPostWorkVerificationState('export', 'idle', {
          payload,
          message:'Nadpisanie eksportu wstrzymane. Możesz wrócić do decyzji ręcznie.'
        });
      } else if(status.status === 'suppressed'){
        setPostWorkVerificationState('export', 'idle', {
          payload,
          message:'Ponowny eksport tej wersji danych został zaniechany.'
        });
      } else if((status.status === 'pending' || (status.status === 'confirmed' && status.verified !== true)) && current.export !== 'error' && current.export !== 'ok'){
        setPostWorkVerificationState('export', 'error', { payload, message:'Brak potwierdzenia danych w Arkuszu.' });
      }
    }
    function expireStalePostWorkVerification(){
      const current = normalizePostWorkVerification(postWorkVerification);
      if(!current.updatedAt) return;
      if(Date.now() - current.updatedAt < 120000) return;
      let changed = false;
      if(current.sync === 'busy'){
        current.sync = 'error';
        current.syncMessage = 'Nie udało się potwierdzić synchronizacji.';
        changed = true;
      }
      if(current.export === 'busy'){
        current.export = 'error';
        current.exportMessage = 'Nie udało się potwierdzić eksportu dniówki.';
        changed = true;
      }
      if(changed){
        current.updatedAt = Date.now();
        postWorkVerification = current;
        savePostWorkVerification();
      }
    }
    function updatePostWorkVerificationDom(){
      const panel = document.getElementById('postWorkVerify');
      if(!panel) return;
      const current = normalizePostWorkVerification(postWorkVerification);
      const syncEl = document.getElementById('postWorkVerifySync');
      const exportEl = document.getElementById('postWorkVerifyExport');
      const setCell = (el, state, message)=>{
        if(!el) return;
        el.classList.remove('state-idle','state-busy','state-ok','state-error');
        el.classList.add('state-' + (['idle','busy','ok','error'].includes(state) ? state : 'idle'));
        if(message) el.setAttribute('title', message);
        else el.removeAttribute('title');
      };
      setCell(syncEl, current.sync, current.syncMessage || 'Synchronizacja: brak potwierdzenia.');
      setCell(exportEl, current.export, current.exportMessage || 'Eksport dniówki: brak potwierdzenia.');
    }
    function renderPostWorkVerification(visible){
      const panel = document.getElementById('postWorkVerify');
      if(!panel) return;
      panel.setAttribute('aria-hidden', visible ? 'false' : 'true');
      if(visible){
        ensureCurrentPostWorkVerification();
        expireStalePostWorkVerification();
        syncPostWorkVerificationWithExportStatus();
      }
      updatePostWorkVerificationDom();
    }
    function isOverwriteRequiredExportResult(result){
      return !!(result && result.requiresOverwriteConfirmation === true);
    }
    function shouldShowExportOverwriteGuard(){
      const current = normalizeDailyExportStatus(dailyExportStatus);
      const controls = document.querySelector('.controls');
      return current.status === 'blocked' &&
        current.overwriteRequired &&
        !current.overwritePromptDismissed &&
        !!controls &&
        controls.classList.contains('results-ended');
    }
    function renderExportOverwriteGuard(){
      const guard = document.getElementById('exportOverwriteGuard');
      if(!guard) return;
      const current = normalizeDailyExportStatus(dailyExportStatus);
      const visible = shouldShowExportOverwriteGuard();
      guard.classList.toggle('visible', visible);
      guard.setAttribute('aria-hidden', visible ? 'false' : 'true');

        amount.textContent = current.existingAmountDisplay ||

      const abandonBtn = document.getElementById('exportOverwriteAbandon');
      const confirmBtn = document.getElementById('exportOverwriteConfirm');
      if(noBtn) noBtn.disabled = exportOverwriteGuardBusy;
      if(abandonBtn) abandonBtn.disabled = exportOverwriteGuardBusy;

    function cancelDailyExportOverwrite(){
      if(!isDailyExportOverwriteBlocked()) return;
      markDailyExportPaused();
      const payload = normalizeDailyExportStatus(dailyExportStatus).payload;
      setPostWorkVerificationState('export', 'idle', {
        payload,
        message:'Nadpisanie eksportu wstrzymane. Możesz wrócić do decyzji ręcznie.'
      });
      setAutoSyncIndicatorState(isAutoSyncEnabled() ? 'on' : 'off');
      if(isAutoSyncEnabled()) scheduleAutoSyncUpload('export_conflict_paused', { immediate:true });
      renderAll();

    function abandonDailyExportOverwrite(){
      if(!isDailyExportOverwriteBlocked()) return;
      markDailyExportSuppressed();
      const payload = normalizeDailyExportStatus(dailyExportStatus).payload;
      setPostWorkVerificationState('export', 'idle', {

      if(isAutoSyncEnabled()) scheduleAutoSyncUpload('export_reexport_abandoned', { immediate:true });
      renderAll();
      showToast('Ponowny eksport zaniechany. Synchronizacja odblokowana.', 'ok');
    }
    async function confirmDailyExportOverwrite(){
      if(exportOverwriteGuardBusy) return;
      const current = normalizeDailyExportStatus(dailyExportStatus);
      if(current.status !== 'blocked' || !current.overwriteRequired ||
          !current.payload || !current.overwriteToken) return;
      const url = localStorage.getItem(LS_APPSCRIPT);
      if(!url){
        showToast('URL eksportu nie jest skonfigurowany.', 'err');
        return;
      }
      exportOverwriteGuardBusy = true;
      renderExportOverwriteGuard();
      const result = await doExport(url, current.payload, {
        overwriteConfirmed:true,
        overwriteToken:current.overwriteToken
      });
      exportOverwriteGuardBusy = false;
      exportOverwriteGuardArmed = false;
      if(isOverwriteRequiredExportResult(result)){
        renderAll();
        showToast('Dane w Arkuszu zmieniły się. Sprawdź kwotę ponownie.', 'err');
        return;
      }
      if(result){
        showToast('Eksport z nadpisaniem potwierdzony.', 'ok');
        if(isAutoSyncEnabled()) setAutoSyncIndicatorState('on');
        scheduleAutoSyncUpload('end_work_overwrite_confirmed', { immediate:true });
      } else {
        showToast('Eksport z nadpisaniem nie powiódł się.', 'err');
      }
      renderAll();
    }

    // ===== pomocnicze =====
    function pad(n){ return String(n).padStart(2,'0'); }
    function nowMinutes(){ const d=new Date(); return d.getHours()*60 + d.getMinutes(); }
    function effectiveNow(){ return endWorkMinutes!==null ? endWorkMinutes : nowMinutes(); }
    function todayISO(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
    function addDaysISO(iso, days){
      const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      const d = m ? new Date(parseInt(m[1],10), parseInt(m[2],10)-1, parseInt(m[3],10)) : new Date();
      d.setDate(d.getDate() + days);
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }
    function formatHHMM(m){ m=((m%1440)+1440)%1440; return `${pad(Math.floor(m/60))}:${pad(m%60)}`; }
    function formatCompact(m){ m=Math.max(0,m); const h=Math.floor(m/60), mm=m%60; return h<=0?String(mm):`${h}:${pad(mm)}`; }
    function formatCompactSigned(m){ const s=m<0?'-':''; const a=Math.abs(m); const h=Math.floor(a/60), mm=a%60; return h<=0?s+String(mm):`${s}${h}:${pad(mm)}`; }
    function minutesToHHMM(m){ m=Math.max(0,m); return pad(Math.floor(m/60))+':'+pad(m%60); }
    function diffMinutes(f,t){ let d=t-f; if(d<0) d+=1440; return d; }
    function applyFinalBreakCorrectionIfNoWorkAfterBreak(options={}){
      if(startWorkMinutes===null || endWorkMinutes===null || !Array.isArray(breakSegments) || breakSegments.length===0) return null;
      const lastIndex = breakSegments.length - 1;
      const last = breakSegments[lastIndex];
      if(!last || last.start===null || last.end===null || typeof last.start === 'undefined' || typeof last.end === 'undefined') return null;
      const breakStart = Number(last.start);
      const breakEnd = Number(last.end);
      const workEnd = Number(endWorkMinutes);
      if(!Number.isFinite(breakStart) || !Number.isFinite(breakEnd) || !Number.isFinite(workEnd)) return null;
      const breakLength = diffMinutes(breakStart, breakEnd);
      const workAfterBreak = diffMinutes(breakEnd, workEnd);
      if(breakLength<=0 || workAfterBreak>FINAL_BREAK_NO_WORK_THRESHOLD_MIN) return null;
      breakSegments = breakSegments.slice(0, lastIndex);
      endWorkMinutes = breakStart;
      breakActive = false;
      currentBreakStart = null;
      if(!pendingEndWorkExport && hasEndedWorkdayForExport()){
        setDailyExportPendingPayload(buildDailyExportPayload(), 'final_break_auto_corrected');
      }
      if(options.notify){
        showToast('Ostatnia przerwa potraktowana jako koniec pracy.', 'ok');
      }
      return {
        removedBreak:{ start:breakStart, end:breakEnd },
        previousEnd:workEnd,
        newEnd:breakStart,
        workAfterBreak,
        threshold:FINAL_BREAK_NO_WORK_THRESHOLD_MIN
      };
    }
    function clock720(m){ return m%720; }
    function angleFromMinutes(m){ return (clock720(m)/720)*360 - 90; }
    function polarToCartesian(cX,cY,r,a){ const rad=a*Math.PI/180; return {x:cX+Math.cos(rad)*r, y:cY+Math.sin(rad)*r}; }
    function clearChildren(n){ while(n.firstChild) n.removeChild(n.firstChild); }
    function createSectorPath(sM,eM,r){
      let diff=clock720(eM)-clock720(sM);
      if(diff<0) diff+=720;
      if(diff===0) return '';
      const p1=polarToCartesian(cx,cy,r,angleFromMinutes(sM));
      const p2=polarToCartesian(cx,cy,r,angleFromMinutes(eM));
      const large=diff>360?1:0;
      return `M ${cx} ${cy} L ${p1.x} ${p1.y} A ${r} ${r} 0 ${large} 1 ${p2.x} ${p2.y} Z`;
    }
    function createSectorPathBySpan(sM,spanM,r){
      if(spanM<=0) return '';
      if(spanM>=720){
        return `M ${cx-r} ${cy} A ${r} ${r} 0 1 0 ${cx+r} ${cy} A ${r} ${r} 0 1 0 ${cx-r} ${cy} Z`;
      }
      const eM=sM+spanM;
      const p1=polarToCartesian(cx,cy,r,angleFromMinutes(sM));
      const p2=polarToCartesian(cx,cy,r,angleFromMinutes(eM));
      const large=spanM>360?1:0;
      return `M ${cx} ${cy} L ${p1.x} ${p1.y} A ${r} ${r} 0 ${large} 1 ${p2.x} ${p2.y} Z`;
    }
    function svgFilledPath(d,c,o=1,extra={}){
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d',d); p.setAttribute('fill',c); p.setAttribute('opacity',o);
      Object.keys(extra).forEach(k=>p.setAttribute(k,extra[k]));
      return p;
    }
    const WORK_GREEN_LAP_COLOR = '#166f33';
    const OVERTIME_ORANGE_LAP_COLOR = '#9a4b05';
    const BREAK_LAP_COLOR = '#666666';

    function appendLapAwareSector(g,sAbs,eAbs,r,baseColor,lapColor,baseOpacity=1,lapOpacity=1,minLap=0,maxLap=Infinity){
      if(startWorkMinutes===null || !g || eAbs<=sAbs) return;
      const workStart=startWorkMinutes;
      let cursor=sAbs;
      while(cursor<eAbs){
        const lapIndex=Math.max(0, Math.floor((cursor-workStart)/720));
        const lapEnd=workStart+(lapIndex+1)*720;
        const segEnd=Math.min(eAbs,lapEnd);
        const d=createSectorPathBySpan(cursor,segEnd-cursor,r);
        if(d && lapIndex>=minLap && lapIndex<=maxLap){
          const isOverlapLap=lapIndex>0;
          g.appendChild(svgFilledPath(
            d,
            isOverlapLap ? lapColor : baseColor,
            isOverlapLap ? lapOpacity : baseOpacity
          ));
        }
        cursor=segEnd;
      }
    }
    function svgLine(x1,y1,x2,y2,c,w,dash=''){
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',x1); l.setAttribute('y1',y1); l.setAttribute('x2',x2); l.setAttribute('y2',y2);
      l.setAttribute('stroke',c); l.setAttribute('stroke-width',w);
      l.setAttribute('stroke-linecap','round'); l.setAttribute('opacity','0.96');
      if(dash) l.setAttribute('stroke-dasharray',dash);
      return l;
    }
    function svgBarrierLine(x1,y1,x2,y2, urgent=false){
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      const cycleMs = urgent ? 1000 : 2000;
      const delaySec = -((Date.now() % cycleMs) / 1000);
      function applyBarrierBlink(el, onOpacity, offOpacity){
        el.style.animation = `barrierLightBlink ${urgent ? 1 : 2}s steps(1,end) infinite`;
        el.style.animationDelay = `${delaySec.toFixed(3)}s`;
        el.style.setProperty('--barrier-light-on', String(onOpacity));
        el.style.setProperty('--barrier-light-off', String(offOpacity));
      }
      const base=document.createElementNS('http://www.w3.org/2000/svg','line');
      base.setAttribute('x1',x1); base.setAttribute('y1',y1); base.setAttribute('x2',x2); base.setAttribute('y2',y2);
      base.setAttribute('stroke','#f5f1e8');
      base.setAttribute('stroke-width','7');
      base.setAttribute('stroke-linecap','butt');
      base.setAttribute('opacity','0.98');
      const stripe=document.createElementNS('http://www.w3.org/2000/svg','line');
      stripe.setAttribute('x1',x1); stripe.setAttribute('y1',y1); stripe.setAttribute('x2',x2); stripe.setAttribute('y2',y2);
      stripe.setAttribute('stroke','#d31515');
      stripe.setAttribute('stroke-width','7');
      stripe.setAttribute('stroke-linecap','butt');
      stripe.setAttribute('stroke-dasharray','14 10');
      stripe.setAttribute('opacity','0.98');
      g.appendChild(base);
      g.appendChild(stripe);
      const led=document.createElementNS('http://www.w3.org/2000/svg','line');
      led.setAttribute('x1',x1); led.setAttribute('y1',y1); led.setAttribute('x2',x2); led.setAttribute('y2',y2);
      led.setAttribute('stroke','#ffd21f');
      led.setAttribute('stroke-width', urgent ? '1.15' : '0.75');
      led.setAttribute('stroke-linecap','butt');
      led.style.filter = urgent
        ? 'drop-shadow(0 0 2px rgba(255,224,46,.88)) drop-shadow(0 0 5px rgba(255,190,0,.42))'
        : 'drop-shadow(0 0 1.6px rgba(255,224,46,.58)) drop-shadow(0 0 3.5px rgba(255,190,0,.24))';
      applyBarrierBlink(led, urgent ? .92 : .56, urgent ? .08 : .02);
      g.appendChild(led);

      const len=Math.hypot(x2-x1,y2-y1);
      const ux=len ? (x2-x1)/len : 0;
      const uy=len ? (y2-y1)/len : 0;
      function addBarrierLamp(dist, fill, glow, onOpacity){
        if(dist<4 || dist>len-4) return;
        const lamp=document.createElementNS('http://www.w3.org/2000/svg','circle');
        lamp.setAttribute('cx',(x1+ux*dist).toFixed(2));
        lamp.setAttribute('cy',(y1+uy*dist).toFixed(2));
        lamp.setAttribute('r', urgent ? '2.45' : '1.85');
        lamp.setAttribute('fill',fill);
        lamp.style.filter = glow;
        applyBarrierBlink(lamp, onOpacity, urgent ? .12 : .05);
        g.appendChild(lamp);
      }
      for(let d=7; d<len; d+=24){
        addBarrierLamp(
          d,
          '#ffffff',
          urgent
            ? 'drop-shadow(0 0 4px rgba(255,255,255,1)) drop-shadow(0 0 10px rgba(255,255,255,.82))'
            : 'drop-shadow(0 0 3px rgba(255,255,255,.75)) drop-shadow(0 0 7px rgba(255,255,255,.42))',
          urgent ? 1 : .88
        );
      }
      for(let d=19; d<len; d+=24){
        addBarrierLamp(
          d,
          '#ff2424',
          urgent
            ? 'drop-shadow(0 0 4px rgba(255,38,38,1)) drop-shadow(0 0 10px rgba(255,0,0,.85))'
            : 'drop-shadow(0 0 3px rgba(255,38,38,.78)) drop-shadow(0 0 7px rgba(255,0,0,.45))',
          urgent ? 1 : .9
        );
      }
      const angle=Math.atan2(y2-y1,x2-x1)*180/Math.PI;
      const midX=(x1+x2)/2, midY=(y1+y2)/2;
      const sign=document.createElementNS('http://www.w3.org/2000/svg','g');
      sign.setAttribute('transform',`translate(${midX.toFixed(2)} ${midY.toFixed(2)}) rotate(${angle.toFixed(2)})`);
      const signCircle=document.createElementNS('http://www.w3.org/2000/svg','circle');
      signCircle.setAttribute('cx','0');
      signCircle.setAttribute('cy','0');
      signCircle.setAttribute('r','9.5');
      signCircle.setAttribute('fill','#d80000');
      signCircle.setAttribute('stroke','#fff');
      signCircle.setAttribute('stroke-width','2.2');
      const signBar=document.createElementNS('http://www.w3.org/2000/svg','rect');
      signBar.setAttribute('x','-6.5');
      signBar.setAttribute('y','-2.2');
      signBar.setAttribute('width','13');
      signBar.setAttribute('height','4.4');
      signBar.setAttribute('rx','1.2');
      signBar.setAttribute('fill','#fff');
      sign.appendChild(signCircle);
      sign.appendChild(signBar);
      g.appendChild(sign);
      return g;
    }

    function buildDots(){
      const g=document.getElementById('dots');
      clearChildren(g);
      for(let i=0;i<60;i++){
        const ang=(i*6-90)*Math.PI/180;
        const x=cx+Math.cos(ang)*radius, y=cy+Math.sin(ang)*radius;

    // ===== wskazówki: kropka minut + strzałka godzin =====
    function renderHands(){
      const gHour = document.getElementById('hourArrow');
      const gMin  = document.getElementById('minuteDot');
      clearChildren(gHour); clearChildren(gMin);

      const now = new Date();
      const h = now.getHours(), m = now.getMinutes();
      const hourDeg = (h % 12) * 30 + m * 0.5;
      // Minuta stoi przy kierunku wskazówki godzinowej, lekko poza tarczą.
      const minDeg  = hourDeg;

      // === Strzałka godzinowa - jako polygon (grot strzałki) ===
      const aRad = (hourDeg - 90) * Math.PI / 180;
      const r1 = 130, r2 = 75;
      // Punkty trzonu strzałki (prostokąt) + grot na końcu (przy cyfrze, r1)
      // Grot ma szerokość większą i kończy się w punkcie r1+8
      const tipR = r1 + 4;        // wierzchołek grotu
      const headR = r1 - 14;       // gdzie zaczyna się grot (cofnięty od wierzchołka o 18)
      const shaftR = r2;           // koniec trzonu (bliżej środka)
      const halfShaft = 5.5;       // pół-szerokość trzonu
      const halfHead  = 11;        // pół-szerokość grotu (szersza)
      // Wektor wzdłużny i prostopadły
      const ux = Math.cos(aRad), uy = Math.sin(aRad);
      const nx = -uy, ny = ux;
      function pt(r, side){
        return [cx + ux*r + nx*side, cy + uy*r + ny*side];
      }
      // 7 wierzchołków: trzon-lewa-koniec, trzon-lewa-baza, grot-lewa-baza,
      //                  wierzchołek, grot-prawa-baza, trzon-prawa-baza, trzon-prawa-koniec
      const p1 = pt(shaftR, -halfShaft);
      const p2 = pt(headR,  -halfShaft);
      const p3 = pt(headR,  -halfHead);
      const p4 = pt(tipR,    0);
      const p5 = pt(headR,   halfHead);
      const p6 = pt(headR,   halfShaft);
      const p7 = pt(shaftR,  halfShaft);
      const points = [p1,p2,p3,p4,p5,p6,p7].map(p=>p.map(n=>n.toFixed(2)).join(',')).join(' ');

      // Obwódka (czarna)
      const hOut = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      hOut.setAttribute('points', points);
      hOut.setAttribute('fill', '#000');
      hOut.setAttribute('stroke', '#000');
      hOut.setAttribute('stroke-width', '4');
      hOut.setAttribute('stroke-linejoin', 'round');
      gHour.appendChild(hOut);
      // Wypełnienie białe
      const hIn = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      hIn.setAttribute('points', points);
      hIn.setAttribute('fill', '#ffffff');
      gHour.appendChild(hIn);

      // === Liczba minut na obwodzie ===
      // Pozycja zależy od kierunku wskazówki godzinowej, a treść od aktualnej minuty.
      const mRad = (minDeg - 90) * Math.PI / 180;
      // Etykieta minut na zewnątrz
      const lblR = radius + 18;
      const lblX = cx + Math.cos(mRad) * lblR, lblY = cy + Math.sin(mRad) * lblR;
      const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
      lbl.setAttribute('x', lblX.toFixed(2)); lbl.setAttribute('y', lblY.toFixed(2));
      lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('dominant-baseline','central');

      function hourLabel24(hour24){ return hour24 === 0 ? '24' : String(hour24); }
      const labelCurrent = hourLabel24(h);
      const labelNext = hourLabel24(hNext24);
      let activeHours = [];
      if(m < 30)       activeHours = [{pos:hh12, label:labelCurrent, type:'active'}];
      else if(m < 55)  activeHours = [{pos:hh12, label:labelCurrent, type:'active'},{pos:nextHh, label:labelNext, type:'preview'}];

    // ===== czas / praca =====
    function getClosedBreakMinutes(){ let s=0; for(const seg of breakSegments) s+=diffMinutes(seg.start,seg.end); return s; }
    function getActiveBreakMinutes(){ return (breakActive&&currentBreakStart!==null)?diffMinutes(currentBreakStart,effectiveNow()):0; }
    function getTotalBreakMinutes(a=true){ let s=getClosedBreakMinutes()+breakAdjustMinutes; if(a) s+=getActiveBreakMinutes(); return s; }
    function getNetWorkMinutes(){ if(startWorkMinutes===null) return 0; return diffMinutes(startWorkMinutes,effectiveNow()) - getTotalBreakMinutes(true); }
    function getTimelineBreakSegmentsAbs(nowAbs, includeActive=true){
      if(startWorkMinutes===null) return [];
      const segments = [];
      for(const seg of breakSegments){
        if(!seg || seg.start===null || seg.end===null || typeof seg.start === 'undefined' || typeof seg.end === 'undefined') continue;
        const sAbs = startWorkMinutes + diffMinutes(startWorkMinutes, seg.start);
        const eAbs = sAbs + diffMinutes(seg.start, seg.end);
        if(eAbs > startWorkMinutes && sAbs < nowAbs) segments.push({
          start:Math.max(startWorkMinutes, sAbs),
          end:Math.min(nowAbs, eAbs)
        });
      }
      if(includeActive && breakActive && currentBreakStart!==null){
        const sAbs = startWorkMinutes + diffMinutes(startWorkMinutes, currentBreakStart);
        if(sAbs < nowAbs) segments.push({
          start:Math.max(startWorkMinutes, sAbs),
          end:nowAbs
        });
      }
      return segments
        .filter(seg=>seg.end>seg.start)
        .sort((a,b)=>a.start-b.start)
        .reduce((merged, seg)=>{
          const last = merged[merged.length-1];
          if(last && seg.start <= last.end){
            last.end = Math.max(last.end, seg.end);
          } else {
            merged.push({ start:seg.start, end:seg.end });
          }
          return merged;
        }, []);
    }
    function getForecastEndMinutes(){
      if(startWorkMinutes===null) return null;
      const now=effectiveNow();
      const nowAbs=startWorkMinutes + diffMinutes(startWorkMinutes, now);
      const targetWork=Math.max(0, workTargetMinutes + (breakAdjustMinutes || 0));
      if(targetWork<=0) return startWorkMinutes;
      let worked=0;
      let cursor=startWorkMinutes;
      const breaksAbs=getTimelineBreakSegmentsAbs(nowAbs, true);
      for(const seg of breaksAbs){
        if(seg.start>cursor){
          const span=seg.start-cursor;
          if(worked+span>=targetWork) return cursor + (targetWork-worked);
          worked+=span;
        }
        cursor=Math.max(cursor, seg.end);
      }
      if(nowAbs>cursor){
        const span=nowAbs-cursor;
        if(worked+span>=targetWork) return cursor + (targetWork-worked);
        worked+=span;
      }
      return nowAbs + (targetWork-worked);
    }
    function getBreakOverlapSince(anchor){
      const total=diffMinutes(anchor,effectiveNow()); let o=0;
      for(const seg of breakSegments){
        let s=diffMinutes(anchor,seg.start), e=diffMinutes(anchor,seg.end);
        if(e<s) e+=1440;
        const f=Math.max(0,s), t=Math.min(total,e);
        if(t>f) o+=t-f;
      }
      if(breakActive&&currentBreakStart!==null){
        let s=diffMinutes(anchor,currentBreakStart), e=total;
        const f=Math.max(0,s), t=Math.min(total,e);
        if(t>f) o+=t-f;
      }
      return o;
    }
    function getEffectiveExerciseElapsed(){
      if(startWorkMinutes===null||lastExerciseMinutes===null) return 0;
      return Math.max(0, diffMinutes(lastExerciseMinutes,effectiveNow()) - getBreakOverlapSince(lastExerciseMinutes));

    const EYE_BLINK_BUFFER_MS = 120;
    const EYE_BLINK_SCHEDULE_MS = 3 * 60 * 1000;
    const EYE_BLINKS = [
      { src:'Photos/blink_normal_v2.gif', weight:50, durationMs:2020 },
      { src:'Photos/blink_fast_v2.gif', weight:25, durationMs:510 },
      { src:'Photos/blink_double_v2.gif', weight:20, durationMs:940 },

    let eyeBlinkScheduleStartedAt = 0;
    let eyeBlinkTimer = null;

    function randomBetween(min, max){
      return min + Math.random() * (max - min);
    }
    function pickWeighted(items){
      const total = items.reduce((sum, item)=>sum + item.weight, 0);
      let r = Math.random() * total;
      for(const item of items){
        r -= item.weight;
        if(r <= 0) return item;
      }
      return items[items.length - 1];
    }
    function pickEyeBlinkDelayMs(){
      const r = Math.random();
      if(r < 0.60) return randomBetween(1.2, 2.4) * 1000;
      if(r < 0.85) return randomBetween(0.4, 1.0) * 1000;
      return randomBetween(3.0, 5.0) * 1000;
    }
    function generateEyeBlinkSchedule(){
      const schedule = [];
      let at = pickEyeBlinkDelayMs();
      while(at < EYE_BLINK_SCHEDULE_MS){
        const blink = pickWeighted(EYE_BLINKS);
        schedule.push({ atMs:at, blink });
        at += blink.durationMs + EYE_BLINK_BUFFER_MS + pickEyeBlinkDelayMs();
      }
      return schedule;
    }

    function scheduleNextEyeBlink(){

        stopEyeBlinkController();

      if(!eyeBlinkSchedule.length){
        eyeBlinkSchedule = generateEyeBlinkSchedule();
        eyeBlinkScheduleStartedAt = Date.now();
      }
      const item = eyeBlinkSchedule.shift();
      if(!item){
        eyeBlinkSchedule = [];
        scheduleNextEyeBlink();
        return;

      const delay = eyeBlinkScheduleStartedAt + item.atMs - Date.now();
      if(delay < -1000){
        eyeBlinkSchedule = [];

      clearTimeout(eyeBlinkTimer);

    // Płynna wersja w minutach z ułamkiem (uwzględnia sekundy z aktualnego zegara)
    function getEffectiveExerciseElapsedFractional(){

    // === Bug 15: efektywny początek czerwonego sektora ===
    // Jeśli po lastExerciseMinutes była przerwa, "wizualny" start brakuczu ćwiczeń
    // to koniec OSTATNIEJ takiej przerwy. W przeciwnym razie - lastExerciseMinutes.
    // Dotyczy zarówno czerwonego pola na tarczy jak i radaru.
    function getRedSectorStart(){
      if(lastExerciseMinutes===null) return null;
      const now = effectiveNow();
      let latestBreakEnd = null;
      // Iteruj zamknięte przerwy
      for(const seg of breakSegments){
        // Czy ta przerwa jest między lastExerciseMinutes a now?
        const segEndAfter = diffMinutes(lastExerciseMinutes, seg.end);
        const segEndBeforeNow = diffMinutes(seg.end, now);
        // segment jest "po lastExercise" gdy segEndAfter < diffMinutes(lastExerciseMinutes, now)
        // i jednocześnie seg.end <= now (czyli zamknięta przerwa skończyła się przed now)
        if(segEndAfter > 0 && segEndAfter <= diffMinutes(lastExerciseMinutes, now)){
          // wybierz najpóźniejszą z takich przerw
          if(latestBreakEnd === null || segEndAfter > diffMinutes(lastExerciseMinutes, latestBreakEnd)){
            latestBreakEnd = seg.end;
          }
        }
      }
      // Jeśli aktualnie trwa przerwa - radar nie powinien latać dalej, ale getEffectiveExerciseElapsed
      // już pauzuje liczenie. Tu zwracamy najlepszy znany punkt:
      return latestBreakEnd !== null ? latestBreakEnd : lastExerciseMinutes;

      const sM=getRedSectorStart();
      const eM=effectiveNow();
      const spanM=diffMinutes(sM,eM);
      if(spanM<=0) return;

      const cycle=4000;
      const t=(Date.now()%cycle)/cycle;
      const progress = t<0.5 ? t*2 : 1-(t-0.5)*2;
      const posM=sM + progress*spanM;
      const widthM=Math.max(1.5, spanM*0.06);

      const tip=createSectorPath(posM-widthM/2, posM+widthM/2, radius);
      if(tip) sw.appendChild(svgFilledPath(tip,'#ffcccc',0.85));

      for(let i=1;i<=3;i++){
        const off=widthM*1.8*i;
        const dir=(t<0.5)?-1:1;
        const tailC=posM+dir*off;
        if(tailC<sM||tailC>eM) continue;
        const tail=createSectorPath(tailC-widthM/2, tailC+widthM/2, radius);

    let _wheelsState = {

    function getWheelVanishAngle(elapsedMinutes){

    function clamp01(v){ return Math.max(0, Math.min(1, v)); }
    function smoothstep(t){
      t = clamp01(t);
      return t * t * (3 - 2 * t);

    function mix(a,b,t){ return a + (b - a) * t; }
    function exerciseCircleColor(progress){
      const pts = [
        { p:0.00, c:[69,238,115] },
        { p:0.45, c:[48,198,91] },
        { p:0.50, c:[33,154,72] },
        { p:0.70, c:[27,104,54] },
        { p:0.80, c:[98,74,28] },
        { p:0.92, c:[188,32,38] },
        { p:1.00, c:[255,34,34] }
      ];
      const p = clamp01(progress);
      for(let i=0; i<pts.length-1; i++){
        const a = pts[i], b = pts[i+1];
        if(p <= b.p){
          const t = smoothstep((p - a.p) / (b.p - a.p));
          const r = Math.round(mix(a.c[0], b.c[0], t));
          const g = Math.round(mix(a.c[1], b.c[1], t));
          const bl = Math.round(mix(a.c[2], b.c[2], t));
          return `rgb(${r},${g},${bl})`;
        }
      }
      return 'rgb(255,34,34)';

    function getExerciseSpraySurface(){
      const canvas = document.getElementById('exerciseSprayCanvas');
      if(!canvas) return null;
      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      if(w < 2 || h < 2) return null;
      const dpr = Math.min(1.6, window.devicePixelRatio || 1);
      const pxW = Math.max(1, Math.round(w * dpr));
      const pxH = Math.max(1, Math.round(h * dpr));
      if(canvas.width !== pxW || canvas.height !== pxH){
        canvas.width = pxW;
        canvas.height = pxH;
      }
      const ctx = canvas.getContext('2d', { alpha:true });
      if(!ctx) return null;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, pxW, pxH);
      return { ctx, w:pxW, h:pxH, cx:pxW / 2, cy:pxH / 2, radius: Math.min(pxW, pxH) * 0.45 };

    function ensureExerciseCloudMap(surface){

      const angle = new Float32Array(total);
      const inside = [];
      for(let y=0; y<surface.h; y++){
        for(let x=0; x<surface.w; x++){
          const idx = y * surface.w + x;
          const dx = x + 0.5 - surface.cx;
          const dy = y + 0.5 - surface.cy;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if(dist > surface.radius) continue;
          const clockDeg = normalizeClockDeg(Math.atan2(dy, dx) * 180 / Math.PI + 90);
          angle[idx] = clockDeg;
          inside.push(idx);
        }
      }
      _exerciseCloudMap = {
        w:surface.w,
        h:surface.h,
        angle,
        inside:Uint32Array.from(inside)
      };
      return _exerciseCloudMap;
    }
    function drawExerciseCloudMask(vanishedDeg){
      const angleDeg = Math.max(0, Math.min(360, vanishedDeg));
      setExerciseCircleProgress(angleDeg / 360);
      clearLegacyWheelSvg();
      const surface = getExerciseSpraySurface();
      if(!surface) return;
      if(angleDeg <= 0.15) return;

      const map = ensureExerciseCloudMap(surface);
      const image = surface.ctx.createImageData(surface.w, surface.h);
      const data = image.data;
      const edgeWidth = 44;
      const cleanStartDeg = 3;
      const effectiveAngle = Math.max(0, angleDeg - cleanStartDeg);
      const finalFill = smoothstep((angleDeg - 350) / 10);

      for(let i=0; i<map.inside.length; i++){
        const idx = map.inside[i];
        const a = map.angle[idx];
        let alpha = smoothstep((effectiveAngle - a) / edgeWidth);

        alpha = Math.max(alpha, finalFill);
        if(alpha <= 0.01) continue;
        const base = idx * 4;
        data[base] = 0;
        data[base + 1] = 0;
        data[base + 2] = 0;
        data[base + 3] = Math.round(clamp01(alpha) * 255);
      }
      surface.ctx.putImageData(image, 0, 0);
    }
    function paintExerciseSprayVanish(vanishedDeg){
      drawExerciseCloudMask(vanishedDeg);
    }
    function paintExerciseSprayRestore(fromAngle, currentAngle){
      const start = Math.max(0, Math.min(360, fromAngle));
      const current = Math.max(0, Math.min(start, currentAngle));
      drawExerciseCloudMask(current);
    }
    function fullCirclePath(){
      return 'M 100 100 m -150 0 a 150 150 0 1 0 300 0 a 150 150 0 1 0 -300 0';
    }
    function sectorPath(startClockDeg, endClockDeg, radius=150){
      const span = Math.max(0, endClockDeg - startClockDeg);
      if(span <= 0.01) return '';
      if(span >= 359.99) return fullCirclePath();
      const cx=100, cy=100;
      const startAng = -90 + startClockDeg;
      const endAng = -90 + endClockDeg;
      const startRad = startAng * Math.PI / 180;
      const endRad = endAng * Math.PI / 180;
      const startX = cx + radius * Math.cos(startRad);
      const startY = cy + radius * Math.sin(startRad);
      const endX = cx + radius * Math.cos(endRad);
      const endY = cy + radius * Math.sin(endRad);
      const largeArc = span > 180 ? 1 : 0;
      return `M ${cx} ${cy} L ${startX.toFixed(2)} ${startY.toFixed(2)} ` +
             `A ${radius} ${radius} 0 ${largeArc} 1 ${endX.toFixed(2)} ${endY.toFixed(2)} Z`;
    }
    function clearWheelImageMask(){
      ['wheelImage','wheelRestoreCover'].forEach((id)=>{
        const el=document.getElementById(id);
        if(!el) return;
        el.style.webkitMaskImage='';
        el.style.maskImage='';
        el.style.webkitMaskSize='';
        el.style.maskSize='';
      });
    }
    function paintWheelRestoreOverageMask(vanishedDeg){
      const wheel=document.getElementById('wheelImage');
      const cover=document.getElementById('wheelRestoreCover');
      if(!wheel && !cover) return;
      const angle=Math.max(0, Math.min(360, vanishedDeg));
      const applyMask=(mask)=>{
        [wheel,cover].forEach((el)=>{
          if(!el) return;
          el.style.webkitMaskSize='100% 100%';
          el.style.maskSize='100% 100%';
          el.style.webkitMaskImage=mask;
          el.style.maskImage=mask;
        });
      };
      if(angle<=0){
        clearWheelImageMask();
        return;
      }
      if(angle>=360){
        applyMask('linear-gradient(transparent, transparent)');
        return;
      }
      const mist=36;
      const revealStart=Math.max(0, angle - mist * 0.5);
      const revealFull=Math.min(360, angle + mist * 0.5);
      const mask =
        `conic-gradient(from 0deg at 50% 50%, ` +
        `rgba(0,0,0,0) 0deg, ` +
         `rgba(0,0,0,0) ${revealStart.toFixed(2)}deg, ` +
         `rgba(0,0,0,.95) ${revealFull.toFixed(2)}deg, ` +
         `rgba(0,0,0,1) 360deg)`;
      applyMask(mask);
    }

    // Rysuje SVG path sektora od 12:00 do `vanishedDeg` (zgodnie ze wskazówkami).
    // Sektor pełny = czarny, plus krawędź soft (filter blur na końcu).
    function paintWheelMask(vanishedDeg){
      paintExerciseSprayVanish(vanishedDeg);
      return;
      const overlayNew = document.getElementById('wheelMaskOverlay');
      const sectorNew = document.getElementById('wheelVanishSector');
      const edgeNew = document.getElementById('wheelVanishEdge');
      if(!overlayNew || !sectorNew || !edgeNew) return;
      overlayNew.style.background = 'none';
      const angleNew = Math.max(0, Math.min(360, vanishedDeg));
      setExerciseCircleProgress(angleNew / 360);
      if(angleNew <= 0){
        sectorNew.setAttribute('d', '');
        edgeNew.setAttribute('d', '');
        return;
      }
      if(angleNew >= 360){
        sectorNew.setAttribute('d', fullCirclePath());
        edgeNew.setAttribute('d', '');
        return;
      }
      const mistNew = 30;
      const hardEndNew = Math.max(0, angleNew - mistNew * 0.48);
      const softEndNew = Math.min(360, angleNew + mistNew * 0.52);
      sectorNew.setAttribute('d', sectorPath(0, hardEndNew));
      edgeNew.setAttribute('d', sectorPath(Math.max(0, hardEndNew - 2), softEndNew));
      return;
      {
        const overlay = document.getElementById('wheelMaskOverlay');
        const exBtn = document.getElementById('exerciseBtn');
        const sector = document.getElementById('wheelVanishSector');
        const edge = document.getElementById('wheelVanishEdge');
        if(sector) sector.setAttribute('d', '');
        if(edge) edge.setAttribute('d', '');
        if(!overlay) return;
        if(exBtn && exBtn.classList.contains('restore-overage')){
          overlay.style.background = 'none';
          paintWheelRestoreOverageMask(vanishedDeg);
          return;
        }
        clearWheelImageMask();

        if(vanishedDeg <= 0){
          overlay.style.background = 'none';
          return;
        }
        if(vanishedDeg >= 360){
          overlay.style.background = '#000';
          return;
        }

        const angle = Math.max(0, Math.min(360, vanishedDeg));
        const mist = 36;
        const startFadeEnd = Math.min(mist, Math.max(6, angle * 0.38));
        const endFadeStart = Math.max(startFadeEnd, angle - mist * 0.5);
        const endFadeEnd = Math.min(360, angle + mist * 0.5);

        overlay.style.background =
          `conic-gradient(from 0deg at 50% 50%, ` +
          `rgba(0,0,0,0) 0deg, ` +
          `rgba(0,0,0,.94) ${startFadeEnd.toFixed(2)}deg, ` +
          `rgba(0,0,0,.97) ${endFadeStart.toFixed(2)}deg, ` +
          `rgba(0,0,0,0) ${endFadeEnd.toFixed(2)}deg, ` +
          `rgba(0,0,0,0) 360deg)`;
        return;
      }

      const sector = document.getElementById('wheelVanishSector');
      const edge = document.getElementById('wheelVanishEdge');
      if(!sector || !edge) return;

      if(vanishedDeg <= 0){
        sector.setAttribute('d', '');
        edge.setAttribute('d', '');
        return;
      }
      if(vanishedDeg >= 360){
        // Pełny krąg
        sector.setAttribute('d', 'M 100 0 A 100 100 0 1 1 99.99 0 Z M 100 100 Z');
        edge.setAttribute('d', '');
        return;
      }

      const cx=100, cy=100, r=110; // r=110 daje minimalny zapas poza viewBox 0-200, żeby nie odsłaniało koła
      // SVG kąty: 0deg = w prawo, ale w zegarze 0deg = w górę. Korekta -90.
      // Sektor "zniknięty" idzie od 12:00 (top) zgodnie ze wskazówkami do `vanishedDeg`.
      const startAng = -90;                    // 12:00
      const endAng   = -90 + vanishedDeg;       // np. dla 90deg → 0deg = 3:00

      const startRad = startAng * Math.PI / 180;
      const endRad   = endAng   * Math.PI / 180;
      const startX = cx + r * Math.cos(startRad);
      const startY = cy + r * Math.sin(startRad);
      const endX   = cx + r * Math.cos(endRad);
      const endY   = cy + r * Math.sin(endRad);
      const largeArc = vanishedDeg > 180 ? 1 : 0;

      const d = `M ${cx} ${cy} L ${startX.toFixed(2)} ${startY.toFixed(2)} ` +
                `A ${r} ${r} 0 ${largeArc} 1 ${endX.toFixed(2)} ${endY.toFixed(2)} Z`;
      sector.setAttribute('d', d);

      // Soft edge: cienki sektor o szerokości 25deg na końcu z opacity gradient
      // Aby uzyskać rozmycie - rysuję drugi krótki sektor i blur go w SVG
      const edgeWidth = 25;
      const edgeStart = Math.max(0, vanishedDeg - edgeWidth);
      const e1Ang = -90 + edgeStart;
      const e2Ang = endAng;
      const e1Rad = e1Ang * Math.PI / 180;
      const e2Rad = e2Ang * Math.PI / 180;
      const e1X = cx + r * Math.cos(e1Rad), e1Y = cy + r * Math.sin(e1Rad);
      const e2X = cx + r * Math.cos(e2Rad), e2Y = cy + r * Math.sin(e2Rad);
      const eLargeArc = (edgeStart - vanishedDeg) > 180 ? 1 : 0;
      const dEdge = `M ${cx} ${cy} L ${e1X.toFixed(2)} ${e1Y.toFixed(2)} ` +
                    `A ${r} ${r} 0 ${eLargeArc} 1 ${e2X.toFixed(2)} ${e2Y.toFixed(2)} Z`;
      edge.setAttribute('d', dEdge);
    }

    function renderWheels(elapsedMinutes){
      const exBtn = document.getElementById('exerciseBtn');

      if(!startWorkMinutes){
        elapsedMinutes = 0;
      }
      if(elapsedMinutes > 500) elapsedMinutes = 500;

      // === Tryb odtwarzania (po kliknięciu) ===
      if(_wheelsState.restoring){
        const durationMs = Math.max(300, _wheelsState.restoreDurationMs || 2000);
        const progress = clamp01((Date.now() - _wheelsState.restoreStartTime) / durationMs);
        if(progress >= 1){
          _wheelsState.restoring = false;
          if(_wheelsState.restoreRaf){
            cancelAnimationFrame(_wheelsState.restoreRaf);
            _wheelsState.restoreRaf = 0;
          }
          paintWheelMask(0);
          exBtn.classList.remove('overage','fading-overage','restore-overage');
          return;
        }
        const ang = _wheelsState.restoreFromAngle * (1 - progress);
        paintExerciseSprayRestore(_wheelsState.restoreFromAngle, ang);
        return;
      }

      // === Tryb normalny: maska zanika zgodnie z upływem minut ===
      const elapsedFrac = (startWorkMinutes && lastExerciseMinutes!==null && endWorkMinutes===null)
        ? getEffectiveExerciseElapsedFractional()
        : elapsedMinutes;

      if(elapsedFrac >= 60){
        // Tryb "overage" - czerwony licznik nadwyżki
        const enteringOverage=!exBtn.classList.contains('overage');
        exBtn.classList.add('overage');
        paintWheelMask(360);
        const overFrac = Math.max(0, elapsedFrac - 60);
        renderOverageRoller(overFrac, { entering: enteringOverage });
        return;
      }
      if(exBtn.classList.contains('overage')){
        const inner=document.getElementById('overageRollerInner');
        if(inner) inner.dataset.active='0';
      }
      exBtn.classList.remove('overage','fading-overage','restore-overage');

      const ang = getWheelVanishAngle(elapsedFrac);
      paintWheelMask(ang);
    }

    // Animacja przywracania koła po kliknięciu
    function getCurrentExerciseVanishAngle(){
      const exBtn = document.getElementById('exerciseBtn');
      if(_wheelsState.restoring){
        const durationMs = Math.max(300, _wheelsState.restoreDurationMs || 2000);
        const progress = clamp01((Date.now() - _wheelsState.restoreStartTime) / durationMs);
        return Math.max(0, _wheelsState.restoreFromAngle * (1 - progress));
      }
      if(exBtn && exBtn.classList.contains('overage')) return 360;
      const elapsedFrac = (startWorkMinutes && lastExerciseMinutes!==null && endWorkMinutes===null)
        ? getEffectiveExerciseElapsedFractional()
        : 0;
      return getWheelVanishAngle(elapsedFrac);
    }

    function cancelWheelRestoreFrame(){
      if(_wheelsState.restoreRaf){
        cancelAnimationFrame(_wheelsState.restoreRaf);
        _wheelsState.restoreRaf = 0;
      }
    }
    function scheduleWheelRestoreFrame(){
      cancelWheelRestoreFrame();
      const tick = ()=>{
        _wheelsState.restoreRaf = 0;
        if(!_wheelsState.restoring) return;
        renderWheels(0);
        if(_wheelsState.restoring){
          _wheelsState.restoreRaf = requestAnimationFrame(tick);
        }
      };
      _wheelsState.restoreRaf = requestAnimationFrame(tick);
    }

    function startWheelRestore(fromAngle){
      const exBtn = document.getElementById('exerciseBtn');
      const restoreAngle = Math.max(0, Math.min(360, Number.isFinite(fromAngle) ? fromAngle : getCurrentExerciseVanishAngle()));
      cancelWheelRestoreFrame();
      if(restoreAngle <= 0.5){
        _wheelsState.restoring = false;
        _wheelsState.restoreFromAngle = 0;
        _wheelsState.restoreDurationMs = 0;
        paintWheelMask(0);
        if(exBtn) exBtn.classList.remove('overage','fading-overage','restore-overage');
        return;
      }

      if(exBtn.classList.contains('overage')){
        exBtn.classList.remove('fading-overage');
        exBtn.classList.add('restore-overage');
        _wheelsState.restoring = true;
        _wheelsState.restoreFromAngle = restoreAngle;
        _wheelsState.restoreStartTime = Date.now();
        _wheelsState.restoreDurationMs = Math.max(700, Math.round(15000 * restoreAngle / 360));
        renderWheels(0);
        scheduleWheelRestoreFrame();
      } else {
        // Z bieżącego stanu zanikania - zacznij animację wstecz
        exBtn.classList.remove('restore-overage');
        _wheelsState.restoring = true;
        _wheelsState.restoreFromAngle = restoreAngle;
        _wheelsState.restoreStartTime = Date.now();
        _wheelsState.restoreDurationMs = Math.max(700, Math.round(15000 * restoreAngle / 360));
        renderWheels(0);
        scheduleWheelRestoreFrame();
      }
    }

    // Rolka nadwyżki - pełne przewijanie jak workRoller, minuty od 1 w górę
    function renderOverageRoller(minutes, opts={}){
      const roller = document.querySelector('#overageDisplay .work-roller');
      const inner = document.getElementById('overageRollerInner');
      if(!roller || !inner) return;

      // Lazy build: pusty start + minuty 1..180 (zapas)
      const MAX_MIN = 180;
      if(inner.dataset.built !== '1'){
        inner.innerHTML='';
        for(let i=0; i<=MAX_MIN; i++){
          const d = document.createElement('div');
          d.className = 'work-roller-digit';
          inner.appendChild(d);
          d.dataset.value = String(i);
          d.textContent = i === 0 ? '' : '+' + formatMinuteValue(i);
        }
        inner.dataset.built='1';
      }

      const h = roller.clientHeight;
      const w = roller.clientWidth;
      if(!h || !w) return;

      const digitH = Math.round(h * 0.72);

      if(inner.dataset.lastH !== String(h) || inner.dataset.lastW !== String(w)){
        inner.querySelectorAll('.work-roller-digit').forEach(d => {
          d.style.height = digitH + 'px';
          const label = d.textContent || '';
          const chars = label.length;
          let fontSize;
          if(chars >= 5){
            fontSize = Math.min(digitH * 0.6, w * 0.28);
          } else if(chars >= 4){
            fontSize = Math.min(digitH * 0.66, w * 0.34);
          } else if(chars === 3){
            fontSize = Math.min(digitH * 0.8, w * 0.52);
          } else {
            fontSize = Math.min(digitH * 0.95, w * 0.64);
          }
          d.style.fontSize = Math.floor(fontSize) + 'px';
          d.style.letterSpacing = '0';
        });
        inner.dataset.lastH = String(h);
        inner.dataset.lastW = String(w);
      }

      const clamped = Math.min(MAX_MIN, Math.max(0, minutes));
      roller.style.transition = 'opacity .45s ease';
      roller.style.opacity = clamped <= 0.01 ? '0' : '1';
      const intM = Math.floor(clamped);
      const frac = clamped - intM;
      const baseOffset = (h / 2) - (digitH / 2);
      const offset = baseOffset - (intM + frac) * digitH;
      // Krótka transition żeby kropki sekund nie szarpały
      if(opts.entering || inner.dataset.active !== '1'){
        inner.style.transition = 'none';
        inner.style.transform = `translateY(${baseOffset}px)`;
        inner.dataset.active = '1';
        inner.offsetHeight;
        inner.style.transition = clamped <= 1.15 ? 'transform 1.15s cubic-bezier(.18,.78,.25,1)' : 'none';
      } else {
        inner.style.transition = 'transform 0.95s linear';
      }
      inner.style.transform = `translateY(${offset}px)`;
    }

    // === Rolka cyfr godzin pracy ===
    // Strategia: wysokość okna rolki = clientHeight w px. Każda cyfra ma tę samą
    // wysokość. translateY = -(intH+frac) * h. Cyfry 10..20 mają mniejszy font,
    // żeby zmieściły się dwucyfrowe.
    function renderWorkRoller(workMinutes){
      const roller = document.querySelector('#workBtn .work-roller');
      const inner = document.getElementById('workRollerInner');
      if(!roller || !inner) return;

      // Lazy build: cyfry 0..20 + znaczniki ◀ ▶ na rolce
      if(inner.dataset.built !== '1'){
        inner.innerHTML='';
        for(let i=0; i<=20; i++){
          const d = document.createElement('div');
          d.className = 'work-roller-digit' + (i>=10 ? ' two-digit' : '');
          d.textContent = i;
          inner.appendChild(d);
        }
        if(!roller.querySelector('.work-roller-mark-left')){
          const ml = document.createElement('div');
          ml.className = 'work-roller-mark-left';
          roller.appendChild(ml);
          const mr = document.createElement('div');
          mr.className = 'work-roller-mark-right';
          roller.appendChild(mr);
        }
        inner.dataset.built='1';
      }

      const h = roller.clientHeight;
      if(!h) return;  // jeszcze nie zrenderowane

      // Każda cyfra ma height = 55% wysokości okna - dzięki temu sąsiadująca cyfra
      // jest widoczna częściowo (efekt "rolki", gdzie cyfra wypiera następną).
      const digitH = Math.round(h * 0.60);

      // Ustaw wysokość każdej cyfry i font proporcjonalnie do digitH
      if(inner.dataset.lastH !== String(h)){
        inner.querySelectorAll('.work-roller-digit').forEach(d => {
          d.style.height = digitH + 'px';
          if(d.classList.contains('two-digit')){
            d.style.fontSize = Math.floor(digitH * 0.86) + 'px';
          } else {
            d.style.fontSize = Math.floor(digitH * 1.14) + 'px';
          }
        });
        inner.dataset.lastH = String(h);
      }

      // Wycentruj tak, by aktualna cyfra była na środku okna.
      // top inner = (h/2 - digitH/2) - (intH+frac)*digitH
      const totalH = workMinutes / 60;
      const intH = Math.min(20, Math.floor(totalH));
      const frac = totalH - Math.floor(totalH);
      const baseOffset = (h / 2) - (digitH / 2);
      const offset = baseOffset - (intH + frac) * digitH;
      inner.style.transform = `translateY(${offset}px)`;
    }

    function getPotPhase(){
      if(potPhase === 'waiting' && potWaitingStartedAt !== null) return 'waiting';
      if(potPhase === 'done') return 'done';
      if(potStartedAt !== null) return 'heating';
      return 'idle';
    }
    function potRemainingSeconds(){
      if(getPotPhase() !== 'heating' || potStartedAt===null) return null;
      const el=(Date.now()-potStartedAt)/1000;
      return potDurationMin*60 - el;
    }
    function potHeatingElapsedSeconds(){
      if(getPotPhase() === 'heating' && potStartedAt !== null){
        return Math.max(0, Math.floor((Date.now() - potStartedAt) / 1000));
      }
      return Math.max(0, Math.floor(potHeatingElapsedSec || 0));
    }
    function potWaitingElapsedSeconds(){
      if(getPotPhase() === 'waiting' && potWaitingStartedAt !== null){
        return Math.max(0, Math.floor((Date.now() - potWaitingStartedAt) / 1000));
      }
      return Math.max(0, Math.floor(potWaitingElapsedSec || 0));
    }
    function formatPotHeatingTime(seconds){
      return String(Math.max(0, Math.floor((seconds || 0) / 60)));
    }
    function formatPotWaitingTime(seconds){
      const totalMinutes = Math.max(0, Math.floor((seconds || 0) / 60));
      if(totalMinutes < 60) return ':' + pad(totalMinutes);
      return Math.floor(totalMinutes / 60) + ':' + pad(totalMinutes % 60);
    }
    function formatPotWaitingFinalTime(seconds){
      return formatPotWaitingTime(seconds);
    }
    function formatPotSplitTime(final=false){
      const waitText = final ? formatPotWaitingFinalTime(potWaitingElapsedSeconds()) : formatPotWaitingTime(potWaitingElapsedSeconds());
      return '<span class="pot-split-part pot-heat-time">' + formatPotHeatingTime(potHeatingElapsedSeconds()) + '</span>' +
             '<span class="pot-split-part pot-sep">/</span>' +
             '<span class="pot-split-part pot-wait-time">' + waitText + '</span>';
    }
    function ensurePotSplitParts(ctr){
      let heat = ctr.querySelector('.pot-heat-time');
      let sep = ctr.querySelector('.pot-sep');
      let wait = ctr.querySelector('.pot-wait-time');
      if(!heat || !sep || !wait){
        ctr.innerHTML = '<span class="pot-split-part pot-heat-time"></span>' +
                        '<span class="pot-split-part pot-sep">/</span>' +
                        '<span class="pot-split-part pot-wait-time"></span>';
        heat = ctr.querySelector('.pot-heat-time');
        sep = ctr.querySelector('.pot-sep');
        wait = ctr.querySelector('.pot-wait-time');
      }
      return {heat, sep, wait};
    }
    function setPotSplitText(part, text, charOffset=0, animate=false){
      const value = String(text ?? '');
      if(!animate){
        part.textContent = value;
        return;
      }
      const chars = Array.from(value);
      let spans = Array.from(part.querySelectorAll('.pot-char'));
      if(spans.length !== chars.length){
        part.textContent = '';
        spans = chars.map(() => {
          const span = document.createElement('span');
          span.className = 'pot-char';
          part.appendChild(span);
          return span;
        });
      }
      spans.forEach((span, i) => {
        const delay = ((charOffset + i) * 0.07).toFixed(3) + 's';
        if(span.textContent !== chars[i]) span.textContent = chars[i];
        if(span.style.getPropertyValue('--pot-char-delay') !== delay){
          span.style.setProperty('--pot-char-delay', delay);
        }
      });
    }
    function updatePotSplitTime(ctr, final=false){
      const waitText = final ? formatPotWaitingFinalTime(potWaitingElapsedSeconds()) : formatPotWaitingTime(potWaitingElapsedSeconds());
      const parts = ensurePotSplitParts(ctr);
      const heatText = formatPotHeatingTime(potHeatingElapsedSeconds());
      const animate = !final && getPotPhase() === 'waiting';
      setPotSplitText(parts.heat, heatText, 0, animate);
      setPotSplitText(parts.sep, '/', heatText.length, animate);
      setPotSplitText(parts.wait, waitText, heatText.length + 1, animate);
    }
    function startPotHeating(){
      potPhase = 'heating';
      potStartedAt = Date.now();
      potAckedDone = false;
      potUsedToday = false;
      potHeatingElapsedSec = null;
      potWaitingStartedAt = null;
      potWaitingElapsedSec = null;
    }
    function stopPotHeatingAndStartWaiting(){
      potHeatingElapsedSec = potHeatingElapsedSeconds();
      potStartedAt = null;
      potAckedDone = false;
      potPhase = 'waiting';
      potWaitingStartedAt = Date.now();

    function getNoteDisplayTimeMinutes(note){
      const raw = String(note && note.alarmTime ? note.alarmTime : '');
      const m = raw.match(/^(\d{1,2}):(\d{2})$/);
      if(!m) return null;
      const h = parseInt(m[1],10);
      const min = parseInt(m[2],10);
      if(!Number.isFinite(h) || !Number.isFinite(min) || h<0 || h>23 || min<0 || min>59) return null;
      return h*60 + min;
    }
    function isNotePostponed(note){
      return !!(note && note.postponedUntilDate);
    }
    function restoreDuePostponedNotes(newWorkDate){
      let changed = false;
      for(const n of activeNotes()){
        if(!n || !n.postponedUntilDate) continue;
        if(String(n.postponedUntilDate) <= String(newWorkDate)){
          n.postponedUntilDate = '';
          n.postponedAtDate = '';
          n.ackedAlerts = {};
          touchSharedRecord(n);
          changed = true;
        }
      }
      return changed;
    }
    function postponeNoteUntilNextWorkDate(note){
      if(!note) return;
      const baseDate = workDate || todayISO();
      note.postponedAtDate = baseDate;
      note.postponedUntilDate = addDaysISO(baseDate, 1);
      note.ackedAlerts = {};
      touchSharedRecord(note);
      saveStateAndScheduleAutoSync('note_postponed');
      renderNotesBar();
    }

    let notePostponeRenderLock = false;
    function setNotePostponeRenderLock(locked){
      notePostponeRenderLock = !!locked;
    }

    function getSortedNotesForDisplay(){
      return activeNotes()
        .filter(note=>!isNotePostponed(note))
        .map((note,index)=>({ note, index, time:getNoteDisplayTimeMinutes(note) }))
        .sort((a,b)=>{
          const aNoTime = a.time === null;
          const bNoTime = b.time === null;
          if(aNoTime && bNoTime) return a.index - b.index;
          if(aNoTime) return 1;
          if(bNoTime) return -1;
          if(a.time !== b.time) return a.time - b.time;
          return a.index - b.index;
        })
        .map(x=>x.note);
    }

    function setupNotePostponeGesture(btn, note){
      const WARNING_MS = 180;
      const HOLD_MS = 2000;
      const GRAY_WAIT_MS = 3000;
      const FADE_MS = 3000;
      let warningTimer = null;
      let timer = null;
      let fadeTimer = null;
      let finishTimer = null;
      let pointerId = null;
      let committed = false;
      let holding = false;

      function addReleaseListeners(){
        document.addEventListener('pointerup', finishHold, true);
        document.addEventListener('pointercancel', finishHold, true);
      }

      function removeReleaseListeners(){
        document.removeEventListener('pointerup', finishHold, true);
        document.removeEventListener('pointercancel', finishHold, true);
      }

      function releaseCapture(){
        if(pointerId !== null){
          try{ btn.releasePointerCapture(pointerId); }catch(e){}
        }
      }

      function clearPendingTimers(){
        clearTimeout(warningTimer);
        clearTimeout(timer);
        warningTimer = null;
        timer = null;
      }

      function clearHold(resetVisual=true){
        clearPendingTimers();
        if(resetVisual && !committed){
          btn.classList.remove('note-postpone-warning');
        }
        if(!committed) setNotePostponeRenderLock(false);
        removeReleaseListeners();
        releaseCapture();
        pointerId = null;
        holding = false;
      }

      btn.addEventListener('pointerdown',(e)=>{
        if(e.pointerType === 'mouse' && e.button !== 0) return;
        if(committed) return;
        clearHold(true);
        pointerId = e.pointerId;
        holding = true;
        setNotePostponeRenderLock(true);
        btn._notePostponeSuppressClick = false;
        warningTimer = setTimeout(()=>{
          if(holding && !committed){
            btn.classList.add('note-postpone-warning');
          }
        }, WARNING_MS);
        addReleaseListeners();
        try{ btn.setPointerCapture(pointerId); }catch(err){}
        timer = setTimeout(()=>{
          commitPostponeVisual();
        }, HOLD_MS);
      });

      function commitPostponeVisual(){
        if(committed || !holding) return;
        committed = true;
        holding = false;
        btn._notePostponeSuppressClick = true;
        clearPendingTimers();
        btn.classList.remove('note-postpone-warning');
        btn.classList.add('note-postpone-committed');
        const body = btn.querySelector('.note-sticker-body');
        if(body){
          body.innerHTML = '<span class="note-tomorrow-text">do jutra...</span>';
        }
        removeReleaseListeners();
        releaseCapture();
        pointerId = null;
        if(navigator.vibrate){ try{ navigator.vibrate([60,40,60]); }catch(e){} }
        fadeTimer = setTimeout(()=>{
          btn.classList.add('note-postpone-fading');
          finishTimer = setTimeout(()=>{
            if(!committed) return;
            committed = false;
            btn._notePostponeSuppressClick = false;
            setNotePostponeRenderLock(false);
            postponeNoteUntilNextWorkDate(note);
          }, FADE_MS);
        }, GRAY_WAIT_MS);
      }

      function finishHold(e){
        if(pointerId !== null && e.pointerId !== pointerId) return;
        if(committed){
          if(e && e.cancelable) e.preventDefault();
          if(e && e.stopPropagation) e.stopPropagation();
          removeReleaseListeners();
          releaseCapture();
          pointerId = null;
          holding = false;
          return;
        }
        clearHold(true);
      }

      btn.addEventListener('pointerup', finishHold);
      btn.addEventListener('pointercancel', finishHold);

      btn.addEventListener('contextmenu',(e)=>{ e.preventDefault(); });
    }

    // Czy notatka ma w tej chwili aktywny alarm (czas przekroczony i nie potwierdzony)?
    function isNoteAlarmActive(n, nowMs){
      if(!n.alarmTime || !Array.isArray(n.alerts) || n.alerts.length === 0) return false;
      const triggerTimes = computeNoteAlertTimes(n);
      for(const t of triggerTimes){
        if(nowMs >= t.ms && !t.acked) return true;
      }
      return false;
    }
    // Oblicz czasy ms dla każdego alertu (w kontekście dzisiejszego dnia)
    function computeNoteAlertTimes(n){
      if(!n.alarmTime) return [];
      const [hh,mm] = n.alarmTime.split(':').map(x=>parseInt(x,10));
      const target = new Date();
      target.setHours(hh, mm, 0, 0);
      const targetMs = target.getTime();
      const acked = n.ackedAlerts || {};
      return (n.alerts||[]).map(min => ({
        offset: min,
        ms: targetMs - min*60*1000,
        acked: !!acked[min]
      }));
    }
    function ackNoteAlarm(n){
      const triggerTimes = computeNoteAlertTimes(n);
      const nowMs = Date.now();
      // Potwierdź najbliższy nadal aktywny
      for(const t of triggerTimes){
        if(nowMs >= t.ms && !t.acked){
          if(!n.ackedAlerts) n.ackedAlerts = {};
          n.ackedAlerts[t.offset] = true;
          touchSharedRecord(n);
          break;
        }
      }
    }

    let dateCenterFitSignature = '';
    function fitDateCenterText(el){
      if(!el || !el.isConnected) return;
      const mainLines = Array.from(el.querySelectorAll('.date-day, .date-value'));
      if(!mainLines.length) return;
      const boxW = el.clientWidth;
      const boxH = el.clientHeight;
      if(!boxW || !boxH) return;
      const signature = [
        boxW,
        boxH,
        el.className,
        mainLines.map(line => line.textContent).join('|'),
        Array.from(el.querySelectorAll('.date-work-time')).map(line => line.textContent).join('|')
      ].join('::');
      if(signature === dateCenterFitSignature) return;
      dateCenterFitSignature = signature;

      el.style.removeProperty('--date-main-size');
      const computedSize = parseFloat(getComputedStyle(mainLines[0]).fontSize) || 32;
      const maxSize = Math.max(computedSize, el.classList.contains('has-work-end') ? 38 : 42);
      const minSize = 13;
      function fits(size){
        el.style.setProperty('--date-main-size', `${size}px`);
        const widthOk = mainLines.every(line => line.scrollWidth <= line.clientWidth + 0.5);
        const heightOk = el.scrollHeight <= el.clientHeight + 0.5;
        return widthOk && heightOk;
      }
      let lo = minSize;
      let hi = maxSize;
      for(let i=0; i<10; i++){
        const mid = (lo + hi) / 2;
        if(fits(mid)) lo = mid;
        else hi = mid;
      }
      el.style.setProperty('--date-main-size', `${Math.max(minSize, Math.floor(lo * 10) / 10)}px`);
    }
    function scheduleDateCenterFit(el){
      requestAnimationFrame(() => fitDateCenterText(el));
    }

    // ===== overlay =====
    const overlay=document.getElementById('overlay');
    const activeViewPointers = new Set();
    const blockedViewPointers = new Set();
    let viewTouchLockedUntil = 0;
    let viewTransitionClickLockedUntil = 0;
    function stopViewTouchEvent(e){
      e.preventDefault();
      e.stopImmediatePropagation();
    }
    function lockViewTouch(ms=0){
      activeViewPointers.forEach(pointerId=>blockedViewPointers.add(pointerId));
      if(ms>0) viewTouchLockedUntil = Math.max(viewTouchLockedUntil, Date.now() + ms);
    }
    document.addEventListener('pointerdown',(e)=>{
      if(viewTouchLockedUntil && Date.now() < viewTouchLockedUntil){
        stopViewTouchEvent(e);
        return;
      }
      viewTransitionClickLockedUntil=0;
      activeViewPointers.add(e.pointerId);
    }, true);
    document.addEventListener('pointerup',(e)=>{
      const blocked = blockedViewPointers.has(e.pointerId) ||
                      (viewTouchLockedUntil && Date.now() < viewTouchLockedUntil);
      activeViewPointers.delete(e.pointerId);
      blockedViewPointers.delete(e.pointerId);
      if(blocked){
        viewTransitionClickLockedUntil = Date.now() + 350;
        stopViewTouchEvent(e);
      }
    }, true);
    document.addEventListener('pointercancel',(e)=>{
      activeViewPointers.delete(e.pointerId);
      blockedViewPointers.delete(e.pointerId);
    }, true);
    document.addEventListener('click',(e)=>{
      if((viewTouchLockedUntil && Date.now() < viewTouchLockedUntil) ||
         Date.now() < viewTransitionClickLockedUntil){
        stopViewTouchEvent(e);
      }
    }, true);
    function showOverlay(html){
      delete overlay.dataset.lockClose;
      overlay.classList.remove('keypad-overlay','keypad-left','keypad-right');
      overlay.innerHTML=html;
      overlay.classList.add('show');
      lockViewTouch();
    }
    function hideOverlay(){
      delete overlay.dataset.lockClose;
      overlay.classList.remove('show','keypad-overlay','keypad-left','keypad-right');
      overlay.innerHTML='';
      lockViewTouch();
    }

      counterPanelDraft=null;

      else closeOverlayToMain('overlay_close');

    const DRIVING_FOCUS_VISIBLE_MS = 2 * 60 * 1000;
    const DRIVING_FOCUS_RESTORE_TOUCH_LOCK_MS = 1000;
    let drivingFocusTimer = null;
    let drivingFocusFaded = false;

    function isWorkActiveForDrivingFocus(){
      return startWorkMinutes !== null && endWorkMinutes === null;
    }
    function isMainScreenVisibleForDrivingFocus(){
      const endOverlay = document.getElementById('endConfirmOverlay');
      return !overlay.classList.contains('show') &&
             (!endOverlay || endOverlay.classList.contains('hidden')) &&
             !endConfirmActive;
    }
    function hasDrivingFocusBlocker(){
      // Active modules stay visible individually; they should not block the whole fade timer.
      return false;
    }
    function shouldKeepDrivingFocusModuleVisible(id){
      const el = document.getElementById(id);
      if(id === 'potBtn'){
        const phase = getPotPhase();
        if(phase === 'heating' || phase === 'waiting') return true;
        if(el && (el.classList.contains('done-alarm') || el.classList.contains('done-alarm-off'))) return true;
      }
      if(id === 'moneyBtn'){
        if(startWorkMinutes !== null && endWorkMinutes === null && counterStart === null) return true;
        if(el && el.classList.contains('counter-start-warning')) return true;
      }
      if(id === 'breakBtn'){
        if(breakActive) return true;
        if(el && (el.classList.contains('on') || el.classList.contains('blink-bg'))) return true;
      }
      if(id === 'coinBtn'){
        if(shouldShowEyeReminder() || isEyeReminderFading()) return true;
      }
      return false;
    }
    function setDrivingFocusVisual(faded){
      const controls = document.querySelector('.controls');
      if(controls) controls.classList.toggle('driving-focus-faded', !!faded);
      ['potBtn','moneyBtn','breakBtn','coinBtn'].forEach(id=>{
        const el = document.getElementById(id);
        if(!el) return;
        el.classList.add('driving-focus-fade-target');
        el.classList.toggle('driving-focus-faded', !!faded && !shouldKeepDrivingFocusModuleVisible(id));
      });
      const startLine = document.querySelector('.date-work-start');
      if(startLine){
        startLine.classList.add('driving-focus-fade-target');
        startLine.classList.toggle('driving-focus-faded', !!faded);
      }
    }
    function setDrivingFocusInstantRestore(enabled){
      ['potBtn','moneyBtn','breakBtn','coinBtn'].forEach(id=>{
        const el = document.getElementById(id);
        if(el) el.classList.toggle('driving-focus-instant-restore', !!enabled);
      });
      const startLine = document.querySelector('.date-work-start');
      if(startLine) startLine.classList.toggle('driving-focus-instant-restore', !!enabled);
    }
    function clearDrivingFocusTimer(){
      clearTimeout(drivingFocusTimer);
      drivingFocusTimer = null;
    }
    function clearDrivingFocusFade(){
      clearDrivingFocusTimer();
      drivingFocusFaded = false;
      setDrivingFocusVisual(false);
    }
    function scheduleDrivingFocusFade(){
      if(drivingFocusTimer || drivingFocusFaded) return;
      drivingFocusTimer = setTimeout(()=>{
        drivingFocusTimer = null;
        if(!isWorkActiveForDrivingFocus() || !isMainScreenVisibleForDrivingFocus() || hasDrivingFocusBlocker()){
          clearDrivingFocusFade();
          return;
        }
        drivingFocusFaded = true;
        setDrivingFocusVisual(true);
      }, DRIVING_FOCUS_VISIBLE_MS);
    }
    function restoreDrivingFocusFade(restartTimer=true){
      clearDrivingFocusTimer();
      setDrivingFocusInstantRestore(true);
      drivingFocusFaded = false;
      setDrivingFocusVisual(false);
      lockViewTouch(DRIVING_FOCUS_RESTORE_TOUCH_LOCK_MS);
      const controls = document.querySelector('.controls');
      if(controls) void controls.offsetHeight;
      const startLine = document.querySelector('.date-work-start');
      if(startLine) void startLine.offsetHeight;
      requestAnimationFrame(()=>setDrivingFocusInstantRestore(false));
      if(restartTimer && isWorkActiveForDrivingFocus() && isMainScreenVisibleForDrivingFocus() && !hasDrivingFocusBlocker()){
        scheduleDrivingFocusFade();
      }
    }
    function restartDrivingFocusTimerForActiveWork(){
      clearDrivingFocusTimer();
      drivingFocusFaded = false;
      setDrivingFocusVisual(false);
      if(isWorkActiveForDrivingFocus() && isMainScreenVisibleForDrivingFocus() && !hasDrivingFocusBlocker()){
        scheduleDrivingFocusFade();
      }
    }
    let drivingFocusRestoredAt = 0;
    let drivingFocusTouchLockedUntil = 0;
    function interceptDrivingFocusFadedTarget(e){
      const target = e.currentTarget;
      if(drivingFocusFaded && target && target.classList.contains('driving-focus-faded')){
        e.preventDefault();
        e.stopImmediatePropagation();
        drivingFocusRestoredAt = Date.now();
        drivingFocusTouchLockedUntil = drivingFocusRestoredAt + DRIVING_FOCUS_RESTORE_TOUCH_LOCK_MS;
        restoreDrivingFocusFade(true);
        return;
      }
      if(drivingFocusTouchLockedUntil && Date.now() < drivingFocusTouchLockedUntil){
        e.preventDefault();
        e.stopImmediatePropagation();
      }
    }
    function bindDrivingFocusRestoreTargets(){
      ['potBtn','moneyBtn','breakBtn','coinBtn'].forEach(id=>{
        const el = document.getElementById(id);
        if(!el || el.dataset.drivingFocusRestoreBound === '1') return;
        el.dataset.drivingFocusRestoreBound = '1';
        el.addEventListener('pointerdown', interceptDrivingFocusFadedTarget, true);
        el.addEventListener('pointerup', interceptDrivingFocusFadedTarget, true);
        el.addEventListener('click', interceptDrivingFocusFadedTarget, true);
      });
    }
    function updateDrivingFocusFade(){
      if(!isWorkActiveForDrivingFocus() || !isMainScreenVisibleForDrivingFocus() || hasDrivingFocusBlocker()){
        clearDrivingFocusFade();
        return;
      }
      setDrivingFocusVisual(drivingFocusFaded);
      scheduleDrivingFocusFade();
