        }
        if(exportOk !== true){
          setAutoSyncIndicatorState('frozen', 'Eksport zakonczonej dniowki nie powiodl sie. Auto Sync sprobuje ponownie przy nastepnej okazji.');
          showToast('Eksport dniowki nieudany.', 'err');
          return;
        }
        const list = await fetchSyncList(cfg);
        if(!list || !list.ok) throw new Error(list && list.error ? list.error : 'syncList failed');
        const candidate = findNewestOtherSnapshot(list.snapshots || [], cfg.deviceId);
        if(!candidate){
          if(reason === 'toggle') markCurrentStateForInitialAutoUpload();
          setAutoSyncIndicatorState('on');
          playSyncNoChangesSound();
          playSyncStandbySound();
          return;
        }
        const seenCloudChange = Number(localStorage.getItem(LS_LAST_SEEN_CLOUD_CHANGE_AT) || 0);
        const cloudChange = Number(candidate.lastLocalChangeAt || candidate.savedAtMs || 0);
        if(cloudChange <= seenCloudChange){
          if(reason === 'toggle') markCurrentStateForInitialAutoUpload();
          markCloudSeen(candidate);
          setAutoSyncIndicatorState('on');
          playSyncNoChangesSound();
          playSyncStandbySound();
          return;
        }
        if(autoSyncConflictWithCloud(candidate)){
          setAutoSyncIndicatorState('frozen', 'Nowszy stan z innego telefonu istnieje w chmurze, a ten telefon ma lokalne niewyslane zmiany.');
          showToast('Konflikt synchronizacji - uzyj recznej synchronizacji.', 'err');
          return;
        }
        setAutoSyncIndicatorState('downloading');
        const loaded = await jsonpRequest(cfg.url, { action:'syncLoad', pin:cfg.pin, id:candidate.id });
        if(!loaded || !loaded.ok || !loaded.snapshot) throw new Error(loaded && loaded.error ? loaded.error : 'syncLoad failed');
        const downloadedComparable = comparableSnapshotState(loaded.snapshot);
        const currentComparable = currentComparableStateString();
        markCloudSeen(loaded.snapshot);
        if(downloadedComparable === currentComparable){
          setAutoSyncIndicatorState('on');
          playSyncNoChangesSound();
          playSyncStandbySound();
          return;
        }
        applySyncSnapshot(loaded.snapshot);
        playSyncSuccessSound();
        setAutoSyncIndicatorState('applied');
      }catch(e){
        if(e && e.sharedDataConflict){
          setAutoSyncIndicatorState('frozen', 'Notatki wymagają decyzji: telefon, Arkusz albo obie wersje.');
          showToast('Konflikt notatek - otwórz menu synchronizacji.', 'err');
        } else {
          setAutoSyncIndicatorState('frozen');
          showToast('Auto Sync zatrzymany - sprawdz ustawienia.', 'err');
        }
      }finally{
        autoSyncBusy = false;
      }
    }

    async function performScheduledAutoSyncUpload(reason, keepalive){
      clearAutoSyncSchedule(false);
      if(!isAutoSyncEnabled()) return;
      if(pendingEndWorkExport) return;
      if(autoSyncBusy){
        if(document.visibilityState === 'visible') scheduleAutoSyncUpload(reason || 'busy_retry');
        return;
      }
      const cfg = getAutoSyncConfig();
      if(!cfg) return;
      if(!await ensureAppsScriptCompatibility(cfg.url, { notify:false })) return;
      const pendingDailyExportBeforeUpload = hasPendingDailyExport();
      if(!pendingDailyExportBeforeUpload && !hasUnuploadedLocalChanges() && !hasUnverifiedSharedDataChanges()){
        setAutoSyncIndicatorState('on');
        return;
      }
      autoSyncBusy = true;
      setAutoSyncIndicatorState('checking');
      try{
        await syncSharedData(cfg);
        const list = await fetchSyncList(cfg);
        if(list && list.ok){
          const candidate = findNewestOtherSnapshot(list.snapshots || [], cfg.deviceId);
          if(candidate){
            const cloudChange = Number(candidate.lastLocalChangeAt || candidate.savedAtMs || 0);
            if(cloudChange > getLastLocalChangeAt()){
              markCloudSeen(candidate);
              setAutoSyncIndicatorState('frozen', 'W chmurze jest nowszy stan z innego telefonu. Automatyczna wysylka zostala zatrzymana, zeby nie nadpisac danych.');
              showToast('Auto Sync zatrzymany - nowszy stan w chmurze.', 'err');
              return;
            }
            if(autoSyncConflictWithCloud(candidate)){
              setAutoSyncIndicatorState('frozen', 'Wykryto ryzyko konfliktu: inny telefon zapisal stan, a ten telefon ma niewyslane zmiany.');
              showToast('Konflikt synchronizacji - uzyj recznej synchronizacji.', 'err');
              return;
            }
          }
        } else if(list && !list.ok){
          throw new Error(list.error || 'syncList failed');
        }
        const exportOk = await retryPendingDailyExportIfNeeded('auto_sync_upload', { notify:false });
        if(exportOk === 'blocked'){
          setAutoSyncIndicatorState('frozen', 'Eksport dniówki czeka na decyzję o nadpisaniu danych w Arkuszu.');
          return;
        }
        if(exportOk !== true){
          setAutoSyncIndicatorState('frozen', 'Eksport zakonczonej dniowki nie powiodl sie. Automatyczna synchronizacja zostala wstrzymana.');
          showToast('Eksport dniowki nieudany.', 'err');
          return;
        }
        const snapshot = buildSyncSnapshot(cfg.device);
        await sendAndVerifySyncSnapshotWithFallback(cfg, snapshot, !!keepalive);
        markVerifiedSyncUpload(snapshot);
        handleSuccessfulOutgoingSyncForEarlyMonth(cfg, snapshot, 'auto_sync_upload');
        playSyncSuccessSound();
        setAutoSyncIndicatorState('on');
      }catch(e){
        if(e && e.sharedDataConflict){
          setAutoSyncIndicatorState('frozen', 'Notatki wymagają decyzji: telefon, Arkusz albo obie wersje.');
        } else if(e && e.sharedDataRetryable){
          setAutoSyncIndicatorState('on');
          scheduleAutoSyncUpload('shared_data_retry');
        } else {
          setAutoSyncIndicatorState('frozen', 'Automatyczna wysylka synchronizacji nie powiodla sie. Sprawdz polaczenie albo uzyj synchronizacji recznej.');
        }
      }finally{
        autoSyncBusy = false;
      }
    }

    function flushScheduledAutoSync(reason){

    async function autoSyncUploadOnHide(reason){

    let workWakeLock = null;
    let workWakeLockWanted = false;

    function shouldKeepWorkAwake(){
      return startWorkMinutes!==null && endWorkMinutes===null;
    }
    async function requestWorkWakeLock(){
      if(!('wakeLock' in navigator)) return;
      if(!window.isSecureContext) return;
      if(document.visibilityState !== 'visible') return;
      if(workWakeLock && !workWakeLock.released) return;
      try{
        const lock = await navigator.wakeLock.request('screen');
        if(!workWakeLockWanted || !shouldKeepWorkAwake()){
          try{ await lock.release(); }catch(e){}
          return;
        }
        workWakeLock = lock;
        lock.addEventListener('release', ()=>{
          if(workWakeLock === lock) workWakeLock = null;
          if(workWakeLockWanted && shouldKeepWorkAwake() && document.visibilityState === 'visible'){
            setTimeout(()=>requestWorkWakeLock(), 250);
          }
        });
      }catch(e){
        workWakeLock = null;
      }
    }
    async function releaseWorkWakeLock(){
      const lock = workWakeLock;
      workWakeLock = null;
      if(lock && !lock.released){
        try{ await lock.release(); }catch(e){}
      }
    }
    function syncWorkWakeLock(){
      workWakeLockWanted = shouldKeepWorkAwake();
      if(workWakeLockWanted) requestWorkWakeLock();
      else releaseWorkWakeLock();
    }

    const HOLD_WARNING_DELAY_MS = 500;
    function startHoldWarning(target){
      if(!target) return;
      clearTimeout(target._holdWarningTimer);
      target._holdWarningTimer = setTimeout(()=>{
        target.classList.add('hold-warning-shake');
      }, HOLD_WARNING_DELAY_MS);
    }
    function stopHoldWarning(target){
      if(!target) return;
      clearTimeout(target._holdWarningTimer);
      target.classList.remove('hold-warning-shake');
    }

    // === Helper: setup long-press na przycisku z akcją 3s + akcja na zwykły click ===
    // - clickAction: krótki klik (uruchomić tylko jeśli długi nie odpalił)
    // - longAction: 3s przytrzymanie
    // - canTrigger: opcjonalna funkcja dopuszczalności (np. nie wchodź w edycję gdy END-confirm)
    function setupLongPress(btn, clickAction, longAction, canTrigger){
      let pressTimer = null;
      let pressStarted = 0;
      let longFired = false;
      let cancelled = false;

      function start(e){
        if(canTrigger && !canTrigger(e)) return;
        if(e && e.target && e.target.closest && e.target.closest('.edit-hint')){ /* hint nie blokuje, jest pointer-events:none, ale zachowawczo */ }
        cancelled = false;
        longFired = false;
        pressStarted = Date.now();
        btn.classList.add('lp-active');
        startHoldWarning(btn);
        if(navigator.vibrate){ try{ navigator.vibrate([15]); }catch(e){} }
        pressTimer = setTimeout(()=>{
          if(cancelled) return;
          longFired = true;
          if(navigator.vibrate){ try{ navigator.vibrate([60,40,60]); }catch(e){} }
          stopHoldWarning(btn);
          btn.classList.remove('lp-active');
          longAction();
        }, 3000);
      }
      function endPress(){
        clearTimeout(pressTimer);
        stopHoldWarning(btn);
        btn.classList.remove('lp-active');
        if(longFired) return;
        if(cancelled) return;
        // krótki klik - uruchom tylko jeśli upłynęło < 3s i nie był to longpress
        clickAction();
      }
      function cancel(){
        cancelled = true;
        clearTimeout(pressTimer);
        stopHoldWarning(btn);
        btn.classList.remove('lp-active');
      }

      btn.addEventListener('pointerdown', (e)=>{ start(e); });
      btn.addEventListener('pointerup',   (e)=>{ endPress(); });
      btn.addEventListener('pointerleave',(e)=>{ cancel(); });
      btn.addEventListener('pointercancel',(e)=>{ cancel(); });
    }

    // === Animacja END - fala + odliczanie 5s. Może być red (koniec dniówki) lub yellow (reset). ===
    let endConfirmActive = false;
    let endConfirmTimer = null;
    let endConfirmInterval = null;
    let endConfirmAction = null;   // funkcja do wywołania przy potwierdzeniu
    let endConfirmMode = 'confirm';
    let endConfirmChoiceActions = null;

    function startEndConfirm(opts){
      if(endConfirmActive) return;
      opts = opts || {};
      const variant = opts.variant || 'red';
      const title = opts.title ?? 'KONIEC DNIÓWKI?';
      const action = opts.action || endWork;
      const mode = opts.mode || 'confirm';
      const hint = opts.hint ?? '';
      endConfirmActive = true;
      endConfirmAction = action;
      endConfirmMode = mode;
      endConfirmChoiceActions = opts.choices || null;

      const ov = document.getElementById('endConfirmOverlay');
      const ctr = document.getElementById('endConfirmCounter');
      const ttl = ov.querySelector('.end-confirm-title');
      const hintEl = ov.querySelector('.end-confirm-hint');
      const resetChoice = ov.querySelector('[data-restart-choice="reset"]');
      const continueChoice = ov.querySelector('[data-restart-choice="continue"]');
      ttl.innerHTML = title;
      hintEl.textContent = hint;
      const choiceLabels = opts.choiceLabels || {};
      if(resetChoice) resetChoice.innerHTML = choiceLabels.reset || 'Startujesz?<br>(czy&#347;cimy dane!)';
      if(continueChoice) continueChoice.innerHTML = choiceLabels.continue || 'Wracasz do roboty?';
      ov.classList.remove('hidden','yellow','blue','choice-mode','choice-title-mode','collapsing');
      if(variant === 'yellow') ov.classList.add('yellow');
      if(variant === 'blue') ov.classList.add('blue');
      if(mode === 'choice') ov.classList.add('choice-mode');
      if(mode === 'choice' && opts.choiceTitleMode) ov.classList.add('choice-title-mode');
      lockViewTouch();

      // restart animacji fali (re-trigger)
      const wave = ov.querySelector('.end-wave');
      wave.style.animation='none';
      wave.offsetHeight;
      wave.style.animation='';

      let secs = 5;
      ctr.textContent = secs;
      if(navigator.vibrate){ try{ navigator.vibrate([40,40,40]); }catch(e){} }

      endConfirmInterval = setInterval(()=>{
        secs--;
        if(secs <= 0){
          ctr.textContent = '0';
          cancelEndConfirm({collapse:true});
        } else {
          ctr.textContent = secs;
        }
      }, 1000);

      endConfirmTimer = setTimeout(()=>{
        cancelEndConfirm({collapse:true});
      }, 5000);
    }
    function cancelEndConfirm(opts){
      const collapse = opts && opts.collapse;
      endConfirmActive = false;
      endConfirmAction = null;
      endConfirmMode = 'confirm';
      endConfirmChoiceActions = null;
      clearTimeout(endConfirmTimer);
      clearInterval(endConfirmInterval);
      const ov = document.getElementById('endConfirmOverlay');
      if(collapse){
        // Zwiń wstecz (animacja), dopiero potem ukryj
        ov.classList.add('collapsing');
        setTimeout(()=>{
          ov.classList.add('hidden');
          ov.classList.remove('yellow','blue','choice-mode','choice-title-mode','collapsing');
          lockViewTouch();
        }, 500);
      } else {
        ov.classList.add('hidden');
        ov.classList.remove('yellow','blue','choice-mode','choice-title-mode','collapsing');
        lockViewTouch();
      }
    }
    function confirmEndAndFinish(){
      if(endConfirmMode === 'choice') return;
      const a = endConfirmAction;
      cancelEndConfirm();  // bez collapse - natychmiastowe ukrycie
      if(typeof a === 'function') a();
    }

    function handleRestartChoice(choice){
      if(endConfirmMode !== 'choice' || !endConfirmChoiceActions) return;
      const actions = endConfirmChoiceActions;
      cancelEndConfirm();
      const action = actions[choice];
      if(typeof action === 'function') action();
    }

      if(vt>=3){
        vt=0;
        const cur=localStorage.getItem(LS_APPSCRIPT)||'';
        const v=prompt('URL Google Apps Script (Web App):', cur);
        if(v!==null){
          storeAppsScriptUrl(v.trim());
          showToast(v.trim()?'URL zapisany':'URL wyczyszczony', 'ok');
          if(v.trim()){
            await verifyAppsScriptAfterStartup({ force:true, notify:true, promptForPin:true });
          }
        }
        return;
      }
      vtT=setTimeout(()=>{
        vt=0;
        openAppVersionStatus();
      }, 650);
    });

    // ===== PWA =====
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('sw.js').then(reg => {
          // Sprawdzaj aktualizacje co 60 sek - automatycznie pobiera nowy sw.js
          setInterval(()=>{ reg.update().catch(()=>{}); }, 60000);

          // Gdy znaleziono nowy SW i jest gotowy do aktywacji - od razu go aktywuj i przeładuj stronę
          reg.addEventListener('updatefound', ()=>{
            const newSW = reg.installing;
            if(!newSW) return;
            newSW.addEventListener('statechange', ()=>{
              if(newSW.state === 'installed' && navigator.serviceWorker.controller){
                // Mamy nowy SW gotowy - poproś o przejęcie kontroli
                newSW.postMessage({type:'SKIP_WAITING'});
              }
            });
          });
        }).catch(()=>{});

        // Gdy aktywny SW się zmieni - przeładuj stronę żeby załadować nowy index.html
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', ()=>{
          if(refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });
    }
    let deferredInstallPrompt=null;
    const installBtn=document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt',(e)=>{
      e.preventDefault();
      deferredInstallPrompt=e;
      installBtn.classList.add('visible');
    });
    installBtn.addEventListener('click', async ()=>{
      if(!deferredInstallPrompt) return;
      installBtn.classList.remove('visible');
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt=null;
    });
    window.addEventListener('appinstalled',()=>{
      installBtn.classList.remove('visible');
      deferredInstallPrompt=null;
    });
    document.getElementById('autoSyncIndicator').addEventListener('click', (e)=>{
      e.stopPropagation();
      if(autoSyncIndicatorState === 'applied'){
        setAutoSyncIndicatorState('on');
        playSyncStandbySound(0);
      } else if(autoSyncIndicatorState === 'frozen'){
        openWorkMenu();
      } else {
        openWorkMenu();
      }
    });

    // ===== init =====
    initializeAppVersionTracking();
    loadState();
    loadPostWorkVerification();
    initializeDailyExportStatus();
    initializeSyncTracking();
    if(startWorkMinutes!==null && endWorkMinutes===null){
      document.getElementById('workBtn').classList.add('on');
    }
    buildDots();
    bindDrivingFocusRestoreTargets();
    renderAll();
    syncWorkWakeLock();
    updateAutoSyncIndicator();
    initializeEarlyMonthPrompt();
    setTimeout(()=>verifyAppsScriptAfterStartup({ force:appVersionFreshlyChanged }), 500);
    setTimeout(()=>autoSyncCheckOnForeground('startup'), 1400);
    window.addEventListener('online', ()=>{
      verifyAppsScriptAfterStartup({ force:true, notify:false });
    });
    // Pierwszy render rolki może paść jeśli clientHeight=0 przed layoutem.
    // Po pierwszej klatce wymuszamy ponowny render dla pewności.
    requestAnimationFrame(()=>{ renderAll(); });

    setInterval(()=>{ blinkState=!blinkState; renderAll(); }, 1000);

    // 100ms: płynna animacja radaru, ognia garnka, przywracania koła
    setInterval(()=>{
      if(startWorkMinutes!==null && lastExerciseMinutes!==null && getEffectiveExerciseElapsed()>60){
        renderRadarSweep();
      }
      if(getPotPhase() === 'heating' || getPotPhase() === 'waiting'){
        renderPotButton();
      }
      // Animacja przywracania koła trwa 2s - aktualizuj klatki
    }, 100);

    // auto-save co minutę
    setInterval(()=>saveState(), 60000);
  </script>
</body>
</html>
