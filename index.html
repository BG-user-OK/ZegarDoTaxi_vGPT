<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tarcza czasu pracy</title>
  <!-- vGPT_5.3.6: based on a previously developed v:1.28 version created by another AI. -->

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tarcza">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    :root{
      --bg:#000000;
      --dot:#d7d7d7;
      --dot-big:#ececec;
      --txt:#f4f4f4;
      --version:#6f6f6f;

      --hand-hour:#e8e8e8;
      --hand-minute:#b9b9b9;
      --hand-outline:rgba(0,0,0,.85);
      --dial-number:#8a8a8a;

      --work-green:#38c866;
      --no-exercise-red:#ff3838;
      --overtime-orange:#ff9a1f;
      --exercise:#e5871f;
      --break-cut:#000000;
      --forecast:#44df73;

      --btn-work-off-1:#0d3f18;
      --btn-work-off-2:#07250f;
      --btn-work-on-1:#2ac158;
      --btn-work-on-2:#17873a;
      --btn-work-over-1:#ffa335;
      --btn-work-over-2:#c96a0a;

      --btn-ex-off-1:#75410a;
      --btn-ex-off-2:#492805;
      --btn-ex-on-1:#ffaa3f;
      --btn-ex-on-2:#d87210;
      --btn-ex-alert-1:#d12727;
      --btn-ex-alert-2:#8f1717;
      --btn-ex-blink-1:#ff5a47;
      --btn-ex-blink-2:#cd2313;

      --btn-break-off-1:#72600b;
      --btn-break-off-2:#463a06;
      --btn-break-on-1:#ffe84d;
      --btn-break-on-2:#d7bc05;

      --btn-pot-off-1:#2a2a2a;
      --btn-pot-off-2:#1a1a1a;

      --btn-money-1:#f4d87a;
      --btn-money-2:#c9a03d;
      --btn-money-text:#5c3e08;

      --work-text-green:#0f431c;
      --work-text-orange:#4a2600;
      --exercise-text:#ffd39a;
      --exercise-text-alert:#ffd6d6;
      --break-text:#fff0a6;

      --red:#b11919;
      --red-dark:#5e0e0e;
      --ok:#188439;
      --ok-dark:#0f5f28;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
    button, .btn, .ok-btn, .cancel-btn, .delete-btn, .arrow-btn, .prov-btn, .counter-edit, .note-sticker, .keypad button {
      touch-action: manipulation;
    }
    html,body{ margin:0; padding:0; width:100%; height:100%; background:#000; color:var(--txt); font-family:Arial, Helvetica, sans-serif; overflow:hidden; }
    body{ display:flex; align-items:center; justify-content:center; }

    .app{
      width:100%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:space-between;
      padding:6px 8px 30px;
      gap:6px; position:relative; background:#000;
    }

    .notes-bar{
      width:100%; min-height:64px;
      display:flex; align-items:center; gap:2px;
      padding:4px 60px 4px 6px;
      flex-wrap:wrap;
    }
    .note-sticker{
      flex:0 0 auto;
      width:var(--note-size, 68px);
      height:var(--note-size, 60px);
      padding:0 4px;
      border-radius:8px 8px 14px 8px;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:calc(var(--note-size, 60px) * 0.5);
      font-weight:800;
      box-shadow:0 2px 4px rgba(0,0,0,.5);
      border:none; cursor:pointer;
      transition:opacity .2s, background .2s;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }
    .note-sticker-body{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      color:inherit;
      font:inherit;
      line-height:inherit;
      border-radius:8px 8px 14px 8px;
      padding:0 4px;
      box-shadow:0 2px 4px rgba(0,0,0,.5);
      background:#f4d847;
    }
    .note-sticker.note-postpone-warning,
    .note-sticker.note-postpone-committed,
    .note-sticker.note-postpone-fading{
      position:relative;
      z-index:80;
      -webkit-user-drag:none;
    }
    .note-sticker.note-postpone-warning .note-sticker-body{
      background:#ff2525;
      color:#fff;
      box-shadow:
        0 0 0 4px rgba(255,255,255,.55),
        0 0 22px rgba(255,0,0,.78),
        0 2px 4px rgba(0,0,0,.5);
    }
    .note-sticker.note-postpone-committed{
      touch-action:none;
    }
    .note-sticker.note-postpone-committed .note-sticker-body{
      background:#d8d8d8;
      color:#111;
      box-shadow:
        0 0 0 2px rgba(255,255,255,.42),
        0 0 18px rgba(255,255,255,.2),
        0 2px 4px rgba(0,0,0,.5);
      transition:background-color 3s ease, color 2.7s ease, box-shadow 3s ease, opacity 3s ease;
    }
    .note-sticker.note-postpone-fading .note-sticker-body{
      background:#000;
      color:rgba(0,0,0,0);
      box-shadow:none;
      opacity:0;
    }
    .note-tomorrow-text{
      width:100%;
      text-align:center;
      font-size:calc(var(--note-size, 60px) * .28);
      font-weight:1000;
      line-height:1.02;
      color:inherit;
      text-shadow:0 1px 0 rgba(255,255,255,.35);
    }
    .note-sticker.empty{
      width:34px;
      height:30px;
      background:#1a1a1a;
      color:#5a5a3a;
      font-size:18px;
    }
    .note-sticker.filled{
      background:transparent;
      color:#3a2c00;
      box-shadow:none;
      padding:0;
      overflow:visible;
      touch-action:none;
      -webkit-user-drag:none;
    }
    .note-sticker.alarm-blink{
      color:#fff;
    }
    .note-sticker.alarm-blink .note-sticker-body{
      background:#ff3838;
      color:#fff;
    }
    .note-sticker.note-postpone-warning.alarm-blink .note-sticker-body{
      background:#ff2525;
      color:#fff;
      box-shadow:
        0 0 0 4px rgba(255,255,255,.55),
        0 0 22px rgba(255,0,0,.78),
        0 2px 4px rgba(0,0,0,.5);
    }
    .note-sticker.note-postpone-committed.alarm-blink .note-sticker-body{
      background:#d8d8d8;
      color:#111;
      box-shadow:
        0 0 0 2px rgba(255,255,255,.42),
        0 0 18px rgba(255,255,255,.2),
        0 2px 4px rgba(0,0,0,.5);
    }
    .note-sticker.note-postpone-fading.alarm-blink .note-sticker-body{
      background:#000;
      color:rgba(0,0,0,0);
      box-shadow:none;
      opacity:0;
    }
    .note-sticker:active{ transform:scale(.96); }
    .note-sticker.note-postpone-warning:active,
    .note-sticker.note-postpone-committed:active,
    .note-sticker.note-postpone-fading:active{
      transform:none;
    }
    .note-sticker.with-time{
      width:var(--note-size, 68px);
      height:calc(var(--note-size, 60px) * 1.22);
      flex-direction:column;
      justify-content:flex-start;
      gap:2px;
      padding:5px 4px 3px;
    }
    .note-sticker.filled.with-time{
      padding:0;
    }
    .note-sticker.with-time .note-sticker-body{
      flex-direction:column;
      justify-content:flex-start;
      gap:2px;
      padding:5px 4px 3px;
    }
    .note-icon-main{
      flex:0 0 auto;
      min-width:0;
      width:100%;
      margin-top:auto;
      margin-bottom:auto;
      text-align:center;
      overflow:hidden;
      text-overflow:clip;
      white-space:nowrap;
      line-height:.92;
    }
    .note-time-mini{
      flex:0 0 auto;
      max-width:100%;
      margin-top:0;
      transform:translateY(1px);
      font-size:calc(var(--note-size, 60px) * 0.21);
      line-height:1;
      font-weight:900;
      color:#2c2100;
      background:rgba(255,255,255,.34);
      border-radius:5px;
      padding:2px 3px;
      font-variant-numeric:tabular-nums;
    }

    .clock-wrap{
      width:min(97vw, 67vh); aspect-ratio:1/1;
      position:relative; display:flex; align-items:center; justify-content:center;
      margin:8px 0;
    }
    .clock-svg{ width:100%; height:100%; display:block; overflow:visible; }
    /* Punkty 4+5: druga warstwa SVG NAD cyframi godzin - dla strzałki i kropki minut */
    .clock-svg-overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:30;
    }
    .clock-center{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
    }
    .clock-face{ width:75%; height:75%; border-radius:50%; position:relative; }
    .number{
      position:absolute; left:50%; top:50%;
      transform:translate(-50%,-50%);
      color:var(--dial-number); font-weight:900;
      font-size:clamp(47px, 12.6vw, 88px);
      line-height:1; letter-spacing:-1.2px;
      transition:color .3s ease, text-shadow .3s ease;
    }
    .number.active{
      color:#ffffff;
      text-shadow:
        0 0 8px rgba(255,255,255,.85),
        0 0 16px rgba(255,255,255,.6),
        0 0 24px rgba(180,255,200,.4);
    }

    .controls{
      width:min(96vw, 620px);
      display:grid; grid-template-columns:repeat(3, 1fr);
      grid-auto-rows:auto; column-gap:6px; row-gap:2px;
      align-items:end;
      position:relative;
    }
    .work-btn{ order:1; }
    .pot-btn{ order:2; }
    .money-btn{ order:3; }
    .exercise-btn{ order:4; }
    .break-btn{ order:5; }
    .coin-btn{ order:6; }
    .controls.results-ended .pot-btn{
      display:none;
    }
    .controls.results-ended .money-btn{
      grid-column:2 / span 2;
      grid-row:1;
      width:100%;
      aspect-ratio:2/1;
      align-self:end;
      overflow:visible;
      z-index:4;
      background:#000 !important;
      box-shadow:none;
    }
    /* Moduł 2 (ćwiczenia) wystaje w górę o połowę swojej wysokości - mieści 4 rzędy kół */
    .exercise-btn{
      /* vGPT_5.3.6: matches the size and baseline of the other top-row buttons. */
      aspect-ratio:1/1 !important;
      align-self:end;
    }
    .driving-focus-restore-area{
      display:none;
      grid-column:2 / span 2;
      grid-row:1 / span 2;
      align-self:stretch;
      justify-self:stretch;
      z-index:40;
      border:none;
      border-radius:16px;
      padding:0;
      margin:0;
      background:transparent;
      cursor:pointer;
      min-width:100%;
      min-height:100%;
    }
    .controls.driving-focus-faded .driving-focus-restore-area{
      display:block;
    }
    .driving-focus-fade-target{
      transition:opacity 5s ease, filter 5s ease, box-shadow 5s ease, background-color 5s ease, color 5s ease, text-shadow 5s ease;
    }
    .driving-focus-fade-target.driving-focus-faded{
      opacity:.025 !important;
      filter:brightness(0) saturate(0);
      box-shadow:none !important;
      pointer-events:none;
    }
    .date-work-start.driving-focus-faded{
      opacity:.02 !important;
      color:rgba(0,0,0,0);
      text-shadow:none;
    }

    /* Data pod zegarem (zmiana 11) */
    .date-display{
      width:100%;
      text-align:center;
      font-size:clamp(24px, 6.4vw, 36px);
      font-weight:800;
      color:var(--dial-number);
      letter-spacing:.5px;
      padding:0;
      line-height:1;
      text-shadow:
        0 0 8px rgba(220,220,225,.55),
        0 0 16px rgba(200,200,210,.35),
        0 0 24px rgba(180,180,200,.2);
    }

    /* Bateria w prawym górnym rogu (zmiana 13) */
    .battery-indicator{
      position:fixed;
      top:6px; right:8px;
      z-index:20;
      padding:3px 9px;
      border:1.5px solid #2ecc71;
      border-radius:4px;
      color:#2ecc71;
      font-size:14px;
      font-weight:800;
      letter-spacing:.3px;
      background:rgba(0,0,0,.4);
      min-width:48px;
      text-align:center;
      pointer-events:none;
    }
    .battery-indicator::after{
      content:'';
      position:absolute;
      top:50%;
      right:-5px;
      transform:translateY(-50%);
      width:3px; height:9px;
      background:#2ecc71;
      border-radius:0 2px 2px 0;
    }
    .auto-sync-indicator{
      position:fixed;
      top:35px;
      right:20px;
      z-index:21;
      width:24px;
      height:24px;
      border-radius:50%;
      background:#555;
      box-shadow:0 0 0 1px rgba(255,255,255,.1), 0 0 8px rgba(0,0,0,.65);
      border:none;
      padding:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#dff8ff;
      font-size:18px;
      line-height:1;
      opacity:1;
      transition:opacity 4s ease, background-color 4s ease, box-shadow 4s ease;
    }
    .auto-sync-indicator.on{
      background:#2ecc71;
      box-shadow:0 0 0 1px rgba(46,204,113,.35), 0 0 14px rgba(46,204,113,.55);
    }
    .auto-sync-indicator.on.green-faded{
      opacity:.06;
      background:#020402;
      box-shadow:none;
    }
    .auto-sync-indicator.checking{
      background:#f4d03f;
      animation:autoSyncBlink .7s infinite alternate;
    }
    .auto-sync-indicator.scheduled{
      background:#ff7a00;
      box-shadow:
        0 0 0 1px rgba(255,154,31,.55),
        0 0 12px rgba(255,122,0,.95),
        0 0 24px rgba(255,122,0,.68);
    }
    .auto-sync-indicator.downloading{
      background:#ff3333;
      animation:autoSyncBlink .45s infinite alternate;
    }
    .auto-sync-indicator.applied{
      background:#e02020;
      width:26px;
      height:26px;
      box-shadow:0 0 0 1px rgba(255,80,80,.35), 0 0 10px rgba(255,0,0,.7);
    }
    .auto-sync-indicator.frozen{
      width:34px;
      height:34px;
      background:transparent;
      box-shadow:none;
      font-size:30px;
      text-shadow:0 0 8px rgba(120,220,255,.95), 0 0 14px rgba(255,255,255,.4);
    }
    @keyframes autoSyncBlink{
      from{ opacity:.35; transform:scale(.9); }
      to{ opacity:1; transform:scale(1.18); }
    }
    .battery-indicator.low{
      color:#ff3838;
      border-color:#ff3838;
    }
    .battery-indicator.low::after{
      background:#ff3838;
    }
    .btn{
      position:relative; border:none; border-radius:16px;
      aspect-ratio:1/1; min-height:84px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08),
                  inset 0 -12px 16px rgba(0,0,0,.34),
                  0 0 0 1px rgba(0,0,0,.55);
      color:#fff; overflow:hidden;
      appearance:none; -webkit-appearance:none; background:#111;
    }
    .btn:active{ transform:scale(.985); }
    .btn.empty-slot{ background:#0a0a0a; box-shadow:inset 0 0 0 1px #1a1a1a; pointer-events:none; opacity:.3; }

    /* === v1.12: long-press progress ring === */
    .btn .lp-ring{
      position:absolute; inset:0;
      border-radius:16px;
      pointer-events:none;
      z-index:6;
      opacity:0;
      box-shadow:inset 0 0 0 0 rgba(255,255,255,0.85);
      transition:opacity .15s ease;
    }
    .btn.lp-active .lp-ring{
      opacity:1;
      animation:lpFill 3s linear forwards;
    }
    @keyframes lpFill{
      0%   { box-shadow:inset 0 0 0 0px rgba(80,200,255,0.0); }
      30%  { box-shadow:inset 0 0 0 3px rgba(80,200,255,0.55); }
      60%  { box-shadow:inset 0 0 0 5px rgba(120,220,255,0.75); }
      100% { box-shadow:inset 0 0 0 8px rgba(255,255,255,0.95); }
    }
    .hold-warning-shake{
      animation:holdWarningShake .18s linear infinite;
      will-change:transform;
    }
    @keyframes holdWarningShake{
      0%   { transform:translate3d(0,0,0) rotate(0deg); }
      12%  { transform:translate3d(-3px,2px,0) rotate(-.35deg); }
      24%  { transform:translate3d(3px,-2px,0) rotate(.35deg); }
      36%  { transform:translate3d(-2px,-3px,0) rotate(-.25deg); }
      48%  { transform:translate3d(2px,3px,0) rotate(.25deg); }
      60%  { transform:translate3d(-3px,0,0) rotate(-.3deg); }
      72%  { transform:translate3d(3px,1px,0) rotate(.3deg); }
      84%  { transform:translate3d(-1px,3px,0) rotate(-.2deg); }
      100% { transform:translate3d(0,0,0) rotate(0deg); }
    }

    /* === v1.12: edit-mini przekształcony w nieklikalną etykietę "✎ 3s" === */
    .edit-hint{
      position:absolute; top:6px; right:6px;
      font-size:11px; font-weight:800;
      color:rgba(255,255,255,.55);
      background:rgba(0,0,0,.28);
      padding:2px 6px;
      border-radius:6px;
      z-index:5;
      pointer-events:none;
      letter-spacing:.5px;
    }

    /* === v1.12: przycisk START/STOP - podział pionowy === */
    .work-split{
      position:absolute; inset:0;
      display:block;
      z-index:2;
      pointer-events:none;
    }
    .work-left{
      display:none;
    }
    .work-time-top{
      position:absolute;
      top:7px;
      left:8px;
      z-index:3;
      font-size:clamp(16px, 4.2vw, 22px);
      font-weight:900;
      color:rgba(255,255,255,.95);
      letter-spacing:-.5px;
      text-shadow:0 1px 0 rgba(0,0,0,.3);
    }
    .work-time-bot{
      position:absolute;
      top:7px;
      right:8px;
      z-index:3;
      font-size:clamp(16px, 4.2vw, 22px);
      font-weight:900;
      color:rgba(255,255,255,.85);
      letter-spacing:-.5px;
      text-align:right;
    }
    .work-icon-row{
      display:none;
    }
    /* Rolka odhaczająca godziny */
    .work-right{
      position:absolute;
      inset:0;
      padding:0;
    }
    .work-roller{
      position:absolute;
      top:50%; left:4%; right:4%;
      transform:translateY(-50%);
      height:94%;
      z-index:1;
      background:rgba(0,0,0,.55);
      border-radius:8px;
      box-shadow:inset 0 0 0 1px rgba(56,200,102,.22),
                 inset 0 0 10px rgba(0,0,0,.7);
      overflow:hidden;
      -webkit-mask-image:linear-gradient(180deg,
        transparent 0%,
        rgba(0,0,0,.08) 9%,
        rgba(0,0,0,.48) 22%,
        black 32%, black 70%,
        rgba(0,0,0,.72) 78%,
        rgba(0,0,0,.18) 92%,
        transparent 100%);
      mask-image:linear-gradient(180deg,
        transparent 0%,
        rgba(0,0,0,.08) 9%,
        rgba(0,0,0,.48) 22%,
        black 32%, black 70%,
        rgba(0,0,0,.72) 78%,
        rgba(0,0,0,.18) 92%,
        transparent 100%);
    }
    .work-roller-inner{
      display:flex; flex-direction:column;
      align-items:center;
      position:absolute;
      top:0; left:0; right:0;
      transition:transform 0.6s ease;
      will-change:transform;
    }
    .work-roller-digit{
      width:100%;
      flex:0 0 auto;
      display:flex; align-items:center; justify-content:center;
      font-weight:900;
      color:var(--work-green);
      text-shadow:0 1px 0 rgba(0,0,0,.55), 0 0 8px rgba(56,200,102,.34);
      border-bottom:2.5px solid rgba(88,232,120,.55);
      box-sizing:border-box;
      position:relative;
      /* font-size i height ustawia JS dynamicznie */
    }
    #workBtn .work-roller-digit::before,
    #workBtn .work-roller-digit::after{
      content:'';
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:22%;
      height:3px;
      border-radius:3px;
      background:rgba(88,232,120,.46);
      box-shadow:0 0 2px rgba(88,232,120,.24);
      opacity:.72;
      pointer-events:none;
    }
    #workBtn .work-roller-digit::before{ left:6%; }
    #workBtn .work-roller-digit::after{ right:6%; }
    /* znaczniki na środku rolki - lewy i prawy */
    .work-roller-mark-left,
    .work-roller-mark-right{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:0; height:0;
      border-style:solid;
      z-index:10;
      pointer-events:none;
      filter:drop-shadow(0 0 3px rgba(88,232,120,.85));
    }
    .work-roller-mark-left{
      left:-1px;
      border-width:5px 0 5px 8px;
      border-color:transparent transparent transparent #58e878;
    }
    .work-roller-mark-right{
      right:-1px;
      border-width:5px 8px 5px 0;
      border-color:transparent #58e878 transparent transparent;
    }

    /* === v1.12: przycisk obrotów - dwa banknoty (góra/dół) === */
    .money-btn{
      background:#000;
      padding:0;
      overflow:hidden;
      border-radius:0;
    }
    /* Pełnoekranowy worek pieniędzy gdy brak kwot - znika gdy są banknoty */
    .money-empty-bag{
      position:absolute;
      inset:0;
      z-index:3;
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(70px, 18vw, 130px);
      line-height:1;
      pointer-events:none;
      opacity:.85;
    }
    .money-btn.counter-start-warning{
      box-shadow:
        0 0 0 2px rgba(255,48,48,.86),
        0 0 18px rgba(255,0,0,.95),
        0 0 34px rgba(255,0,0,.68),
        inset 0 0 22px rgba(255,0,0,.32) !important;
    }
    .money-btn.counter-start-warning .money-empty-bag{
      opacity:1;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,34,34,.34), transparent 48%),
        radial-gradient(circle at 50% 50%, rgba(0,0,0,.32), transparent 62%);
    }
    .money-counter-warning-img{
      max-width:88%;
      max-height:88%;
      object-fit:contain;
      filter:
        drop-shadow(0 0 8px rgba(255,50,50,.95))
        drop-shadow(0 0 18px rgba(255,0,0,.7));
    }
    .money-counter-warning-fallback{
      display:none;
      font-size:clamp(70px, 18vw, 130px);
      text-shadow:
        0 0 10px rgba(255,60,60,.9),
        0 0 24px rgba(255,0,0,.65);
    }
    .money-empty-bag.hidden{ display:none; }
    .money-split{
      position:absolute; inset:0;
      display:grid;
      grid-template-rows:1fr 1fr;
      gap:0;
      z-index:2;
      pointer-events:none;
    }
    .money-cell{
      position:relative;
      display:flex; align-items:center; justify-content:center;
      background-color:#000;
      background-size:contain;
      background-position:center;
      background-repeat:no-repeat;
      overflow:hidden;
      border-radius:0;
    }
    .money-cell.empty{
      background-image:none !important;
    }
    .money-cell-text{
      display:inline-block;
      width:auto;
      font-size:clamp(28px, 9vw, 48px);
      font-weight:900;
      text-align:center;
      line-height:1;
      padding:0;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
      /* offsety: --note-tx ustawia per-banknot (poziomo), górny dodatkowo dostaje shift w lewo */
      transform:translate(calc(var(--note-tx, 0%) + var(--row-shift, 0%)), var(--note-ty, 0%));
    }
    /* Kolory liczb - rozjaśnione, w odcieniu banknotu, z delikatną poświatą */
    .money-cell.note-50  .money-cell-text{
      color:#3870c8;          /* 50zł niebieski - jaśniejszy granatowy */
      text-shadow:0 0 6px rgba(0,30,90,.6), 0 1px 1px rgba(255,255,255,.3);
    }
    .money-cell.note-100 .money-cell-text{
      color:#1a8a3a;          /* 100zł zielony - intensywna zieleń */
      text-shadow:0 0 6px rgba(0,40,15,.6), 0 1px 1px rgba(255,255,255,.3);
    }
    .money-cell.note-200 .money-cell-text{
      color:#a87010;          /* 200zł złoty - jasny złoty/oker */
      text-shadow:0 0 6px rgba(60,30,0,.55), 0 1px 1px rgba(255,255,255,.3);
    }
    .money-cell.note-500 .money-cell-text{
      color:#7a3aaa;          /* 500zł fiolet - jasny fioletowy */
      text-shadow:0 0 6px rgba(40,0,60,.6), 0 1px 1px rgba(255,255,255,.3);
    }
    /* Per-banknot offsety (gdyby okienko obrazka nie było centralnie - korekta) */
    .money-cell.note-50  { --note-tx:0%; --note-ty:0%; }
    .money-cell.note-100 { --note-tx:0%; --note-ty:0%; }
    .money-cell.note-200 { --note-tx:0%; --note-ty:0%; }
    .money-cell.note-500 { --note-tx:0%; --note-ty:0%; }
    /* Punkt 2: górny banknot kwota w lewo, dolny banknot kwota w lewo */
    #moneyTop .money-cell-text { --row-shift:-35%; }
    #moneyTop.note-500 .money-cell-text{
      --row-shift:-24%;
      font-size:clamp(28px, 8.6vw, 46px);
    }
    #moneyTop.note-500 .money-cell-text.money-digits-4{
      --row-shift:-20%;
      font-size:clamp(24px, 7.6vw, 40px);
    }
    #moneyBot .money-cell-text { --row-shift:-20%; }
    .controls.results-ended .money-split{
      display:block;
      overflow:visible;
    }
    .controls.results-ended #moneyTop{
      position:absolute;
      left:0;
      right:0;
      bottom:50%;
      height:100%;
      z-index:4;
      overflow:visible;
    }
    .controls.results-ended #moneyTop .money-cell-text{
      --row-shift:-30%;
      font-size:clamp(44px, 15vw, 88px);
    }
    .controls.results-ended #moneyTop.note-500 .money-cell-text{
      --row-shift:-18%;
    }
    .controls.results-ended #moneyTop .money-cell-text.money-digits-4{
      font-size:clamp(38px, 12vw, 70px);
    }
    .controls.results-ended #moneyTop.note-500 .money-cell-text.money-digits-4{
      --row-shift:-16%;
      font-size:clamp(38px, 11.8vw, 68px);
    }
    .controls.results-ended #moneyBot{
      position:absolute;
      right:0;
      bottom:0;
      width:calc((100% - 6px) / 2);
      height:50%;
      display:flex;
      z-index:2;
    }

    /* moneta (przycisk dolny prawy) */
    .coin-btn{
      background:#000;
      padding:0;
      overflow:hidden;
      border-radius:0;
    }
    .coin-cell{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background-color:#000;
      background-size:contain;
      background-position:center;
      background-repeat:no-repeat;
      z-index:2;
    }
    .coin-cell.empty{ background-image:none !important; }
    .coin-cell-text{
      font-size:clamp(27px, 7.6vw, 43px);
      font-weight:900;
      text-align:center;
      line-height:1;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
    }
    .coin-cell.coin-1 .coin-cell-text{
      color:#3a3a3a;
      text-shadow:0 0 3px rgba(255,255,255,.85);
    }
    .coin-cell.coin-2 .coin-cell-text{
      color:#5e3f08;
      text-shadow:0 0 3px rgba(255,255,255,.85);
    }
    .coin-cell.coin-5 .coin-cell-text{
      color:#3a2a06;
      text-shadow:0 0 3px rgba(255,255,255,.85);
    }

    /* === v1.12: garnek "spał" po wykorzystaniu === */
    .pot-btn.dimmed{
      opacity:.45;
    }

    /* === v1.12: Animacja END - czerwona fala zalewająca tarczę + napis + odliczanie === */
    .end-confirm-overlay{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      z-index:50;
      pointer-events:auto;
      /* ograniczenie do okręgu tarczy zegara - środek (50%,50%), promień ~50% */
      clip-path:circle(50% at 50% 50%);
      -webkit-clip-path:circle(50% at 50% 50%);
      overflow:hidden;
      border-radius:50%;
    }
    .end-confirm-overlay.hidden{ display:none; }
    .end-wave{
      position:absolute;
      left:50%; top:50%;
      width:0; height:0;
      background:radial-gradient(circle,#ff2828 0%,#a80000 70%,#5e0000 100%);
      border-radius:50%;
      transform:translate(-50%,-50%);
      animation:endWaveExpand .55s ease-out forwards;
    }
    /* Wariant żółty dla resetu */
    .end-confirm-overlay.yellow .end-wave{
      background:radial-gradient(circle,#ffe040 0%,#d6a90a 70%,#7a5e00 100%);
    }
    .end-confirm-overlay.blue .end-wave{
      background:radial-gradient(circle,#bdf2ff 0%,#55c8f0 68%,#12769e 100%);
    }
    .end-confirm-overlay.yellow .end-confirm-counter,
    .end-confirm-overlay.yellow .end-confirm-title,
    .end-confirm-overlay.yellow .end-confirm-hint{
      color:#1c1400;
      text-shadow:0 1px 3px rgba(255,255,255,.5);
    }
    .end-confirm-overlay.blue .end-confirm-counter,
    .end-confirm-overlay.blue .end-confirm-title,
    .end-confirm-overlay.blue .end-confirm-hint{
      color:#05283a;
      text-shadow:0 1px 3px rgba(255,255,255,.62);
    }
    @keyframes endWaveExpand{
      0%   { width:0; height:0; opacity:.6; }
      100% { width:200%; height:200%; opacity:1; }
    }
    /* Punkt 5: zwijanie wstecz gdy minie czas bez kliknięcia */
    @keyframes endWaveCollapse{
      0%   { width:200%; height:200%; opacity:1; }
      100% { width:0; height:0; opacity:.4; }
    }
    .end-confirm-overlay.collapsing .end-wave{
      animation:endWaveCollapse .5s ease-in forwards !important;
    }
    .end-confirm-overlay.collapsing .end-confirm-content{
      animation:endTextFadeOut .25s ease-out forwards !important;
    }
    @keyframes endTextFadeOut{
      0% { opacity:1; }
      100% { opacity:0; }
    }
    .end-confirm-content{
      position:relative;
      z-index:51;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#fff;
      opacity:0;
      animation:endTextFade .35s .35s forwards;
      padding:0 16px;
    }
    @keyframes endTextFade{ to{ opacity:1; } }
    .end-confirm-title{
      font-size:clamp(18px, 4.6vw, 26px);
      font-weight:900;
      letter-spacing:.5px;
      line-height:1.1;
      text-shadow:0 2px 6px rgba(0,0,0,.6);
      margin-bottom:8px;
    }
    .end-confirm-title .missing-counter-main{
      display:block;
      font-size:clamp(26px, 7.2vw, 44px);
      line-height:.94;
      letter-spacing:.2px;
      text-shadow:
        0 2px 4px rgba(0,0,0,.75),
        0 0 12px rgba(255,255,255,.24);
    }
    .end-confirm-title .missing-counter-question{
      display:block;
      margin-top:8px;
      font-size:clamp(18px, 5.1vw, 30px);
      line-height:1;
      text-shadow:0 2px 6px rgba(0,0,0,.7);
    }
    .end-confirm-counter{
      font-size:clamp(60px, 18vw, 110px);
      font-weight:900;
      line-height:1;
      text-shadow:0 4px 14px rgba(0,0,0,.7);
    }
    .end-confirm-hint{
      font-size:clamp(12px, 3vw, 15px);
      font-weight:700;
      color:rgba(255,230,230,.92);
      margin-top:6px;
    }
    .end-confirm-hint:empty{ display:none; }
    .end-confirm-choice{
      display:none;
    }
    .end-confirm-overlay.choice-mode .end-confirm-content{
      width:100%;
      height:100%;
      display:grid;
      grid-template-rows:30% 45% 25%;
      align-items:center;
      justify-items:center;
      padding:24px 34px 30px;
    }
    .end-confirm-overlay.choice-mode .end-confirm-title,
    .end-confirm-overlay.choice-mode .end-confirm-hint{ display:none; }
    .end-confirm-overlay.choice-mode .end-confirm-choice{
      display:contents;
    }
    .end-confirm-overlay.choice-mode .end-confirm-counter{
      grid-row:3;
      align-self:end;
      font-size:clamp(42px, 12vw, 72px);
      margin:0;
    }
    .end-choice-btn{
      border:none;
      border-radius:10px;
      padding:10px 12px;
      font-size:clamp(14px, 3.6vw, 18px);
      font-weight:900;
      line-height:1.12;
      box-shadow:0 4px 14px rgba(0,0,0,.28), inset 0 0 0 2px rgba(0,0,0,.08);
    }
    .end-choice-btn.reset{
      grid-row:1;
      align-self:end;
      width:min(58vw, 190px);
      min-height:54px;
      color:#ffffff;
      background:#ff3333;
    }
    .end-choice-btn.continue{
      grid-row:2;
      align-self:center;
      width:min(76vw, 300px);
      min-height:112px;
      border-radius:12px;
      font-size:clamp(19px, 5vw, 27px);
      color:#0b4419;
      background:#9cff9c;
    }

    .work-btn{ background:#000000; }
    /* Punkt 3: wyszarzenie przycisku pracy podczas trwania przerwy */
    .work-btn.dimmed-during-break{
      opacity:.45;
      filter:grayscale(.7);
      transition:opacity .3s ease, filter .3s ease;
    }
    .work-btn.on{
      background:#000000;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14),
                  inset 0 -12px 16px rgba(0,0,0,.24),
                  0 0 0 1px rgba(255,255,255,.12);
    }
    .work-btn.overtime{
      background:linear-gradient(180deg,var(--btn-work-over-1),var(--btn-work-over-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15),
                  inset 0 -12px 16px rgba(0,0,0,.18),
                  0 0 22px rgba(255,154,31,.55),
                  0 0 0 1px rgba(255,154,31,.55);
    }

    .exercise-btn.flash{
      background:linear-gradient(180deg,var(--btn-ex-on-1),var(--btn-ex-on-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16),
                  inset 0 -12px 16px rgba(0,0,0,.2),
                  0 0 22px rgba(255,170,63,.45),
                  0 0 0 1px rgba(255,170,63,.45);
    }
    .exercise-btn.alert{
      background:linear-gradient(180deg,var(--btn-ex-alert-1),var(--btn-ex-alert-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10),
                  inset 0 -12px 16px rgba(0,0,0,.22),
                  0 0 18px rgba(209,39,39,.34),
                  0 0 0 1px rgba(209,39,39,.42);
    }
    .exercise-btn.blink{
      background:linear-gradient(180deg,var(--btn-ex-blink-1),var(--btn-ex-blink-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18),
                  inset 0 -12px 16px rgba(0,0,0,.18),
                  0 0 24px rgba(255,90,71,.52),
                  0 0 0 1px rgba(255,90,71,.52);
    }

    /* === Przerwa === */
    .break-btn{
      background:#aaaaaa;
      transition:background .25s ease;
    }
    .break-img{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:contain;
      z-index:1; pointer-events:none;
    }
    /* Obrazek "off" widoczny gdy nie ma przerwy. Obrazek "on" gdy trwa przerwa (klasa .on) */
    .break-img-off{ display:block; }
    .break-img-on{ display:none; }
    .break-btn.on .break-img-off{ display:none; }
    .break-btn.on .break-img-on{ display:block; }
    .break-top-zone, .break-bot-zone{
      position:absolute;
      left:5%; width:50%;
      height:33%;
      display:flex; align-items:center; justify-content:flex-start;
      font-size:clamp(18px,5vw,28px); font-weight:900;
      color:#1a1a1a; z-index:3; pointer-events:none;
      text-shadow:0 0 6px rgba(255,255,255,.85),0 1px 0 rgba(255,255,255,.6);
      font-variant-numeric:tabular-nums;
    }
    .break-top-zone{ top:0; }
    .break-bot-zone{ bottom:0; }
    /* Tło miga między szarym a żółtym - tylko gdy klasa .blink-bg jest aktywna */
    .break-btn.on{ background:#aaaaaa; }
    .break-btn.on.blink-bg{
      background:#ffe84d;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.22),
                 0 0 24px rgba(255,232,77,.55),
                 0 0 0 1px rgba(255,232,77,.55);
    }

    /* === Garnek z obrazkiem === */
    .pot-btn{ background:linear-gradient(180deg,var(--btn-pot-off-1),var(--btn-pot-off-2)); }
    .pot-btn.done-alarm{ background:linear-gradient(180deg,#ff4b22,#e00000); box-shadow:inset 0 0 0 2px rgba(255,235,220,.5), inset 0 0 36px rgba(255,40,0,.45), 0 0 34px rgba(255,48,0,.85); }
    .pot-btn.done-alarm-off{ background:linear-gradient(180deg,#d01800,#850000); box-shadow:inset 0 0 0 1px rgba(255,130,100,.35), inset 0 0 26px rgba(160,0,0,.5), 0 0 18px rgba(255,20,0,.48); }
    .pot-btn.pot-has-img{ background:#000 !important; }
    .pot-btn.pot-has-img.done-alarm{ background:linear-gradient(180deg,#ff4b22,#e00000) !important; }
    .pot-btn.pot-has-img.done-alarm-off{ background:linear-gradient(180deg,#d01800,#850000) !important; }
    .pot-img{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:contain;
      z-index:3;        /* nad paskiem ognia, ale pod licznikiem */
      pointer-events:none;
    }
    /* Pasek ognia półprzezroczysty żeby nie zasłaniał obrazka */
    .pot-fire-bar{
      position:absolute; bottom:0; left:0; right:0;
      background:linear-gradient(0deg, rgba(255,28,0,.92), rgba(255,96,0,.82));
      border-radius:0 0 14px 14px;
      z-index:2; transition:height 0.8s linear;
      pointer-events:none;
    }
    /* Podczas alarmu (done-alarm/off) tło miga całym przyciskiem, obrazek tylko lekko zostaje widoczny. */
    .pot-btn.done-alarm .pot-img,
    .pot-btn.done-alarm-off .pot-img{
      opacity:0.38;
    }
    /* Licznik garnka: okienko 250x15 na 400x400 = 62.5%x3.75%, rozmiar 106x105 = 26.5%x26.25%
       Środek: left=75.75%, top=16.875% */
    .pot-counter-box{
      position:absolute;
      left:75.75%; top:16.875%;
      transform:translate(-50%,-50%);
      z-index:5;
      font-size:clamp(18px,5vw,32px); font-weight:900;
      color:#fff;
      text-shadow:0 0 6px rgba(0,0,0,.9),0 1px 0 rgba(0,0,0,.7);
      font-variant-numeric:tabular-nums;
      line-height:1; pointer-events:none;
    }
    /* Gdy brak obrazka - centralnie i większa czcionka */
    .pot-btn:not(.pot-has-img) .pot-counter-box{
      left:50%; top:50%;
      font-size:clamp(40px,11vw,64px);
    }

    /* === Moduł ćwiczeń: pojedyncze koło z animowaną maską (zanikanie zgodnie z ruchem wskazówek) === */
    .exercise-btn{
      background:#000 !important;
      box-shadow:none !important;
      border-radius:16px;
      overflow:hidden;
      position:relative;
    }
    .wheel-image{
      position:absolute;
      inset:0;
      width:100%; height:100%;
      object-fit:contain;
      pointer-events:none;
      z-index:1;
      filter:drop-shadow(0 0 10px rgba(220,220,235,.5));
      /* Maska sterowana z JS - przez clip-path lub przez nakładkę SVG.
         Tutaj samo CSS bez maski, JS rysuje overlay. */
    }
    /* Czarna nakładka maskująca - SVG sektor który rośnie od 12:00 */
    .wheel-mask-overlay{
      position:absolute;
      inset:0;
      width:100%; height:100%;
      pointer-events:none;
      z-index:2;
      background:none;
      filter:blur(1.6px);
      transform:scale(1.035);
      transform-origin:center;
      will-change:background;
    }
    .wheel-restore-cover{
      position:absolute;
      inset:0;
      width:100%; height:100%;
      pointer-events:none;
      z-index:2;
      display:none;
      background:#000;
      filter:blur(1.6px);
      transform:scale(1.035);
      transform-origin:center;
      will-change:-webkit-mask-image,mask-image;
    }
    /* Czerwony moduł nadwyżki - jak dotychczas */
    .overage-display{
      position:absolute;
      inset:0;
      z-index:3;
      background:#000;
      box-shadow:none;
      display:none;
      border-radius:16px;
      transition:opacity 0.6s ease;
    }
    .overage-display .work-roller{
      left:3%;
      right:3%;
      height:94%;
      background:var(--no-exercise-red);
      box-shadow:
        inset 0 0 0 1px rgba(255,210,210,.42),
        inset 0 8px 14px rgba(255,255,255,.14),
        inset 0 -12px 16px rgba(95,0,0,.34),
        0 0 16px rgba(255,56,56,.24);
      -webkit-mask-image:linear-gradient(180deg,
        transparent 0%,
        rgba(0,0,0,.06) 5%,
        rgba(0,0,0,.28) 14%,
        rgba(0,0,0,.68) 28%,
        black 38%, black 62%,
        rgba(0,0,0,.68) 72%,
        rgba(0,0,0,.28) 86%,
        rgba(0,0,0,.06) 95%,
        transparent 100%);
      mask-image:linear-gradient(180deg,
        transparent 0%,
        rgba(0,0,0,.06) 5%,
        rgba(0,0,0,.28) 14%,
        rgba(0,0,0,.68) 28%,
        black 38%, black 62%,
        rgba(0,0,0,.68) 72%,
        rgba(0,0,0,.28) 86%,
        rgba(0,0,0,.06) 95%,
        transparent 100%);
    }
    .exercise-btn.overage .overage-display{
      display:block;
    }
    .exercise-btn.overage .wheel-image,
    .exercise-btn.overage .wheel-mask-overlay{
      display:none;
    }
    .exercise-btn.restore-overage .overage-display{
      display:block;
      opacity:1;
      z-index:1;
    }
    .exercise-btn.restore-overage .wheel-image{
      display:block;
      z-index:3;
    }
    .exercise-btn.restore-overage .wheel-restore-cover{
      display:block;
    }
    .exercise-btn.restore-overage .wheel-mask-overlay{
      display:none;
    }
    /* Stan "fading-overage": czerwony moduł gaśnie do czerni przed pojawieniem się koła z animacją odwrotną */
    .exercise-btn.fading-overage .overage-display{
      opacity:0;
    }
    .overage-display .work-roller-digit{
      color:#8a0000 !important;
      text-shadow:
        0 1px 0 rgba(255,210,70,.42),
        0 0 7px rgba(160,0,0,.42);
      border-bottom:2.5px solid rgba(128,0,0,.36);
    }
    .exercise-btn.flash{
      background:linear-gradient(180deg,var(--btn-ex-on-1),var(--btn-ex-on-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16),
                  inset 0 -12px 16px rgba(0,0,0,.2),
                  0 0 22px rgba(255,170,63,.45),
                  0 0 0 1px rgba(255,170,63,.45);
    }

    /* === Data w środku tarczy - na czarnym kole pod nią === */
    .date-center{
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      z-index:20;
      text-align:center; pointer-events:none;
      font-size:clamp(20px,5.4vw,32px);
      font-weight:800;
      color:var(--dial-number);
      line-height:1.05;
      text-shadow:0 0 8px rgba(220,220,225,.55),0 0 16px rgba(200,200,210,.35);
      /* Ograniczenie do czarnego koła w SVG (r=75) - zgodne z wewnętrznym promieniem wskazówki godzinowej. */
      width:45%; height:45%;
      border-radius:50%;
      overflow:hidden;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:2px;
      padding:5px 7px;
      box-sizing:border-box;
    }
    .date-line{
      max-width:100%;
      overflow:hidden;
      text-overflow:clip;
      white-space:nowrap;
    }
    .date-day,
    .date-value{
      line-height:1.05;
    }
    .date-work-time{
      color:rgba(115,115,115,.72);
      font-size:clamp(16px,4.2vw,22px);
      font-weight:900;
      line-height:1;
      letter-spacing:-.5px;
      text-shadow:0 1px 0 rgba(0,0,0,.55);
    }
    .date-center.has-work-end{
      font-size:clamp(18px,4.8vw,29px);
    }
    .date-center.has-work-end .date-work-time{
      font-size:clamp(15px,3.9vw,21px);
    }

    .money-btn{ background:linear-gradient(180deg,var(--btn-money-1),var(--btn-money-2)); }

    .btn-inner{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
      z-index:2;
    }
    .btn-inner.money-stack{ flex-direction:column; gap:2px; padding:4px; }

    .mini-corner, .mini-corner-bottom{
      position:absolute; left:8px;
      font-size:15px; font-weight:800;
      color:rgba(255,255,255,.9);
      letter-spacing:-.3px; z-index:2; pointer-events:none;
    }
    .mini-corner{ top:6px; }
    .mini-corner-bottom{ bottom:6px; }

    .center-big{
      font-size:clamp(48px, 13vw, 76px);
      font-weight:900; line-height:1;
      letter-spacing:-1.2px; text-align:center;
      pointer-events:none; text-shadow:0 1px 0 rgba(0,0,0,.25);
    }
    .work-btn .center-big{ color:var(--work-text-green); }
    .work-btn.overtime .center-big{ color:var(--work-text-orange); }
    .exercise-btn .center-big{ color:var(--exercise-text); }
    .exercise-btn.alert .center-big,
    .exercise-btn.blink .center-big{ color:var(--exercise-text-alert); }
    .break-btn .center-big, .break-btn .mini-corner{ color:var(--break-text); }
    .pot-btn .center-big{ color:#fff; font-size:clamp(40px,11vw,64px); }
    /* alarm po grzaniu - cyfra ciemnoczerwona z mocną białą poświatą */
    .pot-btn.done-alarm .center-big,
    .pot-btn.done-alarm-off .center-big{
      color:#5e0e0e;
      text-shadow:
        0 0 10px rgba(255,255,255,1),
        0 0 5px rgba(255,255,255,1),
        0 1px 0 rgba(255,255,255,.6);
    }

    .money-big{
      font-size:clamp(34px, 9vw, 54px);
      font-weight:900; line-height:1;
      color:var(--btn-money-text); letter-spacing:-1px;
    }
    .money-mid, .money-small{
      font-size:clamp(15px, 3.6vw, 22px);
      font-weight:800; line-height:1;
      color:#6e4d0d;
      display:flex; align-items:center; gap:3px;
    }

    .emoji{
      position:absolute; bottom:6px; right:8px;
      font-size:20px; opacity:.92; pointer-events:none;
    }

    .edit-mini{
      position:absolute; top:6px; right:6px;
      width:30px; height:30px; border:none;
      border-radius:8px; background:rgba(0,0,0,.22);
      color:#f0fff0; font-size:16px; font-weight:700;
      display:flex; align-items:center; justify-content:center;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
      z-index:5; cursor:pointer;
    }
    .edit-mini:active{ transform:scale(.96); }

    .overlay{
      position:fixed; inset:0;
      background:rgba(0,0,0,.85);
      display:none; align-items:center; justify-content:center;
      z-index:1000; padding:8px;
    }
    .overlay.show{ display:flex; }

    .editor{
      width:min(96vw, 520px);
      max-height:90vh;
      background:#060606; border:1px solid #232323;
      border-radius:18px;
      box-shadow:0 0 30px rgba(0,0,0,.65);
      display:flex; flex-direction:column; justify-content:center;
      padding:18px 14px 88px; position:relative;
      overflow-y:auto;
    }
    .editor-center{
      display:grid; grid-template-columns:1fr auto 1fr;
      align-items:center; justify-items:center;
      gap:10px; padding:12px 8px 12px;
    }
    .target-section{
      text-align:center;
      margin-top:8px;
      padding-top:10px;
      border-top:1px solid #2a2a2a;
    }
    .target-section button{
      margin-top:6px;
      padding:0 18px;
      font-size:15px;
      height:42px;
      width:auto;
    }
    .time-col{ display:flex; flex-direction:column; align-items:center; gap:12px; width:100%; }
    .arrow-btn{
      width:min(22vw, 84px); height:min(14vw, 58px);
      border:none; border-radius:14px;
      background:#111; color:#d5d5d5;
      font-size:30px; font-weight:700;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.05), 0 4px 12px rgba(0,0,0,.3);
    }
    .time-box{
      min-width:110px; text-align:center;
      font-size:clamp(52px, 14vw, 86px);
      font-weight:700; color:#f0f0f0;
      letter-spacing:2px;
    }
    .colon{
      font-size:clamp(42px, 10vw, 66px);
      font-weight:700; color:#d9d9d9;
      margin-top:-6px;
    }
    .editor-actions{
      position:absolute; left:12px; right:12px; bottom:12px;
      display:flex; justify-content:space-between; align-items:center;
    }
    .time-picker-layer{
      position:absolute; inset:0;
      z-index:1200;
      display:flex; align-items:center; justify-content:center;
      padding:8px;
      background:rgba(0,0,0,.74);
    }
    .time-picker-editor{
      justify-content:flex-start;
      padding:12px 12px 86px;
      overflow:hidden;
    }
    .time-picker-title{
      text-align:center;
      color:#cfcfcf;
      font-size:16px;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
      padding:2px 0 8px;
    }
    .time-picker-top{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:8px;
      margin-bottom:10px;
    }
    .time-picker-field{
      height:72px;
      border:none;
      border-radius:14px;
      background:#111;
      color:#b9b9b9;
      font-size:clamp(40px, 12vw, 64px);
      font-weight:900;
      font-variant-numeric:tabular-nums;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
    }
    .time-picker-field.active{
      background:linear-gradient(180deg,#133f45,#09292e);
      color:#7ef4ff;
      box-shadow:inset 0 0 0 2px rgba(126,244,255,.75), 0 0 18px rgba(72,229,255,.22);
    }
    .time-picker-colon{
      color:#d8faff;
      font-size:clamp(38px, 10vw, 58px);
      font-weight:900;
      margin-top:-5px;
    }
    .time-picker-dial{
      position:relative;
      width:min(88vw, 472px);
      aspect-ratio:1;
      margin:0 auto;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 47%, rgba(31,66,70,.28), rgba(6,8,9,.95) 62%, #020303 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.07),
        inset 0 0 34px rgba(0,0,0,.82),
        0 8px 24px rgba(0,0,0,.5);
      overflow:hidden;
    }
    .time-picker-center{
      position:absolute; left:50%; top:50%;
      width:12px; height:12px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:#7ef4ff;
      box-shadow:0 0 16px rgba(126,244,255,.5);
      z-index:3;
    }
    .time-picker-hand{
      position:absolute;
      left:50%;
      top:calc(50% - var(--hand-len));
      width:2px;
      height:var(--hand-len);
      transform:translateX(-50%) rotate(var(--hand-angle));
      transform-origin:50% 100%;
      background:linear-gradient(180deg, rgba(126,244,255,.18), rgba(126,244,255,.72));
      box-shadow:0 0 8px rgba(126,244,255,.18);
      z-index:2;
    }
    .time-picker-number{
      position:absolute;
      left:var(--x);
      top:var(--y);
      width:52px;
      height:52px;
      transform:translate(-50%,-50%);
      border:none;
      border-radius:50%;
      background:transparent;
      color:#d7e4e5;
      font-size:20px;
      font-weight:900;
      font-variant-numeric:tabular-nums;
      z-index:4;
    }
    .time-picker-number.inner{
      width:46px;
      height:46px;
      font-size:17px;
      color:#aebfc1;
    }
    .time-picker-number.selected{
      width:62px;
      height:62px;
      background:#9af5ff;
      color:#041012;
      box-shadow:0 0 22px rgba(126,244,255,.45);
    }
    .time-picker-number.disabled{
      opacity:.25;
      pointer-events:none;
    }
    .time-picker-extra{
      margin:8px auto 0;
      text-align:center;
      color:#bfbfbf;
      font-size:15px;
      font-weight:800;
    }
    .time-picker-extra button{
      margin-top:6px;
      height:40px;
      width:auto;
      padding:0 18px;
      border:none;
      border-radius:12px;
      background:linear-gradient(180deg,#2a4a2a,#1a3a1a);
      color:#d6ffd9;
      font-size:15px;
      font-weight:900;
    }
    .cancel-btn, .ok-btn, .delete-btn{
      width:64px; height:64px;
      border:none; border-radius:16px;
      font-size:32px; font-weight:700; color:#fff;
    }
    .cancel-btn{ background:linear-gradient(180deg,var(--red),var(--red-dark)); box-shadow:0 0 18px rgba(177,25,25,.25); }
    .ok-btn{ background:linear-gradient(180deg,var(--ok),var(--ok-dark)); box-shadow:0 0 18px rgba(24,132,57,.25); }
    .delete-btn{ background:linear-gradient(180deg,#555,#222); font-size:22px; }

    .big-panel{
      width:100%;
      height:min(96vh, 820px);
      max-width:560px;
      background:#0a0a0a;
      border:1px solid #222; border-radius:16px;
      padding:6px 10px 10px;
      display:flex; flex-direction:column; gap:4px;
      position:relative;
    }
    .big-panel h3{
      margin:0 0 4px;
      font-size:18px; font-weight:900;
      color:#bbb;
      text-transform:uppercase;
      letter-spacing:2px;
      text-align:center;
      text-shadow:0 1px 2px rgba(0,0,0,.6);
    }
    .providers-list{
      flex:1;
      display:flex; flex-direction:column;
      gap:6px;
      overflow-y:auto;
      position:relative;
      padding:22px 14px;
      isolation:isolate;
    }
    .money-panel{
      height:min(99dvh, 860px);
      max-height:99vh;
      padding:4px 8px 6px;
    }
    .money-panel .providers-list{
      gap:4px;
      padding:16px 12px 12px;
    }
    .money-panel .provider-row{
      min-height:46px;
    }
    .money-panel .prov-btn{
      min-height:42px;
      font-size:17px;
    }
    .money-panel .prov-amount{
      font-size:22px;
    }
    .money-panel .panel-actions .cancel-btn,
    .money-panel .panel-actions .ok-btn{
      width:86px !important;
      height:86px !important;
      font-size:42px !important;
      border-radius:18px !important;
    }
    /* Dwie tablice w tle - srebrna (lewa) i złota (prawa) */
    .sync-menu{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:16px 6px;
    }
    .sync-menu-btn,
    .sync-snapshot-btn{
      border:none;
      border-radius:12px;
      background:linear-gradient(180deg,#202020,#0f0f0f);
      color:#f2f2f2;
      min-height:66px;
      padding:10px 14px;
      font-size:20px;
      font-weight:900;
      text-align:left;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08), 0 4px 12px rgba(0,0,0,.34);
    }
    .sync-menu-btn.primary{
      background:linear-gradient(180deg,#1d4d2a,#0c2a14);
      color:#d8ffdf;
    }
    .sync-menu-btn.warn{
      background:linear-gradient(180deg,#5b1616,#250808);
      color:#ffdede;
    }
    .sync-list{
      flex:1;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:8px 2px 12px;
    }
    .sync-snapshot-btn{
      min-height:74px;
      font-size:16px;
      line-height:1.22;
    }
    .sync-snapshot-btn strong{
      display:block;
      font-size:19px;
      color:#fff;
      margin-bottom:2px;
    }
    .sync-meta{
      display:block;
      color:#a9a9a9;
      font-size:14px;
      font-weight:700;
    }
    .sync-warning{
      color:#ffdddd;
      font-size:22px;
      font-weight:900;
      text-align:center;
      line-height:1.12;
      padding:18px 8px;
      text-shadow:0 0 14px rgba(255,0,0,.38);
    }
    .sync-loading{
      color:#ddd;
      font-size:24px;
      font-weight:900;
      text-align:center;
      padding:28px 8px;
    }
    .board-bg{
      position:absolute;
      top:0; bottom:0;
      width:calc(50% - 8px);
      border-radius:14px;
      z-index:0;
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,.5),
        inset 0 -2px 6px rgba(0,0,0,.45),
        0 4px 14px rgba(0,0,0,.7);
    }
    .board-silver{
      left:0;
      background:
        /* drobne pionowe szlify */
        repeating-linear-gradient(90deg,
          rgba(255,255,255,.04) 0 1px,
          transparent 1px 3px),
        /* główny gradient metalowy */
        linear-gradient(140deg,
          #e4e4ea 0%, #aaaab2 18%, #cdcdd4 35%,
          #969aa0 52%, #d0d0d6 70%, #9a9aa2 88%, #b5b5bc 100%);
    }
    .board-gold{
      right:0;
      background:
        repeating-linear-gradient(90deg,
          rgba(0,0,0,.05) 0 1px,
          transparent 1px 3px),
        linear-gradient(140deg,
          #f8da72 0%, #c69a30 18%, #ecc760 35%,
          #b58820 52%, #ecc960 70%, #ad8018 88%, #d6a838 100%);
    }
    /* Śrubki w rogach każdej tablicy */
    .board-bg::before, .board-bg::after,
    .board-bg .screw-bl, .board-bg .screw-br{
      content:'';
      position:absolute;
      width:11px; height:11px;
      border-radius:50%;
      box-shadow:
        inset -1px -1px 1px rgba(0,0,0,.5),
        0 1px 2px rgba(0,0,0,.6);
    }
    .board-silver::before, .board-silver::after,
    .board-silver .screw-bl, .board-silver .screw-br{
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.7) 0%, transparent 40%),
        linear-gradient(90deg, transparent 40%, rgba(0,0,0,.55) 45%, rgba(0,0,0,.55) 55%, transparent 60%),
        radial-gradient(circle at 30% 30%, #fafafa 0%, #b0b0b0 35%, #555 100%);
    }
    .board-gold::before, .board-gold::after,
    .board-gold .screw-bl, .board-gold .screw-br{
      background:
        radial-gradient(circle at 30% 30%, rgba(255,250,210,.7) 0%, transparent 40%),
        linear-gradient(90deg, transparent 40%, rgba(0,0,0,.55) 45%, rgba(0,0,0,.55) 55%, transparent 60%),
        radial-gradient(circle at 30% 30%, #fff4cc 0%, #b8902a 35%, #5a4408 100%);
    }
    .board-bg::before{ top:7px; left:7px; }
    .board-bg::after{ top:7px; right:7px; }
    .board-bg .screw-bl{ position:absolute; bottom:7px; left:7px; }
    .board-bg .screw-br{ position:absolute; bottom:7px; right:7px; }

    .provider-row{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:1fr 1fr;
      column-gap:16px;
      min-height:50px;
      padding:0;
    }
    /* Wewnątrz każdej kolumny - moduł z marginesem od krawędzi tablicy */
    .provider-row > .prov-btn,
    .provider-row > .prov-amount,
    .provider-row > .prov-suma-label,
    .provider-row > .prov-suma-amount,
    .provider-row > .prov-summary-empty{
      margin:0 14px;
    }
    .provider-summary-row{
      min-height:96px !important;
      align-items:center;
      margin-bottom:2px;
    }
    .provider-summary-row.summary-empty{
      pointer-events:none;
    }
    .prov-summary-empty{
      min-height:88px;
      border-radius:8px;
      opacity:0;
    }
    .prov-suma-label{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:82px;
      border-radius:8px;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(104,255,129,.2) 0%, transparent 48%),
        linear-gradient(180deg, #171d17 0%, #071007 58%, #010401 100%);
      color:#35ff62;
      font-size:clamp(27px, 7vw, 40px);
      font-weight:1000;
      letter-spacing:1px;
      text-shadow:
        0 0 4px rgba(195,255,206,.92),
        0 0 12px rgba(67,255,103,.95),
        0 0 24px rgba(0,255,60,.68);
      box-shadow:
        inset 0 5px 12px rgba(0,0,0,.76),
        inset 0 -2px 5px rgba(140,255,150,.12),
        0 0 18px rgba(0,255,60,.26);
    }
    .prov-suma-amount{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      min-height:82px;
      padding:0 12px;
      border-radius:8px;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,245,176,.48) 0%, rgba(255,204,70,.22) 34%, transparent 70%),
        linear-gradient(180deg, rgba(130,84,0,.62) 0%, rgba(54,36,0,.7) 58%, rgba(14,10,0,.86) 100%);
      color:#fff8d0;
      font-size:clamp(30px, 8vw, 46px);
      font-weight:1000;
      line-height:.92;
      font-variant-numeric:tabular-nums;
      text-shadow:
        0 0 4px rgba(255,255,255,.86),
        0 0 14px rgba(255,224,92,.9),
        0 0 30px rgba(255,174,0,.56);
      box-shadow:
        inset 0 6px 14px rgba(255,232,126,.28),
        inset 0 -8px 14px rgba(0,0,0,.58),
        0 0 18px rgba(255,197,55,.32);
    }
    .prov-btn{
      position:relative;
      border:none; border-radius:8px;
      font-size:18px; font-weight:900;
      letter-spacing:.5px;
      padding:0 10px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      overflow:hidden;
      text-align:center;
      min-height:46px;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.12) 0%, transparent 42%),
        linear-gradient(180deg, #24262a 0%, #101115 55%, #050506 100%) !important;
      color:#d5d7da !important;
      box-shadow:
        inset 0 4px 9px rgba(0,0,0,.75),
        inset 0 -1px 0 rgba(255,255,255,.08),
        0 1px 0 rgba(255,255,255,.18);
      transition:filter .2s ease, box-shadow .2s ease, background .2s ease;
    }
    .prov-btn::before{
      content:'';
      position:absolute;
      inset:4px;
      border-radius:6px;
      background:
        linear-gradient(180deg, rgba(0,0,0,.42), rgba(255,255,255,.035) 42%, rgba(0,0,0,.46)),
        radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.08), transparent 56%);
      box-shadow:
        inset 0 3px 8px rgba(0,0,0,.82),
        inset 0 -1px 2px rgba(255,255,255,.08);
      pointer-events:none;
    }
    .prov-img{
      position:absolute;
      left:50%; top:50%;
      transform:translate(-50%,-50%);
      height:auto;
      width:auto;
      max-width:82%;
      max-height:74%;
      object-fit:contain;
      pointer-events:none;
      display:none;
      z-index:2;
      opacity:.52;
      filter:grayscale(.18) saturate(.78) brightness(.66) contrast(1);
      transition:opacity .2s ease, filter .2s ease, transform .2s ease;
    }
    .prov-btn.has-img{
      border-radius:8px;
      justify-content:center;
      padding:0;
    }
    .prov-btn.has-img .prov-img{ display:block; }
    .prov-btn.has-img .prov-label{ display:none; }
    .prov-btn.filled{
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.2) 0%, transparent 44%),
        linear-gradient(180deg, #303338 0%, #15171b 58%, #070708 100%) !important;
      box-shadow:
        inset 0 4px 9px rgba(0,0,0,.68),
        inset 0 -1px 0 rgba(255,255,255,.14),
        0 0 12px rgba(230,235,245,.18);
    }
    .prov-btn.filled.has-img .prov-img{
      opacity:1;
      filter:saturate(1.12) brightness(1.06) contrast(1.04);
      transform:translate(-50%,-50%) scale(1.02);
    }
    .prov-btn.filled .prov-label{
      color:#ffffff;
      text-shadow:0 0 8px rgba(255,255,255,.28);
    }
    .prov-btn.empty .prov-label{
      color:rgba(220,224,230,.48);
    }
    .prov-label{
      position:relative;
      z-index:2;
    }
    .prov-amount{

    .keypad{

    .keypad button{
      --key-bg:#1a1a1a;
      position:relative;
      overflow:hidden;
      border:none; border-radius:12px;
      background:var(--key-bg); color:#f0f0f0;
      font-size:28px; font-weight:700;
      padding:18px 0;

    }
    .keypad button > span{
      position:relative;
      z-index:2;
      pointer-events:none;
    }
    .keypad button::before,
    .keypad button::after{
      content:'';
      position:absolute;
      left:50%;
      top:50%;
      width:170%;
      aspect-ratio:1/1;
      border-radius:50%;
      transform:translate(-50%,-50%) scale(0);
      pointer-events:none;

      45%{ opacity:1; transform:translate(-50%,-50%) scale(1.18); }
      100%{ opacity:1; transform:translate(-50%,-50%) scale(1.18); }
    }
    @keyframes keyFlashReturn{
      0%,47%{ opacity:0; transform:translate(-50%,-50%) scale(0); }

<body>
  <div class="app">
    <div class="battery-indicator" id="batteryIndicator">—</div>
    <button class="auto-sync-indicator" id="autoSyncIndicator" type="button" aria-label="Auto Sync"></button>
    <div class="notes-bar" id="notesBar"></div>

    <div class="clock-wrap">
      <div class="end-confirm-overlay hidden" id="endConfirmOverlay">
        <div class="end-wave"></div>
        <div class="end-confirm-content">
          <div class="end-confirm-title">KONIEC DNIÓWKI?</div>
          <div class="end-confirm-counter" id="endConfirmCounter">5</div>
          <div class="end-confirm-choice" id="endConfirmChoice">
            <button class="end-choice-btn reset" type="button" data-restart-choice="reset">Startujesz?<br>(czyścimy dane!)</button>
            <button class="end-choice-btn continue" type="button" data-restart-choice="continue">Wracasz do roboty?</button>
          </div>
          <div class="end-confirm-hint"></div>
        </div>
      </div>
      <svg class="clock-svg" viewBox="-30 -30 460 460" aria-hidden="true">
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g id="workFill"></g>
        <g id="noExerciseFill"></g>
        <g id="radarSweep"></g>
        <g id="overtimeFill"></g>
        <g id="breakFill"></g>
        <g id="exerciseMarks"></g>
        <g id="forecastHand"></g>
        <g id="dots"></g>
        <!-- Czarne koło pod datą - przykrywa wszystkie kolory tarczy w środku, datę pokazuje na czystym tle -->
        <circle cx="200" cy="200" r="75" fill="#000" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      </svg>

      <div class="clock-center">
        <div class="clock-face">
          <div class="number" data-hour="12" style="top:2%; left:50%;">12</div>
          <div class="number" data-hour="1" style="top:9%; left:75%;">1</div>
          <div class="number" data-hour="2" style="top:28%; left:91%;">2</div>
          <div class="number" data-hour="3" style="top:50%; left:99%;">3</div>
          <div class="number" data-hour="4" style="top:72%; left:91%;">4</div>
          <div class="number" data-hour="5" style="top:91%; left:75%;">5</div>
          <div class="number" data-hour="6" style="top:99%; left:50%;">6</div>
          <div class="number" data-hour="7" style="top:91%; left:25%;">7</div>
          <div class="number" data-hour="8" style="top:72%; left:9%;">8</div>
          <div class="number" data-hour="9" style="top:50%; left:1%;">9</div>
          <div class="number" data-hour="10" style="top:28%; left:9%;">10</div>
          <div class="number" data-hour="11" style="top:9%; left:25%;">11</div>
          <div class="date-center" id="dateCenterEl"></div>
        </div>
      </div>

      <!-- Punkty 4+5: druga warstwa SVG nad cyframi godzin - dla strzałki godzinowej i kropki minut -->
      <svg class="clock-svg clock-svg-overlay" viewBox="-30 -30 460 460" aria-hidden="true">
        <g id="hourArrow"></g>
        <g id="minuteDot"></g>
      </svg>
    </div>

    <div class="controls">
      <button class="btn work-btn" id="workBtn" type="button">
        <div class="lp-ring"></div>
        <div class="work-split">
          <div class="work-right">
            <div class="work-roller">
              <div class="work-roller-inner" id="workRollerInner">
                <div class="work-roller-digit">0</div>
              </div>
            </div>
          </div>
        </div>
      </button>

      <button class="btn exercise-btn" id="exerciseBtn" type="button">
        <img src="Photos/kolo.png" alt="Koło" class="wheel-image" id="wheelImage"
             onerror="this.style.display='none'" />
        <svg class="wheel-mask-overlay" id="wheelMaskOverlay" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <defs>
            <radialGradient id="maskFade" cx="100" cy="100" r="100" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#000" stop-opacity="1"/>
              <stop offset="100%" stop-color="#000" stop-opacity="1"/>
            </radialGradient>
            <!-- Maska kątowa: kąt który zanikł (czarny sektor) z miękkim brzegiem -->
            <linearGradient id="edgeFade" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#000" stop-opacity="1"/>
              <stop offset="50%" stop-color="#000" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#000" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <!-- Czarny sektor (vanished area) - rysowany dynamicznie z JS -->
          <path id="wheelVanishSector" d="" fill="#000" />
          <!-- Miękka krawędź (gradient blur) - rysowana dynamicznie z JS -->
          <path id="wheelVanishEdge" d="" fill="#000" opacity="0.5" filter="url(#blurEdge)" />
          <filter id="blurEdge">
            <feGaussianBlur stdDeviation="3"/>
          </filter>
        </svg>
        <div class="wheel-restore-cover" id="wheelRestoreCover" aria-hidden="true"></div>
        <div class="overage-display" id="overageDisplay">
          <div class="work-roller">
            <div class="work-roller-inner" id="overageRollerInner"></div>

        <div class="break-bot-zone" id="breakBotZone"></div>

      <button class="btn pot-btn" id="potBtn" type="button">

        <div class="pot-fire-bar" id="potFireBar" style="height:0%"></div>

             onload="this.parentElement.classList.add('pot-has-img')"
             onerror="this.style.display='none'" />
        <div class="pot-counter-box" id="potCenter">🫕</div>
      </button>

      <button class="btn money-btn" id="moneyBtn" type="button">
        <div class="money-empty-bag" id="moneyEmptyBag">💰</div>
        <div class="money-split">
          <div class="money-cell empty" id="moneyTop"></div>
          <div class="money-cell empty" id="moneyBot"></div>
        </div>
      </button>

      <button class="btn coin-btn empty-slot" id="coinBtn" type="button">
        <div class="coin-cell empty" id="coinCell"></div>
      </button>
      <button class="driving-focus-restore-area" id="drivingFocusRestoreArea" type="button" aria-label="Pokaż ukryte moduły"></button>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>

  <button class="install-btn" id="installBtn" type="button">📥 Zainstaluj</button>
  <div class="version">vGPT_5.3.6</div>

  <script>
    const LS_KEY = 'tarcza_state_v1';
    const LS_PERSIST = 'tarcza_persist_v1';
    const LS_APPSCRIPT = 'tarcza_appscript_url';
    const LS_SYNC_PIN = 'tarcza_sync_pin';
    const LS_SYNC_DEVICE = 'tarcza_sync_device';
    const LS_AUTO_SYNC_ENABLED = 'tarcza_auto_sync_enabled';
    const LS_SYNC_DEVICE_ID = 'tarcza_sync_device_id';
    const LS_LAST_LOCAL_CHANGE_AT = 'tarcza_last_local_change_at';

    const LS_LAST_SEEN_CLOUD_CHANGE_AT = 'tarcza_last_seen_cloud_change_at';

    const PROVIDERS = [
      { key:'uber',    label:'UBER',    bg:'#000000', fg:'#ffffff' },

    let startWorkMinutes = null;
