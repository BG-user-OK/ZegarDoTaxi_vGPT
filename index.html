<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tarcza czasu pracy</title>
  <!-- vGPT_2.3: based on a previously developed v:1.28 version created by another AI. -->

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tarcza">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    :root{
      --bg:#000000;
      --dot:#d7d7d7;
      --dot-big:#ececec;
      --txt:#f4f4f4;
      --version:#6f6f6f;

      --hand-hour:#e8e8e8;
      --hand-minute:#b9b9b9;
      --hand-outline:rgba(0,0,0,.85);
      --dial-number:#8a8a8a;

      --work-green:#38c866;
      --no-exercise-red:#ff3838;
      --overtime-orange:#ff9a1f;
      --exercise:#e5871f;
      --break-cut:#000000;
      --forecast:#44df73;

      --btn-work-off-1:#0d3f18;
      --btn-work-off-2:#07250f;
      --btn-work-on-1:#2ac158;
      --btn-work-on-2:#17873a;
      --btn-work-over-1:#ffa335;
      --btn-work-over-2:#c96a0a;

      --btn-ex-off-1:#75410a;
      --btn-ex-off-2:#492805;
      --btn-ex-on-1:#ffaa3f;
      --btn-ex-on-2:#d87210;
      --btn-ex-alert-1:#d12727;
      --btn-ex-alert-2:#8f1717;
      --btn-ex-blink-1:#ff5a47;
      --btn-ex-blink-2:#cd2313;

      --btn-break-off-1:#72600b;
      --btn-break-off-2:#463a06;
      --btn-break-on-1:#ffe84d;
      --btn-break-on-2:#d7bc05;

      --btn-pot-off-1:#2a2a2a;
      --btn-pot-off-2:#1a1a1a;

      --btn-money-1:#f4d87a;
      --btn-money-2:#c9a03d;
      --btn-money-text:#5c3e08;

      --work-text-green:#0f431c;
      --work-text-orange:#4a2600;
      --exercise-text:#ffd39a;
      --exercise-text-alert:#ffd6d6;
      --break-text:#fff0a6;

      --red:#b11919;
      --red-dark:#5e0e0e;
      --ok:#188439;
      --ok-dark:#0f5f28;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
    button, .btn, .ok-btn, .cancel-btn, .delete-btn, .arrow-btn, .prov-btn, .counter-edit, .note-sticker, .keypad button {
      touch-action: manipulation;
    }
    html,body{ margin:0; padding:0; width:100%; height:100%; background:#000; color:var(--txt); font-family:Arial, Helvetica, sans-serif; overflow:hidden; }
    body{ display:flex; align-items:center; justify-content:center; }

    .app{
      width:100%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:space-between;
      padding:6px 8px 30px;
      gap:6px; position:relative; background:#000;
    }

    .notes-bar{
      width:100%; min-height:64px;
      display:flex; align-items:center; gap:2px;
      padding:4px 60px 4px 6px;
      flex-wrap:wrap;
    }
    .note-sticker{
      flex:0 0 auto;
      width:var(--note-size, 68px);
      height:var(--note-size, 60px);
      padding:0 4px;
      border-radius:8px 8px 14px 8px;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:calc(var(--note-size, 60px) * 0.5);
      font-weight:800;
      box-shadow:0 2px 4px rgba(0,0,0,.5);
      border:none; cursor:pointer;
      transition:opacity .2s, background .2s;
    }
    .note-sticker.empty{
      width:34px;
      height:30px;
      background:#1a1a1a;
      color:#5a5a3a;
      font-size:18px;
    }
    .note-sticker.filled{
      background:#f4d847;
      color:#3a2c00;
    }
    .note-sticker.alarm-blink{
      background:#ff3838;
      color:#fff;
    }
    .note-sticker:active{ transform:scale(.96); }
    .note-sticker.with-time{
      width:var(--note-size, 68px);
      height:calc(var(--note-size, 60px) * 1.22);
      flex-direction:column;
      justify-content:flex-start;
      gap:2px;
      padding:5px 4px 3px;
    }
    .note-icon-main{
      flex:0 0 auto;
      min-width:0;
      width:100%;
      margin-top:auto;
      margin-bottom:auto;
      text-align:center;
      overflow:hidden;
      text-overflow:clip;
      white-space:nowrap;
      line-height:.92;
    }
    .note-time-mini{
      flex:0 0 auto;
      max-width:100%;
      margin-top:0;
      transform:translateY(1px);
      font-size:calc(var(--note-size, 60px) * 0.21);
      line-height:1;
      font-weight:900;
      color:#2c2100;
      background:rgba(255,255,255,.34);
      border-radius:5px;
      padding:2px 3px;
      font-variant-numeric:tabular-nums;
    }

    .clock-wrap{
      width:min(94vw, 64vh); aspect-ratio:1/1;
      position:relative; display:flex; align-items:center; justify-content:center;
      margin:8px 0;
    }
    .clock-svg{ width:100%; height:100%; display:block; overflow:visible; }
    /* Punkty 4+5: druga warstwa SVG NAD cyframi godzin - dla strzałki i kropki minut */
    .clock-svg-overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:30;
    }
    .clock-center{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
    }
    .clock-face{ width:73%; height:73%; border-radius:50%; position:relative; }
    .number{
      position:absolute; left:50%; top:50%;
      transform:translate(-50%,-50%);
      color:var(--dial-number); font-weight:900;
      font-size:clamp(45px, 12vw, 84px);
      line-height:1; letter-spacing:-1.2px;
      transition:color .3s ease, text-shadow .3s ease;
    }
    .number.active{
      color:#ffffff;
      text-shadow:
        0 0 8px rgba(255,255,255,.85),
        0 0 16px rgba(255,255,255,.6),
        0 0 24px rgba(180,255,200,.4);
    }

    .controls{
      width:min(96vw, 620px);
      display:grid; grid-template-columns:repeat(3, 1fr);
      grid-auto-rows:auto; column-gap:6px; row-gap:2px;
      align-items:end;
    }
    /* Moduł 2 (ćwiczenia) wystaje w górę o połowę swojej wysokości - mieści 4 rzędy kół */
    .exercise-btn{
      /* vGPT_2.3: matches the size and baseline of the other top-row buttons. */
      aspect-ratio:1/1 !important;
      align-self:end;
    }

    /* Data pod zegarem (zmiana 11) */
    .date-display{
      width:100%;
      text-align:center;
      font-size:clamp(24px, 6.4vw, 36px);
      font-weight:800;
      color:var(--dial-number);
      letter-spacing:.5px;
      padding:0;
      line-height:1;
      text-shadow:
        0 0 8px rgba(220,220,225,.55),
        0 0 16px rgba(200,200,210,.35),
        0 0 24px rgba(180,180,200,.2);
    }

    /* Bateria w prawym górnym rogu (zmiana 13) */
    .battery-indicator{
      position:fixed;
      top:6px; right:8px;
      z-index:20;
      padding:3px 9px;
      border:1.5px solid #2ecc71;
      border-radius:4px;
      color:#2ecc71;
      font-size:14px;
      font-weight:800;
      letter-spacing:.3px;
      background:rgba(0,0,0,.4);
      min-width:48px;
      text-align:center;
      pointer-events:none;
    }
    .battery-indicator::after{
      content:'';
      position:absolute;
      top:50%;
      right:-5px;
      transform:translateY(-50%);
      width:3px; height:9px;
      background:#2ecc71;
      border-radius:0 2px 2px 0;
    }
    .battery-indicator.low{
      color:#ff3838;
      border-color:#ff3838;
    }
    .battery-indicator.low::after{
      background:#ff3838;
    }
    .btn{
      position:relative; border:none; border-radius:16px;
      aspect-ratio:1/1; min-height:84px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08),
                  inset 0 -12px 16px rgba(0,0,0,.34),
                  0 0 0 1px rgba(0,0,0,.55);
      color:#fff; overflow:hidden;
      appearance:none; -webkit-appearance:none; background:#111;
    }
    .btn:active{ transform:scale(.985); }
    .btn.empty-slot{ background:#0a0a0a; box-shadow:inset 0 0 0 1px #1a1a1a; pointer-events:none; opacity:.3; }

    /* === v1.12: long-press progress ring === */
    .btn .lp-ring{
      position:absolute; inset:0;
      border-radius:16px;
      pointer-events:none;
      z-index:6;
      opacity:0;
      box-shadow:inset 0 0 0 0 rgba(255,255,255,0.85);
      transition:opacity .15s ease;
    }
    .btn.lp-active .lp-ring{
      opacity:1;
      animation:lpFill 3s linear forwards;
    }
    @keyframes lpFill{
      0%   { box-shadow:inset 0 0 0 0px rgba(80,200,255,0.0); }
      30%  { box-shadow:inset 0 0 0 3px rgba(80,200,255,0.55); }
      60%  { box-shadow:inset 0 0 0 5px rgba(120,220,255,0.75); }
      100% { box-shadow:inset 0 0 0 8px rgba(255,255,255,0.95); }
    }

    /* === v1.12: edit-mini przekształcony w nieklikalną etykietę "✎ 3s" === */
    .edit-hint{
      position:absolute; top:6px; right:6px;
      font-size:11px; font-weight:800;
      color:rgba(255,255,255,.55);
      background:rgba(0,0,0,.28);
      padding:2px 6px;
      border-radius:6px;
      z-index:5;
      pointer-events:none;
      letter-spacing:.5px;
    }

    /* === v1.12: przycisk START/STOP - podział pionowy === */
    .work-split{
      position:absolute; inset:0;
      display:grid;
      grid-template-columns:1.2fr 1fr;
      z-index:2;
      pointer-events:none;
    }
    .work-left{
      display:flex; flex-direction:column;
      justify-content:space-between;
      padding:8px 6px 8px 10px;
    }
    .work-time-top{
      font-size:clamp(16px, 4.2vw, 22px);
      font-weight:900;
      color:rgba(255,255,255,.95);
      letter-spacing:-.5px;
      text-shadow:0 1px 0 rgba(0,0,0,.3);
    }
    .work-time-bot{
      font-size:clamp(16px, 4.2vw, 22px);
      font-weight:900;
      color:rgba(255,255,255,.85);
      letter-spacing:-.5px;
    }
    .work-icon-row{
      display:flex; align-items:center;
      gap:4px;
      font-size:18px;
      color:rgba(255,255,255,.85);
    }
    /* Rolka odhaczająca godziny */
    .work-right{
      display:flex; align-items:center; justify-content:center;
      padding:6px 6px 6px 0;
      position:relative;
    }
    .work-roller{
      position:absolute;
      top:50%; left:6%; right:6%;
      transform:translateY(-50%);
      height:80%;
      background:rgba(0,0,0,.55);
      border-radius:8px;
      box-shadow:inset 0 0 0 1px rgba(56,200,102,.22),
                 inset 0 0 10px rgba(0,0,0,.7);
      overflow:hidden;
      -webkit-mask-image:linear-gradient(180deg,
        transparent 0%,
        rgba(0,0,0,.05) 22%,
        rgba(0,0,0,.4) 35%,
        black 45%, black 55%,
        rgba(0,0,0,.4) 65%,
        rgba(0,0,0,.05) 78%,
        transparent 100%);
      mask-image:linear-gradient(180deg,
        transparent 0%,
        rgba(0,0,0,.05) 22%,
        rgba(0,0,0,.4) 35%,
        black 45%, black 55%,
        rgba(0,0,0,.4) 65%,
        rgba(0,0,0,.05) 78%,
        transparent 100%);
    }
    .work-roller-inner{
      display:flex; flex-direction:column;
      align-items:center;
      position:absolute;
      top:0; left:0; right:0;
      transition:transform 0.6s ease;
      will-change:transform;
    }
    .work-roller-digit{
      width:100%;
      flex:0 0 auto;
      display:flex; align-items:center; justify-content:center;
      font-weight:900;
      color:#f4ffe8;
      text-shadow:0 1px 0 rgba(0,0,0,.5);
      border-bottom:2.5px solid rgba(88,232,120,.55);
      box-sizing:border-box;
      /* font-size i height ustawia JS dynamicznie */
    }
    /* znaczniki na środku rolki - lewy i prawy */
    .work-roller-mark-left,
    .work-roller-mark-right{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:0; height:0;
      border-style:solid;
      z-index:10;
      pointer-events:none;
      filter:drop-shadow(0 0 3px rgba(88,232,120,.85));
    }
    .work-roller-mark-left{
      left:-1px;
      border-width:5px 0 5px 8px;
      border-color:transparent transparent transparent #58e878;
    }
    .work-roller-mark-right{
      right:-1px;
      border-width:5px 8px 5px 0;
      border-color:transparent #58e878 transparent transparent;
    }

    /* === v1.12: przycisk obrotów - dwa banknoty (góra/dół) === */
    .money-btn{
      background:#000;
      padding:0;
      overflow:hidden;
      border-radius:0;
    }
    /* Pełnoekranowy worek pieniędzy gdy brak kwot - znika gdy są banknoty */
    .money-empty-bag{
      position:absolute;
      inset:0;
      z-index:3;
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(70px, 18vw, 130px);
      line-height:1;
      pointer-events:none;
      opacity:.85;
    }
    .money-empty-bag.hidden{ display:none; }
    .money-split{
      position:absolute; inset:0;
      display:grid;
      grid-template-rows:1fr 1fr;
      gap:0;
      z-index:2;
      pointer-events:none;
    }
    .money-cell{
      position:relative;
      display:flex; align-items:center; justify-content:center;
      background-color:#000;
      background-size:contain;
      background-position:center;
      background-repeat:no-repeat;
      overflow:hidden;
      border-radius:0;
    }
    .money-cell.empty{
      background-image:none !important;
    }
    .money-cell-text{
      display:inline-block;
      width:auto;
      font-size:clamp(28px, 9vw, 48px);
      font-weight:900;
      text-align:center;
      line-height:1;
      padding:0;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
      /* offsety: --note-tx ustawia per-banknot (poziomo), górny dodatkowo dostaje shift w lewo */
      transform:translate(calc(var(--note-tx, 0%) + var(--row-shift, 0%)), var(--note-ty, 0%));
    }
    /* Kolory liczb - rozjaśnione, w odcieniu banknotu, z delikatną poświatą */
    .money-cell.note-50  .money-cell-text{
      color:#3870c8;          /* 50zł niebieski - jaśniejszy granatowy */
      text-shadow:0 0 6px rgba(0,30,90,.6), 0 1px 1px rgba(255,255,255,.3);
    }
    .money-cell.note-100 .money-cell-text{
      color:#1a8a3a;          /* 100zł zielony - intensywna zieleń */
      text-shadow:0 0 6px rgba(0,40,15,.6), 0 1px 1px rgba(255,255,255,.3);
    }
    .money-cell.note-200 .money-cell-text{
      color:#a87010;          /* 200zł złoty - jasny złoty/oker */
      text-shadow:0 0 6px rgba(60,30,0,.55), 0 1px 1px rgba(255,255,255,.3);
    }
    .money-cell.note-500 .money-cell-text{
      color:#7a3aaa;          /* 500zł fiolet - jasny fioletowy */
      text-shadow:0 0 6px rgba(40,0,60,.6), 0 1px 1px rgba(255,255,255,.3);
    }
    /* Per-banknot offsety (gdyby okienko obrazka nie było centralnie - korekta) */
    .money-cell.note-50  { --note-tx:0%; --note-ty:0%; }
    .money-cell.note-100 { --note-tx:0%; --note-ty:0%; }
    .money-cell.note-200 { --note-tx:0%; --note-ty:0%; }
    .money-cell.note-500 { --note-tx:0%; --note-ty:0%; }
    /* Punkt 2: górny banknot kwota w lewo, dolny banknot kwota w lewo */
    #moneyTop .money-cell-text { --row-shift:-35%; }
    #moneyBot .money-cell-text { --row-shift:-20%; }

    /* moneta (przycisk dolny prawy) */
    .coin-btn{
      background:#000;
      padding:0;
      overflow:hidden;
      border-radius:0;
    }
    .coin-cell{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background-color:#000;
      background-size:contain;
      background-position:center;
      background-repeat:no-repeat;
      z-index:2;
    }
    .coin-cell.empty{ background-image:none !important; }
    .coin-cell-text{
      font-size:clamp(27px, 7.6vw, 43px);
      font-weight:900;
      text-align:center;
      line-height:1;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
    }
    .coin-cell.coin-1 .coin-cell-text{
      color:#3a3a3a;
      text-shadow:0 0 3px rgba(255,255,255,.85);
    }
    .coin-cell.coin-2 .coin-cell-text{
      color:#5e3f08;
      text-shadow:0 0 3px rgba(255,255,255,.85);
    }
    .coin-cell.coin-5 .coin-cell-text{
      color:#3a2a06;
      text-shadow:0 0 3px rgba(255,255,255,.85);
    }

    /* === v1.12: garnek "spał" po wykorzystaniu === */
    .pot-btn.dimmed{
      opacity:.45;
    }

    /* === v1.12: Animacja END - czerwona fala zalewająca tarczę + napis + odliczanie === */
    .end-confirm-overlay{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      z-index:50;
      pointer-events:auto;
      /* ograniczenie do okręgu tarczy zegara - środek (50%,50%), promień ~50% */
      clip-path:circle(50% at 50% 50%);
      -webkit-clip-path:circle(50% at 50% 50%);
      overflow:hidden;
      border-radius:50%;
    }
    .end-confirm-overlay.hidden{ display:none; }
    .end-wave{
      position:absolute;
      left:50%; top:50%;
      width:0; height:0;
      background:radial-gradient(circle,#ff2828 0%,#a80000 70%,#5e0000 100%);
      border-radius:50%;
      transform:translate(-50%,-50%);
      animation:endWaveExpand .55s ease-out forwards;
    }
    /* Wariant żółty dla resetu */
    .end-confirm-overlay.yellow .end-wave{
      background:radial-gradient(circle,#ffe040 0%,#d6a90a 70%,#7a5e00 100%);
    }
    .end-confirm-overlay.blue .end-wave{
      background:radial-gradient(circle,#bdf2ff 0%,#55c8f0 68%,#12769e 100%);
    }
    .end-confirm-overlay.yellow .end-confirm-counter,
    .end-confirm-overlay.yellow .end-confirm-title,
    .end-confirm-overlay.yellow .end-confirm-hint{
      color:#1c1400;
      text-shadow:0 1px 3px rgba(255,255,255,.5);
    }
    .end-confirm-overlay.blue .end-confirm-counter,
    .end-confirm-overlay.blue .end-confirm-title,
    .end-confirm-overlay.blue .end-confirm-hint{
      color:#05283a;
      text-shadow:0 1px 3px rgba(255,255,255,.62);
    }
    @keyframes endWaveExpand{
      0%   { width:0; height:0; opacity:.6; }
      100% { width:200%; height:200%; opacity:1; }
    }
    /* Punkt 5: zwijanie wstecz gdy minie czas bez kliknięcia */
    @keyframes endWaveCollapse{
      0%   { width:200%; height:200%; opacity:1; }
      100% { width:0; height:0; opacity:.4; }
    }
    .end-confirm-overlay.collapsing .end-wave{
      animation:endWaveCollapse .5s ease-in forwards !important;
    }
    .end-confirm-overlay.collapsing .end-confirm-content{
      animation:endTextFadeOut .25s ease-out forwards !important;
    }
    @keyframes endTextFadeOut{
      0% { opacity:1; }
      100% { opacity:0; }
    }
    .end-confirm-content{
      position:relative;
      z-index:51;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#fff;
      opacity:0;
      animation:endTextFade .35s .35s forwards;
      padding:0 16px;
    }
    @keyframes endTextFade{ to{ opacity:1; } }
    .end-confirm-title{
      font-size:clamp(18px, 4.6vw, 26px);
      font-weight:900;
      letter-spacing:.5px;
      line-height:1.1;
      text-shadow:0 2px 6px rgba(0,0,0,.6);
      margin-bottom:8px;
    }
    .end-confirm-counter{
      font-size:clamp(60px, 18vw, 110px);
      font-weight:900;
      line-height:1;
      text-shadow:0 4px 14px rgba(0,0,0,.7);
    }
    .end-confirm-hint{
      font-size:clamp(12px, 3vw, 15px);
      font-weight:700;
      color:rgba(255,230,230,.92);
      margin-top:6px;
    }
    .end-confirm-hint:empty{ display:none; }
    .end-confirm-choice{
      display:none;
    }
    .end-confirm-overlay.choice-mode .end-confirm-content{
      width:100%;
      height:100%;
      display:grid;
      grid-template-rows:30% 45% 25%;
      align-items:center;
      justify-items:center;
      padding:24px 34px 30px;
    }
    .end-confirm-overlay.choice-mode .end-confirm-title,
    .end-confirm-overlay.choice-mode .end-confirm-hint{ display:none; }
    .end-confirm-overlay.choice-mode .end-confirm-choice{
      display:contents;
    }

    .work-btn{ background:linear-gradient(180deg,var(--btn-work-off-1),var(--btn-work-off-2)); }

    .work-btn.overtime{

                  inset 0 -12px 16px rgba(0,0,0,.18),
                  0 0 22px rgba(255,154,31,.55),
                  0 0 0 1px rgba(255,154,31,.55);
    }

    .exercise-btn.flash{
      background:linear-gradient(180deg,var(--btn-ex-on-1),var(--btn-ex-on-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16),
                  inset 0 -12px 16px rgba(0,0,0,.2),
                  0 0 22px rgba(255,170,63,.45),
                  0 0 0 1px rgba(255,170,63,.45);
    }
    .exercise-btn.alert{
      background:linear-gradient(180deg,var(--btn-ex-alert-1),var(--btn-ex-alert-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10),
                  inset 0 -12px 16px rgba(0,0,0,.22),
                  0 0 18px rgba(209,39,39,.34),
                  0 0 0 1px rgba(209,39,39,.42);
    }
    .exercise-btn.blink{
      background:linear-gradient(180deg,var(--btn-ex-blink-1),var(--btn-ex-blink-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18),
                  inset 0 -12px 16px rgba(0,0,0,.18),
                  0 0 24px rgba(255,90,71,.52),
                  0 0 0 1px rgba(255,90,71,.52);

    /* === Przerwa === */
    .break-btn{
      background:#aaaaaa;
      transition:background .25s ease;
    }
    .break-img{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:contain;
      z-index:1; pointer-events:none;
    }
    /* Obrazek "off" widoczny gdy nie ma przerwy. Obrazek "on" gdy trwa przerwa (klasa .on) */
    .break-img-off{ display:block; }
    .break-img-on{ display:none; }
    .break-btn.on .break-img-off{ display:none; }
    .break-btn.on .break-img-on{ display:block; }
    .break-top-zone, .break-bot-zone{
      position:absolute;
      left:5%; width:50%;
      height:33%;
      display:flex; align-items:center; justify-content:flex-start;
      font-size:clamp(18px,5vw,28px); font-weight:900;

      font-variant-numeric:tabular-nums;
    }
    .break-top-zone{ top:0; }
    .break-bot-zone{ bottom:0; }
    /* Tło miga między szarym a żółtym - tylko gdy klasa .blink-bg jest aktywna */
    .break-btn.on{ background:#aaaaaa; }
    .break-btn.on.blink-bg{
      background:#ffe84d;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.22),
                 0 0 24px rgba(255,232,77,.55),

    /* === Garnek z obrazkiem === */
    .pot-btn{ background:linear-gradient(180deg,var(--btn-pot-off-1),var(--btn-pot-off-2)); }
    .pot-btn.done-alarm{ background:linear-gradient(180deg,#ff4b22,#e00000); box-shadow:inset 0 0 0 2px rgba(255,235,220,.5), inset 0 0 36px rgba(255,40,0,.45), 0 0 34px rgba(255,48,0,.85); }
    .pot-btn.done-alarm-off{ background:linear-gradient(180deg,#d01800,#850000); box-shadow:inset 0 0 0 1px rgba(255,130,100,.35), inset 0 0 26px rgba(160,0,0,.5), 0 0 18px rgba(255,20,0,.48); }
    .pot-btn.pot-has-img{ background:#000 !important; }
    .pot-btn.pot-has-img.done-alarm{ background:linear-gradient(180deg,#ff4b22,#e00000) !important; }
    .pot-btn.pot-has-img.done-alarm-off{ background:linear-gradient(180deg,#d01800,#850000) !important; }
    .pot-img{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:contain;
      z-index:3;        /* nad paskiem ognia, ale pod licznikiem */
      pointer-events:none;
    }
    /* Pasek ognia półprzezroczysty żeby nie zasłaniał obrazka */
    .pot-fire-bar{
      position:absolute; bottom:0; left:0; right:0;
      background:linear-gradient(0deg, rgba(255,28,0,.92), rgba(255,96,0,.82));
      border-radius:0 0 14px 14px;
      z-index:2; transition:height 0.8s linear;
      pointer-events:none;
    }
    /* Podczas alarmu (done-alarm/off) tło miga całym przyciskiem, obrazek tylko lekko zostaje widoczny. */
    .pot-btn.done-alarm .pot-img,
    .pot-btn.done-alarm-off .pot-img{
      opacity:0.38;
    }
    /* Licznik garnka: okienko 250x15 na 400x400 = 62.5%x3.75%, rozmiar 106x105 = 26.5%x26.25%
       Środek: left=75.75%, top=16.875% */
    .pot-counter-box{
      position:absolute;
      left:75.75%; top:16.875%;
      transform:translate(-50%,-50%);
      z-index:5;
      font-size:clamp(18px,5vw,32px); font-weight:900;
      color:#fff;
      text-shadow:0 0 6px rgba(0,0,0,.9),0 1px 0 rgba(0,0,0,.7);
      font-variant-numeric:tabular-nums;
      line-height:1; pointer-events:none;
    }
    /* Gdy brak obrazka - centralnie i większa czcionka */
    .pot-btn:not(.pot-has-img) .pot-counter-box{
      left:50%; top:50%;
      font-size:clamp(40px,11vw,64px);
    }

    /* === Moduł ćwiczeń: pojedyncze koło z animowaną maską (zanikanie zgodnie z ruchem wskazówek) === */
    .exercise-btn{
      background:#000 !important;
      box-shadow:none !important;
      border-radius:16px;
      overflow:hidden;
      position:relative;
    }
    .wheel-image{
      position:absolute;
      inset:0;
      width:100%; height:100%;
      object-fit:contain;
      pointer-events:none;
      filter:drop-shadow(0 0 10px rgba(220,220,235,.5));
      /* Maska sterowana z JS - przez clip-path lub przez nakładkę SVG.
         Tutaj samo CSS bez maski, JS rysuje overlay. */
    }
    /* Czarna nakładka maskująca - SVG sektor który rośnie od 12:00 */
    .wheel-mask-overlay{
      position:absolute;
      inset:0;
      width:100%; height:100%;
      pointer-events:none;
      z-index:2;
      background:none;
      filter:blur(1.6px);
      transform:scale(1.035);
      transform-origin:center;
      will-change:background;
    }
    /* Czerwony moduł nadwyżki - jak dotychczas */
    .overage-display{
      position:absolute;
      inset:0;
      z-index:3;
      background:linear-gradient(180deg, #c01515, #6a0808);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.15),
        inset 0 -10px 18px rgba(0,0,0,.45),
        0 0 22px rgba(255,40,40,.35);
      display:none;
      border-radius:16px;
      transition:opacity 0.6s ease;
    }
    .exercise-btn.overage .overage-display{
      display:block;
    }
    .exercise-btn.overage .wheel-image,
    .exercise-btn.overage .wheel-mask-overlay{
      display:none;
    }
    /* Stan "fading-overage": czerwony moduł gaśnie do czerni przed pojawieniem się koła z animacją odwrotną */
    .exercise-btn.fading-overage .overage-display{
      opacity:0;
    }
    .overage-display .work-roller-digit{
      color:#fff !important;
      text-shadow:0 0 6px rgba(255,180,180,.6);
      border-bottom:2.5px solid rgba(255,200,200,.45);

    .exercise-btn.flash{

      box-shadow: inset 0 1px 0 rgba(255,255,255,.16),
                  inset 0 -12px 16px rgba(0,0,0,.2),
                  0 0 22px rgba(255,170,63,.45),

    /* Dwie tablice w tle - srebrna (lewa) i złota (prawa) */
    .board-bg{
      position:absolute;
      top:0; bottom:0;
      width:calc(50% - 8px);
      border-radius:14px;
      z-index:0;
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,.5),
        inset 0 -2px 6px rgba(0,0,0,.45),
        0 4px 14px rgba(0,0,0,.7);
    }
    .board-silver{
      left:0;
      background:
        /* drobne pionowe szlify */
        repeating-linear-gradient(90deg,
          rgba(255,255,255,.04) 0 1px,
          transparent 1px 3px),
        /* główny gradient metalowy */
        linear-gradient(140deg,
          #e4e4ea 0%, #aaaab2 18%, #cdcdd4 35%,
          #969aa0 52%, #d0d0d6 70%, #9a9aa2 88%, #b5b5bc 100%);
    }
    .board-gold{
      right:0;
      background:
        repeating-linear-gradient(90deg,
          rgba(0,0,0,.05) 0 1px,
          transparent 1px 3px),
        linear-gradient(140deg,
          #f8da72 0%, #c69a30 18%, #ecc760 35%,
          #b58820 52%, #ecc960 70%, #ad8018 88%, #d6a838 100%);
    }
    /* Śrubki w rogach każdej tablicy */
    .board-bg::before, .board-bg::after,
    .board-bg .screw-bl, .board-bg .screw-br{
      content:'';
      position:absolute;
      width:11px; height:11px;
      border-radius:50%;
      box-shadow:
        inset -1px -1px 1px rgba(0,0,0,.5),
        0 1px 2px rgba(0,0,0,.6);

    .board-silver::before, .board-silver::after,
    .board-silver .screw-bl, .board-silver .screw-br{

        radial-gradient(circle at 30% 30%, rgba(255,255,255,.7) 0%, transparent 40%),
        linear-gradient(90deg, transparent 40%, rgba(0,0,0,.55) 45%, rgba(0,0,0,.55) 55%, transparent 60%),
        radial-gradient(circle at 30% 30%, #fafafa 0%, #b0b0b0 35%, #555 100%);
    }
    .board-gold::before, .board-gold::after,
    .board-gold .screw-bl, .board-gold .screw-br{
      background:
        radial-gradient(circle at 30% 30%, rgba(255,250,210,.7) 0%, transparent 40%),
        linear-gradient(90deg, transparent 40%, rgba(0,0,0,.55) 45%, rgba(0,0,0,.55) 55%, transparent 60%),
        radial-gradient(circle at 30% 30%, #fff4cc 0%, #b8902a 35%, #5a4408 100%);
    }
    .board-bg::before{ top:7px; left:7px; }
    .board-bg::after{ top:7px; right:7px; }
    .board-bg .screw-bl{ position:absolute; bottom:7px; left:7px; }

<body>
  <div class="app">
    <div class="battery-indicator" id="batteryIndicator">—</div>
    <div class="notes-bar" id="notesBar"></div>

    <div class="clock-wrap">
      <div class="end-confirm-overlay hidden" id="endConfirmOverlay">
        <div class="end-wave"></div>
        <div class="end-confirm-content">
          <div class="end-confirm-title">KONIEC DNIÓWKI?</div>

          <div class="end-confirm-choice" id="endConfirmChoice">

      <svg class="clock-svg" viewBox="-30 -30 460 460" aria-hidden="true">
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">

        </defs>
        <g id="workFill"></g>
        <g id="noExerciseFill"></g>
        <g id="radarSweep"></g>

        <g id="breakFill"></g>

        <!-- Czarne koło pod datą - przykrywa wszystkie kolory tarczy w środku, datę pokazuje na czystym tle -->
        <circle cx="200" cy="200" r="75" fill="#000" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      </svg>

      <div class="clock-center">
        <div class="clock-face">
          <div class="number" data-hour="12" style="top:2%; left:50%;">12</div>
          <div class="number" data-hour="1" style="top:9%; left:75%;">1</div>
          <div class="number" data-hour="2" style="top:28%; left:91%;">2</div>
          <div class="number" data-hour="3" style="top:50%; left:99%;">3</div>
          <div class="number" data-hour="4" style="top:72%; left:91%;">4</div>
          <div class="number" data-hour="5" style="top:91%; left:75%;">5</div>
          <div class="number" data-hour="6" style="top:99%; left:50%;">6</div>
          <div class="number" data-hour="7" style="top:91%; left:25%;">7</div>
          <div class="number" data-hour="8" style="top:72%; left:9%;">8</div>
          <div class="number" data-hour="9" style="top:50%; left:1%;">9</div>
          <div class="number" data-hour="10" style="top:28%; left:9%;">10</div>
          <div class="number" data-hour="11" style="top:9%; left:25%;">11</div>
          <div class="date-center" id="dateCenterEl"></div>
        </div>
      </div>

      <!-- Punkty 4+5: druga warstwa SVG nad cyframi godzin - dla strzałki godzinowej i kropki minut -->
      <svg class="clock-svg clock-svg-overlay" viewBox="-30 -30 460 460" aria-hidden="true">
        <g id="hourArrow"></g>
        <g id="minuteDot"></g>
      </svg>
    </div>

    <div class="controls">
      <button class="btn work-btn" id="workBtn" type="button">
        <div class="lp-ring"></div>
        <div class="work-split">
          <div class="work-left">
            <div class="work-time-top" id="workStartMini">--:--</div>
            <div class="work-icon-row"></div>
            <div class="work-time-bot" id="workEndMini"></div>
          </div>
          <div class="work-right">
            <div class="work-roller">
              <div class="work-roller-inner" id="workRollerInner">
                <div class="work-roller-digit">0</div>
              </div>
            </div>
          </div>
        </div>
      </button>

      <button class="btn exercise-btn" id="exerciseBtn" type="button">
        <img src="Photos/kolo.png" alt="Koło" class="wheel-image" id="wheelImage"
             onerror="this.style.display='none'" />
        <svg class="wheel-mask-overlay" id="wheelMaskOverlay" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <defs>
            <radialGradient id="maskFade" cx="100" cy="100" r="100" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#000" stop-opacity="1"/>
              <stop offset="100%" stop-color="#000" stop-opacity="1"/>
            </radialGradient>
            <!-- Maska kątowa: kąt który zanikł (czarny sektor) z miękkim brzegiem -->
            <linearGradient id="edgeFade" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#000" stop-opacity="1"/>
              <stop offset="50%" stop-color="#000" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#000" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <!-- Czarny sektor (vanished area) - rysowany dynamicznie z JS -->
          <path id="wheelVanishSector" d="" fill="#000" />
          <!-- Miękka krawędź (gradient blur) - rysowana dynamicznie z JS -->
          <path id="wheelVanishEdge" d="" fill="#000" opacity="0.5" filter="url(#blurEdge)" />
          <filter id="blurEdge">
            <feGaussianBlur stdDeviation="3"/>
          </filter>
        </svg>
        <div class="overage-display" id="overageDisplay">
          <div class="work-roller" style="position:absolute;top:50%;left:6%;right:6%;transform:translateY(-50%);height:80%;background:rgba(0,0,0,.55);">
            <div class="work-roller-inner" id="overageRollerInner"></div>
          </div>
        </div>
      </button>

      <button class="btn break-btn" id="breakBtn" type="button">
        <div class="lp-ring"></div>
        <img src="Photos/przerwa-off.png" alt="Przerwa" class="break-img break-img-off" id="breakImgOff"
             onload="this.parentElement.classList.add('has-img')"
             onerror="this.style.display='none'" />
        <img src="Photos/przerwa.png" alt="Przerwa" class="break-img break-img-on" id="breakImgOn"
             onerror="this.style.display='none'" />
        <div class="break-top-zone" id="breakTopZone"></div>
        <div class="break-bot-zone" id="breakBotZone"></div>
      </button>

      <button class="btn pot-btn" id="potBtn" type="button">
        <div class="lp-ring"></div>
        <div class="pot-fire-bar" id="potFireBar" style="height:0%"></div>
        <img src="Photos/gotowanie.png" alt="Gotowanie" class="pot-img" id="potImg"
             onload="this.parentElement.classList.add('pot-has-img')"
             onerror="this.style.display='none'" />
        <div class="pot-counter-box" id="potCenter">🫕</div>
      </button>

      <button class="btn money-btn" id="moneyBtn" type="button">
        <div class="money-empty-bag" id="moneyEmptyBag">💰</div>
        <div class="money-split">
          <div class="money-cell empty" id="moneyTop"></div>
          <div class="money-cell empty" id="moneyBot"></div>
        </div>
      </button>

      <button class="btn coin-btn" id="coinBtn" type="button">
        <div class="coin-cell empty" id="coinCell"></div>
      </button>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>

  <button class="install-btn" id="installBtn" type="button">📥 Zainstaluj</button>
  <div class="version">vGPT_2.3</div>

  <script>
    const LS_KEY = 'tarcza_state_v1';
    const LS_PERSIST = 'tarcza_persist_v1';
    const LS_APPSCRIPT = 'tarcza_appscript_url';

    const PROVIDERS = [
      { key:'uber',    label:'UBER',    bg:'#000000', fg:'#ffffff' },
      { key:'bolt',    label:'BOLT',    bg:'#34d186', fg:'#ffffff' },
      { key:'taxi',    label:'TAXI',    bg:'#f4d500', fg:'#000000' },
      { key:'priv',    label:'PRIV',    bg:'#13204a', fg:'#ffffff' },
      { key:'freenow', label:'FREENOW', bg:'#000000', fg:'#ff3838' },
      { key:'agap',    label:'AGAP',    bg:'#ff8a0a', fg:'#000000' },
      { key:'tip',     label:'NAPIWEK', bg:'#9adf9a', fg:'#0d3b0d' },
      { key:'other',   label:'INNE',    bg:'#555555', fg:'#ffffff' },
      { key:'swinka',  label:'ŚWINKA',  bg:'#f7a7c7', fg:'#2b0715' }
    ];

    let startWorkMinutes = null;
    let endWorkMinutes = null;
    let lastExerciseMinutes = null;
    let breakActive = false;
    let currentBreakStart = null;
    let breakSegments = [];
    let exerciseMarkers = [];
    let breakAdjustMinutes = 0;
    let workDate = null;
    // Punkt 7: planowany cel pracy w minutach (domyślnie 8h = 480min)
    let workTargetMinutes = 480;

    let potDurationMin = 20;
    let potStartedAt = null;
    let potAckedDone = false;
    let potUsedToday = false;

    let revenues = {};
    PROVIDERS.forEach(p => revenues[p.key] = 0);

    let counterStart = null;
    let counterEnd = null;
    let privKmTotal = 0;

    let lastCounterEnd = null;
    let notes = [];
    let recentNoteSymbols = [];

    let editMode = "start";
    let editHour = 0, editMinute = 0;
    let editSignedMinutes = 0;
    let editPotMinutes = 20;

    let keypadMode = null;
    let keypadContext = null;
    let keypadRaw = '';
    let keypadCounterDigits = [];
    let keypadCursorFromRight = 0;

    const cx=200, cy=200, radius=200;
    let blinkState = false;

    // ===== localStorage =====
    function saveState(){
      try{
        const state = {
          startWorkMinutes, endWorkMinutes, lastExerciseMinutes,
          breakActive, currentBreakStart, breakSegments,
          exerciseMarkers, breakAdjustMinutes, workDate,
          potDurationMin, potStartedAt, potAckedDone, potUsedToday,
          revenues, counterStart, counterEnd, privKmTotal,
          workTargetMinutes
        };
        localStorage.setItem(LS_KEY, JSON.stringify(state));
        const persist = { lastCounterEnd, notes, recentNoteSymbols };
        localStorage.setItem(LS_PERSIST, JSON.stringify(persist));
      }catch(e){}
    }
    function loadState(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        if(raw){
          const s = JSON.parse(raw);
          startWorkMinutes = s.startWorkMinutes ?? null;
          endWorkMinutes = s.endWorkMinutes ?? null;
          lastExerciseMinutes = s.lastExerciseMinutes ?? null;
          breakActive = !!s.breakActive;
          currentBreakStart = s.currentBreakStart ?? null;
          breakSegments = Array.isArray(s.breakSegments) ? s.breakSegments : [];
          exerciseMarkers = Array.isArray(s.exerciseMarkers) ? s.exerciseMarkers : [];
          breakAdjustMinutes = s.breakAdjustMinutes || 0;
          workDate = s.workDate || null;
          potDurationMin = s.potDurationMin ?? 20;
          potStartedAt = s.potStartedAt ?? null;
          potAckedDone = !!s.potAckedDone;
          potUsedToday = !!s.potUsedToday;
          workTargetMinutes = s.workTargetMinutes ?? 480;
          // Sanitacja: jeśli pot był uruchomiony >24h temu (np. zostawiony z innego dnia
          // i apka się sama nie wygasiła) - resetujemy. Inaczej miga z zawyżonymi liczbami.
          if(potStartedAt !== null){
            const ageMs = Date.now() - potStartedAt;
            const maxAgeMs = 24 * 60 * 60 * 1000;
            if(ageMs > maxAgeMs || ageMs < 0){
              potStartedAt = null;
              potAckedDone = false;
            }
          }
          if(s.revenues){
            PROVIDERS.forEach(p => revenues[p.key] = s.revenues[p.key] || 0);
          }
          counterStart = s.counterStart ?? null;
          counterEnd = s.counterEnd ?? null;
          privKmTotal = s.privKmTotal || 0;
        }
        const rawP = localStorage.getItem(LS_PERSIST);
        if(rawP){
          const p = JSON.parse(rawP);
          lastCounterEnd = p.lastCounterEnd ?? null;
          notes = Array.isArray(p.notes) ? p.notes : [];
          recentNoteSymbols = Array.isArray(p.recentNoteSymbols) ? p.recentNoteSymbols.slice(0,50) : [];
        }
      }catch(e){}
    }

    // ===== pomocnicze =====
    function pad(n){ return String(n).padStart(2,'0'); }
    function nowMinutes(){ const d=new Date(); return d.getHours()*60 + d.getMinutes(); }
    function effectiveNow(){ return endWorkMinutes!==null ? endWorkMinutes : nowMinutes(); }
    function todayISO(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
    function formatHHMM(m){ m=((m%1440)+1440)%1440; return `${pad(Math.floor(m/60))}:${pad(m%60)}`; }
    function formatCompact(m){ m=Math.max(0,m); const h=Math.floor(m/60), mm=m%60; return h<=0?String(mm):`${h}:${pad(mm)}`; }
    function formatCompactSigned(m){ const s=m<0?'-':''; const a=Math.abs(m); const h=Math.floor(a/60), mm=a%60; return h<=0?s+String(mm):`${s}${h}:${pad(mm)}`; }
    function minutesToHHMM(m){ m=Math.max(0,m); return pad(Math.floor(m/60))+':'+pad(m%60); }
    function diffMinutes(f,t){ let d=t-f; if(d<0) d+=1440; return d; }
    function clock720(m){ return m%720; }
    function angleFromMinutes(m){ return (clock720(m)/720)*360 - 90; }
    function polarToCartesian(cX,cY,r,a){ const rad=a*Math.PI/180; return {x:cX+Math.cos(rad)*r, y:cY+Math.sin(rad)*r}; }
    function clearChildren(n){ while(n.firstChild) n.removeChild(n.firstChild); }
    function createSectorPath(sM,eM,r){
      let diff=clock720(eM)-clock720(sM);
      if(diff<0) diff+=720;
      if(diff===0) return '';
      const p1=polarToCartesian(cx,cy,r,angleFromMinutes(sM));
      const p2=polarToCartesian(cx,cy,r,angleFromMinutes(eM));
      const large=diff>360?1:0;
      return `M ${cx} ${cy} L ${p1.x} ${p1.y} A ${r} ${r} 0 ${large} 1 ${p2.x} ${p2.y} Z`;
    }
    function svgFilledPath(d,c,o=1,extra={}){
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d',d); p.setAttribute('fill',c); p.setAttribute('opacity',o);
      Object.keys(extra).forEach(k=>p.setAttribute(k,extra[k]));
      return p;
    }
    function svgLine(x1,y1,x2,y2,c,w,dash=''){
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',x1); l.setAttribute('y1',y1); l.setAttribute('x2',x2); l.setAttribute('y2',y2);
      l.setAttribute('stroke',c); l.setAttribute('stroke-width',w);
      l.setAttribute('stroke-linecap','round'); l.setAttribute('opacity','0.96');
      if(dash) l.setAttribute('stroke-dasharray',dash);
      return l;
    }

    function buildDots(){
      const g=document.getElementById('dots');
      clearChildren(g);
      for(let i=0;i<60;i++){
        const ang=(i*6-90)*Math.PI/180;
        const x=cx+Math.cos(ang)*radius, y=cy+Math.sin(ang)*radius;
        const isH=i%5===0;
        const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
        dot.setAttribute('cx',x.toFixed(2)); dot.setAttribute('cy',y.toFixed(2));
        dot.setAttribute('r', isH?'3.8':'2.1');
        dot.setAttribute('fill', isH?'var(--dot-big)':'var(--dot)');
        dot.setAttribute('opacity', isH?'0.92':'0.72');
        g.appendChild(dot);
      }
    }

    // ===== wskazówki: kropka minut + strzałka godzin =====
    function renderHands(){
      const gHour = document.getElementById('hourArrow');
      const gMin  = document.getElementById('minuteDot');
      clearChildren(gHour); clearChildren(gMin);

      const now = new Date();
      const h = now.getHours(), m = now.getMinutes();
      const hourDeg = (h % 12) * 30 + m * 0.5;
      // Minuty stoją na pełnej minucie - bez płynnego ruchu sekund
      const minDeg  = m * 6;

      // === Strzałka godzinowa - jako polygon (grot strzałki) ===
      const aRad = (hourDeg - 90) * Math.PI / 180;
      const r1 = 130, r2 = 75;
      // Punkty trzonu strzałki (prostokąt) + grot na końcu (przy cyfrze, r1)
      // Grot ma szerokość większą i kończy się w punkcie r1+8
      const tipR = r1 + 4;        // wierzchołek grotu
      const headR = r1 - 14;       // gdzie zaczyna się grot (cofnięty od wierzchołka o 18)
      const shaftR = r2;           // koniec trzonu (bliżej środka)
      const halfShaft = 5.5;       // pół-szerokość trzonu
      const halfHead  = 11;        // pół-szerokość grotu (szersza)
      // Wektor wzdłużny i prostopadły
      const ux = Math.cos(aRad), uy = Math.sin(aRad);
      const nx = -uy, ny = ux;
      function pt(r, side){
        return [cx + ux*r + nx*side, cy + uy*r + ny*side];
      }
      // 7 wierzchołków: trzon-lewa-koniec, trzon-lewa-baza, grot-lewa-baza,
      //                  wierzchołek, grot-prawa-baza, trzon-prawa-baza, trzon-prawa-koniec
      const p1 = pt(shaftR, -halfShaft);
      const p2 = pt(headR,  -halfShaft);
      const p3 = pt(headR,  -halfHead);
      const p4 = pt(tipR,    0);
      const p5 = pt(headR,   halfHead);
      const p6 = pt(headR,   halfShaft);
      const p7 = pt(shaftR,  halfShaft);
      const points = [p1,p2,p3,p4,p5,p6,p7].map(p=>p.map(n=>n.toFixed(2)).join(',')).join(' ');

      // Obwódka (czarna)
      const hOut = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      hOut.setAttribute('points', points);
      hOut.setAttribute('fill', '#000');
      hOut.setAttribute('stroke', '#000');
      hOut.setAttribute('stroke-width', '4');
      hOut.setAttribute('stroke-linejoin', 'round');
      gHour.appendChild(hOut);
      // Wypełnienie białe
      const hIn = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      hIn.setAttribute('points', points);
      hIn.setAttribute('fill', '#ffffff');
      gHour.appendChild(hIn);

      // === Kropka minut na obwodzie + liczba minut na zewnątrz ===
      // Kropka pokazuje aktualną minutę i nie porusza się w obrębie minuty.
      const mRad = (minDeg - 90) * Math.PI / 180;
      const dotR = radius;
      const dotX = cx + Math.cos(mRad) * dotR, dotY = cy + Math.sin(mRad) * dotR;
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx', dotX.toFixed(2)); dot.setAttribute('cy', dotY.toFixed(2));
      dot.setAttribute('r','7'); dot.setAttribute('fill','#ffffff');
      dot.setAttribute('filter','url(#glow)');
      gMin.appendChild(dot);
      // Etykieta minut na zewnątrz
      const lblR = radius + 23;
      const lblX = cx + Math.cos(mRad) * lblR, lblY = cy + Math.sin(mRad) * lblR;
      const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
      lbl.setAttribute('x', lblX.toFixed(2)); lbl.setAttribute('y', lblY.toFixed(2));
      lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('dominant-baseline','central');
      lbl.setAttribute('fill','#fff'); lbl.setAttribute('font-size','22');
      lbl.setAttribute('font-weight','800'); lbl.setAttribute('font-family','inherit');
      lbl.setAttribute('opacity','0.95');
      lbl.textContent = String(m);
      gMin.appendChild(lbl);

      // === Podświetlenie aktualnej godziny (tryb 24h dla świecących) ===
      const hh12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
      const hNext24 = (h + 1) % 24;
      const nextHh = hNext24 === 0 ? 12 : (hNext24 > 12 ? hNext24 - 12 : hNext24);
      function hourLabel24(hour24){ return hour24 === 0 ? '24' : String(hour24); }
      const labelCurrent = hourLabel24(h);
      const labelNext = hourLabel24(hNext24);
      let activeHours = [];
      if(m < 30)       activeHours = [{pos:hh12, label:labelCurrent}];
      else if(m < 55)  activeHours = [{pos:hh12, label:labelCurrent},{pos:nextHh, label:labelNext}];
      else             activeHours = [{pos:nextHh, label:labelNext}];
      const activePosMap = {};
      for(const a of activeHours) activePosMap[a.pos] = a.label;
      document.querySelectorAll('.number').forEach(el => {
        const hourVal = parseInt(el.dataset.hour, 10);
        if(activePosMap[hourVal] !== undefined){
          el.classList.add('active');
          el.textContent = activePosMap[hourVal];
        } else {
          el.classList.remove('active');
          el.textContent = String(hourVal);
        }
      });
    }

    // ===== czas / praca =====
    function getClosedBreakMinutes(){ let s=0; for(const seg of breakSegments) s+=diffMinutes(seg.start,seg.end); return s; }
    function getActiveBreakMinutes(){ return (breakActive&&currentBreakStart!==null)?diffMinutes(currentBreakStart,effectiveNow()):0; }
    function getTotalBreakMinutes(a=true){ let s=getClosedBreakMinutes()+breakAdjustMinutes; if(a) s+=getActiveBreakMinutes(); return s; }
    function getNetWorkMinutes(){ if(startWorkMinutes===null) return 0; return diffMinutes(startWorkMinutes,effectiveNow()) - getTotalBreakMinutes(true); }
    function getForecastEndMinutes(){ if(startWorkMinutes===null) return null; return startWorkMinutes + workTargetMinutes + getTotalBreakMinutes(true); }
    function getBreakOverlapSince(anchor){
      const total=diffMinutes(anchor,effectiveNow()); let o=0;
      for(const seg of breakSegments){
        let s=diffMinutes(anchor,seg.start), e=diffMinutes(anchor,seg.end);
        if(e<s) e+=1440;
        const f=Math.max(0,s), t=Math.min(total,e);
        if(t>f) o+=t-f;
      }
      if(breakActive&&currentBreakStart!==null){
        let s=diffMinutes(anchor,currentBreakStart), e=total;
        const f=Math.max(0,s), t=Math.min(total,e);
        if(t>f) o+=t-f;
      }
      return o;
    }
    function getEffectiveExerciseElapsed(){
      if(startWorkMinutes===null||lastExerciseMinutes===null) return 0;
      return Math.max(0, diffMinutes(lastExerciseMinutes,effectiveNow()) - getBreakOverlapSince(lastExerciseMinutes));
    }
    // Płynna wersja w minutach z ułamkiem (uwzględnia sekundy z aktualnego zegara)
    function getEffectiveExerciseElapsedFractional(){
      if(startWorkMinutes===null||lastExerciseMinutes===null) return 0;
      const baseMin = getEffectiveExerciseElapsed();
      // Jeśli mamy zamknięty endWorkMinutes - nie ma już ruchu sekund
      if(endWorkMinutes!==null) return baseMin;
      // Inaczej - dodaj ułamek wynikający z aktualnych sekund
      const secs = new Date().getSeconds();
      return baseMin + (secs/60);
    }

    // === Bug 15: efektywny początek czerwonego sektora ===
    // Jeśli po lastExerciseMinutes była przerwa, "wizualny" start brakuczu ćwiczeń
    // to koniec OSTATNIEJ takiej przerwy. W przeciwnym razie - lastExerciseMinutes.
    // Dotyczy zarówno czerwonego pola na tarczy jak i radaru.
    function getRedSectorStart(){
      if(lastExerciseMinutes===null) return null;
      const now = effectiveNow();
      let latestBreakEnd = null;
      // Iteruj zamknięte przerwy
      for(const seg of breakSegments){
        // Czy ta przerwa jest między lastExerciseMinutes a now?
        const segEndAfter = diffMinutes(lastExerciseMinutes, seg.end);
        const segEndBeforeNow = diffMinutes(seg.end, now);
        // segment jest "po lastExercise" gdy segEndAfter < diffMinutes(lastExerciseMinutes, now)
        // i jednocześnie seg.end <= now (czyli zamknięta przerwa skończyła się przed now)
        if(segEndAfter > 0 && segEndAfter <= diffMinutes(lastExerciseMinutes, now)){
          // wybierz najpóźniejszą z takich przerw
          if(latestBreakEnd === null || segEndAfter > diffMinutes(lastExerciseMinutes, latestBreakEnd)){
            latestBreakEnd = seg.end;
          }
        }
      }
      // Jeśli aktualnie trwa przerwa - radar nie powinien latać dalej, ale getEffectiveExerciseElapsed
      // już pauzuje liczenie. Tu zwracamy najlepszy znany punkt:
      return latestBreakEnd !== null ? latestBreakEnd : lastExerciseMinutes;
    }

    function renderWorkFill(){
      const wf=document.getElementById('workFill');
      const nef=document.getElementById('noExerciseFill');
      const ov=document.getElementById('overtimeFill');
      clearChildren(wf); clearChildren(nef); clearChildren(ov);
      if(startWorkMinutes===null) return;

      const now=effectiveNow();
      const forecastEnd=getForecastEndMinutes();
      const net=getNetWorkMinutes();

      const base=createSectorPath(startWorkMinutes,now,radius);
      if(base) wf.appendChild(svgFilledPath(base,'var(--work-green)',0.62));

      if(lastExerciseMinutes!==null && getEffectiveExerciseElapsed()>60){
        const sectorStart = getRedSectorStart();
        const red=createSectorPath(sectorStart,now,radius);
        if(red) nef.appendChild(svgFilledPath(red,'var(--no-exercise-red)',0.78));
      }
      if(net>workTargetMinutes && forecastEnd!==null){
        const s=createSectorPath(forecastEnd,now,radius);
        if(s) ov.appendChild(svgFilledPath(s,'var(--overtime-orange)',0.88));
      }
    }

    function renderRadarSweep(){
      const sw=document.getElementById('radarSweep');
      clearChildren(sw);
      if(startWorkMinutes===null||lastExerciseMinutes===null) return;
      if(getEffectiveExerciseElapsed()<=60) return;

      const sM=getRedSectorStart();
      const eM=effectiveNow();
      const spanM=diffMinutes(sM,eM);
      if(spanM<=0) return;

      const cycle=4000;
      const t=(Date.now()%cycle)/cycle;
      const progress = t<0.5 ? t*2 : 1-(t-0.5)*2;
      const posM=sM + progress*spanM;
      const widthM=Math.max(1.5, spanM*0.06);

      const tip=createSectorPath(posM-widthM/2, posM+widthM/2, radius);
      if(tip) sw.appendChild(svgFilledPath(tip,'#ffcccc',0.85));

      for(let i=1;i<=3;i++){
        const off=widthM*1.8*i;
        const dir=(t<0.5)?-1:1;
        const tailC=posM+dir*off;
        if(tailC<sM||tailC>eM) continue;
        const tail=createSectorPath(tailC-widthM/2, tailC+widthM/2, radius);
        if(tail) sw.appendChild(svgFilledPath(tail,'#ff8888', 0.5/i));
      }
    }

    function renderBreakFill(){
      const bf=document.getElementById('breakFill');
      clearChildren(bf);
      for(const seg of breakSegments){
        const d=createSectorPath(seg.start,seg.end,radius);
        if(d) bf.appendChild(svgFilledPath(d,'var(--break-cut)',1));
      }
      if(breakActive&&currentBreakStart!==null){
        const d=createSectorPath(currentBreakStart,effectiveNow(),radius);
        if(d) bf.appendChild(svgFilledPath(d,'var(--break-cut)',1));
      }
    }

    function renderExerciseMarks(){
      const g=document.getElementById('exerciseMarks');
      clearChildren(g);
      for(const mk of exerciseMarkers){
        const d=createSectorPath(mk-1.3,mk+1.3,radius);
        if(d) g.appendChild(svgFilledPath(d,'#1a8a3a',0.98));
      }
    }

    function renderForecastHand(){
      const g=document.getElementById('forecastHand');
      clearChildren(g);
      const end=getForecastEndMinutes();
      if(end===null) return;
      const ang = angleFromMinutes(end);
      const fRad = ang * Math.PI / 180;
      const r1 = 130, r2 = 75;
      const fx1 = cx + Math.cos(fRad)*r1, fy1 = cy + Math.sin(fRad)*r1;
      const fx2 = cx + Math.cos(fRad)*r2, fy2 = cy + Math.sin(fRad)*r2;
      g.appendChild(svgLine(fx1,fy1,fx2,fy2,'var(--forecast)',5,'8 6'));
    }

    // ===== przyciski =====
    function renderButtons(){
      const workBtn=document.getElementById('workBtn');
      const workStartMini=document.getElementById('workStartMini');
      const workEndMini=document.getElementById('workEndMini');
      const exBtn=document.getElementById('exerciseBtn');
      const breakTopZone=document.getElementById('breakTopZone');
      const breakBotZone=document.getElementById('breakBotZone');

      if(startWorkMinutes===null){
        workStartMini.textContent='--:--';
        workEndMini.textContent='';
        breakTopZone.textContent='';
        breakBotZone.textContent='';
        workBtn.classList.remove('overtime');
        renderWorkRoller(0);
        renderWheels(0);
      } else {
        const net=getNetWorkMinutes();
        const ex=getEffectiveExerciseElapsed();
        const totalBreak=getTotalBreakMinutes(true);
        workStartMini.textContent=formatHHMM(startWorkMinutes);
        workEndMini.textContent=endWorkMinutes!==null?formatHHMM(endWorkMinutes):'';
        // Punkt 2: gdy pauza aktywna - pokaż tylko dolny (bieżąca pauza); gdy nieaktywna - tylko górny (suma)
        if(breakActive){
          breakTopZone.textContent = '';
          breakBotZone.textContent = ':' + pad(getActiveBreakMinutes());
        } else {
          breakTopZone.textContent = totalBreak !== 0 ? ':' + pad(Math.abs(totalBreak)) : '';
          breakBotZone.textContent = '';
        }
        workBtn.classList.toggle('overtime', net>workTargetMinutes);
        renderWorkRoller(Math.max(0,net));
        renderWheels(ex);
      }

      const breakBtn=document.getElementById('breakBtn');
      // Punkt 10: obrazek "on/off" sterowany TYLKO przez breakActive (nie przez blinkState).
      // Klasa .on pokazuje obrazek przerwa.png; .blink-bg miga tłem żółto-szarym.
      breakBtn.classList.remove('on','blink-bg');
      if(endWorkMinutes===null && breakActive){
        breakBtn.classList.add('on');                  // obrazek przerwa.png stale
        if(blinkState) breakBtn.classList.add('blink-bg');  // tło miga
      }
      // Punkt 3: przy aktywnej przerwie przycisk pracy wyszarzony
      workBtn.classList.toggle('dimmed-during-break', breakActive && endWorkMinutes===null);

      renderPotButton();
      renderMoneyButton();
      renderNotesBar();
    }

    // === Render modułu ćwiczeń ===
    // Logika: koło ma SVG-overlay z czarnym sektorem który rośnie zgodnie z minutami.
    // Sektor zaczyna się od 12:00 (kąt -90 w SVG units), idzie zgodnie z ruchem wskazówek.
    // 60 minut → 360°, czyli 6°/min.
    // Stan _wheelsState:
    //   .restoring - czy aktualnie odtwarzamy koło wstecz (po kliknięciu)
    //   .restoreFromAngle - od jakiego kąta startujemy odtwarzanie
    //   .restoreStartTime - kiedy zaczęliśmy odtwarzanie (animacja 2s)
    let _wheelsState = {
      restoring: false,
      restoreFromAngle: 0,
      restoreStartTime: 0
    };

    // Rysuje SVG path sektora od 12:00 do `vanishedDeg` (zgodnie ze wskazówkami).
    // Sektor pełny = czarny, plus krawędź soft (filter blur na końcu).
    function paintWheelMask(vanishedDeg){
      {
        const overlay = document.getElementById('wheelMaskOverlay');
        const sector = document.getElementById('wheelVanishSector');
        const edge = document.getElementById('wheelVanishEdge');
        if(sector) sector.setAttribute('d', '');
        if(edge) edge.setAttribute('d', '');
        if(!overlay) return;

        if(vanishedDeg <= 0){
          overlay.style.background = 'none';
          return;
        }
        if(vanishedDeg >= 360){
          overlay.style.background = '#000';
          return;
        }

        const angle = Math.max(0, Math.min(360, vanishedDeg));
        const mist = 36;
        const startFadeEnd = Math.min(mist, Math.max(6, angle * 0.38));
        const endFadeStart = Math.max(startFadeEnd, angle - mist * 0.5);
        const endFadeEnd = Math.min(360, angle + mist * 0.5);

        overlay.style.background =
          `conic-gradient(from -90deg at 50% 50%, ` +
          `rgba(0,0,0,0) 0deg, ` +
          `rgba(0,0,0,.94) ${startFadeEnd.toFixed(2)}deg, ` +
          `rgba(0,0,0,.97) ${endFadeStart.toFixed(2)}deg, ` +
          `rgba(0,0,0,0) ${endFadeEnd.toFixed(2)}deg, ` +
          `rgba(0,0,0,0) 360deg)`;
        return;
      }

      const sector = document.getElementById('wheelVanishSector');
      const edge = document.getElementById('wheelVanishEdge');
      if(!sector || !edge) return;

      if(vanishedDeg <= 0){
        sector.setAttribute('d', '');
        edge.setAttribute('d', '');
        return;
      }
      if(vanishedDeg >= 360){
        // Pełny krąg
        sector.setAttribute('d', 'M 100 0 A 100 100 0 1 1 99.99 0 Z M 100 100 Z');
        edge.setAttribute('d', '');
        return;
      }

      const cx=100, cy=100, r=110; // r=110 daje minimalny zapas poza viewBox 0-200, żeby nie odsłaniało koła
      // SVG kąty: 0deg = w prawo, ale w zegarze 0deg = w górę. Korekta -90.
      // Sektor "zniknięty" idzie od 12:00 (top) zgodnie ze wskazówkami do `vanishedDeg`.
      const startAng = -90;                    // 12:00
      const endAng   = -90 + vanishedDeg;       // np. dla 90deg → 0deg = 3:00

      const startRad = startAng * Math.PI / 180;
      const endRad   = endAng   * Math.PI / 180;
      const startX = cx + r * Math.cos(startRad);
      const startY = cy + r * Math.sin(startRad);
      const endX   = cx + r * Math.cos(endRad);
      const endY   = cy + r * Math.sin(endRad);
      const largeArc = vanishedDeg > 180 ? 1 : 0;

      const d = `M ${cx} ${cy} L ${startX.toFixed(2)} ${startY.toFixed(2)} ` +
                `A ${r} ${r} 0 ${largeArc} 1 ${endX.toFixed(2)} ${endY.toFixed(2)} Z`;
      sector.setAttribute('d', d);

      // Soft edge: cienki sektor o szerokości 25deg na końcu z opacity gradient
      // Aby uzyskać rozmycie - rysuję drugi krótki sektor i blur go w SVG
      const edgeWidth = 25;
      const edgeStart = Math.max(0, vanishedDeg - edgeWidth);
      const e1Ang = -90 + edgeStart;
      const e2Ang = endAng;
      const e1Rad = e1Ang * Math.PI / 180;
      const e2Rad = e2Ang * Math.PI / 180;
      const e1X = cx + r * Math.cos(e1Rad), e1Y = cy + r * Math.sin(e1Rad);
      const e2X = cx + r * Math.cos(e2Rad), e2Y = cy + r * Math.sin(e2Rad);
      const eLargeArc = (edgeStart - vanishedDeg) > 180 ? 1 : 0;
      const dEdge = `M ${cx} ${cy} L ${e1X.toFixed(2)} ${e1Y.toFixed(2)} ` +
                    `A ${r} ${r} 0 ${eLargeArc} 1 ${e2X.toFixed(2)} ${e2Y.toFixed(2)} Z`;
      edge.setAttribute('d', dEdge);
    }

    function renderWheels(elapsedMinutes){
      const exBtn = document.getElementById('exerciseBtn');

      if(!startWorkMinutes){
        elapsedMinutes = 0;
      }
      if(elapsedMinutes > 500) elapsedMinutes = 500;

      // === Tryb odtwarzania (po kliknięciu) ===
      if(_wheelsState.restoring){
        const dt = (Date.now() - _wheelsState.restoreStartTime) / 1000;
        const RESTORE_DUR = 2.0;
        if(dt >= RESTORE_DUR){
          _wheelsState.restoring = false;
          paintWheelMask(0);
          exBtn.classList.remove('overage','fading-overage');
          return;
        }
        const progress = dt / RESTORE_DUR;
        const ang = _wheelsState.restoreFromAngle * (1 - progress);
        paintWheelMask(ang);
        return;
      }

      // === Tryb normalny: maska zanika zgodnie z upływem minut ===
      const elapsedFrac = (startWorkMinutes && lastExerciseMinutes!==null && endWorkMinutes===null)
        ? getEffectiveExerciseElapsedFractional()
        : elapsedMinutes;

      if(elapsedFrac >= 60){
        // Tryb "overage" - czerwony licznik nadwyżki
        exBtn.classList.add('overage');
        paintWheelMask(360);
        const overFrac = Math.max(0, elapsedFrac - 60);
        renderOverageRoller(overFrac);
        return;
      }
      exBtn.classList.remove('overage','fading-overage');

      const ang = Math.min(360, elapsedFrac * 6);
      paintWheelMask(ang);
    }

    // Animacja przywracania koła po kliknięciu
    function startWheelRestore(){
      const exBtn = document.getElementById('exerciseBtn');

      if(exBtn.classList.contains('overage')){
        // Najpierw fade czerwonego do czerni (0.6s)
        exBtn.classList.add('fading-overage');
        setTimeout(()=>{
          exBtn.classList.remove('overage','fading-overage');
          _wheelsState.restoring = true;
          _wheelsState.restoreFromAngle = 360;
          _wheelsState.restoreStartTime = Date.now();
          renderWheels(0);
        }, 600);
      } else {
        // Z bieżącego stanu zanikania - zacznij animację wstecz
        const elapsedFrac = (startWorkMinutes && lastExerciseMinutes!==null && endWorkMinutes===null)
          ? getEffectiveExerciseElapsedFractional()
          : 0;
        const currentAngle = Math.min(360, elapsedFrac * 6);
        _wheelsState.restoring = true;
        _wheelsState.restoreFromAngle = currentAngle;
        _wheelsState.restoreStartTime = Date.now();
        renderWheels(0);
      }
    }

    // Rolka nadwyżki - pełne przewijanie jak workRoller, minuty od 1 w górę
    function renderOverageRoller(minutes){
      const roller = document.querySelector('#overageDisplay .work-roller');
      const inner = document.getElementById('overageRollerInner');
      if(!roller || !inner) return;

      // Lazy build: cyfry 0..180 (zapas)
      const MAX_MIN = 180;
      if(inner.dataset.built !== '1'){
        inner.innerHTML='';
        for(let i=0; i<=MAX_MIN; i++){
          const d = document.createElement('div');
          d.className = 'work-roller-digit';
          inner.appendChild(d);
          d.textContent = i;
        }
        inner.dataset.built='1';
      }

      const h = roller.clientHeight;
      if(!h) return;

      const digitH = Math.round(h * 0.55);

      if(inner.dataset.lastH !== String(h)){
        inner.querySelectorAll('.work-roller-digit').forEach(d => {
          d.style.height = digitH + 'px';
          // Dla 3-cyfrowych - mniejsza czcionka
          const n = parseInt(d.textContent, 10);
          d.style.fontSize = (n >= 100
            ? Math.floor(digitH * 0.52)
            : Math.floor(digitH * 0.78)) + 'px';
        });
        inner.dataset.lastH = String(h);
      }

      const clamped = Math.min(MAX_MIN, Math.max(0, minutes));
      const intM = Math.floor(clamped);
      const frac = clamped - intM;
      const baseOffset = (h / 2) - (digitH / 2);
      const offset = baseOffset - (intM + frac) * digitH;
      // Krótka transition żeby kropki sekund nie szarpały
      inner.style.transition = 'transform 0.95s linear';
      inner.style.transform = `translateY(${offset}px)`;
    }

    // === Rolka cyfr godzin pracy ===
    // Strategia: wysokość okna rolki = clientHeight w px. Każda cyfra ma tę samą
    // wysokość. translateY = -(intH+frac) * h. Cyfry 10..20 mają mniejszy font,
    // żeby zmieściły się dwucyfrowe.
    function renderWorkRoller(workMinutes){
      const roller = document.querySelector('#workBtn .work-roller');
      const inner = document.getElementById('workRollerInner');
      if(!roller || !inner) return;

      // Lazy build: cyfry 0..20 + znaczniki ◀ ▶ na rolce
      if(inner.dataset.built !== '1'){
        inner.innerHTML='';
        for(let i=0; i<=20; i++){
          const d = document.createElement('div');
          d.className = 'work-roller-digit' + (i>=10 ? ' two-digit' : '');
          d.textContent = i;
          inner.appendChild(d);
        }
        if(!roller.querySelector('.work-roller-mark-left')){
          const ml = document.createElement('div');
          ml.className = 'work-roller-mark-left';
          roller.appendChild(ml);
          const mr = document.createElement('div');
          mr.className = 'work-roller-mark-right';
          roller.appendChild(mr);
        }
        inner.dataset.built='1';
      }

      const h = roller.clientHeight;
      if(!h) return;  // jeszcze nie zrenderowane

      // Każda cyfra ma height = 55% wysokości okna - dzięki temu sąsiadująca cyfra
      // jest widoczna częściowo (efekt "rolki", gdzie cyfra wypiera następną).
      const digitH = Math.round(h * 0.55);

      // Ustaw wysokość każdej cyfry i font proporcjonalnie do digitH
      if(inner.dataset.lastH !== String(h)){
        inner.querySelectorAll('.work-roller-digit').forEach(d => {
          d.style.height = digitH + 'px';
          if(d.classList.contains('two-digit')){
            d.style.fontSize = Math.floor(digitH * 0.78) + 'px';
          } else {
            d.style.fontSize = Math.floor(digitH * 0.92) + 'px';
          }
        });
        inner.dataset.lastH = String(h);
      }

      // Wycentruj tak, by aktualna cyfra była na środku okna.
      // top inner = (h/2 - digitH/2) - (intH+frac)*digitH
      const totalH = workMinutes / 60;
      const intH = Math.min(20, Math.floor(totalH));
      const frac = totalH - Math.floor(totalH);
      const baseOffset = (h / 2) - (digitH / 2);
      const offset = baseOffset - (intH + frac) * digitH;
      inner.style.transform = `translateY(${offset}px)`;
    }

    function potRemainingSeconds(){
      if(potStartedAt===null) return null;
      const el=(Date.now()-potStartedAt)/1000;
      return potDurationMin*60 - el;
    }

    function renderPotButton(){
      const btn=document.getElementById('potBtn');
      const ctr=document.getElementById('potCenter');
      const bar=document.getElementById('potFireBar');
      btn.classList.remove('done-alarm','done-alarm-off','dimmed');

      if(potStartedAt===null){
        // spoczynek - gdy jest obrazek: ukryj counter-box; gdy brak: emoji garnek
        if(btn.classList.contains('pot-has-img')){
          ctr.removeAttribute('data-show');
          ctr.textContent='';
        } else {
          ctr.textContent='🫕';
        }
        if(bar) bar.style.height='0%';
        if(potUsedToday) btn.classList.add('dimmed');
        return;
      }
      // Gdy grzeje - zawsze pokaż licznik (data-show żeby CSS go pokazał)
      ctr.setAttribute('data-show','1');
      const rem=potRemainingSeconds();
      const totalSec=potDurationMin*60;
      const elapsedSec=totalSec - rem;
      if(rem>0){
        const pct=Math.min(100,(elapsedSec/totalSec)*100);
        if(bar) bar.style.height=pct.toFixed(1)+'%';
        ctr.textContent=Math.ceil(rem/60);
      } else {
        if(bar) bar.style.height='0%';
        if(!potAckedDone){
          btn.classList.add(blinkState?'done-alarm':'done-alarm-off');
          const totalMin=Math.ceil(elapsedSec/60);
          ctr.textContent=totalMin;
        } else {
          if(btn.classList.contains('pot-has-img')){
            ctr.removeAttribute('data-show');
            ctr.textContent='';
          } else {
            ctr.textContent='🫕';
          }
          potStartedAt=null;
          potAckedDone=false;
          potUsedToday=true;
          btn.classList.add('dimmed');
        }
      }
    }

    // Czy notatka ma w tej chwili aktywny alarm (czas przekroczony i nie potwierdzony)?
    function isNoteAlarmActive(n, nowMs){
      if(!n.alarmTime || !Array.isArray(n.alerts) || n.alerts.length === 0) return false;
      const triggerTimes = computeNoteAlertTimes(n);
      for(const t of triggerTimes){
        if(nowMs >= t.ms && !t.acked) return true;
      }
      return false;
    }
    // Oblicz czasy ms dla każdego alertu (w kontekście dzisiejszego dnia)
    function computeNoteAlertTimes(n){
      if(!n.alarmTime) return [];
      const [hh,mm] = n.alarmTime.split(':').map(x=>parseInt(x,10));
      const target = new Date();
      target.setHours(hh, mm, 0, 0);
      const targetMs = target.getTime();
      const acked = n.ackedAlerts || {};
      return (n.alerts||[]).map(min => ({
        offset: min,
        ms: targetMs - min*60*1000,
        acked: !!acked[min]
      }));
    }
    function ackNoteAlarm(n){
      const triggerTimes = computeNoteAlertTimes(n);
      const nowMs = Date.now();
      // Potwierdź najbliższy nadal aktywny
      for(const t of triggerTimes){
        if(nowMs >= t.ms && !t.acked){
          if(!n.ackedAlerts) n.ackedAlerts = {};
          n.ackedAlerts[t.offset] = true;
          break;
        }
      }
    }

    function openTimeEditor(mode){
      editMode=mode;
      if(mode==='start'){
        if(startWorkMinutes!==null){
          editHour=Math.floor(startWorkMinutes/60);
          editMinute=startWorkMinutes%60;
        } else {
          const n=new Date();
          editHour=n.getHours(); editMinute=n.getMinutes();
        }
      } else if(mode==='breakAdjust'){ editSignedMinutes=0; }
      else if(mode==='pot'){ editPotMinutes=potDurationMin; }
      renderTimeEditor();
    }
    function renderTimeEditor(){
      let hT, mT, lab='';
      if(editMode==='start'){
        hT=pad(editHour); mT=pad(editMinute); lab='Godzina rozpoczęcia pracy';
      } else if(editMode==='breakAdjust'){

      } else if(editMode==='pot'){

      } else if(editMode==='target'){
        hT=pad(Math.floor(workTargetMinutes/60)); mT=pad(workTargetMinutes%60); lab='Cel pracy (godziny dziś)';

      // Punkt 7: w trybie 'start' dodatkowo widać i można edytować cel pracy
      const targetSection = editMode==='start' ? `

          <div class="keypad-label" style="opacity:.7;">Cel pracy: <strong style="color:#7adf8a;">${pad(Math.floor(workTargetMinutes/60))}:${pad(workTargetMinutes%60)}</strong></div>

        </div>
      ` : '';
      showOverlay(`
        <div class="editor">

          <div class="editor-center">
            <div class="time-col">
              <button class="arrow-btn" data-act="hUp">▲</button>
              <div class="time-box">${hT}</div>
              <button class="arrow-btn" data-act="hDn">▼</button>
            </div>
            <div class="colon">:</div>
            <div class="time-col">
              <button class="arrow-btn" data-act="mUp">▲</button>
              <div class="time-box">${mT}</div>
              <button class="arrow-btn" data-act="mDn">▼</button>
            </div>
          </div>
          ${targetSection}
          <div class="editor-actions">
            <button class="cancel-btn" data-act="cancel">✕</button>
            <button class="ok-btn" data-act="ok">✓</button>

      overlay.querySelectorAll('[data-act]').forEach(el=>{
        el.addEventListener('click',(e)=>{ e.stopPropagation(); timeEditorAction(el.dataset.act); });
      });
    }
    function timeEditorAction(a){
      if(a==='cancel'){ hideOverlay(); return; }
      if(a==='editTarget'){ openTimeEditor('target'); return; }
      if(a==='ok'){
        if(editMode==='start'){
          setWorkStart(editHour*60+editMinute, true);
        } else if(editMode==='breakAdjust'){
          breakAdjustMinutes += editSignedMinutes;
          saveState(); renderAll();
        } else if(editMode==='pot'){
          potDurationMin = Math.max(1, editPotMinutes);
          saveState(); renderAll();
        } else if(editMode==='target'){
          // Cel zatwierdzony - wracamy do edytora startu
          saveState(); renderAll();
          openTimeEditor('start');
          return;
        }
        hideOverlay(); return;
      }
      if(editMode==='start'){
        if(a==='hUp') editHour=(editHour+1)%24;
        if(a==='hDn') editHour=(editHour+23)%24;
        if(a==='mUp') editMinute=(editMinute+1)%60;
        if(a==='mDn') editMinute=(editMinute+59)%60;
      } else if(editMode==='breakAdjust'){
        if(a==='hUp') editSignedMinutes+=60;
        if(a==='hDn') editSignedMinutes-=60;
        if(a==='mUp') editSignedMinutes+=1;
        if(a==='mDn') editSignedMinutes-=1;
      } else if(editMode==='pot'){
        if(a==='hUp') editPotMinutes=Math.min(999,editPotMinutes+60);
        if(a==='hDn') editPotMinutes=Math.max(1,editPotMinutes-60);
        if(a==='mUp') editPotMinutes=Math.min(999,editPotMinutes+1);
        if(a==='mDn') editPotMinutes=Math.max(1,editPotMinutes-1);
      } else if(editMode==='target'){
        // Cel pracy - od 1h do 16h
        if(a==='hUp') workTargetMinutes=Math.min(960, workTargetMinutes+60);
        if(a==='hDn') workTargetMinutes=Math.max(60, workTargetMinutes-60);
        if(a==='mUp') workTargetMinutes=Math.min(960, workTargetMinutes+15);
        if(a==='mDn') workTargetMinutes=Math.max(60, workTargetMinutes-15);
      }
      renderTimeEditor();
    }
