    function normalizeForSyncCompare(value, key){
      if(Array.isArray(value)) return value.map(v=>normalizeForSyncCompare(v, key));
      if(value && typeof value === 'object'){
        const out = {};
        Object.keys(value).sort().forEach(k=>{
          out[k] = normalizeForSyncCompare(value[k], k);
        });
        return out;
      }
      if(typeof value === 'number' && key === 'potStartedAt'){
        return Math.floor(value / 60000);
      }
      return value;
    }
    function stableStringify(value){
      return JSON.stringify(normalizeForSyncCompare(value, ''));
    }
    function getCurrentComparableState(){
      return collectStateObjects();
    }

    // ===== localStorage =====
    function saveState(){
      try{
        const state = {
          startWorkMinutes, endWorkMinutes, lastExerciseMinutes,
          breakActive, currentBreakStart, breakSegments,
          exerciseMarkers, breakAdjustMinutes, workDate,
          potDurationMin, potStartedAt, potAckedDone, potUsedToday,
          revenues, counterStart, counterEnd, privKmTotal,
          workTargetMinutes
        };
        localStorage.setItem(LS_KEY, JSON.stringify(state));
        const persist = { lastCounterEnd, notes, recentNoteSymbols };
        localStorage.setItem(LS_PERSIST, JSON.stringify(persist));
        const comparable = stableStringify({state, persist});
        const previous = localStorage.getItem(LS_SYNC_STATE_HASH) || '';
        localStorage.setItem(LS_SYNC_STATE_HASH, comparable);
        const changed = !!(previous && previous !== comparable && !syncApplyInProgress);
        if(previous && previous !== comparable && !syncApplyInProgress){
          localStorage.setItem(LS_LAST_LOCAL_CHANGE_AT, String(Date.now()));
        }
        return changed;
      }catch(e){}
      return false;
    }
    function loadState(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        if(raw){
          const s = JSON.parse(raw);
          startWorkMinutes = s.startWorkMinutes ?? null;
          endWorkMinutes = s.endWorkMinutes ?? null;
          lastExerciseMinutes = s.lastExerciseMinutes ?? null;
          breakActive = !!s.breakActive;
          currentBreakStart = s.currentBreakStart ?? null;
          breakSegments = Array.isArray(s.breakSegments) ? s.breakSegments : [];
          exerciseMarkers = Array.isArray(s.exerciseMarkers) ? s.exerciseMarkers : [];
          breakAdjustMinutes = s.breakAdjustMinutes || 0;
          workDate = s.workDate || null;
          potDurationMin = s.potDurationMin ?? 20;
          potStartedAt = s.potStartedAt ?? null;
          potAckedDone = !!s.potAckedDone;
          potUsedToday = !!s.potUsedToday;
          workTargetMinutes = s.workTargetMinutes ?? 480;
          // Sanitacja: jeśli pot był uruchomiony >24h temu (np. zostawiony z innego dnia
          // i apka się sama nie wygasiła) - resetujemy. Inaczej miga z zawyżonymi liczbami.
          if(potStartedAt !== null){
            const ageMs = Date.now() - potStartedAt;
            const maxAgeMs = 24 * 60 * 60 * 1000;
            if(ageMs > maxAgeMs || ageMs < 0){
              potStartedAt = null;
              potAckedDone = false;
            }
          }
          if(s.revenues){
            PROVIDERS.forEach(p => revenues[p.key] = s.revenues[p.key] || 0);
          }
          counterStart = s.counterStart ?? null;
          counterEnd = s.counterEnd ?? null;
          privKmTotal = s.privKmTotal || 0;
        }
        const rawP = localStorage.getItem(LS_PERSIST);
        if(rawP){
          const p = JSON.parse(rawP);
          lastCounterEnd = p.lastCounterEnd ?? null;
          notes = Array.isArray(p.notes) ? p.notes : [];
          recentNoteSymbols = Array.isArray(p.recentNoteSymbols) ? p.recentNoteSymbols.slice(0,50) : [];
        }
      }catch(e){}
    }

    function collectStateObjects(){
      return {
        state:{
          startWorkMinutes, endWorkMinutes, lastExerciseMinutes,
          breakActive, currentBreakStart, breakSegments,
          exerciseMarkers, breakAdjustMinutes, workDate,
          potDurationMin, potStartedAt, potAckedDone, potUsedToday,
          revenues, counterStart, counterEnd, privKmTotal,
          workTargetMinutes
        },
        persist:{ lastCounterEnd, notes, recentNoteSymbols }
      };
    }
    function applyStateObjects(state, persist){
      const s = state || {};
      startWorkMinutes = s.startWorkMinutes ?? null;
      endWorkMinutes = s.endWorkMinutes ?? null;
      lastExerciseMinutes = s.lastExerciseMinutes ?? null;
      breakActive = !!s.breakActive;
      currentBreakStart = s.currentBreakStart ?? null;
      breakSegments = Array.isArray(s.breakSegments) ? s.breakSegments : [];
      exerciseMarkers = Array.isArray(s.exerciseMarkers) ? s.exerciseMarkers : [];
      breakAdjustMinutes = s.breakAdjustMinutes || 0;
      workDate = s.workDate || null;
      potDurationMin = s.potDurationMin ?? 20;
      potStartedAt = s.potStartedAt ?? null;
      potAckedDone = !!s.potAckedDone;
      potUsedToday = !!s.potUsedToday;
      workTargetMinutes = s.workTargetMinutes ?? 480;
      PROVIDERS.forEach(p => revenues[p.key] = s.revenues ? (s.revenues[p.key] || 0) : 0);
      counterStart = s.counterStart ?? null;
      counterEnd = s.counterEnd ?? null;
      privKmTotal = s.privKmTotal || 0;

      const p = persist || {};
      lastCounterEnd = p.lastCounterEnd ?? null;
      notes = Array.isArray(p.notes) ? p.notes : [];
      recentNoteSymbols = Array.isArray(p.recentNoteSymbols) ? p.recentNoteSymbols.slice(0,50) : [];
      syncApplyInProgress = true;
      try{ saveState(); }
      finally{ syncApplyInProgress = false; }
    }
    function initializeSyncTracking(){
      const comparable = stableStringify(getCurrentComparableState());
      if(!localStorage.getItem(LS_SYNC_STATE_HASH)) localStorage.setItem(LS_SYNC_STATE_HASH, comparable);
      if(!localStorage.getItem(LS_LAST_LOCAL_CHANGE_AT)) localStorage.setItem(LS_LAST_LOCAL_CHANGE_AT, '0');
    }

    // ===== pomocnicze =====
    function pad(n){ return String(n).padStart(2,'0'); }
    function nowMinutes(){ const d=new Date(); return d.getHours()*60 + d.getMinutes(); }
    function effectiveNow(){ return endWorkMinutes!==null ? endWorkMinutes : nowMinutes(); }
    function todayISO(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
    function addDaysISO(iso, days){
      const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      const d = m ? new Date(parseInt(m[1],10), parseInt(m[2],10)-1, parseInt(m[3],10)) : new Date();
      d.setDate(d.getDate() + days);
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }
    function formatHHMM(m){ m=((m%1440)+1440)%1440; return `${pad(Math.floor(m/60))}:${pad(m%60)}`; }
    function formatCompact(m){ m=Math.max(0,m); const h=Math.floor(m/60), mm=m%60; return h<=0?String(mm):`${h}:${pad(mm)}`; }
    function formatCompactSigned(m){ const s=m<0?'-':''; const a=Math.abs(m); const h=Math.floor(a/60), mm=a%60; return h<=0?s+String(mm):`${s}${h}:${pad(mm)}`; }
    function minutesToHHMM(m){ m=Math.max(0,m); return pad(Math.floor(m/60))+':'+pad(m%60); }
    function diffMinutes(f,t){ let d=t-f; if(d<0) d+=1440; return d; }
    function clock720(m){ return m%720; }
    function angleFromMinutes(m){ return (clock720(m)/720)*360 - 90; }
    function polarToCartesian(cX,cY,r,a){ const rad=a*Math.PI/180; return {x:cX+Math.cos(rad)*r, y:cY+Math.sin(rad)*r}; }
    function clearChildren(n){ while(n.firstChild) n.removeChild(n.firstChild); }
    function createSectorPath(sM,eM,r){
      let diff=clock720(eM)-clock720(sM);
      if(diff<0) diff+=720;
      if(diff===0) return '';
      const p1=polarToCartesian(cx,cy,r,angleFromMinutes(sM));
      const p2=polarToCartesian(cx,cy,r,angleFromMinutes(eM));
      const large=diff>360?1:0;
      return `M ${cx} ${cy} L ${p1.x} ${p1.y} A ${r} ${r} 0 ${large} 1 ${p2.x} ${p2.y} Z`;
    }
    function createSectorPathBySpan(sM,spanM,r){
      if(spanM<=0) return '';
      if(spanM>=720){
        return `M ${cx-r} ${cy} A ${r} ${r} 0 1 0 ${cx+r} ${cy} A ${r} ${r} 0 1 0 ${cx-r} ${cy} Z`;
      }
      const eM=sM+spanM;
      const p1=polarToCartesian(cx,cy,r,angleFromMinutes(sM));
      const p2=polarToCartesian(cx,cy,r,angleFromMinutes(eM));
      const large=spanM>360?1:0;
      return `M ${cx} ${cy} L ${p1.x} ${p1.y} A ${r} ${r} 0 ${large} 1 ${p2.x} ${p2.y} Z`;
    }
    function svgFilledPath(d,c,o=1,extra={}){
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d',d); p.setAttribute('fill',c); p.setAttribute('opacity',o);
      Object.keys(extra).forEach(k=>p.setAttribute(k,extra[k]));
      return p;
    }
    const WORK_GREEN_LAP_COLOR = '#166f33';
    const OVERTIME_ORANGE_LAP_COLOR = '#9a4b05';
    const BREAK_LAP_COLOR = '#666666';

    function appendLapAwareSector(g,sAbs,eAbs,r,baseColor,lapColor,baseOpacity=1,lapOpacity=1,minLap=0,maxLap=Infinity){
      if(startWorkMinutes===null || !g || eAbs<=sAbs) return;
      const workStart=startWorkMinutes;
      let cursor=sAbs;
      while(cursor<eAbs){
        const lapIndex=Math.max(0, Math.floor((cursor-workStart)/720));
        const lapEnd=workStart+(lapIndex+1)*720;
        const segEnd=Math.min(eAbs,lapEnd);
        const d=createSectorPathBySpan(cursor,segEnd-cursor,r);
        if(d && lapIndex>=minLap && lapIndex<=maxLap){
          const isOverlapLap=lapIndex>0;
          g.appendChild(svgFilledPath(
            d,
            isOverlapLap ? lapColor : baseColor,
            isOverlapLap ? lapOpacity : baseOpacity
          ));
        }
        cursor=segEnd;
      }
    }
    function svgLine(x1,y1,x2,y2,c,w,dash=''){
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',x1); l.setAttribute('y1',y1); l.setAttribute('x2',x2); l.setAttribute('y2',y2);
      l.setAttribute('stroke',c); l.setAttribute('stroke-width',w);
      l.setAttribute('stroke-linecap','round'); l.setAttribute('opacity','0.96');
      if(dash) l.setAttribute('stroke-dasharray',dash);
      return l;
    }
    function svgBarrierLine(x1,y1,x2,y2){
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      const base=document.createElementNS('http://www.w3.org/2000/svg','line');
      base.setAttribute('x1',x1); base.setAttribute('y1',y1); base.setAttribute('x2',x2); base.setAttribute('y2',y2);
      base.setAttribute('stroke','#f5f1e8');
      base.setAttribute('stroke-width','7');
      base.setAttribute('stroke-linecap','butt');
      base.setAttribute('opacity','0.98');
      const stripe=document.createElementNS('http://www.w3.org/2000/svg','line');
      stripe.setAttribute('x1',x1); stripe.setAttribute('y1',y1); stripe.setAttribute('x2',x2); stripe.setAttribute('y2',y2);
      stripe.setAttribute('stroke','#d31515');
      stripe.setAttribute('stroke-width','7');
      stripe.setAttribute('stroke-linecap','butt');
      stripe.setAttribute('stroke-dasharray','14 10');
      stripe.setAttribute('opacity','0.98');
      g.appendChild(base);
      g.appendChild(stripe);
      const angle=Math.atan2(y2-y1,x2-x1)*180/Math.PI;
      const midX=(x1+x2)/2, midY=(y1+y2)/2;
      const sign=document.createElementNS('http://www.w3.org/2000/svg','g');
      sign.setAttribute('transform',`translate(${midX.toFixed(2)} ${midY.toFixed(2)}) rotate(${angle.toFixed(2)})`);
      const signCircle=document.createElementNS('http://www.w3.org/2000/svg','circle');
      signCircle.setAttribute('cx','0');
      signCircle.setAttribute('cy','0');
      signCircle.setAttribute('r','9.5');
      signCircle.setAttribute('fill','#d80000');
      signCircle.setAttribute('stroke','#fff');
      signCircle.setAttribute('stroke-width','2.2');
      const signBar=document.createElementNS('http://www.w3.org/2000/svg','rect');
      signBar.setAttribute('x','-6.5');
      signBar.setAttribute('y','-2.2');
      signBar.setAttribute('width','13');
      signBar.setAttribute('height','4.4');
      signBar.setAttribute('rx','1.2');
      signBar.setAttribute('fill','#fff');
      sign.appendChild(signCircle);
      sign.appendChild(signBar);
      g.appendChild(sign);
      return g;
    }

    function buildDots(){
      const g=document.getElementById('dots');
      clearChildren(g);
      for(let i=0;i<60;i++){
        const ang=(i*6-90)*Math.PI/180;
        const x=cx+Math.cos(ang)*radius, y=cy+Math.sin(ang)*radius;
        const isH=i%5===0;
        const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
        dot.setAttribute('cx',x.toFixed(2)); dot.setAttribute('cy',y.toFixed(2));
        dot.setAttribute('r', isH?'3.8':'2.1');
        dot.setAttribute('fill', isH?'var(--dot-big)':'var(--dot)');
        dot.setAttribute('opacity', isH?'0.92':'0.72');
        g.appendChild(dot);
      }
    }

    // ===== wskazówki: kropka minut + strzałka godzin =====
    function renderHands(){
      const gHour = document.getElementById('hourArrow');
      const gMin  = document.getElementById('minuteDot');
      clearChildren(gHour); clearChildren(gMin);

      const now = new Date();
      const h = now.getHours(), m = now.getMinutes();
      const hourDeg = (h % 12) * 30 + m * 0.5;
      // Minuty stoją na pełnej minucie - bez płynnego ruchu sekund
      const minDeg  = m * 6;

      // === Strzałka godzinowa - jako polygon (grot strzałki) ===
      const aRad = (hourDeg - 90) * Math.PI / 180;
      const r1 = 130, r2 = 75;
      // Punkty trzonu strzałki (prostokąt) + grot na końcu (przy cyfrze, r1)
      // Grot ma szerokość większą i kończy się w punkcie r1+8
      const tipR = r1 + 4;        // wierzchołek grotu
      const headR = r1 - 14;       // gdzie zaczyna się grot (cofnięty od wierzchołka o 18)
      const shaftR = r2;           // koniec trzonu (bliżej środka)
      const halfShaft = 5.5;       // pół-szerokość trzonu
      const halfHead  = 11;        // pół-szerokość grotu (szersza)
      // Wektor wzdłużny i prostopadły
      const ux = Math.cos(aRad), uy = Math.sin(aRad);
      const nx = -uy, ny = ux;
      function pt(r, side){
        return [cx + ux*r + nx*side, cy + uy*r + ny*side];
      }
      // 7 wierzchołków: trzon-lewa-koniec, trzon-lewa-baza, grot-lewa-baza,
      //                  wierzchołek, grot-prawa-baza, trzon-prawa-baza, trzon-prawa-koniec
      const p1 = pt(shaftR, -halfShaft);
      const p2 = pt(headR,  -halfShaft);
      const p3 = pt(headR,  -halfHead);
      const p4 = pt(tipR,    0);
      const p5 = pt(headR,   halfHead);
      const p6 = pt(headR,   halfShaft);
      const p7 = pt(shaftR,  halfShaft);
      const points = [p1,p2,p3,p4,p5,p6,p7].map(p=>p.map(n=>n.toFixed(2)).join(',')).join(' ');

      // Obwódka (czarna)
      const hOut = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      hOut.setAttribute('points', points);
      hOut.setAttribute('fill', '#000');
      hOut.setAttribute('stroke', '#000');
      hOut.setAttribute('stroke-width', '4');
      hOut.setAttribute('stroke-linejoin', 'round');
      gHour.appendChild(hOut);
      // Wypełnienie białe
      const hIn = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      hIn.setAttribute('points', points);
      hIn.setAttribute('fill', '#ffffff');
      gHour.appendChild(hIn);

      // === Kropka minut na obwodzie + liczba minut na zewnątrz ===
      // Kropka pokazuje aktualną minutę i nie porusza się w obrębie minuty.
      const mRad = (minDeg - 90) * Math.PI / 180;
      // Etykieta minut na zewnątrz
      const lblR = radius;
      const lblX = cx + Math.cos(mRad) * lblR, lblY = cy + Math.sin(mRad) * lblR;
      const lblBg = document.createElementNS('http://www.w3.org/2000/svg','circle');
      lblBg.setAttribute('cx', lblX.toFixed(2)); lblBg.setAttribute('cy', lblY.toFixed(2));
      lblBg.setAttribute('r','29');
      lblBg.setAttribute('fill','#000');
      lblBg.setAttribute('stroke','rgba(255,255,255,.22)');
      lblBg.setAttribute('stroke-width','2');
      gMin.appendChild(lblBg);
      const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
      lbl.setAttribute('x', lblX.toFixed(2)); lbl.setAttribute('y', lblY.toFixed(2));
      lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('dominant-baseline','central');
      lbl.setAttribute('fill','#fff'); lbl.setAttribute('font-size','43');
      lbl.setAttribute('font-weight','900'); lbl.setAttribute('font-family','inherit');
      lbl.setAttribute('opacity','0.95');
      lbl.style.filter = 'drop-shadow(0 0 5px rgba(255,255,255,.98)) drop-shadow(0 0 13px rgba(255,255,255,.76)) drop-shadow(0 0 22px rgba(185,220,255,.48))';
      lbl.textContent = String(m);
      gMin.appendChild(lbl);

      // === Podświetlenie aktualnej godziny (tryb 24h dla świecących) ===
      const hh12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
      const hNext24 = (h + 1) % 24;
      const nextHh = hNext24 === 0 ? 12 : (hNext24 > 12 ? hNext24 - 12 : hNext24);
      function hourLabel24(hour24){ return hour24 === 0 ? '24' : String(hour24); }
      const labelCurrent = hourLabel24(h);
      const labelNext = hourLabel24(hNext24);
      let activeHours = [];
      if(m < 30)       activeHours = [{pos:hh12, label:labelCurrent}];
      else if(m < 55)  activeHours = [{pos:hh12, label:labelCurrent},{pos:nextHh, label:labelNext}];
      else             activeHours = [{pos:nextHh, label:labelNext}];
      const activePosMap = {};
      for(const a of activeHours) activePosMap[a.pos] = a.label;
      document.querySelectorAll('.number').forEach(el => {
        const hourVal = parseInt(el.dataset.hour, 10);
        if(activePosMap[hourVal] !== undefined){
          el.classList.add('active');
          el.textContent = activePosMap[hourVal];
        } else {
          el.classList.remove('active');
          el.textContent = String(hourVal);
        }
      });
    }

    // ===== czas / praca =====
    function getClosedBreakMinutes(){ let s=0; for(const seg of breakSegments) s+=diffMinutes(seg.start,seg.end); return s; }
    function getActiveBreakMinutes(){ return (breakActive&&currentBreakStart!==null)?diffMinutes(currentBreakStart,effectiveNow()):0; }
    function getTotalBreakMinutes(a=true){ let s=getClosedBreakMinutes()+breakAdjustMinutes; if(a) s+=getActiveBreakMinutes(); return s; }
    function getNetWorkMinutes(){ if(startWorkMinutes===null) return 0; return diffMinutes(startWorkMinutes,effectiveNow()) - getTotalBreakMinutes(true); }
    function getTimelineBreakSegmentsAbs(nowAbs, includeActive=true){
      if(startWorkMinutes===null) return [];
      const segments = [];
      for(const seg of breakSegments){
        if(!seg || seg.start===null || seg.end===null || typeof seg.start === 'undefined' || typeof seg.end === 'undefined') continue;
        const sAbs = startWorkMinutes + diffMinutes(startWorkMinutes, seg.start);
        const eAbs = sAbs + diffMinutes(seg.start, seg.end);
        if(eAbs > startWorkMinutes && sAbs < nowAbs) segments.push({
          start:Math.max(startWorkMinutes, sAbs),
          end:Math.min(nowAbs, eAbs)
        });
      }
      if(includeActive && breakActive && currentBreakStart!==null){
        const sAbs = startWorkMinutes + diffMinutes(startWorkMinutes, currentBreakStart);
        if(sAbs < nowAbs) segments.push({
          start:Math.max(startWorkMinutes, sAbs),
          end:nowAbs
        });
      }
      return segments
        .filter(seg=>seg.end>seg.start)
        .sort((a,b)=>a.start-b.start)
        .reduce((merged, seg)=>{
          const last = merged[merged.length-1];
          if(last && seg.start <= last.end){
            last.end = Math.max(last.end, seg.end);
          } else {
            merged.push({ start:seg.start, end:seg.end });
          }
          return merged;
        }, []);
    }
    function getForecastEndMinutes(){
      if(startWorkMinutes===null) return null;
      const now=effectiveNow();
      const nowAbs=startWorkMinutes + diffMinutes(startWorkMinutes, now);
      const targetWork=Math.max(0, workTargetMinutes + (breakAdjustMinutes || 0));
      if(targetWork<=0) return startWorkMinutes;
      let worked=0;
      let cursor=startWorkMinutes;
      const breaksAbs=getTimelineBreakSegmentsAbs(nowAbs, true);
      for(const seg of breaksAbs){
        if(seg.start>cursor){
          const span=seg.start-cursor;
          if(worked+span>=targetWork) return cursor + (targetWork-worked);
          worked+=span;
        }
        cursor=Math.max(cursor, seg.end);
      }
      if(nowAbs>cursor){
        const span=nowAbs-cursor;
        if(worked+span>=targetWork) return cursor + (targetWork-worked);
        worked+=span;
      }
      return nowAbs + (targetWork-worked);
    }
    function getBreakOverlapSince(anchor){
      const total=diffMinutes(anchor,effectiveNow()); let o=0;
      for(const seg of breakSegments){
        let s=diffMinutes(anchor,seg.start), e=diffMinutes(anchor,seg.end);
        if(e<s) e+=1440;
        const f=Math.max(0,s), t=Math.min(total,e);
        if(t>f) o+=t-f;
      }
      if(breakActive&&currentBreakStart!==null){
        let s=diffMinutes(anchor,currentBreakStart), e=total;
        const f=Math.max(0,s), t=Math.min(total,e);
        if(t>f) o+=t-f;
      }
      return o;
    }
    function getEffectiveExerciseElapsed(){
      if(startWorkMinutes===null||lastExerciseMinutes===null) return 0;
      return Math.max(0, diffMinutes(lastExerciseMinutes,effectiveNow()) - getBreakOverlapSince(lastExerciseMinutes));
    }
    // Płynna wersja w minutach z ułamkiem (uwzględnia sekundy z aktualnego zegara)
    function getEffectiveExerciseElapsedFractional(){
      if(startWorkMinutes===null||lastExerciseMinutes===null) return 0;
      const baseMin = getEffectiveExerciseElapsed();
      // Jeśli mamy zamknięty endWorkMinutes - nie ma już ruchu sekund
      if(endWorkMinutes!==null) return baseMin;
      // Inaczej - dodaj ułamek wynikający z aktualnych sekund
      const secs = new Date().getSeconds();
      return baseMin + (secs/60);
    }

    // === Bug 15: efektywny początek czerwonego sektora ===
    // Jeśli po lastExerciseMinutes była przerwa, "wizualny" start brakuczu ćwiczeń
    // to koniec OSTATNIEJ takiej przerwy. W przeciwnym razie - lastExerciseMinutes.
    // Dotyczy zarówno czerwonego pola na tarczy jak i radaru.
    function getRedSectorStart(){
      if(lastExerciseMinutes===null) return null;
      const now = effectiveNow();
      let latestBreakEnd = null;
      // Iteruj zamknięte przerwy
      for(const seg of breakSegments){
        // Czy ta przerwa jest między lastExerciseMinutes a now?
        const segEndAfter = diffMinutes(lastExerciseMinutes, seg.end);
        const segEndBeforeNow = diffMinutes(seg.end, now);
        // segment jest "po lastExercise" gdy segEndAfter < diffMinutes(lastExerciseMinutes, now)
        // i jednocześnie seg.end <= now (czyli zamknięta przerwa skończyła się przed now)
        if(segEndAfter > 0 && segEndAfter <= diffMinutes(lastExerciseMinutes, now)){
          // wybierz najpóźniejszą z takich przerw
          if(latestBreakEnd === null || segEndAfter > diffMinutes(lastExerciseMinutes, latestBreakEnd)){
            latestBreakEnd = seg.end;
          }
        }
      }
      // Jeśli aktualnie trwa przerwa - radar nie powinien latać dalej, ale getEffectiveExerciseElapsed
      // już pauzuje liczenie. Tu zwracamy najlepszy znany punkt:
      return latestBreakEnd !== null ? latestBreakEnd : lastExerciseMinutes;
    }

    function renderWorkFill(){
      const wf=document.getElementById('workFill');
      const nef=document.getElementById('noExerciseFill');
      const ov=document.getElementById('overtimeFill');
      clearChildren(wf); clearChildren(nef); clearChildren(ov);
      if(startWorkMinutes===null) return;

      const now=effectiveNow();
      const forecastEnd=getForecastEndMinutes();
      const net=getNetWorkMinutes();
      const nowAbs=startWorkMinutes + diffMinutes(startWorkMinutes,now);

      appendLapAwareSector(wf,startWorkMinutes,nowAbs,radius,'var(--work-green)',WORK_GREEN_LAP_COLOR,0.62,0.82);

      if(lastExerciseMinutes!==null && getEffectiveExerciseElapsed()>60){
        const sectorStart = getRedSectorStart();
        const red=createSectorPath(sectorStart,now,radius);
        if(red) nef.appendChild(svgFilledPath(red,'var(--no-exercise-red)',0.78));
      }
      if(net>workTargetMinutes && forecastEnd!==null){
        appendLapAwareSector(ov,forecastEnd,nowAbs,radius,'var(--overtime-orange)',OVERTIME_ORANGE_LAP_COLOR,0.88,0.95);
      }
    }

    function renderRadarSweep(){
      const sw=document.getElementById('radarSweep');
      clearChildren(sw);
      if(startWorkMinutes===null||lastExerciseMinutes===null) return;
      if(getEffectiveExerciseElapsed()<=60) return;

      const sM=getRedSectorStart();
      const eM=effectiveNow();
      const spanM=diffMinutes(sM,eM);
      if(spanM<=0) return;

      const cycle=4000;
      const t=(Date.now()%cycle)/cycle;
      const progress = t<0.5 ? t*2 : 1-(t-0.5)*2;
      const posM=sM + progress*spanM;
      const widthM=Math.max(1.5, spanM*0.06);

      const tip=createSectorPath(posM-widthM/2, posM+widthM/2, radius);
      if(tip) sw.appendChild(svgFilledPath(tip,'#ffcccc',0.85));

      for(let i=1;i<=3;i++){
        const off=widthM*1.8*i;
        const dir=(t<0.5)?-1:1;
        const tailC=posM+dir*off;
        if(tailC<sM||tailC>eM) continue;
        const tail=createSectorPath(tailC-widthM/2, tailC+widthM/2, radius);
        if(tail) sw.appendChild(svgFilledPath(tail,'#ff8888', 0.5/i));
      }
    }

    function renderBreakFill(){
      const bf=document.getElementById('breakFill');
      clearChildren(bf);
      for(const seg of breakSegments){
        const sAbs=startWorkMinutes!==null ? startWorkMinutes + diffMinutes(startWorkMinutes,seg.start) : seg.start;
        const eAbs=sAbs + diffMinutes(seg.start,seg.end);
        appendLapAwareSector(bf,sAbs,eAbs,radius,'var(--break-cut)',BREAK_LAP_COLOR,1,0.96);
      }
      if(breakActive&&currentBreakStart!==null){
        const now=effectiveNow();
        const sAbs=startWorkMinutes!==null ? startWorkMinutes + diffMinutes(startWorkMinutes,currentBreakStart) : currentBreakStart;
        const eAbs=sAbs + diffMinutes(currentBreakStart,now);
        appendLapAwareSector(bf,sAbs,eAbs,radius,'var(--break-cut)',BREAK_LAP_COLOR,1,0.96);
      }
    }

    function renderExerciseMarks(){
      const g=document.getElementById('exerciseMarks');
      clearChildren(g);
      for(const mk of exerciseMarkers){
        const d=createSectorPath(mk-1.3,mk+1.3,radius);
        if(d) g.appendChild(svgFilledPath(d,'#0b3f1f',0.9));
      }
    }

    function renderForecastHand(){
      const g=document.getElementById('forecastHand');
      clearChildren(g);
      const end=getForecastEndMinutes();
      if(end===null) return;
      const ang = angleFromMinutes(end);
      const fRad = ang * Math.PI / 180;
      const r1 = radius, r2 = 75;
      const fx1 = cx + Math.cos(fRad)*r1, fy1 = cy + Math.sin(fRad)*r1;
      const fx2 = cx + Math.cos(fRad)*r2, fy2 = cy + Math.sin(fRad)*r2;
      g.appendChild(svgBarrierLine(fx1,fy1,fx2,fy2));

    // ===== przyciski =====
    function formatBreakButtonTime(minutes){
      const m = Math.max(0, Math.floor(Math.abs(minutes)));
      if(m < 60) return ':' + pad(m);
      return Math.floor(m / 60) + ':' + pad(m % 60);
    }
    function formatMinuteValue(minutes){
      const m = Math.max(0, Math.floor(Math.abs(minutes)));
      if(m < 60) return String(m);
      return Math.floor(m / 60) + ':' + pad(m % 60);
    }

    function renderButtons(){
      const workBtn=document.getElementById('workBtn');
      const exBtn=document.getElementById('exerciseBtn');
      const breakTopZone=document.getElementById('breakTopZone');
      const breakBotZone=document.getElementById('breakBotZone');

      if(startWorkMinutes===null){
        breakTopZone.textContent='';
        breakBotZone.textContent='';
        workBtn.classList.remove('overtime');
        renderWorkRoller(0);
        renderWheels(0);
      } else {
        const net=getNetWorkMinutes();
        const ex=getEffectiveExerciseElapsed();
        const totalBreak=getTotalBreakMinutes(true);
        // Punkt 2: gdy pauza aktywna - pokaż tylko dolny (bieżąca pauza); gdy nieaktywna - tylko górny (suma)
        if(breakActive){
          breakTopZone.textContent = '';
          breakBotZone.textContent = formatBreakButtonTime(getActiveBreakMinutes());
        } else {
          breakTopZone.textContent = totalBreak !== 0 ? formatBreakButtonTime(totalBreak) : '';
          breakBotZone.textContent = '';
        }
        workBtn.classList.toggle('overtime', net>workTargetMinutes);
        renderWorkRoller(Math.max(0,net));
        renderWheels(ex);
      }

      const breakBtn=document.getElementById('breakBtn');
      // Punkt 10: obrazek "on/off" sterowany TYLKO przez breakActive (nie przez blinkState).
      // Klasa .on pokazuje obrazek przerwa.png; .blink-bg miga tłem żółto-szarym.
      breakBtn.classList.remove('on','blink-bg');
      if(endWorkMinutes===null && breakActive){
        breakBtn.classList.add('on');                  // obrazek przerwa.png stale
        if(blinkState) breakBtn.classList.add('blink-bg');  // tło miga
      }
      // Punkt 3: przy aktywnej przerwie przycisk pracy wyszarzony
      workBtn.classList.toggle('dimmed-during-break', breakActive && endWorkMinutes===null);

      renderPotButton();
      renderMoneyButton();
      renderNotesBar();
    }

    // === Render modułu ćwiczeń ===
    // Logika: koło ma SVG-overlay z czarnym sektorem który rośnie zgodnie z minutami.
    // Sektor zaczyna się od 12:00 (kąt -90 w SVG units), idzie zgodnie z ruchem wskazówek.
    // 60 minut → 360°, czyli 6°/min.
    // Stan _wheelsState:
    //   .restoring - czy aktualnie odtwarzamy koło wstecz (po kliknięciu)
    //   .restoreFromAngle - od jakiego kąta startujemy odtwarzanie
    //   .restoreStartTime - kiedy zaczęliśmy odtwarzanie (animacja 2s)
    let _wheelsState = {
      restoring: false,
      restoreFromAngle: 0,
      restoreStartTime: 0
    };
    const WHEEL_VISUAL_HOLD_MINUTES = 3.5;

    function getWheelVanishAngle(elapsedMinutes){
      const activeSpan = 60 - WHEEL_VISUAL_HOLD_MINUTES;
      const visualElapsed = Math.max(0, elapsedMinutes - WHEEL_VISUAL_HOLD_MINUTES);
      return Math.min(360, (visualElapsed / activeSpan) * 360);
    }
    function clearWheelImageMask(){
      ['wheelImage','wheelRestoreCover'].forEach((id)=>{
        const el=document.getElementById(id);
        if(!el) return;
        el.style.webkitMaskImage='';
        el.style.maskImage='';
        el.style.webkitMaskSize='';
        el.style.maskSize='';
      });
    }
    function paintWheelRestoreOverageMask(vanishedDeg){
      const wheel=document.getElementById('wheelImage');
      const cover=document.getElementById('wheelRestoreCover');
      if(!wheel && !cover) return;
      const angle=Math.max(0, Math.min(360, vanishedDeg));
      const applyMask=(mask)=>{
        [wheel,cover].forEach((el)=>{
          if(!el) return;
          el.style.webkitMaskSize='100% 100%';
          el.style.maskSize='100% 100%';
          el.style.webkitMaskImage=mask;
          el.style.maskImage=mask;
        });
      };
      if(angle<=0){
        clearWheelImageMask();
        return;
      }
      if(angle>=360){
        applyMask('linear-gradient(transparent, transparent)');
        return;
      }
      const mist=36;
      const revealStart=Math.max(0, angle - mist * 0.5);
      const revealFull=Math.min(360, angle + mist * 0.5);
      const mask =
        `conic-gradient(from 0deg at 50% 50%, ` +
        `rgba(0,0,0,0) 0deg, ` +
         `rgba(0,0,0,0) ${revealStart.toFixed(2)}deg, ` +
         `rgba(0,0,0,.95) ${revealFull.toFixed(2)}deg, ` +
         `rgba(0,0,0,1) 360deg)`;
      applyMask(mask);
    }

    // Rysuje SVG path sektora od 12:00 do `vanishedDeg` (zgodnie ze wskazówkami).
    // Sektor pełny = czarny, plus krawędź soft (filter blur na końcu).
    function paintWheelMask(vanishedDeg){
      {
        const overlay = document.getElementById('wheelMaskOverlay');
        const exBtn = document.getElementById('exerciseBtn');
        const sector = document.getElementById('wheelVanishSector');
        const edge = document.getElementById('wheelVanishEdge');
        if(sector) sector.setAttribute('d', '');
        if(edge) edge.setAttribute('d', '');
        if(!overlay) return;
        if(exBtn && exBtn.classList.contains('restore-overage')){
          overlay.style.background = 'none';
          paintWheelRestoreOverageMask(vanishedDeg);
          return;
        }
        clearWheelImageMask();

        if(vanishedDeg <= 0){
          overlay.style.background = 'none';
          return;
        }
        if(vanishedDeg >= 360){
          overlay.style.background = '#000';
          return;
        }

        const angle = Math.max(0, Math.min(360, vanishedDeg));
        const mist = 36;
        const startFadeEnd = Math.min(mist, Math.max(6, angle * 0.38));
        const endFadeStart = Math.max(startFadeEnd, angle - mist * 0.5);
        const endFadeEnd = Math.min(360, angle + mist * 0.5);

        overlay.style.background =
          `conic-gradient(from 0deg at 50% 50%, ` +
          `rgba(0,0,0,0) 0deg, ` +
          `rgba(0,0,0,.94) ${startFadeEnd.toFixed(2)}deg, ` +
          `rgba(0,0,0,.97) ${endFadeStart.toFixed(2)}deg, ` +
          `rgba(0,0,0,0) ${endFadeEnd.toFixed(2)}deg, ` +
          `rgba(0,0,0,0) 360deg)`;
        return;
      }

      const sector = document.getElementById('wheelVanishSector');
      const edge = document.getElementById('wheelVanishEdge');
      if(!sector || !edge) return;

      if(vanishedDeg <= 0){
        sector.setAttribute('d', '');
        edge.setAttribute('d', '');
        return;
      }
      if(vanishedDeg >= 360){
        // Pełny krąg
        sector.setAttribute('d', 'M 100 0 A 100 100 0 1 1 99.99 0 Z M 100 100 Z');
        edge.setAttribute('d', '');
        return;
      }

      const cx=100, cy=100, r=110; // r=110 daje minimalny zapas poza viewBox 0-200, żeby nie odsłaniało koła
      // SVG kąty: 0deg = w prawo, ale w zegarze 0deg = w górę. Korekta -90.
      // Sektor "zniknięty" idzie od 12:00 (top) zgodnie ze wskazówkami do `vanishedDeg`.
      const startAng = -90;                    // 12:00
      const endAng   = -90 + vanishedDeg;       // np. dla 90deg → 0deg = 3:00

      const startRad = startAng * Math.PI / 180;
      const endRad   = endAng   * Math.PI / 180;
      const startX = cx + r * Math.cos(startRad);
      const startY = cy + r * Math.sin(startRad);
      const endX   = cx + r * Math.cos(endRad);
      const endY   = cy + r * Math.sin(endRad);
      const largeArc = vanishedDeg > 180 ? 1 : 0;

      const d = `M ${cx} ${cy} L ${startX.toFixed(2)} ${startY.toFixed(2)} ` +
                `A ${r} ${r} 0 ${largeArc} 1 ${endX.toFixed(2)} ${endY.toFixed(2)} Z`;
      sector.setAttribute('d', d);

      // Soft edge: cienki sektor o szerokości 25deg na końcu z opacity gradient
      // Aby uzyskać rozmycie - rysuję drugi krótki sektor i blur go w SVG
      const edgeWidth = 25;
      const edgeStart = Math.max(0, vanishedDeg - edgeWidth);
      const e1Ang = -90 + edgeStart;
      const e2Ang = endAng;
      const e1Rad = e1Ang * Math.PI / 180;
      const e2Rad = e2Ang * Math.PI / 180;
      const e1X = cx + r * Math.cos(e1Rad), e1Y = cy + r * Math.sin(e1Rad);
      const e2X = cx + r * Math.cos(e2Rad), e2Y = cy + r * Math.sin(e2Rad);
      const eLargeArc = (edgeStart - vanishedDeg) > 180 ? 1 : 0;
      const dEdge = `M ${cx} ${cy} L ${e1X.toFixed(2)} ${e1Y.toFixed(2)} ` +
                    `A ${r} ${r} 0 ${eLargeArc} 1 ${e2X.toFixed(2)} ${e2Y.toFixed(2)} Z`;
      edge.setAttribute('d', dEdge);
    }

    function renderWheels(elapsedMinutes){
      const exBtn = document.getElementById('exerciseBtn');

      if(!startWorkMinutes){
        elapsedMinutes = 0;
      }
      if(elapsedMinutes > 500) elapsedMinutes = 500;

      // === Tryb odtwarzania (po kliknięciu) ===
      if(_wheelsState.restoring){
        const dt = (Date.now() - _wheelsState.restoreStartTime) / 1000;
        const RESTORE_DUR = 2.0;
        if(dt >= RESTORE_DUR){
          _wheelsState.restoring = false;
          paintWheelMask(0);
          clearWheelImageMask();
          exBtn.classList.remove('overage','fading-overage','restore-overage');
          return;
        }
        const progress = dt / RESTORE_DUR;
        const ang = _wheelsState.restoreFromAngle * (1 - progress);
        paintWheelMask(ang);
        return;
      }

      // === Tryb normalny: maska zanika zgodnie z upływem minut ===
      const elapsedFrac = (startWorkMinutes && lastExerciseMinutes!==null && endWorkMinutes===null)
        ? getEffectiveExerciseElapsedFractional()
        : elapsedMinutes;

      if(elapsedFrac >= 60){
        // Tryb "overage" - czerwony licznik nadwyżki
        const enteringOverage=!exBtn.classList.contains('overage');
        exBtn.classList.add('overage');
        paintWheelMask(360);
        const overFrac = Math.max(0, elapsedFrac - 60);
        renderOverageRoller(overFrac, { entering: enteringOverage });
        return;
      }
      clearWheelImageMask();
      if(exBtn.classList.contains('overage')){
        const inner=document.getElementById('overageRollerInner');
        if(inner) inner.dataset.active='0';
      }
      exBtn.classList.remove('overage','fading-overage','restore-overage');

      const ang = getWheelVanishAngle(elapsedFrac);
      paintWheelMask(ang);
    }

    // Animacja przywracania koła po kliknięciu
    function startWheelRestore(){
      const exBtn = document.getElementById('exerciseBtn');

      if(exBtn.classList.contains('overage')){
        exBtn.classList.remove('fading-overage');
        exBtn.classList.add('restore-overage');
        _wheelsState.restoring = true;
        _wheelsState.restoreFromAngle = 360;
        _wheelsState.restoreStartTime = Date.now();
        renderWheels(0);
      } else {
        // Z bieżącego stanu zanikania - zacznij animację wstecz
        const elapsedFrac = (startWorkMinutes && lastExerciseMinutes!==null && endWorkMinutes===null)
          ? getEffectiveExerciseElapsedFractional()
          : 0;
        const currentAngle = getWheelVanishAngle(elapsedFrac);
        exBtn.classList.remove('restore-overage');
        _wheelsState.restoring = true;
        _wheelsState.restoreFromAngle = currentAngle;
        _wheelsState.restoreStartTime = Date.now();
        renderWheels(0);
      }
    }

    // Rolka nadwyżki - pełne przewijanie jak workRoller, minuty od 1 w górę
    function renderOverageRoller(minutes, opts={}){
      const roller = document.querySelector('#overageDisplay .work-roller');
      const inner = document.getElementById('overageRollerInner');
      if(!roller || !inner) return;

      // Lazy build: pusty start + minuty 1..180 (zapas)
      const MAX_MIN = 180;
      if(inner.dataset.built !== '1'){
        inner.innerHTML='';
        for(let i=0; i<=MAX_MIN; i++){
          const d = document.createElement('div');
          d.className = 'work-roller-digit';
          inner.appendChild(d);
          d.dataset.value = String(i);
          d.textContent = i === 0 ? '' : '+' + formatMinuteValue(i);
        }
        inner.dataset.built='1';
      }

      const h = roller.clientHeight;
      const w = roller.clientWidth;
      if(!h || !w) return;

      const digitH = Math.round(h * 0.72);

      if(inner.dataset.lastH !== String(h) || inner.dataset.lastW !== String(w)){
        inner.querySelectorAll('.work-roller-digit').forEach(d => {
          d.style.height = digitH + 'px';
          const label = d.textContent || '';
          const chars = label.length;
          let fontSize;
          if(chars >= 5){
            fontSize = Math.min(digitH * 0.6, w * 0.28);
          } else if(chars >= 4){
            fontSize = Math.min(digitH * 0.66, w * 0.34);
          } else if(chars === 3){
            fontSize = Math.min(digitH * 0.8, w * 0.52);
          } else {
            fontSize = Math.min(digitH * 0.95, w * 0.64);
          }
          d.style.fontSize = Math.floor(fontSize) + 'px';
          d.style.letterSpacing = '0';
        });
        inner.dataset.lastH = String(h);
        inner.dataset.lastW = String(w);
      }

      const clamped = Math.min(MAX_MIN, Math.max(0, minutes));
      roller.style.transition = 'opacity .45s ease';
      roller.style.opacity = clamped <= 0.01 ? '0' : '1';
      const intM = Math.floor(clamped);
      const frac = clamped - intM;
      const baseOffset = (h / 2) - (digitH / 2);
      const offset = baseOffset - (intM + frac) * digitH;
      // Krótka transition żeby kropki sekund nie szarpały
      if(opts.entering || inner.dataset.active !== '1'){
        inner.style.transition = 'none';
        inner.style.transform = `translateY(${baseOffset}px)`;
        inner.dataset.active = '1';
        inner.offsetHeight;
        inner.style.transition = clamped <= 1.15 ? 'transform 1.15s cubic-bezier(.18,.78,.25,1)' : 'none';
      } else {
        inner.style.transition = 'transform 0.95s linear';
      }
      inner.style.transform = `translateY(${offset}px)`;
    }

    // === Rolka cyfr godzin pracy ===
    // Strategia: wysokość okna rolki = clientHeight w px. Każda cyfra ma tę samą
    // wysokość. translateY = -(intH+frac) * h. Cyfry 10..20 mają mniejszy font,
    // żeby zmieściły się dwucyfrowe.
    function renderWorkRoller(workMinutes){
      const roller = document.querySelector('#workBtn .work-roller');
      const inner = document.getElementById('workRollerInner');
      if(!roller || !inner) return;

      // Lazy build: cyfry 0..20 + znaczniki ◀ ▶ na rolce
      if(inner.dataset.built !== '1'){
        inner.innerHTML='';
        for(let i=0; i<=20; i++){
          const d = document.createElement('div');
          d.className = 'work-roller-digit' + (i>=10 ? ' two-digit' : '');
          d.textContent = i;
          inner.appendChild(d);
        }
        if(!roller.querySelector('.work-roller-mark-left')){
          const ml = document.createElement('div');
          ml.className = 'work-roller-mark-left';
          roller.appendChild(ml);
          const mr = document.createElement('div');
          mr.className = 'work-roller-mark-right';
          roller.appendChild(mr);
        }
        inner.dataset.built='1';
      }

      const h = roller.clientHeight;
      if(!h) return;  // jeszcze nie zrenderowane

      // Każda cyfra ma height = 55% wysokości okna - dzięki temu sąsiadująca cyfra
      // jest widoczna częściowo (efekt "rolki", gdzie cyfra wypiera następną).
      const digitH = Math.round(h * 0.60);

      // Ustaw wysokość każdej cyfry i font proporcjonalnie do digitH
      if(inner.dataset.lastH !== String(h)){
        inner.querySelectorAll('.work-roller-digit').forEach(d => {
          d.style.height = digitH + 'px';
          if(d.classList.contains('two-digit')){
            d.style.fontSize = Math.floor(digitH * 0.86) + 'px';
          } else {
            d.style.fontSize = Math.floor(digitH * 1.14) + 'px';
          }
        });
        inner.dataset.lastH = String(h);
      }

      // Wycentruj tak, by aktualna cyfra była na środku okna.
      // top inner = (h/2 - digitH/2) - (intH+frac)*digitH
      const totalH = workMinutes / 60;
      const intH = Math.min(20, Math.floor(totalH));
      const frac = totalH - Math.floor(totalH);
      const baseOffset = (h / 2) - (digitH / 2);
      const offset = baseOffset - (intH + frac) * digitH;
      inner.style.transform = `translateY(${offset}px)`;
    }

    function getNoteDisplayTimeMinutes(note){
      const raw = String(note && note.alarmTime ? note.alarmTime : '');
      const m = raw.match(/^(\d{1,2}):(\d{2})$/);
      if(!m) return null;
      const h = parseInt(m[1],10);
      const min = parseInt(m[2],10);
      if(!Number.isFinite(h) || !Number.isFinite(min) || h<0 || h>23 || min<0 || min>59) return null;
      return h*60 + min;
    }
    function isNotePostponed(note){
      return !!(note && note.postponedUntilDate);
    }
    function restoreDuePostponedNotes(newWorkDate){
      let changed = false;
      for(const n of notes){
        if(!n || !n.postponedUntilDate) continue;
        if(String(n.postponedUntilDate) <= String(newWorkDate)){
          delete n.postponedUntilDate;
          delete n.postponedAtDate;
          n.ackedAlerts = {};
          changed = true;
        }
      }
      return changed;
    }
    function postponeNoteUntilNextWorkDate(note){
      if(!note) return;
      const baseDate = workDate || todayISO();
      note.postponedAtDate = baseDate;
      note.postponedUntilDate = addDaysISO(baseDate, 1);
      note.ackedAlerts = {};
      saveStateAndScheduleAutoSync('note_postponed');
      renderNotesBar();
    }

    let notePostponeRenderLock = false;

      notePostponeRenderLock = !!locked;

    function getSortedNotesForDisplay(){
      return notes
        .filter(note=>!isNotePostponed(note))
        .map((note,index)=>({ note, index, time:getNoteDisplayTimeMinutes(note) }))
        .sort((a,b)=>{
          const aNoTime = a.time === null;
          const bNoTime = b.time === null;
          if(aNoTime && bNoTime) return a.index - b.index;
          if(aNoTime) return 1;
          if(bNoTime) return -1;
          if(a.time !== b.time) return a.time - b.time;
          return a.index - b.index;
        })
        .map(x=>x.note);
    }

    function setupNotePostponeGesture(btn, note){
      const WARNING_MS = 180;
      const HOLD_MS = 2000;
      const GRAY_WAIT_MS = 3000;
      const FADE_MS = 3000;
      let warningTimer = null;
      let timer = null;
      let fadeTimer = null;
      let finishTimer = null;
      let pointerId = null;
      let committed = false;
      let holding = false;

      function addReleaseListeners(){
        document.addEventListener('pointerup', finishHold, true);
        document.addEventListener('pointercancel', finishHold, true);
      }

      function removeReleaseListeners(){
        document.removeEventListener('pointerup', finishHold, true);
        document.removeEventListener('pointercancel', finishHold, true);
      }

      function releaseCapture(){
        if(pointerId !== null){
          try{ btn.releasePointerCapture(pointerId); }catch(e){}
        }
      }

      function clearPendingTimers(){
        clearTimeout(warningTimer);
        clearTimeout(timer);
        warningTimer = null;
        timer = null;
      }

      function clearHold(resetVisual=true){
        clearPendingTimers();
        if(resetVisual && !committed){
          btn.classList.remove('note-postpone-warning');
        }
        if(!committed) setNotePostponeRenderLock(false);
        removeReleaseListeners();
        releaseCapture();
        pointerId = null;
        holding = false;
      }

      btn.addEventListener('pointerdown',(e)=>{
        if(e.pointerType === 'mouse' && e.button !== 0) return;
        if(committed) return;
        clearHold(true);
        pointerId = e.pointerId;
        holding = true;
        setNotePostponeRenderLock(true);
        btn._notePostponeSuppressClick = false;
        warningTimer = setTimeout(()=>{
          if(holding && !committed){
            btn.classList.add('note-postpone-warning');
          }
        }, WARNING_MS);
        addReleaseListeners();
        try{ btn.setPointerCapture(pointerId); }catch(err){}
        timer = setTimeout(()=>{
          commitPostponeVisual();
        }, HOLD_MS);
      });

      function commitPostponeVisual(){
        if(committed || !holding) return;
        committed = true;
        holding = false;
        btn._notePostponeSuppressClick = true;
        clearPendingTimers();
        btn.classList.remove('note-postpone-warning');
        btn.classList.add('note-postpone-committed');
        const body = btn.querySelector('.note-sticker-body');
        if(body){
          body.innerHTML = '<span class="note-tomorrow-text">do jutra...</span>';
        }
        removeReleaseListeners();
        releaseCapture();
        pointerId = null;
        if(navigator.vibrate){ try{ navigator.vibrate([60,40,60]); }catch(e){} }
        fadeTimer = setTimeout(()=>{
          btn.classList.add('note-postpone-fading');
          finishTimer = setTimeout(()=>{
            if(!committed) return;
            committed = false;
            btn._notePostponeSuppressClick = false;
            setNotePostponeRenderLock(false);
            postponeNoteUntilNextWorkDate(note);
          }, FADE_MS);
        }, GRAY_WAIT_MS);
      }

      function finishHold(e){
        if(pointerId !== null && e.pointerId !== pointerId) return;
        if(committed){
          if(e && e.cancelable) e.preventDefault();
          if(e && e.stopPropagation) e.stopPropagation();
          removeReleaseListeners();
          releaseCapture();
          pointerId = null;
          holding = false;
          return;
        }
        clearHold(true);
      }

      btn.addEventListener('pointerup', finishHold);
      btn.addEventListener('pointercancel', finishHold);

      btn.addEventListener('contextmenu',(e)=>{ e.preventDefault(); });
    }

        bar.appendChild(b);

    // Czy notatka ma w tej chwili aktywny alarm (czas przekroczony i nie potwierdzony)?
    function isNoteAlarmActive(n, nowMs){
      if(!n.alarmTime || !Array.isArray(n.alerts) || n.alerts.length === 0) return false;
      const triggerTimes = computeNoteAlertTimes(n);
      for(const t of triggerTimes){
        if(nowMs >= t.ms && !t.acked) return true;
      }
      return false;
    }
    // Oblicz czasy ms dla każdego alertu (w kontekście dzisiejszego dnia)
    function computeNoteAlertTimes(n){
      if(!n.alarmTime) return [];
      const [hh,mm] = n.alarmTime.split(':').map(x=>parseInt(x,10));
      const target = new Date();
      target.setHours(hh, mm, 0, 0);
      const targetMs = target.getTime();
      const acked = n.ackedAlerts || {};
      return (n.alerts||[]).map(min => ({
        offset: min,
        ms: targetMs - min*60*1000,
        acked: !!acked[min]
      }));
    }
    function ackNoteAlarm(n){
      const triggerTimes = computeNoteAlertTimes(n);
      const nowMs = Date.now();
      // Potwierdź najbliższy nadal aktywny
      for(const t of triggerTimes){
        if(nowMs >= t.ms && !t.acked){
          if(!n.ackedAlerts) n.ackedAlerts = {};
          n.ackedAlerts[t.offset] = true;
          break;
        }
      }
    }

    // ===== wspolny picker czasu =====
    function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }
    function roundToStep(n,step){
      const s = step || 5;
      return Math.round(n / s) * s;
    }
    function normalizePickerMinutes(total, opts){
      const step = opts.minuteStep || 5;
      let value = Number.isFinite(total) ? Math.max(0, Math.floor(total)) : 0;
      let h = Math.floor(value / 60);
      let m = roundToStep(value % 60, step);
      if(m >= 60){ h += 1; m = 0; }
      value = h * 60 + m;
      if(opts.kind === 'clock') return ((value % 1440) + 1440) % 1440;
      const min = Number.isFinite(opts.minMinutes) ? opts.minMinutes : 0;
      const max = Number.isFinite(opts.maxMinutes) ? opts.maxMinutes : 23 * 60 + 55;
      return clamp(value, min, max);
    }
    function pickerPoint(index,total,ring){
      const a = (index / total) * Math.PI * 2 - Math.PI / 2;
      return {
        x: 50 + Math.cos(a) * ring,
        y: 50 + Math.sin(a) * ring
      };
    }
    function openSharedTimePicker(opts){
      const options = Object.assign({
        kind:'clock',
        title:'TIME',
        minuteStep:5,
        initialMinutes:0,
        autoConfirm:true,
        nested:false,
        extraHtml:'',
        extraActions:{}
      }, opts || {});

      let value = normalizePickerMinutes(options.initialMinutes, options);
      let selectedHour = Math.floor(value / 60) % 24;
      let selectedMinute = value % 60;
      let activePart = 'hour';
      let layer = null;

      function totalFor(h,m){ return h * 60 + m; }
      function isDuration(){ return options.kind !== 'clock'; }
      function valueAllowed(total){
        if(!isDuration()) return true;
        const min = Number.isFinite(options.minMinutes) ? options.minMinutes : 0;
        const max = Number.isFinite(options.maxMinutes) ? options.maxMinutes : 23 * 60 + 55;
        return total >= min && total <= max;
      }
      function hourAllowed(h){
        if(!isDuration()) return true;
        const step = options.minuteStep || 5;
        for(let m=0;m<60;m+=step){
          if(valueAllowed(totalFor(h,m))) return true;
        }
        return false;
      }
      function minuteAllowed(m){ return valueAllowed(totalFor(selectedHour,m)); }
      function closePicker(callCancel){
        if(layer) layer.remove();
        else hideOverlay();
        if(callCancel && typeof options.onCancel === 'function') options.onCancel();
      }
      function confirmPicker(){
        const out = normalizePickerMinutes(totalFor(selectedHour, selectedMinute), options);
        closePicker(false);
        if(typeof options.onDone === 'function') options.onDone(out);
      }
      function dialNumberHtml(value,label,ring,index,total,selected,disabled,inner){
        const p = pickerPoint(index,total,ring);
        const cls = ['time-picker-number'];
        if(selected) cls.push('selected');
        if(disabled) cls.push('disabled');
        if(inner) cls.push('inner');
        return `<button type="button" class="${cls.join(' ')}" data-tp-value="${value}" style="--x:${p.x.toFixed(2)}%;--y:${p.y.toFixed(2)}%;">${label}</button>`;
      }
      function dialHtml(){
        let numbers = '';
        let angle = 0;
        let handLen = '41%';
        if(activePart === 'hour'){
          for(let h=0;h<24;h++){
            const inner = h >= 12;
            const idx = inner ? h - 12 : h;
            const ring = inner ? 28 : 41;
            numbers += dialNumberHtml(h, pad(h), ring, idx, 12, h === selectedHour, !hourAllowed(h), inner);
          }
          angle = (selectedHour % 12) * 30;
          handLen = selectedHour >= 12 ? '28%' : '41%';
        } else {
          const step = options.minuteStep || 5;
          for(let m=0;m<60;m+=step){
            numbers += dialNumberHtml(m, pad(m), 41, m / step, 60 / step, m === selectedMinute, !minuteAllowed(m), false);
          }
          angle = selectedMinute * 6;
          handLen = '41%';
        }
        return `
          <div class="time-picker-dial">
            <div class="time-picker-hand" style="--hand-angle:${angle}deg;--hand-len:${handLen};"></div>
            <div class="time-picker-center"></div>
            ${numbers}
          </div>`;
      }
      function render(){
        const html = `
          <div class="editor time-picker-editor">
            <div class="time-picker-title">${escapeHtml(options.title)}</div>
            <div class="time-picker-top">
              <button type="button" class="time-picker-field ${activePart==='hour'?'active':''}" data-tp-field="hour">${pad(selectedHour)}</button>
              <div class="time-picker-colon">:</div>
              <button type="button" class="time-picker-field ${activePart==='minute'?'active':''}" data-tp-field="minute">${pad(selectedMinute)}</button>
            </div>
            ${dialHtml()}
            ${options.extraHtml ? `<div class="time-picker-extra">${options.extraHtml}</div>` : ''}
            <div class="editor-actions">
              <button class="cancel-btn" type="button" data-tp-act="cancel">X</button>
              <button class="ok-btn" type="button" data-tp-act="ok">OK</button>
            </div>
          </div>`;
        if(layer) layer.innerHTML = html;
        else showOverlay(html);
        bind();
      }
      function bind(){
        const root = layer || overlay;
        root.querySelectorAll('[data-tp-field]').forEach(btn=>{
          btn.addEventListener('click',(e)=>{
            e.stopPropagation();
            activePart = btn.dataset.tpField;
            render();
          });
        });
        root.querySelectorAll('[data-tp-value]').forEach(btn=>{
          btn.addEventListener('click',(e)=>{
            e.stopPropagation();
            if(btn.classList.contains('disabled')) return;
            const v = parseInt(btn.dataset.tpValue,10);
            if(activePart === 'hour'){
              selectedHour = v;
              if(!minuteAllowed(selectedMinute)){
                const step = options.minuteStep || 5;
                for(let m=0;m<60;m+=step){
                  if(minuteAllowed(m)){ selectedMinute = m; break; }
                }
              }
              activePart = 'minute';
              render();
            } else {
              selectedMinute = v;
              if(options.autoConfirm) confirmPicker();
              else render();
            }
          });
        });
        const cancel = root.querySelector('[data-tp-act="cancel"]');
        if(cancel) cancel.addEventListener('click',(e)=>{ e.stopPropagation(); closePicker(true); });
        const ok = root.querySelector('[data-tp-act="ok"]');
        if(ok) ok.addEventListener('click',(e)=>{ e.stopPropagation(); confirmPicker(); });
        root.querySelectorAll('[data-tp-extra]').forEach(btn=>{
          btn.addEventListener('click',(e)=>{
            e.stopPropagation();
            const action = options.extraActions && options.extraActions[btn.dataset.tpExtra];
            if(typeof action === 'function') action();
          });
        });
      }
      if(options.nested){
        layer = document.createElement('div');
        layer.className = 'time-picker-layer';
        layer.addEventListener('click',(e)=>{ if(e.target === layer) closePicker(true); });
        overlay.appendChild(layer);
      }
      render();
    }

    // ===== edytor czasu =====
    function openTimeEditor(mode){
      editMode=mode;
      if(mode==='start'){
        const initial = startWorkMinutes!==null ? startWorkMinutes : nowMinutes();
        openSharedTimePicker({
          title:'Godzina startu',
          kind:'clock',
          initialMinutes:initial,
          extraHtml:`Cel pracy: <strong style="color:#7adf8a;">${pad(Math.floor(workTargetMinutes/60))}:${pad(workTargetMinutes%60)}</strong><br><button type="button" data-tp-extra="target">Zmien cel</button>`,
          extraActions:{ target:()=>openTimeEditor('target') },
          onDone:(mins)=>setWorkStart(mins, true)
        });
      } else if(mode==='breakAdjust'){
        openSharedTimePicker({
          title:'Korekta przerw',
          kind:'duration',
          initialMinutes:0,
          minMinutes:0,
          maxMinutes:23*60+55,
          onDone:(mins)=>{
            breakAdjustMinutes += mins;
            saveStateAndScheduleAutoSync('break_adjust');
            renderAll();
          }
        });
      } else if(mode==='pot'){
        openSharedTimePicker({
          title:'Czas grzania',
          kind:'duration',
          initialMinutes:potDurationMin,
          minMinutes:5,
          maxMinutes:995,
          onDone:(mins)=>{
            potDurationMin = Math.max(1, mins);
            saveStateAndScheduleAutoSync('pot_duration');
            renderAll();
          }
        });
      } else if(mode==='target'){
        openSharedTimePicker({
          title:'Cel pracy',
          kind:'duration',
          initialMinutes:workTargetMinutes,
          minMinutes:60,
          maxMinutes:960,
          onDone:(mins)=>{
            workTargetMinutes = mins;
            saveStateAndScheduleAutoSync('work_target');
            renderAll();
            openTimeEditor('start');
          }
        });
      }
    }
    function renderTimeEditor(){
      let hT, mT, lab='';
      if(editMode==='start'){
        hT=pad(editHour); mT=pad(editMinute); lab='Godzina rozpoczęcia pracy';
      } else if(editMode==='breakAdjust'){
        const s=editSignedMinutes<0?'-':''; const a=Math.abs(editSignedMinutes);
        hT=`${s}${pad(Math.floor(a/60))}`; mT=pad(a%60); lab='Korekta sumy przerw (+/-)';
      } else if(editMode==='pot'){
        hT=pad(Math.floor(editPotMinutes/60)); mT=pad(editPotMinutes%60); lab='Czas grzania obiadu';
      } else if(editMode==='target'){
        hT=pad(Math.floor(workTargetMinutes/60)); mT=pad(workTargetMinutes%60); lab='Cel pracy (godziny dziś)';
      }
      // Punkt 7: w trybie 'start' dodatkowo widać i można edytować cel pracy
      const targetSection = editMode==='start' ? `
        <div class="target-section">
          <div class="keypad-label" style="opacity:.7;">Cel pracy: <strong style="color:#7adf8a;">${pad(Math.floor(workTargetMinutes/60))}:${pad(workTargetMinutes%60)}</strong></div>
          <button class="ok-btn" data-act="editTarget" style="background:linear-gradient(180deg,#2a4a2a,#1a3a1a);">Zmień cel</button>
        </div>
      ` : '';
      showOverlay(`
        <div class="editor">
          <div class="keypad-label" style="text-align:center;padding-top:8px;">${lab}</div>
          <div class="editor-center">
            <div class="time-col">
              <button class="arrow-btn" data-act="hUp">▲</button>
              <div class="time-box">${hT}</div>
              <button class="arrow-btn" data-act="hDn">▼</button>
            </div>
            <div class="colon">:</div>
            <div class="time-col">
              <button class="arrow-btn" data-act="mUp">▲</button>
              <div class="time-box">${mT}</div>
              <button class="arrow-btn" data-act="mDn">▼</button>
            </div>
          </div>
          ${targetSection}
          <div class="editor-actions">
            <button class="cancel-btn" data-act="cancel">✕</button>
            <button class="ok-btn" data-act="ok">✓</button>
          </div>
        </div>
      `);
      overlay.querySelectorAll('[data-act]').forEach(el=>{
        el.addEventListener('click',(e)=>{ e.stopPropagation(); timeEditorAction(el.dataset.act); });
      });
    }
    function timeEditorAction(a){
      if(a==='cancel'){ hideOverlay(); return; }
      if(a==='editTarget'){ openTimeEditor('target'); return; }
      if(a==='ok'){
        if(editMode==='start'){
          setWorkStart(editHour*60+editMinute, true);
        } else if(editMode==='breakAdjust'){
          breakAdjustMinutes += editSignedMinutes;
          saveStateAndScheduleAutoSync('break_adjust');
          renderAll();
        } else if(editMode==='pot'){
          potDurationMin = Math.max(1, editPotMinutes);
          saveStateAndScheduleAutoSync('pot_duration');
          renderAll();
        } else if(editMode==='target'){
          // Cel zatwierdzony - wracamy do edytora startu
          saveStateAndScheduleAutoSync('work_target');
          renderAll();
          openTimeEditor('start');
          return;
        }
        hideOverlay(); return;
      }
      if(editMode==='start'){
        if(a==='hUp') editHour=(editHour+1)%24;
        if(a==='hDn') editHour=(editHour+23)%24;
        if(a==='mUp') editMinute=(editMinute+1)%60;
        if(a==='mDn') editMinute=(editMinute+59)%60;
      } else if(editMode==='breakAdjust'){
        if(a==='hUp') editSignedMinutes+=60;
        if(a==='hDn') editSignedMinutes-=60;
        if(a==='mUp') editSignedMinutes+=1;
        if(a==='mDn') editSignedMinutes-=1;
      } else if(editMode==='pot'){
        if(a==='hUp') editPotMinutes=Math.min(999,editPotMinutes+60);
        if(a==='hDn') editPotMinutes=Math.max(1,editPotMinutes-60);
        if(a==='mUp') editPotMinutes=Math.min(999,editPotMinutes+1);
        if(a==='mDn') editPotMinutes=Math.max(1,editPotMinutes-1);
      } else if(editMode==='target'){
        // Cel pracy - od 1h do 16h
        if(a==='hUp') workTargetMinutes=Math.min(960, workTargetMinutes+60);
        if(a==='hDn') workTargetMinutes=Math.max(60, workTargetMinutes-60);
        if(a==='mUp') workTargetMinutes=Math.min(960, workTargetMinutes+15);
        if(a==='mDn') workTargetMinutes=Math.max(60, workTargetMinutes-15);
      }
      renderTimeEditor();
    }

    // ===== obroty =====
    function formatAmountDisplay(g){
      const z=Math.floor(g/100), gg=g%100;
      return `${z},${pad(gg)}`;
    }
    function formatProviderSumDisplay(g){
      const z=Math.floor(g/100);
      return String(z).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
    }
    function openMoneyPanel(){
      let rows='';
      const finalCounterMissing = counterEnd === null;
      const workHasStarted = startWorkMinutes !== null;
      const filledProviderCount = PROVIDERS.reduce((count,p)=>count + ((revenues[p.key]||0)>0 ? 1 : 0), 0);
      const providerTotal = getTotalRevenueGroszy();
      if(filledProviderCount > 1){
        rows += `
          <div class="provider-row provider-summary-row">
            <div class="prov-suma-label">SUMA:</div>
            <div class="prov-suma-amount">${formatProviderSumDisplay(providerTotal)}</div>
          </div>`;
      } else {
        rows += `
          <div class="provider-row provider-summary-row summary-empty" aria-hidden="true">
            <div class="prov-summary-empty"></div>
            <div class="prov-summary-empty"></div>
          </div>`;
      }
      for(const p of PROVIDERS){
        const v=revenues[p.key]||0;
        const filled = v > 0;
        const disp=v>0?formatAmountDisplay(v):'—';
        const imgSrc = `Photos/${p.key}.png`;
        rows += `
          <div class="provider-row ${filled?'provider-filled':'provider-empty'}">
            <button class="prov-btn ${filled?'filled':'empty'}" data-prov="${p.key}" style="background:${p.bg};color:${p.fg};">
              <img src="${imgSrc}" alt="${p.label}" class="prov-img"
                   onload="this.parentElement.classList.add('has-img')"
                   onerror="this.remove()" />
              <span class="prov-label">${p.label}</span>
            </button>
            <div class="prov-amount ${filled?'filled':'empty'}">${disp}</div>
          </div>`;
      }
      // Punkt 8: zamiast 'otwórz' pokazuj najwyższy aktualny licznik (końcowy > początkowy > z wczoraj)
      const counterDisplay = counterEnd !== null ? counterEnd : '';
      const cAny = counterEnd !== null;
      const counterLabelWarning = workHasStarted && finalCounterMissing;
      const counterValueWarning = workHasStarted && finalCounterMissing;
      rows += `
        <div class="provider-row" style="margin-top:8px;">
          <button class="prov-btn ${counterLabelWarning?'counter-warning':''}" data-prov="__counter" style="background:#2a2a2a;color:#f0f0f0;"><span class="prov-label">LICZNIK</span></button>
          <div class="prov-amount ${cAny?'filled':'empty'} ${counterValueWarning?'counter-warning':''}">${counterDisplay}</div>
        </div>`;
      showOverlay(`
        <div class="big-panel money-panel">
          <h3>Obroty dnia</h3>
          <div class="providers-list">
            <div class="board-bg board-silver"><span class="screw-bl"></span><span class="screw-br"></span></div>
            <div class="board-bg board-gold"><span class="screw-bl"></span><span class="screw-br"></span></div>
            ${rows}
          </div>
          <div class="panel-actions">
            <button class="cancel-btn" data-act="cancel" style="width:96px;height:96px;font-size:48px;border-radius:20px;">✕</button>
            <button class="ok-btn" data-act="ok" style="width:96px;height:96px;font-size:48px;border-radius:20px;">✓</button>
          </div>
        </div>
      `);
      overlay.querySelector('[data-act="cancel"]').addEventListener('click',(e)=>{ e.stopPropagation(); closeOverlayToMain('money_panel'); });
      overlay.querySelector('[data-act="ok"]').addEventListener('click',(e)=>{
        e.stopPropagation();
        saveStateAndMarkOverlayDirty('money_panel');
        closeOverlayToMain('money_panel');
      });
      overlay.querySelectorAll('[data-prov]').forEach(btn=>{
        btn.addEventListener('click',(e)=>{
          e.stopPropagation();
          const k=btn.dataset.prov;
          if(k==='__counter') openCounterPanel();
          else handleProviderClick(k);
        });
      });
    }
    function handleProviderClick(key){
      const cur=revenues[key]||0;
      if(cur>0){
        const lab = PROVIDERS.find(p=>p.key===key).label;
        showOverlay(`
          <div class="big-panel" style="height:auto;max-width:440px;">
            <div style="display:flex;justify-content:flex-start;padding:2px;">
              <button class="cancel-btn" data-act="back" style="width:54px;height:54px;font-size:28px;">←</button>
            </div>
            <div style="color:#ddd;font-size:17px;text-align:center;padding:18px 10px 8px;line-height:1.4;">
              <strong>${lab}</strong>: już ${formatAmountDisplay(cur)}<br>
              <span style="color:#999;font-size:14px;">Co zrobić z nową kwotą?</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 4px 4px;">
              <button class="choice-btn" data-choice="replace"
                      style="height:80px;border:none;border-radius:14px;font-size:18px;font-weight:900;color:#fff;background:linear-gradient(180deg,var(--ok),var(--ok-dark));box-shadow:0 0 18px rgba(24,132,57,.25);cursor:pointer;">
                ZASTĄPIĆ
              </button>
              <button class="choice-btn" data-choice="add"
                      style="height:80px;border:none;border-radius:14px;font-size:18px;font-weight:900;color:#fff;background:linear-gradient(180deg,#1a6aaa,#0a3a6a);box-shadow:0 0 18px rgba(26,106,170,.25);cursor:pointer;">
                DODAĆ
              </button>
            </div>
          </div>
        `);
        overlay.querySelector('[data-act="back"]').addEventListener('click',(e)=>{
          e.stopPropagation(); openMoneyPanel();
        });
        overlay.querySelectorAll('[data-choice]').forEach(b=>{
          b.addEventListener('click',(e)=>{
            e.stopPropagation();
            openKeypad('amount',{ provider:key, addMode:b.dataset.choice==='add' });
          });
        });
      } else {
        openKeypad('amount',{ provider:key, addMode:false });
      }
    }

    // ===== keypad =====
    function openKeypad(mode,ctx){
      keypadMode=mode;
      keypadContext=ctx;
      keypadRaw='';
      if(mode==='counter'){
        let hint=ctx.hint;
        if(hint===null||hint===undefined) hint=0;
        // Trzymam oryginalny hint (do liveKm i do backspace)
        keypadContext.hintDigits = String(hint).padStart(6,'0').split('').map(d=>parseInt(d));
        keypadCounterDigits = keypadContext.hintDigits.slice();
        keypadContext.entered = [];   // historia wpisanych cyfr (od pierwszej do ostatniej)
        keypadCursorFromRight = 0;    // zawsze na ostatniej pozycji
      }
      renderKeypad();
    }
    function liveKmPreview(){
      // oblicza przebieg na podstawie aktualnie wpisywanych cyfr licznika końcowego
      const curEnd=parseInt(keypadCounterDigits.join(''),10);
      if(counterStart===null) return '';
      const km=curEnd - counterStart - privKmTotal;
      return `przebieg: ${km} km`;
    }

    function renderKeypad(){
      let disp='', lab='';
      const startCounterAutoHelp = keypadMode==='counter' && keypadContext.startWorkAuto;
      if(keypadMode==='amount'){
        const p=PROVIDERS.find(x=>x.key===keypadContext.provider);
        lab=`Kwota: ${p.label}${keypadContext.addMode?' (dodaj)':''}`;
        disp=formatAmountDisplay(parseInt(keypadRaw||'0',10));
      } else if(keypadMode==='counter'){
        lab=keypadContext.label||'Licznik';
        // Kursor zawsze na ostatniej pozycji (idx=5)
        disp=keypadCounterDigits.map((d,i)=> i===5?`<span class="underline">${d}</span>`:String(d)).join('');
      }
      showOverlay(`
        <div class="big-panel" style="max-width:420px;">
          <div class="keypad-label">${lab}</div>
          <div class="keypad-display">${disp}</div>
          ${keypadMode==='counter' && keypadContext.field==='end'
            ? `<div class="keypad-live-preview" style="text-align:center;font-size:17px;font-weight:700;color:#aaa;padding:2px 0 4px;">${liveKmPreview()}</div>`
            : ''}
          <div class="keypad" style="${startCounterAutoHelp?'flex:0 0 auto;':'flex:1;'}">
            <button data-k="1"><span>1</span></button><button data-k="2"><span>2</span></button><button data-k="3"><span>3</span></button>
            <button data-k="4"><span>4</span></button><button data-k="5"><span>5</span></button><button data-k="6"><span>6</span></button>
            <button data-k="7"><span>7</span></button><button data-k="8"><span>8</span></button><button data-k="9"><span>9</span></button>
            <button class="key-cancel" data-k="cancel"><span>✕</span></button>
            <button data-k="0"><span>0</span></button>
            <button class="key-ok" data-k="ok"><span>✓</span></button>
            <button class="key-back" data-k="back" style="grid-column:span 3;"><span>← Cofnij</span></button>
          </div>
          ${startCounterAutoHelp
            ? `<div class="keypad-start-counter-help">
                <div class="keypad-start-counter-help-text">zerknij na licznik w aucie i skoryguj stan powyżej w apce jeśli trzeba 😀</div>
                <img src="Photos/licznik.png" alt="Licznik" />
              </div>`
            : ''}
        </div>
      `);
      overlay.querySelectorAll('[data-k]').forEach(b=>{
        b.addEventListener('pointerdown',(e)=>{
          e.preventDefault();
          e.stopPropagation();
          flashKeypadKey(b);
          keypadPress(b.dataset.k);
        });
        b.addEventListener('click',(e)=>{
          e.preventDefault();
          e.stopPropagation();
        });
      });
    }
    function flashKeypadKey(btn){
      clearTimeout(btn._flashTimer);
      btn.classList.remove('key-flash');
      void btn.offsetWidth;
      btn.classList.add('key-flash');
      btn._flashTimer = setTimeout(()=>btn.classList.remove('key-flash'), 500);
    }
    function updateKeypadDisplay(){
      const display = overlay.querySelector('.keypad-display');
      if(!display) return;
      if(keypadMode==='amount'){
        display.innerHTML = formatAmountDisplay(parseInt(keypadRaw||'0',10));
      } else if(keypadMode==='counter'){
        display.innerHTML = keypadCounterDigits.map((d,i)=> i===5?`<span class="underline">${d}</span>`:String(d)).join('');
        const live = overlay.querySelector('.keypad-live-preview');
        if(live) live.textContent = liveKmPreview();
      }
    }
    function keypadPress(k){
      if(k==='cancel'){
        if(keypadMode==='amount') openMoneyPanel();
        else if(keypadMode==='counter'){
          if(keypadContext.returnToMain){
            closeOverlayToMain('counter_edit_cancel');
          } else {
            openCounterPanel();
          }
        }
        return;
      }
      if(k==='ok'){ commitKeypad(); return; }
      if(k==='back'){
        if(keypadMode==='amount'){
          keypadRaw=keypadRaw.slice(0,-1);
        } else if(keypadMode==='counter'){
          // cofnij ostatnio wpisaną cyfrę: usuń z entered, odbuduj displej z hint + entered
          if(keypadContext.entered.length > 0){
            keypadContext.entered.pop();
            rebuildCounterDisplay();
          }
        }
        updateKeypadDisplay(); return;
      }
      if(/^[0-9]$/.test(k)){
        if(keypadMode==='amount'){
          if(keypadRaw.length<10) keypadRaw+=k;
        } else if(keypadMode==='counter'){
          // shift left + push: nowa cyfra na końcu, najstarsza wypada z lewej
          keypadContext.entered.push(parseInt(k));
          if(keypadContext.entered.length > 6) keypadContext.entered.shift();
          rebuildCounterDisplay();
          // auto-akceptacja po wpisaniu 6 cyfr (cały licznik nadpisany)
          if(keypadContext.entered.length >= 6){
            commitKeypad();
            return;
          }
        }
        updateKeypadDisplay();
      }
    }
    // Buduje keypadCounterDigits jako: hint z lewej (na pozycjach niezastąpionych) + entered z prawej
    function rebuildCounterDisplay(){
      const hint = keypadContext.hintDigits;
      const ent = keypadContext.entered;
      const n = ent.length;
      // n=0: tylko hint; n=k: ostatnich k pozycji to entered, reszta z hint (przesunięta? NIE - hint zostaje na lewych pozycjach)
      // Przykład: hint=284756, wpisuję 3 -> 284753 (zastąpiona ostatnia)
      // Wpisuję jeszcze 9 -> 284739 (ostatnie 2)
      const result = hint.slice();
      for(let i=0; i<n; i++){
        result[6 - n + i] = ent[i];
      }
      keypadCounterDigits = result;
    }
    function commitKeypad(){
      if(keypadMode==='amount'){
        const g=parseInt(keypadRaw||'0',10);
        const k=keypadContext.provider;
        if(k){
          if(keypadContext.addMode){
            if(g>0) revenues[k]=(revenues[k]||0)+g;
          } else {
            revenues[k]=g;
          }
        }
        saveStateAndMarkOverlayDirty('provider_amount');
        openMoneyPanel();
      } else if(keypadMode==='counter'){
        const val=parseInt(keypadCounterDigits.join(''),10);
        if(keypadContext.field==='start') counterStart=val;
        else if(keypadContext.field==='end') counterEnd=val;
        else if(keypadContext.field==='priv') privKmTotal+=val;
        saveStateAndMarkOverlayDirty('counter_edit');
        if(keypadContext.returnToMain){
          closeOverlayToMain('counter_edit');
        } else {
          openCounterPanel();
        }
      }
    }
