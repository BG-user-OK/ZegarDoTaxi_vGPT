<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tarcza czasu pracy</title>
<!-- v6.16.0: based on a previously developed v:1.28 version created by another AI. -->

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tarcza">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    :root{
      --bg:#000000;
      --dot:#d7d7d7;
      --dot-big:#ececec;
      --txt:#f4f4f4;
      --version:#6f6f6f;

      --hand-hour:#e8e8e8;
      --hand-minute:#b9b9b9;
      --hand-outline:rgba(0,0,0,.85);
      --dial-number:#8a8a8a;

      --work-green:#38c866;
      --no-exercise-red:#ff3838;
      --overtime-orange:#ff9a1f;
      --exercise:#e5871f;
      --break-cut:#000000;
      --forecast:#44df73;

      --btn-work-off-1:#0d3f18;
      --btn-work-off-2:#07250f;
      --btn-work-on-1:#2ac158;
      --btn-work-on-2:#17873a;
      --btn-work-over-1:#ffa335;
      --btn-work-over-2:#c96a0a;

      --btn-ex-off-1:#75410a;
      --btn-ex-off-2:#492805;
      --btn-ex-on-1:#ffaa3f;
      --btn-ex-on-2:#d87210;
      --btn-ex-alert-1:#d12727;
      --btn-ex-alert-2:#8f1717;
      --btn-ex-blink-1:#ff5a47;
      --btn-ex-blink-2:#cd2313;

      --btn-break-off-1:#72600b;
      --btn-break-off-2:#463a06;
      --btn-break-on-1:#ffe84d;
      --btn-break-on-2:#d7bc05;

      --btn-pot-off-1:#2a2a2a;
      --btn-pot-off-2:#1a1a1a;

      --btn-money-1:#f4d87a;
      --btn-money-2:#c9a03d;
      --btn-money-text:#5c3e08;

      --work-text-green:#0f431c;
      --work-text-orange:#4a2600;
      --exercise-text:#ffd39a;
      --exercise-text-alert:#ffd6d6;
      --break-text:#fff0a6;

      --red:#b11919;
      --red-dark:#5e0e0e;
      --ok:#188439;
      --ok-dark:#0f5f28;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
    button, .btn, .ok-btn, .cancel-btn, .delete-btn, .arrow-btn, .prov-btn, .prov-amount[data-prov], .counter-row[data-cnt], .note-sticker, .keypad button {
      touch-action: manipulation;
    }
    html,body{ margin:0; padding:0; width:100%; height:100%; background:#000; color:var(--txt); font-family:Arial, Helvetica, sans-serif; overflow:hidden; }
    body{ display:flex; align-items:center; justify-content:center; }

    .app{
      width:100%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:space-between;
      padding:6px 8px 30px;
      gap:6px; position:relative; background:#000;
    }

    .notes-bar{
      width:100%; min-height:64px;
      display:flex; align-items:center; gap:2px;
      padding:4px 60px 4px 6px;
      flex-wrap:wrap;
    }
    .note-sticker{
      flex:0 0 auto;
      width:var(--note-size, 68px);
      height:var(--note-size, 60px);
      padding:0 4px;
      border-radius:8px 8px 14px 8px;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:calc(var(--note-size, 60px) * 0.5);
      font-weight:800;
      box-shadow:0 2px 4px rgba(0,0,0,.5);
      border:none; cursor:pointer;
      transition:opacity .2s, background .2s;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }
    .note-sticker-body{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      color:inherit;
      font:inherit;
      line-height:inherit;
      border-radius:8px 8px 14px 8px;
      padding:0 4px;
      box-shadow:0 2px 4px rgba(0,0,0,.5);
      background:#f4d847;
    }
    .note-sticker.note-postpone-warning,
    .note-sticker.note-postpone-committed,
    .note-sticker.note-postpone-fading{
      position:relative;
      z-index:80;
      -webkit-user-drag:none;
    }
    .note-sticker.note-postpone-warning .note-sticker-body{
      background:#ff2525;
      color:#fff;
      box-shadow:
        0 0 0 4px rgba(255,255,255,.55),
        0 0 22px rgba(255,0,0,.78),
        0 2px 4px rgba(0,0,0,.5);
    }
    .note-sticker.note-postpone-committed{
      touch-action:none;
    }
    .note-sticker.note-postpone-committed .note-sticker-body{
      background:#d8d8d8;
      color:#111;
      box-shadow:
        0 0 0 2px rgba(255,255,255,.42),
        0 0 18px rgba(255,255,255,.2),
        0 2px 4px rgba(0,0,0,.5);
      transition:background-color 3s ease, color 2.7s ease, box-shadow 3s ease, opacity 3s ease;
    }
    .note-sticker.note-postpone-fading .note-sticker-body{
      background:#000;
      color:rgba(0,0,0,0);
      box-shadow:none;
      opacity:0;
    }
    .note-tomorrow-text{
      width:100%;
      text-align:center;
      font-size:calc(var(--note-size, 60px) * .28);
      font-weight:1000;
      line-height:1.02;
      color:inherit;
      text-shadow:0 1px 0 rgba(255,255,255,.35);
    }
    .note-sticker.empty{
      width:34px;
      height:30px;
      background:#1a1a1a;
      color:#5a5a3a;
      font-size:18px;
    }
    .note-sticker.filled{
      background:transparent;
      color:#3a2c00;
      box-shadow:none;
      padding:0;
      overflow:visible;
      touch-action:none;
      -webkit-user-drag:none;
    }
    .note-sticker.alarm-blink{
      color:#fff;
    }
    .note-sticker.alarm-blink .note-sticker-body{
      background:#ff3838;
      color:#fff;
    }
    .note-sticker.note-postpone-warning.alarm-blink .note-sticker-body{
      background:#ff2525;
      color:#fff;
      box-shadow:
        0 0 0 4px rgba(255,255,255,.55),
        0 0 22px rgba(255,0,0,.78),
        0 2px 4px rgba(0,0,0,.5);
    }
    .note-sticker.note-postpone-committed.alarm-blink .note-sticker-body{
      background:#d8d8d8;
      color:#111;
      box-shadow:
        0 0 0 2px rgba(255,255,255,.42),
        0 0 18px rgba(255,255,255,.2),
        0 2px 4px rgba(0,0,0,.5);
    }
    .note-sticker.note-postpone-fading.alarm-blink .note-sticker-body{
      background:#000;
      color:rgba(0,0,0,0);
      box-shadow:none;
      opacity:0;
    }
    .note-sticker:active{ transform:scale(.96); }
    .note-sticker.note-postpone-warning:active,
    .note-sticker.note-postpone-committed:active,
    .note-sticker.note-postpone-fading:active{
      transform:none;
    }
    .note-sticker.with-time{
      width:var(--note-size, 68px);
      height:calc(var(--note-size, 60px) * 1.22);
      flex-direction:column;
      justify-content:flex-start;
      gap:2px;
      padding:5px 4px 3px;
    }
    .note-sticker.filled.with-time{
      padding:0;
    }
    .note-sticker.with-time .note-sticker-body{
      flex-direction:column;
      justify-content:flex-start;
      gap:2px;
      padding:5px 4px 3px;
    }
    .note-icon-main{
      flex:0 0 auto;
      min-width:0;
      width:100%;
      margin-top:auto;
      margin-bottom:auto;
      text-align:center;
      overflow:hidden;
      text-overflow:clip;
      white-space:nowrap;
      line-height:.92;
    }
    .note-time-mini{
      flex:0 0 auto;
      max-width:100%;
      margin-top:0;
      transform:translateY(1px);
      font-size:calc(var(--note-size, 60px) * 0.21);
      line-height:1;
      font-weight:900;
      color:#2c2100;
      background:rgba(255,255,255,.34);
      border-radius:5px;
      padding:2px 3px;
      font-variant-numeric:tabular-nums;
    }

    .clock-wrap{
      width:min(97vw, 67vh); aspect-ratio:1/1;
      position:relative; display:flex; align-items:center; justify-content:center;
      margin:8px 0;
    }
    .clock-svg{ width:100%; height:100%; display:block; overflow:visible; }
    /* Punkty 4+5: druga warstwa SVG NAD cyframi godzin - dla strzałki i kropki minut */
    .clock-svg-overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:30;
    }
    .clock-center{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
    }
    .clock-face{ width:75%; height:75%; border-radius:50%; position:relative; }
    .number{
      position:absolute; left:50%; top:50%;
      transform:translate(-50%,-50%);
      color:var(--dial-number); font-weight:900;
      font-size:clamp(47px, 12.6vw, 88px);
      line-height:1; letter-spacing:-1.2px;
      transition:color .3s ease, text-shadow .3s ease;
    }
    .number.active{
      color:#ffffff;
      text-shadow:
        0 0 8px rgba(255,255,255,.85),
        0 0 16px rgba(255,255,255,.6),
        0 0 24px rgba(180,255,200,.4);
    }
    .number.preview{
      color:rgba(255,255,255,.58);
      text-shadow:
        0 0 4px rgba(255,255,255,.42),
        0 0 9px rgba(255,255,255,.26),
        0 0 14px rgba(180,255,200,.16);
    }
    @keyframes barrierLightBlink{
      0%,49.99%{ opacity:var(--barrier-light-on, .95); }
      50%,100%{ opacity:var(--barrier-light-off, .1); }
    }

    .controls{
      width:min(96vw, 620px);
      display:grid; grid-template-columns:repeat(3, 1fr);
      grid-auto-rows:auto; column-gap:6px; row-gap:2px;
      align-items:end;
      position:relative;
    }
    .work-btn{ order:1; }
    .pot-btn{ order:2; }
    .money-btn{ order:3; }
    .exercise-btn{ order:4; }
    .break-btn{ order:5; }
    .coin-btn{ order:6; }
    .controls.results-ended .pot-btn{
      display:none;
    }
    .controls.results-ended .money-btn{
      grid-column:2 / span 2;
      grid-row:1;
      width:100%;
      aspect-ratio:2/1;
      align-self:end;
      overflow:visible;
      z-index:4;
      background:#000 !important;
      box-shadow:none;
    }
    /* Moduł 2 (ćwiczenia) wystaje w górę o połowę swojej wysokości - mieści 4 rzędy kół */
    .exercise-btn{
    /* v6.6.0: matches the size and baseline of the other top-row buttons. */
      aspect-ratio:1/1 !important;
      align-self:end;
    }
    .driving-focus-restore-area{
      display:none;
      position:absolute;
      inset:auto;
      width:0;
      height:0;
      z-index:-1;
      border:none;
      border-radius:16px;
      padding:0;
      margin:0;
      background:transparent;
      pointer-events:none;
    }
    .controls.driving-focus-faded .driving-focus-restore-area{
      display:none;
    }
    .btn.driving-focus-fade-target,
    .date-work-start.driving-focus-fade-target{
      transition:opacity 5s ease, filter 5s ease, box-shadow 5s ease, background-color 5s ease, color 5s ease, text-shadow 5s ease;
    }
    .driving-focus-fade-target.driving-focus-instant-restore{
      transition:none !important;
    }
    .driving-focus-fade-target.driving-focus-faded{
      opacity:.025 !important;
      filter:brightness(0) saturate(0);
      box-shadow:none !important;
    }
    .date-work-start.driving-focus-faded{
      opacity:.02 !important;
      color:rgba(0,0,0,0);
      text-shadow:none;
    }
    .controls.results-ended.results-no-breaks .exercise-btn,
    .controls.results-ended.results-no-breaks .break-btn{
      opacity:.025 !important;
      filter:brightness(0) saturate(0);
      box-shadow:none !important;
      background:#000 !important;
      color:#000 !important;
      text-shadow:none !important;
    }

    @media (orientation: landscape) and (max-height:620px) and (pointer:coarse){
      .app{
        display:grid;
        grid-template-columns:auto minmax(0, 1.06fr) minmax(142px, 23vw);
        grid-template-rows:100%;
        align-items:center;
        justify-items:center;
        justify-content:stretch;
        gap:6px;
        padding:4px 6px;
      }
      .notes-bar{
        grid-column:3;
        grid-row:1;
        width:100%;
        height:100%;
        min-height:0;
        align-self:stretch;
        justify-self:stretch;
        display:flex;
        flex-direction:column;
        flex-wrap:nowrap;
        align-items:flex-start;
        align-content:flex-start;
        justify-content:flex-start;
        gap:4px;
        overflow-y:auto;
        overflow-x:hidden;
        padding:54px 6px 8px;
      }
      .notes-bar .note-sticker{
        flex:0 0 auto;
      }
      .clock-wrap{
        grid-column:2;
        grid-row:1;
        width:min(100%, calc(100vh - 8px));
        max-width:calc(100vh - 8px);
        margin:0;
        align-self:center;
        justify-self:center;
      }
      .controls{
        grid-column:1;
        grid-row:1;
        width:min(31vw, calc((100vh - 18px) * .66));
        min-width:160px;
        max-width:calc((100vh - 18px) * .66);
        align-self:center;
        justify-self:start;
        display:grid;
        grid-template-columns:repeat(2, minmax(0, 1fr));
        grid-auto-rows:auto;
        gap:5px;
        align-items:stretch;
      }
      .controls:not(.results-ended) .btn{
        width:100%;
        min-height:0;
        align-self:stretch;
      }
      .controls:not(.results-ended) .work-btn{ grid-column:1; grid-row:1; }
      .controls:not(.results-ended) .exercise-btn{ grid-column:1; grid-row:2; }
      .controls:not(.results-ended) .coin-btn{ grid-column:1; grid-row:3; }
      .controls:not(.results-ended) .pot-btn{ grid-column:2; grid-row:1; }
      .controls:not(.results-ended) .break-btn{ grid-column:2; grid-row:2; }
      .controls:not(.results-ended) .money-btn{ grid-column:2; grid-row:3; }
      .controls.results-ended{
        grid-template-columns:repeat(3, minmax(0, 1fr));
        grid-template-rows:repeat(3, minmax(0, 1fr));
        width:min(34vw, calc((100vh - 18px) * .86));
        max-width:calc((100vh - 18px) * .86);
        align-self:center;
        align-content:center;
      }
      .controls.results-ended .btn{
        min-height:0;
        width:100%;
      }
      .controls.results-ended .work-btn{
        grid-column:1;
        grid-row:3;
        align-self:end;
      }
      .controls.results-ended .money-btn{
        grid-column:1 / span 2;
        grid-row:1;
        align-self:start;
        justify-self:start;
        width:100%;
        transform:none;
      }
      .controls.results-ended .coin-btn{
        grid-column:1;
        grid-row:2;
        align-self:start;
        justify-self:start;
      }
      .controls.results-ended #moneyTop{
        position:absolute;
        left:0;
        right:0;
        bottom:0;
        height:100%;
      }
      .controls.results-ended #moneyBot{
        position:absolute;
        right:0;
        bottom:0;
        width:50%;
        height:50%;
        transform:translateY(calc(100% + 5px));
      }
      .controls.results-ended .post-work-verify{
        left:0;
        bottom:0;
        width:50%;
        height:50%;
        transform:translateY(calc(100% + 5px));
      }
      .controls.results-ended #moneyTop .money-cell-text{
        font-size:clamp(30px, 7.4vw, 58px);
      }
      .controls.results-ended #moneyTop .money-cell-text.money-digits-4{
        font-size:clamp(28px, 6.6vw, 52px);
      }
      .controls.results-ended .coin-cell-text{
        font-size:clamp(24px, 5.6vw, 38px);
      }
    }

    /* Data pod zegarem (zmiana 11) */
    .date-display{
      width:100%;
      text-align:center;
      font-size:clamp(24px, 6.4vw, 36px);
      font-weight:800;
      color:var(--dial-number);
      letter-spacing:.5px;
      padding:0;
      line-height:1;
      text-shadow:
        0 0 8px rgba(220,220,225,.55),
        0 0 16px rgba(200,200,210,.35),
        0 0 24px rgba(180,180,200,.2);
    }

    /* Bateria w prawym górnym rogu (zmiana 13) */
    .battery-indicator{
      position:fixed;
      top:6px; right:8px;
      z-index:20;
      padding:3px 9px;
      border:1.5px solid #2ecc71;
      border-radius:4px;
      color:#2ecc71;
      font-size:14px;
      font-weight:800;
      letter-spacing:.3px;
      background:rgba(0,0,0,.4);
      min-width:48px;
      text-align:center;
      pointer-events:none;
      transition:right .18s ease;
    }
    .battery-indicator.charging{
      right:30px;
    }
    .battery-indicator::after{
      content:'';
      position:absolute;
      top:50%;
      right:-5px;
      transform:translateY(-50%);
      width:3px; height:9px;
      background:#2ecc71;
      border-radius:0 2px 2px 0;
    }
    .battery-indicator::before{
      content:'\26A1';
      position:absolute;
      top:50%;
      right:-25px;
      transform:translateY(-50%);
      color:#2ecc71;
      font-size:17px;
      font-weight:900;
      line-height:1;
      opacity:0;
      text-shadow:0 0 8px rgba(46,204,113,.78);
      pointer-events:none;
    }
    .battery-indicator.charging::before{
      opacity:1;
    }
    .battery-indicator.low.charging::before{
      color:#2ecc71;
      text-shadow:0 0 8px rgba(46,204,113,.78);
    }
    .auto-sync-indicator{
      position:fixed;
      top:35px;
      right:20px;
      z-index:90;
      width:24px;
      height:24px;
      border-radius:50%;
      background:#555;
      box-shadow:0 0 0 1px rgba(255,255,255,.1), 0 0 8px rgba(0,0,0,.65);
      border:none;
      padding:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#dff8ff;
      font-size:18px;
      line-height:1;
      opacity:1;
      transition:opacity 4s ease, background-color 4s ease, box-shadow 4s ease;
    }
    .auto-sync-indicator.on{
      background:#2ecc71;
      box-shadow:0 0 0 1px rgba(46,204,113,.35), 0 0 14px rgba(46,204,113,.55);
    }
    .auto-sync-indicator.on.green-faded{
      opacity:.06;
      background:#020402;
      box-shadow:none;
    }
    .auto-sync-indicator.checking{
      opacity:1;
      background:#f4d03f;
      animation:autoSyncBlink .7s infinite alternate;
    }
    .auto-sync-indicator.scheduled{
      opacity:1;
      background:#ff7a00;
      box-shadow:
        0 0 0 1px rgba(255,154,31,.55),
        0 0 12px rgba(255,122,0,.95),
        0 0 24px rgba(255,122,0,.68);
    }
    .auto-sync-indicator.downloading{
      opacity:1;
      background:#ff3333;
      animation:autoSyncBlink .45s infinite alternate;
    }
    .auto-sync-indicator.applied{
      opacity:1;
      background:#e02020;
      width:26px;
      height:26px;
      box-shadow:0 0 0 1px rgba(255,80,80,.35), 0 0 10px rgba(255,0,0,.7);
    }
    .auto-sync-indicator.frozen{
      opacity:1;
      width:34px;
      height:34px;
      background:transparent;
      box-shadow:none;
      font-size:30px;
      text-shadow:0 0 8px rgba(120,220,255,.95), 0 0 14px rgba(255,255,255,.4);
    }
    @keyframes autoSyncBlink{
      from{ opacity:.35; transform:scale(.9); }
      to{ opacity:1; transform:scale(1.18); }
    }
    .battery-indicator.low{
      color:#ff3838;
      border-color:#ff3838;
    }
    .battery-indicator.low::after{
      background:#ff3838;
    }
    .btn{
      position:relative; border:none; border-radius:16px;
      aspect-ratio:1/1; min-height:84px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08),
                  inset 0 -12px 16px rgba(0,0,0,.34),
                  0 0 0 1px rgba(0,0,0,.55);
      color:#fff; overflow:hidden;
      appearance:none; -webkit-appearance:none; background:#111;
    }
    .btn:active{ transform:scale(.985); }
    .btn.empty-slot{ background:#0a0a0a; box-shadow:inset 0 0 0 1px #1a1a1a; pointer-events:none; opacity:.3; }
    .early-month-module{
      position:absolute;
      left:calc((100% - 12px) / 3 + 6px);
      top:0;
      width:calc(((100% - 12px) / 3) * 2 + 6px);
      height:100%;
      z-index:12;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border:none;
      border-radius:18px;
      padding:0;
      background:#000;
      color:#f5f5f5;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.05), 0 0 28px rgba(255,216,72,.16);
      opacity:0;
      pointer-events:none;
      transform:scale(.985);
      transition:opacity .9s ease, transform .9s ease, box-shadow .9s ease;
    }
    .early-month-module.visible{
      opacity:1;
      pointer-events:auto;
      transform:scale(1);

    .early-month-module.fading{

    .early-month-content{

      justify-content:center;

      filter:drop-shadow(0 0 10px rgba(255,216,72,.34));
    }
    .early-month-days{

      line-height:.95;
      font-weight:1000;
      color:#ffdc4c;
      text-shadow:0 0 10px rgba(255,216,72,.48), 0 0 20px rgba(255,180,0,.22);

    .early-month-title{
      font-size:clamp(18px, 5.2vw, 32px);
      line-height:1.08;
      font-weight:1000;
      letter-spacing:.4px;
      text-transform:uppercase;
      color:#f2f2f2;
      text-shadow:0 0 10px rgba(255,255,255,.22);

    .early-month-subtitle{
      max-width:96%;
      font-size:clamp(13px, 3.4vw, 20px);
      line-height:1.15;
      font-weight:850;
      color:#a6a6a6;

    .early-month-actions{
      flex:0 0 38%;
      min-height:86px;
      display:grid;
      grid-template-columns:1fr 1fr;

    }
    .early-month-action{
      border:none;
      border-radius:0;
      padding:6px 5px;
      color:#fff;
      font-size:clamp(14px, 4vw, 24px);
      line-height:1.08;
      font-weight:1000;
      letter-spacing:.2px;
      text-transform:uppercase;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      white-space:normal;
      appearance:none;
      -webkit-appearance:none;
    }
    .early-month-action.create{
      background:linear-gradient(180deg,#16933e,#07591f);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.16), inset 0 -14px 18px rgba(0,0,0,.28);
    }
    .early-month-action.tomorrow{
      background:linear-gradient(180deg,#c91d1d,#7f0e0e);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.14), inset 0 -14px 18px rgba(0,0,0,.3);
    }
    .early-month-module.busy .early-month-action{
      filter:brightness(.55);
      pointer-events:none;
    }
    .early-month-module.success{
      box-shadow:inset 0 0 0 1px rgba(70,255,126,.22), 0 0 28px rgba(46,204,113,.24);
    }
    .early-month-module.error{
      box-shadow:inset 0 0 0 1px rgba(255,70,70,.28), 0 0 28px rgba(255,20,20,.22);
    }
    @media (orientation: landscape) and (max-height:620px) and (pointer:coarse){
      .early-month-module{ display:none !important; }
    }

    /* === v1.12: long-press progress ring === */
    .btn .lp-ring{
      position:absolute; inset:0;
      border-radius:16px;
      pointer-events:none;
      z-index:6;
      opacity:0;
      box-shadow:inset 0 0 0 0 rgba(255,255,255,0.85);
      transition:opacity .15s ease;
    }
    .btn.lp-active .lp-ring{
      opacity:1;
      animation:lpFill 3s linear forwards;
    }
    @keyframes lpFill{
      0%   { box-shadow:inset 0 0 0 0px rgba(80,200,255,0.0); }
      30%  { box-shadow:inset 0 0 0 3px rgba(80,200,255,0.55); }
      60%  { box-shadow:inset 0 0 0 5px rgba(120,220,255,0.75); }
      100% { box-shadow:inset 0 0 0 8px rgba(255,255,255,0.95); }
    }
    .hold-warning-shake{
      animation:holdWarningShake .18s linear infinite;
      will-change:transform;
    }
    @keyframes holdWarningShake{
      0%   { transform:translate3d(0,0,0) rotate(0deg); }
      12%  { transform:translate3d(-3px,2px,0) rotate(-.35deg); }
      24%  { transform:translate3d(3px,-2px,0) rotate(.35deg); }
      36%  { transform:translate3d(-2px,-3px,0) rotate(-.25deg); }
      48%  { transform:translate3d(2px,3px,0) rotate(.25deg); }
      60%  { transform:translate3d(-3px,0,0) rotate(-.3deg); }
      72%  { transform:translate3d(3px,1px,0) rotate(.3deg); }
      84%  { transform:translate3d(-1px,3px,0) rotate(-.2deg); }
      100% { transform:translate3d(0,0,0) rotate(0deg); }
    }

    /* === v1.12: edit-mini przekształcony w nieklikalną etykietę "✎ 3s" === */
    .edit-hint{
      position:absolute; top:6px; right:6px;
      font-size:11px; font-weight:800;
      color:rgba(255,255,255,.55);
      background:rgba(0,0,0,.28);
      padding:2px 6px;
      border-radius:6px;
      z-index:5;
      pointer-events:none;
      letter-spacing:.5px;
    }

    /* === v1.12: przycisk START/STOP - podział pionowy === */
    .work-split{
      position:absolute; inset:0;
      display:block;
      z-index:2;
      pointer-events:none;
    }
    .work-left{
      display:none;
    }
    .work-time-top{
      position:absolute;
      top:7px;
      left:8px;
      z-index:3;
      font-size:clamp(16px, 4.2vw, 22px);
      font-weight:900;
      color:rgba(255,255,255,.95);
      letter-spacing:-.5px;
      text-shadow:0 1px 0 rgba(0,0,0,.3);
    }
    .work-time-bot{
      position:absolute;
      top:7px;
      right:8px;
      z-index:3;
      font-size:clamp(16px, 4.2vw, 22px);
      font-weight:900;
      color:rgba(255,255,255,.85);
      letter-spacing:-.5px;
      text-align:right;
    }
    .work-icon-row{
      display:none;
    }
    /* Rolka odhaczająca godziny */
    .work-right{
      position:absolute;
      inset:0;
      padding:0;
    }
    .work-roller{
      position:absolute;
      top:50%; left:4%; right:4%;
      transform:translateY(-50%);
      height:94%;
      z-index:1;
      background:rgba(0,0,0,.55);
      border-radius:8px;
      box-shadow:inset 0 0 0 1px rgba(56,200,102,.22),
                 inset 0 0 10px rgba(0,0,0,.7);
      overflow:hidden;
      -webkit-mask-image:linear-gradient(180deg,
        transparent 0%,
        rgba(0,0,0,.08) 9%,
        rgba(0,0,0,.48) 22%,
        black 32%, black 70%,
        rgba(0,0,0,.72) 78%,
        rgba(0,0,0,.18) 92%,
        transparent 100%);
      mask-image:linear-gradient(180deg,
        transparent 0%,
        rgba(0,0,0,.08) 9%,
        rgba(0,0,0,.48) 22%,
        black 32%, black 70%,
        rgba(0,0,0,.72) 78%,
        rgba(0,0,0,.18) 92%,
        transparent 100%);
    }
    .work-roller-inner{
      display:flex; flex-direction:column;
      align-items:center;
      position:absolute;
      top:0; left:0; right:0;
      transition:transform 0.6s ease;
      will-change:transform;
    }
    .work-roller-digit{
      width:100%;
      flex:0 0 auto;
      display:flex; align-items:center; justify-content:center;
      font-weight:900;
      color:var(--work-green);
      text-shadow:0 1px 0 rgba(0,0,0,.55), 0 0 8px rgba(56,200,102,.34);
      border-bottom:2.5px solid rgba(88,232,120,.55);
      box-sizing:border-box;
      position:relative;
      /* font-size i height ustawia JS dynamicznie */
    }
    #workBtn .work-roller-digit::before,
    #workBtn .work-roller-digit::after{
      content:'';
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:22%;
      height:3px;
      border-radius:3px;
      background:rgba(88,232,120,.46);
      box-shadow:0 0 2px rgba(88,232,120,.24);
      opacity:.72;
      pointer-events:none;
    }
    #workBtn .work-roller-digit::before{ left:6%; }
    #workBtn .work-roller-digit::after{ right:6%; }
    /* znaczniki na środku rolki - lewy i prawy */
    .work-roller-mark-left,
    .work-roller-mark-right{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:0; height:0;
      border-style:solid;
      z-index:10;
      pointer-events:none;
      filter:drop-shadow(0 0 3px rgba(88,232,120,.85));
    }
    .work-roller-mark-left{
      left:-1px;
      border-width:5px 0 5px 8px;
      border-color:transparent transparent transparent #58e878;
    }
    .work-roller-mark-right{
      right:-1px;
      border-width:5px 8px 5px 0;
      border-color:transparent #58e878 transparent transparent;
    }
    #workBtn.overtime .work-roller{
      box-shadow:inset 0 0 0 1px rgba(255,154,31,.24),
                 inset 0 0 10px rgba(0,0,0,.7);
    }
    #workBtn.overtime .work-roller-digit{
      color:var(--overtime-orange);
      text-shadow:0 1px 0 rgba(0,0,0,.55), 0 0 8px rgba(255,154,31,.34);
      border-bottom-color:rgba(255,154,31,.55);
    }
    #workBtn.overtime .work-roller-digit::before,
    #workBtn.overtime .work-roller-digit::after{
      background:rgba(255,154,31,.46);
      box-shadow:0 0 2px rgba(255,154,31,.24);
    }
    #workBtn.overtime .work-roller-mark-left,
    #workBtn.overtime .work-roller-mark-right{
      filter:drop-shadow(0 0 3px rgba(255,154,31,.82));
    }
    #workBtn.overtime .work-roller-mark-left{
      border-color:transparent transparent transparent var(--overtime-orange);
    }
    #workBtn.overtime .work-roller-mark-right{
      border-color:transparent var(--overtime-orange) transparent transparent;
    }

    /* === v1.12: przycisk obrotów - dwa banknoty (góra/dół) === */
    .money-btn{
      background:#000;
      padding:0;
      overflow:hidden;
      border-radius:0;
    }
    /* Pełnoekranowy worek pieniędzy gdy brak kwot - znika gdy są banknoty */
    .money-empty-bag{
      position:absolute;
      inset:0;
      z-index:3;
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(70px, 18vw, 130px);
      line-height:1;
      pointer-events:none;
      opacity:.85;
    }
    .money-bag-img{
      max-width:86%;
      max-height:86%;
      object-fit:contain;
      display:block;
    }
    .money-btn.counter-start-warning{
      box-shadow:
        0 0 0 2px rgba(255,48,48,.86),
        0 0 18px rgba(255,0,0,.95),
        0 0 34px rgba(255,0,0,.68),
        inset 0 0 22px rgba(255,0,0,.32) !important;
    }
    .money-btn.counter-start-warning .money-empty-bag{
      opacity:1;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,34,34,.34), transparent 48%),
        radial-gradient(circle at 50% 50%, rgba(0,0,0,.32), transparent 62%);
    }
    .money-counter-warning-img{
      max-width:88%;
      max-height:88%;
      object-fit:contain;
      filter:
        drop-shadow(0 0 8px rgba(255,50,50,.95))
        drop-shadow(0 0 18px rgba(255,0,0,.7));
    }
    .money-counter-warning-fallback{
      display:none;
      font-size:clamp(70px, 18vw, 130px);
      text-shadow:
        0 0 10px rgba(255,60,60,.9),
        0 0 24px rgba(255,0,0,.65);
    }
    .money-empty-bag.hidden{ display:none; }
    .money-split{
      position:absolute; inset:0;
      display:grid;
      grid-template-rows:1fr 1fr;
      gap:0;
      z-index:2;
      pointer-events:none;
    }
    .money-cell{
      position:relative;
      display:flex; align-items:center; justify-content:center;
      background-color:#000;
      background-size:contain;
      background-position:center;
      background-repeat:no-repeat;
      overflow:hidden;
      border-radius:0;
    }
    .money-cell.empty{
      background-image:none !important;
    }
    .money-cell-text{
      display:inline-block;
      width:auto;
      font-size:clamp(28px, 9vw, 48px);
      font-weight:900;
      text-align:center;
      line-height:1;
      padding:0;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
      /* offsety: --note-tx ustawia per-banknot (poziomo), górny dodatkowo dostaje shift w lewo */
      transform:translate(calc(var(--note-tx, 0%) + var(--row-shift, 0%)), var(--note-ty, 0%));
    }
    /* Kolory liczb - rozjaśnione, w odcieniu banknotu, z delikatną poświatą */
    .money-cell.note-50  .money-cell-text{
      color:#3870c8;          /* 50zł niebieski - jaśniejszy granatowy */
      text-shadow:0 0 6px rgba(0,30,90,.6), 0 1px 1px rgba(255,255,255,.3);
    }
    .money-cell.note-100 .money-cell-text{
      color:#1a8a3a;          /* 100zł zielony - intensywna zieleń */
      text-shadow:0 0 6px rgba(0,40,15,.6), 0 1px 1px rgba(255,255,255,.3);
    }
    .money-cell.note-200 .money-cell-text{
      color:#a87010;          /* 200zł złoty - jasny złoty/oker */
      text-shadow:0 0 6px rgba(60,30,0,.55), 0 1px 1px rgba(255,255,255,.3);
    }
    .money-cell.note-500 .money-cell-text{
      color:#7a3aaa;          /* 500zł fiolet - jasny fioletowy */
      text-shadow:0 0 6px rgba(40,0,60,.6), 0 1px 1px rgba(255,255,255,.3);
    }
    /* Per-banknot offsety (gdyby okienko obrazka nie było centralnie - korekta) */
    .money-cell.note-50  { --note-tx:0%; --note-ty:0%; }
    .money-cell.note-100 { --note-tx:0%; --note-ty:0%; }
    .money-cell.note-200 { --note-tx:0%; --note-ty:0%; }
    .money-cell.note-500 { --note-tx:0%; --note-ty:0%; }
    /* Punkt 2: górny banknot kwota w lewo, dolny banknot kwota w lewo */
    #moneyTop .money-cell-text { --row-shift:-35%; }
    #moneyTop.note-500 .money-cell-text{
      --row-shift:-24%;
      font-size:clamp(28px, 8.6vw, 46px);
    }
    #moneyTop.note-500 .money-cell-text.money-digits-4{
      --row-shift:-20%;
      font-size:clamp(24px, 7.6vw, 40px);
    }
    #moneyBot .money-cell-text { --row-shift:-20%; }
    .controls.results-ended .money-split{
      display:block;
      overflow:visible;
    }
    .controls.results-ended #moneyTop{
      position:absolute;
      left:0;
      right:0;
      bottom:50%;
      height:100%;
      z-index:4;
      overflow:visible;
    }
    .controls.results-ended #moneyTop .money-cell-text{
      --row-shift:-30%;
      font-size:clamp(44px, 15vw, 88px);
    }
    .controls.results-ended #moneyTop.note-500 .money-cell-text{
      --row-shift:-18%;
    }
    .controls.results-ended #moneyTop .money-cell-text.money-digits-4{
      font-size:clamp(38px, 12vw, 70px);
    }
    .controls.results-ended #moneyTop.note-500 .money-cell-text.money-digits-4{
      --row-shift:-16%;
      font-size:clamp(38px, 11.8vw, 68px);
    }
    .controls.results-ended #moneyBot{
      position:absolute;
      right:0;
      bottom:0;
      width:calc((100% - 6px) / 2);
      height:50%;
      display:flex;
      z-index:2;
    }
    .post-work-verify{
      display:none;
      position:absolute;
      left:0;
      bottom:0;
      width:calc((100% - 6px) / 2);
      height:50%;
      z-index:7;
      grid-template-columns:1fr 1fr;
      gap:3px;
      padding:4px;
      box-sizing:border-box;
      background:#000;
      border-radius:4px;
      pointer-events:auto;
      touch-action:manipulation;
    }
    .controls.results-ended .post-work-verify{
      display:grid;
    }
    .post-work-verify-cell{
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:0;
      border-radius:5px;
      color:#5b5b5b;
      background:radial-gradient(circle at 50% 38%, rgba(255,255,255,.06), rgba(0,0,0,.96) 68%);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
      transition:color .25s ease, box-shadow .25s ease, background .25s ease, opacity .25s ease;
    }
    .post-work-verify-icon{
      width:58%;
      height:58%;
      max-width:54px;
      max-height:54px;
      display:block;
      fill:none;
      stroke:currentColor;
      stroke-width:7;
      stroke-linecap:round;
      stroke-linejoin:round;
      filter:drop-shadow(0 0 5px rgba(255,255,255,.06));
    }
    .post-work-verify-cell.state-busy{
      color:#ffd83d;
      background:radial-gradient(circle at 50% 38%, rgba(255,216,61,.2), rgba(0,0,0,.95) 72%);
      box-shadow:inset 0 0 0 1px rgba(255,216,61,.32), 0 0 15px rgba(255,216,61,.26);
      animation:postVerifyBusyPulse .72s ease-in-out infinite alternate;
    }
    .post-work-verify-cell.state-ok{
      color:#32f06b;
      background:radial-gradient(circle at 50% 38%, rgba(50,240,107,.16), rgba(0,0,0,.96) 70%);
      box-shadow:inset 0 0 0 1px rgba(50,240,107,.28), 0 0 13px rgba(50,240,107,.22);
    }
    .post-work-verify-cell.state-error{
      color:#ff3535;
      background:radial-gradient(circle at 50% 38%, rgba(255,53,53,.19), rgba(0,0,0,.96) 70%);
      box-shadow:inset 0 0 0 1px rgba(255,53,53,.36), 0 0 16px rgba(255,53,53,.32);
    }
    @keyframes postVerifyBusyPulse{
      from{ opacity:.48; filter:brightness(.9); }
      to{ opacity:1; filter:brightness(1.24); }
    }
    .export-overwrite-guard{

      justify-content:center;
      background:#000;
      opacity:0;
      pointer-events:none;
      transition:opacity 1.45s ease;
    }
    .eye-reminder-img{
      width:92%;
      height:92%;
      object-fit:contain;
      filter:none;
    }
    .eye-reminder-fallback{
      display:none;
      font-size:clamp(58px, 16vw, 118px);
      line-height:1;
      color:#fff;
      text-shadow:none;
    }
    .coin-btn.eye-reminder-active,
    .coin-btn.eye-reminder-dismissing{
      background:#000 !important;
      box-shadow:none !important;
      outline:none !important;
    }
    .coin-btn.eye-reminder-active .coin-cell,
    .coin-btn.eye-reminder-dismissing .coin-cell{
      opacity:0;
      filter:brightness(0) saturate(0);
    }
    .coin-btn.eye-reminder-active .eye-reminder-layer{
      opacity:1;
      transition-delay:.7s;
    }
    .coin-btn.eye-reminder-dismissing .eye-reminder-layer{
      opacity:0;
      transition-delay:0s;
    }

    /* === v1.12: garnek "spał" po wykorzystaniu === */
    .pot-btn.dimmed{
      opacity:.45;
    }

    /* === v1.12: Animacja END - czerwona fala zalewająca tarczę + napis + odliczanie === */
    .end-confirm-overlay{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      z-index:50;
      pointer-events:auto;
      /* ograniczenie do okręgu tarczy zegara - środek (50%,50%), promień ~50% */
      clip-path:circle(50% at 50% 50%);
      -webkit-clip-path:circle(50% at 50% 50%);
      overflow:hidden;
      border-radius:50%;
    }
    .end-confirm-overlay.hidden{ display:none; }
    .end-wave{
      position:absolute;
      left:50%; top:50%;
      width:0; height:0;
      background:radial-gradient(circle,#ff2828 0%,#a80000 70%,#5e0000 100%);
      border-radius:50%;
      transform:translate(-50%,-50%);
      animation:endWaveExpand .55s ease-out forwards;
    }
    /* Wariant żółty dla resetu */
    .end-confirm-overlay.yellow .end-wave{
      background:radial-gradient(circle,#ffe040 0%,#d6a90a 70%,#7a5e00 100%);
    }
    .end-confirm-overlay.blue .end-wave{
      background:radial-gradient(circle,#bdf2ff 0%,#55c8f0 68%,#12769e 100%);
    }
    .end-confirm-overlay.yellow .end-confirm-counter,
    .end-confirm-overlay.yellow .end-confirm-title,
    .end-confirm-overlay.yellow .end-confirm-hint{
      color:#1c1400;
      text-shadow:0 1px 3px rgba(255,255,255,.5);
    }
    .end-confirm-overlay.blue .end-confirm-counter,
    .end-confirm-overlay.blue .end-confirm-title,
    .end-confirm-overlay.blue .end-confirm-hint{
      color:#05283a;
      text-shadow:0 1px 3px rgba(255,255,255,.62);
    }
    @keyframes endWaveExpand{
      0%   { width:0; height:0; opacity:.6; }
      100% { width:200%; height:200%; opacity:1; }
    }
    /* Punkt 5: zwijanie wstecz gdy minie czas bez kliknięcia */
    @keyframes endWaveCollapse{
      0%   { width:200%; height:200%; opacity:1; }
      100% { width:0; height:0; opacity:.4; }
    }
    .end-confirm-overlay.collapsing .end-wave{
      animation:endWaveCollapse .5s ease-in forwards !important;
    }
    .end-confirm-overlay.collapsing .end-confirm-content{
      animation:endTextFadeOut .25s ease-out forwards !important;
    }
    @keyframes endTextFadeOut{
      0% { opacity:1; }
      100% { opacity:0; }
    }
    .end-confirm-content{
      position:relative;
      z-index:51;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#fff;
      opacity:0;
      animation:endTextFade .35s .35s forwards;
      padding:0 16px;
    }
    @keyframes endTextFade{ to{ opacity:1; } }
    .end-confirm-title{
      font-size:clamp(18px, 4.6vw, 26px);
      font-weight:900;
      letter-spacing:.5px;
      line-height:1.1;
      text-shadow:0 2px 6px rgba(0,0,0,.6);
      margin-bottom:8px;
    }
    .end-confirm-title .missing-counter-main{
      display:block;
      font-size:clamp(26px, 7.2vw, 44px);
      line-height:.94;
      letter-spacing:.2px;
      text-shadow:
        0 2px 4px rgba(0,0,0,.75),
        0 0 12px rgba(255,255,255,.24);
    }
    .end-confirm-title .missing-counter-question{
      display:block;
      margin-top:8px;
      font-size:clamp(18px, 5.1vw, 30px);
      line-height:1;
      text-shadow:0 2px 6px rgba(0,0,0,.7);
    }
    .end-confirm-counter{
      font-size:clamp(60px, 18vw, 110px);
      font-weight:900;
      line-height:1;
      text-shadow:0 4px 14px rgba(0,0,0,.7);
    }
    .end-confirm-hint{
      font-size:clamp(12px, 3vw, 15px);
      font-weight:700;
      color:rgba(255,230,230,.92);
      margin-top:6px;
    }
    .end-confirm-hint:empty{ display:none; }
    .end-confirm-choice{
      display:none;
    }
    .end-confirm-overlay.choice-mode .end-confirm-content{
      width:100%;
      height:100%;
      display:grid;
      grid-template-rows:30% 45% 25%;
      align-items:center;
      justify-items:center;
      padding:24px 34px 30px;
    }
    .end-confirm-overlay.choice-mode .end-confirm-title,
    .end-confirm-overlay.choice-mode .end-confirm-hint{ display:none; }
    .end-confirm-overlay.choice-mode.choice-title-mode .end-confirm-content{
      grid-template-rows:24% 22% 35% 19%;
      padding:24px 34px 30px;
    }
    .end-confirm-overlay.choice-mode.choice-title-mode .end-confirm-title{
      display:block;
      grid-row:1;
      align-self:end;
      margin:0;
    }
    .end-confirm-overlay.choice-mode.choice-title-mode .end-confirm-hint{ display:none; }
    .end-confirm-overlay.choice-mode.choice-title-mode .end-confirm-counter{
      grid-row:4;
    }
    .end-confirm-overlay.choice-mode.choice-title-mode .end-choice-btn.reset{
      grid-row:2;
      align-self:center;
      min-height:58px;
    }
    .end-confirm-overlay.choice-mode.choice-title-mode .end-choice-btn.continue{
      grid-row:3;
      align-self:center;
    }
    .end-confirm-overlay.choice-mode .end-confirm-choice{
      display:contents;
    }
    .end-confirm-overlay.choice-mode .end-confirm-counter{
      grid-row:3;
      align-self:end;
      font-size:clamp(42px, 12vw, 72px);
      margin:0;
    }
    .end-choice-btn{
      border:none;
      border-radius:10px;
      padding:10px 12px;
      font-size:clamp(14px, 3.6vw, 18px);
      font-weight:900;
      line-height:1.12;
      box-shadow:0 4px 14px rgba(0,0,0,.28), inset 0 0 0 2px rgba(0,0,0,.08);
    }
    .end-choice-btn.reset{
      grid-row:1;
      align-self:end;
      width:min(58vw, 190px);
      min-height:54px;
      color:#ffffff;
      background:#ff3333;
    }
    .end-choice-btn.continue{
      grid-row:2;
      align-self:center;
      width:min(76vw, 300px);
      min-height:112px;
      border-radius:12px;
      font-size:clamp(19px, 5vw, 27px);
      color:#0b4419;
      background:#9cff9c;
    }

    .work-btn{ background:#000000; }
    /* Punkt 3: wyszarzenie przycisku pracy podczas trwania przerwy */
    .btn.dimmed-during-break{
      opacity:.45;
      filter:grayscale(.7);
      transition:opacity .3s ease, filter .3s ease;
    }
    .money-btn.counter-start-warning.dimmed-during-break{
      opacity:.72;
      filter:grayscale(.25) brightness(.9);
    }
    .work-btn.on{
      background:#000000;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14),
                  inset 0 -12px 16px rgba(0,0,0,.24),
                  0 0 0 1px rgba(255,255,255,.12);
    }
    .work-btn.overtime{
      background:#000000;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14),
                  inset 0 -12px 16px rgba(0,0,0,.24),
                  0 0 0 1px rgba(255,255,255,.12);
    }

    .exercise-btn.flash{
      background:linear-gradient(180deg,var(--btn-ex-on-1),var(--btn-ex-on-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16),
                  inset 0 -12px 16px rgba(0,0,0,.2),
                  0 0 22px rgba(255,170,63,.45),
                  0 0 0 1px rgba(255,170,63,.45);
    }
    .exercise-btn.alert{
      background:linear-gradient(180deg,var(--btn-ex-alert-1),var(--btn-ex-alert-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10),
                  inset 0 -12px 16px rgba(0,0,0,.22),
                  0 0 18px rgba(209,39,39,.34),
                  0 0 0 1px rgba(209,39,39,.42);
    }
    .exercise-btn.blink{
      background:linear-gradient(180deg,var(--btn-ex-blink-1),var(--btn-ex-blink-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18),
                  inset 0 -12px 16px rgba(0,0,0,.18),
                  0 0 24px rgba(255,90,71,.52),
                  0 0 0 1px rgba(255,90,71,.52);
    }

    /* === Przerwa === */
    .break-btn{
      background:transparent;
      transition:background .25s ease;
    }
    .break-img{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:contain;
      z-index:1; pointer-events:none;
    }
    /* Obrazek "off" widoczny gdy nie ma przerwy. Obrazek "on" gdy trwa przerwa (klasa .on) */
    .break-img-off{ display:block; }
    .break-img-on{ display:none; }
    .break-btn.on .break-img-off{ display:none; }
    .break-btn.on .break-img-on{ display:block; }
    .break-top-zone, .break-bot-zone{
      position:absolute;
      left:5%; width:50%;
      height:33%;
      display:flex; align-items:center; justify-content:flex-start;
      font-size:clamp(18px,5vw,28px); font-weight:900;
      color:#1a1a1a; z-index:3; pointer-events:none;
      text-shadow:0 0 6px rgba(255,255,255,.85),0 1px 0 rgba(255,255,255,.6);
      font-variant-numeric:tabular-nums;
    }
    .break-top-zone{ top:0; }
    .break-bot-zone{ bottom:0; }
    /* Tło miga między szarym a żółtym - tylko gdy klasa .blink-bg jest aktywna */
    .break-btn.on{ background:transparent; }
    .break-btn.on.dimmed-during-break{
      opacity:1;
      filter:none;
    }
    .break-btn.on.blink-bg{
      background:#ffe84d;
      box-shadow:none;
    }

    /* === Garnek z obrazkiem === */
    .pot-btn{ background:linear-gradient(180deg,var(--btn-pot-off-1),var(--btn-pot-off-2)); }
    .pot-btn.done-alarm{ background:linear-gradient(180deg,#ff4b22,#e00000); box-shadow:inset 0 0 0 2px rgba(255,235,220,.5), inset 0 0 36px rgba(255,40,0,.45), 0 0 34px rgba(255,48,0,.85); }
    .pot-btn.done-alarm-off{ background:#000; box-shadow:none; }
    .pot-btn.pot-has-img{ background:#000 !important; }
    .pot-btn.pot-has-img.done-alarm{ background:linear-gradient(180deg,#ff4b22,#e00000) !important; }
    .pot-btn.pot-has-img.done-alarm-off{ background:#000 !important; box-shadow:none !important; }
    .pot-btn.pot-waiting{
      background:#000 !important;
      box-shadow:inset 0 0 0 1px rgba(255,42,42,.52), inset 0 0 28px rgba(255,0,0,.14), 0 0 32px rgba(255,0,0,.68);
    }
    .pot-btn.pot-final{
      background:#000 !important;
      box-shadow:inset 0 0 0 1px rgba(255,42,42,.22), 0 0 18px rgba(255,0,0,.24);
    }
    .pot-btn.pot-waiting .pot-img{
      opacity:.16;
    }
    .pot-btn.pot-final .pot-img{
      opacity:.56;
      filter:brightness(.82) saturate(.9);
    }
    .pot-radar{
      position:absolute; inset:0;
      border-radius:14px;
      z-index:4;
      pointer-events:none;
      opacity:0;
      background:
        radial-gradient(circle at center, rgba(255,40,40,.34) 0 4%, rgba(255,40,40,0) 17%),
        conic-gradient(from -10deg, rgba(255,0,0,0) 0deg 336deg, rgba(255,40,30,.12) 342deg, rgba(255,60,40,.88) 356deg, rgba(255,0,0,0) 360deg);
      filter:blur(.2px);
      mix-blend-mode:screen;
    }
    .pot-btn.pot-waiting .pot-radar{
      opacity:1;
      animation:potRadarSpin 2s linear infinite;
    }
    @keyframes potRadarSpin{ to{ transform:rotate(360deg); } }
    .pot-img{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:contain;
      z-index:3;        /* nad paskiem ognia, ale pod licznikiem */
      pointer-events:none;
    }
    /* Pasek ognia półprzezroczysty żeby nie zasłaniał obrazka */
    .pot-fire-bar{
      position:absolute; bottom:0; left:0; right:0;
      background:linear-gradient(0deg, rgba(255,28,0,.92), rgba(255,96,0,.82));
      border-radius:0 0 14px 14px;
      z-index:2; transition:height 0.8s linear;
      pointer-events:none;
    }
    /* Podczas alarmu (done-alarm/off) tło miga całym przyciskiem, obrazek tylko lekko zostaje widoczny. */
    .pot-btn.done-alarm .pot-img,
    .pot-btn.done-alarm-off .pot-img{
      opacity:0.38;
    }
    /* Licznik garnka: okienko 250x15 na 400x400 = 62.5%x3.75%, rozmiar 106x105 = 26.5%x26.25%
       Środek: left=75.75%, top=16.875% */
    .pot-counter-box{
      position:absolute;
      left:75.75%; top:16.875%;
      transform:translate(-50%,-50%);
      z-index:5;
      font-size:clamp(18px,5vw,32px); font-weight:900;
      color:#fff;
      text-shadow:0 0 6px rgba(0,0,0,.9),0 1px 0 rgba(0,0,0,.7);
      font-variant-numeric:tabular-nums;
      line-height:1; pointer-events:none;
    }
    .pot-btn.pot-waiting .pot-counter-box,
    .pot-btn.pot-final .pot-counter-box{
      left:auto;
      right:7%;
      top:8%;
      transform:none;
      display:inline-flex;
      align-items:baseline;
      justify-content:flex-end;
      gap:.11em;
      font-size:clamp(13px,3.7vw,25px);
      color:#252525;
      white-space:nowrap;
      letter-spacing:0;
      text-align:right;
      text-shadow:0 0 3px rgba(255,255,255,.06),0 1px 0 rgba(0,0,0,.85);
    }
    .pot-split-part{
      color:#121212;
      opacity:.34;
      text-shadow:0 0 2px rgba(255,255,255,.025),0 1px 0 rgba(0,0,0,.9);
    }
    .pot-heat-time{
      --pot-lit:#31ff66;
      --pot-glow:rgba(42,255,98,.92);
    }
    .pot-sep,
    .pot-wait-time{
      --pot-lit:#ff3030;
      --pot-glow:rgba(255,32,32,.92);
    }
    .pot-btn.pot-waiting .pot-split-part{
      display:inline-flex;
      align-items:baseline;
    }
    .pot-btn.pot-waiting .pot-char{
      display:inline-block;
      color:#121212;
      opacity:.34;
      text-shadow:0 0 2px rgba(255,255,255,.025),0 1px 0 rgba(0,0,0,.9);
      animation:potRadarTextReveal 2s linear infinite;
      animation-delay:var(--pot-char-delay,0s);
    }
    .pot-btn.pot-final .pot-counter-box{
      font-size:clamp(13px,3.8vw,26px);
    }
    .pot-btn.pot-final .pot-heat-time{
      color:#35ee62;
      opacity:1;
      text-shadow:0 0 9px rgba(42,255,98,.72),0 2px 0 rgba(0,0,0,.9);
    }
    .pot-btn.pot-final .pot-sep,
    .pot-btn.pot-final .pot-wait-time{
      color:#ff5656;
      opacity:1;
      text-shadow:0 0 8px rgba(255,0,0,.62),0 2px 0 rgba(0,0,0,.9);
    }
    @keyframes potRadarTextReveal{
      0%,25%{
        color:var(--pot-lit);
        opacity:1;
        text-shadow:
          0 0 2px rgba(255,255,255,.98),
          0 0 8px var(--pot-glow),
          0 0 17px var(--pot-glow),
          0 0 31px var(--pot-glow),
          0 0 44px var(--pot-glow),
          0 2px 0 rgba(0,0,0,.9);
      }
      75%,100%{
        color:#121212;
        opacity:.34;
        text-shadow:0 0 2px rgba(255,255,255,.025),0 1px 0 rgba(0,0,0,.9);
      }
    }
    /* Gdy brak obrazka - centralnie i większa czcionka */
    .pot-btn:not(.pot-has-img) .pot-counter-box{
      left:50%; top:50%;
      font-size:clamp(40px,11vw,64px);
    }

    /* === Moduł ćwiczeń: pojedyncze koło z animowaną maską (zanikanie zgodnie z ruchem wskazówek) === */
    .exercise-btn{
      background:#000 !important;
      box-shadow:none !important;
      border-radius:16px;
      overflow:hidden;
      position:relative;
    }
    .exercise-circle{
      position:absolute;
      inset:5%;
      border-radius:50%;
      background:var(--exercise-circle-color,#45ee73);
      pointer-events:none;
      z-index:1;
      box-shadow:0 0 10px rgba(255,255,255,.16);
      will-change:background-color;
      /* Maska sterowana z JS - przez clip-path lub przez nakładkę SVG.
         Tutaj samo CSS bez maski, JS rysuje overlay. */
    }
    /* Czarna nakładka maskująca - SVG sektor który rośnie od 12:00 */
    .wheel-mask-overlay{
      position:absolute;
      inset:0;
      width:100%; height:100%;
      pointer-events:none;
      z-index:2;
      background:none;
      filter:none;
      display:none;
      transform:none;
      transform-origin:center;
      will-change:contents;
    }
    .exercise-spray-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:2;
      background:none;
      filter:blur(1.1px);
      will-change:contents;
    }
    /* Czerwony moduł nadwyżki - jak dotychczas */
    .overage-display{
      position:absolute;
      inset:0;
      z-index:3;
      background:#000;
      box-shadow:none;
      display:none;
      border-radius:16px;
      transition:opacity 0.6s ease;
    }
    .overage-display .work-roller{
      left:3%;
      right:3%;
      height:94%;
      background:#000;
      box-shadow:none;
      -webkit-mask-image:linear-gradient(180deg,
        transparent 0%,
        rgba(0,0,0,.06) 5%,
        rgba(0,0,0,.28) 14%,
        rgba(0,0,0,.68) 28%,
        black 38%, black 62%,
        rgba(0,0,0,.68) 72%,
        rgba(0,0,0,.28) 86%,
        rgba(0,0,0,.06) 95%,
        transparent 100%);
      mask-image:linear-gradient(180deg,
        transparent 0%,
        rgba(0,0,0,.06) 5%,
        rgba(0,0,0,.28) 14%,
        rgba(0,0,0,.68) 28%,
        black 38%, black 62%,
        rgba(0,0,0,.68) 72%,
        rgba(0,0,0,.28) 86%,
        rgba(0,0,0,.06) 95%,
        transparent 100%);
    }
    .exercise-btn.overage .overage-display{
      display:block;
    }
    .exercise-btn.overage .exercise-circle,
    .exercise-btn.overage .wheel-mask-overlay,
    .exercise-btn.overage .exercise-spray-canvas{
      display:none;
    }
    .exercise-btn.restore-overage .overage-display{
      display:block;
      opacity:0;
      z-index:1;
    }
    .exercise-btn.restore-overage .exercise-circle{
      display:block;
      z-index:3;
    }
    .exercise-btn.restore-overage .exercise-spray-canvas{
      display:block;
      z-index:4;
    }
    /* Stan "fading-overage": czerwony moduł gaśnie do czerni przed pojawieniem się koła z animacją odwrotną */
    .exercise-btn.fading-overage .overage-display{
      opacity:0;
    }
    .overage-display .work-roller-digit{
      color:#8a0000 !important;
      text-shadow:
        0 1px 0 rgba(255,210,70,.42),
        0 0 7px rgba(160,0,0,.42);
      border-bottom:2.5px solid rgba(128,0,0,.36);
    }
    .exercise-btn.flash{
      background:linear-gradient(180deg,var(--btn-ex-on-1),var(--btn-ex-on-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16),
                  inset 0 -12px 16px rgba(0,0,0,.2),
                  0 0 22px rgba(255,170,63,.45),
                  0 0 0 1px rgba(255,170,63,.45);
    }

    /* === Data w środku tarczy - na czarnym kole pod nią === */
    .date-center{
      --date-main-size:clamp(22px,6.8vw,42px);
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      z-index:20;
      text-align:center; pointer-events:none;
      font-size:var(--date-main-size);
      font-weight:800;
      color:var(--dial-number);
      line-height:1.05;
      text-shadow:0 0 8px rgba(220,220,225,.55),0 0 16px rgba(200,200,210,.35);
      /* Ograniczenie do czarnego koła w SVG (r=75) - zgodne z wewnętrznym promieniem wskazówki godzinowej. */
      width:45%; height:45%;
      border-radius:50%;
      overflow:hidden;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:2px;
      padding:5px 7px;
      box-sizing:border-box;
    }
    .date-line{
      max-width:100%;
      overflow:hidden;
      text-overflow:clip;
      white-space:nowrap;
    }
    .date-day,
    .date-value{
      font-size:var(--date-main-size);
      line-height:1.05;
    }
    .date-work-time{
      color:rgba(115,115,115,.72);
      font-size:clamp(16px,4.2vw,22px);
      font-weight:900;

    .keypad button::before,
    .keypad button::after{
      content:'';
      position:absolute;
      left:50%;
      top:50%;
      width:170%;
      aspect-ratio:1/1;
      border-radius:50%;
      transform:translate(-50%,-50%) scale(0);
      pointer-events:none;
      z-index:1;
    }
    .keypad button::before{ background:#ffffff; opacity:0; }
    .keypad button::after{ background:var(--key-bg); opacity:0; }
    .keypad button.key-flash::before{ animation:keyFlashWhite .46s ease-out forwards; }
    .keypad button.key-flash::after{ animation:keyFlashReturn .46s ease-out forwards; }
    @keyframes keyFlashWhite{
      0%{ opacity:.95; transform:translate(-50%,-50%) scale(0); }
      45%{ opacity:1; transform:translate(-50%,-50%) scale(1.18); }
      100%{ opacity:1; transform:translate(-50%,-50%) scale(1.18); }
    }
    @keyframes keyFlashReturn{
      0%,47%{ opacity:0; transform:translate(-50%,-50%) scale(0); }
      48%{ opacity:1; transform:translate(-50%,-50%) scale(0); }
      100%{ opacity:1; transform:translate(-50%,-50%) scale(1.18); }
    }

  <div class="app">
    <div class="battery-indicator" id="batteryIndicator">—</div>
    <button class="auto-sync-indicator" id="autoSyncIndicator" type="button" aria-label="Auto Sync"></button>
    <div class="notes-bar" id="notesBar"></div>

    <div class="clock-wrap">
      <div class="end-confirm-overlay hidden" id="endConfirmOverlay">
        <div class="end-wave"></div>
        <div class="end-confirm-content">
          <div class="end-confirm-title">KONIEC DNIÓWKI?</div>
          <div class="end-confirm-counter" id="endConfirmCounter">5</div>
          <div class="end-confirm-choice" id="endConfirmChoice">
            <button class="end-choice-btn reset" type="button" data-restart-choice="reset">Startujesz?<br>(czyścimy dane!)</button>
            <button class="end-choice-btn continue" type="button" data-restart-choice="continue">Wracasz do roboty?</button>
          </div>
          <div class="end-confirm-hint"></div>
        </div>
      </div>
      <svg class="clock-svg" viewBox="-30 -30 460 460" aria-hidden="true">
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g id="workFill"></g>
        <g id="noExerciseFill"></g>
        <g id="radarSweep"></g>
        <g id="overtimeFill"></g>
        <g id="breakFill"></g>
        <g id="exerciseMarks"></g>
        <g id="forecastHand"></g>
        <g id="dots"></g>
        <!-- Czarne koło pod datą - przykrywa wszystkie kolory tarczy w środku, datę pokazuje na czystym tle -->
        <circle cx="200" cy="200" r="75" fill="#000" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      </svg>

      <div class="clock-center">
        <div class="clock-face">
          <div class="number" data-hour="12" style="top:2%; left:50%;">12</div>
          <div class="number" data-hour="1" style="top:9%; left:75%;">1</div>
          <div class="number" data-hour="2" style="top:28%; left:91%;">2</div>

          <div class="number" data-hour="4" style="top:72%; left:91%;">4</div>
          <div class="number" data-hour="5" style="top:91%; left:75%;">5</div>
          <div class="number" data-hour="6" style="top:99%; left:50%;">6</div>
          <div class="number" data-hour="7" style="top:91%; left:25%;">7</div>
          <div class="number" data-hour="8" style="top:72%; left:9%;">8</div>

  <button class="install-btn" id="installBtn" type="button">📥 Zainstaluj</button>
    <div class="version">v6.16.0</div>

  <script>
    const LS_KEY = 'tarcza_state_v1';
    const LS_PERSIST = 'tarcza_persist_v1';
    const LS_APPSCRIPT = 'tarcza_appscript_url';
    const LS_SYNC_PIN = 'tarcza_sync_pin';
    const LS_SYNC_DEVICE = 'tarcza_sync_device';
    const LS_AUTO_SYNC_ENABLED = 'tarcza_auto_sync_enabled';
    const LS_SYNC_DEVICE_ID = 'tarcza_sync_device_id';
    const LS_LAST_LOCAL_CHANGE_AT = 'tarcza_last_local_change_at';
    const LS_LAST_AUTO_UPLOAD_CHANGE_AT = 'tarcza_last_auto_upload_change_at';
    const LS_LAST_SEEN_SYNC_ID = 'tarcza_last_seen_sync_id';
    const LS_LAST_SEEN_CLOUD_CHANGE_AT = 'tarcza_last_seen_cloud_change_at';
    const LS_SYNC_STATE_HASH = 'tarcza_sync_state_hash';
    const LS_LAST_VERIFIED_SYNC_HASH = 'tarcza_last_verified_sync_hash';
    const LS_APPSCRIPT_COMPAT_CACHE = 'tarcza_appscript_compat_cache_v1';
    const LS_APP_VERSION_STATUS = 'tarcza_app_version_status_v1';
    const LS_POST_WORK_VERIFY = 'tarcza_post_work_verify_v1';
    const LS_SHARED_DATA_BASE = 'tarcza_shared_data_base_v1';
    const LS_SHARED_DATA_CONFLICTS = 'tarcza_shared_data_conflicts_v1';
    const LS_SHARED_DATA_VERIFIED_HASH = 'tarcza_shared_data_verified_hash_v1';
    const LS_EARLY_MONTH_SHEET = 'tarcza_early_month_sheet_v1';
    const FINAL_BREAK_NO_WORK_THRESHOLD_MIN = 2;
    const AI_PASTE_HOLD_MS = 2000;
    const EARLY_MONTH_WINDOW_DAYS = 7;
    const EARLY_MONTH_FREE_AREA_MS = 30000;
    const EARLY_MONTH_WATCH_RECHECK_MS = 1000;

    const PROVIDERS = [
      { key:'uber',    label:'UBER',    bg:'#000000', fg:'#ffffff' },
      { key:'bolt',    label:'BOLT',    bg:'#34d186', fg:'#ffffff' },
      { key:'taxi',    label:'TAXI',    bg:'#f4d500', fg:'#000000' },
      { key:'priv',    label:'PRIV',    bg:'#13204a', fg:'#ffffff' },
      { key:'freenow', label:'FREENOW', bg:'#000000', fg:'#ff3838' },
      { key:'agap',    label:'AGAP',    bg:'#ff8a0a', fg:'#000000' },
      { key:'tip',     label:'NAPIWEK', bg:'#9adf9a', fg:'#0d3b0d' },
      { key:'other',   label:'INNE',    bg:'#555555', fg:'#ffffff' },
      { key:'swinka',  label:'ŚWINKA',  bg:'#f7a7c7', fg:'#2b0715' }
    ];

    let startWorkMinutes = null;
    let endWorkMinutes = null;
    let lastExerciseMinutes = null;
    let lastEyeExerciseMinutes = null;
    let breakActive = false;
    let currentBreakStart = null;
    let breakSegments = [];
    let exerciseMarkers = [];
    let breakAdjustMinutes = 0;
    let workDate = null;
    let pendingEndWorkExport = false;
    let dailyExportStatus = null;
    let exportOverwriteGuardArmed = false;
    let exportOverwriteGuardBusy = false;
    // Punkt 7: planowany cel pracy w minutach (domyślnie 8h = 480min)
    let workTargetMinutes = 480;

    let potDurationMin = 20;
    let potStartedAt = null;
    let potAckedDone = false;
    let potUsedToday = false;
    let potPhase = 'idle';
    let potHeatingElapsedSec = null;
    let potWaitingStartedAt = null;
    let potWaitingElapsedSec = null;

    let revenues = {};
    PROVIDERS.forEach(p => revenues[p.key] = 0);

    let counterStart = null;
    let counterEnd = null;
    let privKmTotal = 0;

    let lastCounterEnd = null;
    let notes = [];
    let recentNoteSymbols = [];
    let recentNoteTextBySymbol = {};
    let emojiRecords = [];
    let sharedDataConflicts = [];

    let editMode = "start";
    let editHour = 0, editMinute = 0;
    let editSignedMinutes = 0;
    let editPotMinutes = 20;

    let keypadMode = null;
    let keypadContext = null;
    let keypadRaw = '';
    let keypadAmountNegative = false;
    let keypadCounterDigits = [];
    let keypadCursorFromRight = 0;
    let keypadSide = 'right';
    let counterPanelDraft = null;
    let moneyPanelDraft = null;
    let aiPasteSession = null;

    const cx=200, cy=200, radius=200;
    let blinkState = false;
    let syncApplyInProgress = false;
    let postWorkVerification = null;

    function normalizeForSyncCompare(value, key){
      if(Array.isArray(value)) return value.map(v=>normalizeForSyncCompare(v, key));
      if(value && typeof value === 'object'){
        const out = {};
        Object.keys(value).sort().forEach(k=>{
          out[k] = normalizeForSyncCompare(value[k], k);
        });
        return out;
      }
      if(typeof value === 'number' && key === 'potStartedAt'){
        return Math.floor(value / 60000);
      }
      return value;
    }
    function stableStringify(value){
      return JSON.stringify(normalizeForSyncCompare(value, ''));
    }
    function getCurrentComparableState(){
      return collectStateObjects();
    }

    // ===== localStorage =====
    function saveState(){
      try{
        const state = {
          startWorkMinutes, endWorkMinutes, lastExerciseMinutes, lastEyeExerciseMinutes,
          breakActive, currentBreakStart, breakSegments,
          exerciseMarkers, breakAdjustMinutes, workDate,
          pendingEndWorkExport, dailyExportStatus,
          potDurationMin, potStartedAt, potAckedDone, potUsedToday,
          potPhase, potHeatingElapsedSec, potWaitingStartedAt, potWaitingElapsedSec,
          revenues, counterStart, counterEnd, privKmTotal,
          workTargetMinutes
        };
        localStorage.setItem(LS_KEY, JSON.stringify(state));
        const persist = { lastCounterEnd, notes, recentNoteSymbols, recentNoteTextBySymbol, emojiRecords };
        localStorage.setItem(LS_PERSIST, JSON.stringify(persist));
        const comparable = stableStringify({state, persist});
        const previous = localStorage.getItem(LS_SYNC_STATE_HASH) || '';
        localStorage.setItem(LS_SYNC_STATE_HASH, comparable);
        const changed = !!(previous && previous !== comparable && !syncApplyInProgress);
        if(previous && previous !== comparable && !syncApplyInProgress){
          localStorage.setItem(LS_LAST_LOCAL_CHANGE_AT, String(Date.now()));
        }
        return changed;
      }catch(e){}
      return false;
    }
    function loadState(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        if(raw){
          const s = JSON.parse(raw);
          startWorkMinutes = s.startWorkMinutes ?? null;
          endWorkMinutes = s.endWorkMinutes ?? null;
          lastExerciseMinutes = s.lastExerciseMinutes ?? null;
          lastEyeExerciseMinutes = s.lastEyeExerciseMinutes ?? null;
          breakActive = !!s.breakActive;
          currentBreakStart = s.currentBreakStart ?? null;
          breakSegments = Array.isArray(s.breakSegments) ? s.breakSegments : [];
          exerciseMarkers = Array.isArray(s.exerciseMarkers) ? s.exerciseMarkers : [];
          breakAdjustMinutes = s.breakAdjustMinutes || 0;
          workDate = s.workDate || null;
          pendingEndWorkExport = !!s.pendingEndWorkExport;
          dailyExportStatus = s.dailyExportStatus ? normalizeDailyExportStatus(s.dailyExportStatus) : null;
          potDurationMin = s.potDurationMin ?? 20;
          potStartedAt = s.potStartedAt ?? null;
          potAckedDone = !!s.potAckedDone;
          potUsedToday = !!s.potUsedToday;
          potPhase = s.potPhase || (potStartedAt !== null ? 'heating' : 'idle');
          potHeatingElapsedSec = s.potHeatingElapsedSec ?? null;
          potWaitingStartedAt = s.potWaitingStartedAt ?? null;
          potWaitingElapsedSec = s.potWaitingElapsedSec ?? null;
          workTargetMinutes = s.workTargetMinutes ?? 480;
          // Sanitacja: jeśli pot był uruchomiony >24h temu (np. zostawiony z innego dnia
          // i apka się sama nie wygasiła) - resetujemy. Inaczej miga z zawyżonymi liczbami.
          if(potStartedAt !== null){
            const ageMs = Date.now() - potStartedAt;
            const maxAgeMs = 24 * 60 * 60 * 1000;
            if(ageMs > maxAgeMs || ageMs < 0){
              potStartedAt = null;
              potAckedDone = false;
              potPhase = 'idle';
            }
          }
          if(s.revenues){
            PROVIDERS.forEach(p => revenues[p.key] = s.revenues[p.key] || 0);
          }
          counterStart = s.counterStart ?? null;
          counterEnd = s.counterEnd ?? null;
          privKmTotal = s.privKmTotal || 0;
        }
        const rawP = localStorage.getItem(LS_PERSIST);
        if(rawP){
          const p = JSON.parse(rawP);
          lastCounterEnd = p.lastCounterEnd ?? null;
          notes = Array.isArray(p.notes) ? p.notes : [];
          recentNoteSymbols = Array.isArray(p.recentNoteSymbols) ? p.recentNoteSymbols.slice(0,50) : [];
          recentNoteTextBySymbol = (p.recentNoteTextBySymbol && typeof p.recentNoteTextBySymbol === 'object' && !Array.isArray(p.recentNoteTextBySymbol)) ? p.recentNoteTextBySymbol : {};
          emojiRecords = Array.isArray(p.emojiRecords) ? p.emojiRecords : [];
        }
        const sharedMigration = migrateSharedRecords();
        loadSharedDataConflicts();
        const correction = applyFinalBreakCorrectionIfNoWorkAfterBreak({ notify:true });
        if(sharedMigration || correction) saveState();
      }catch(e){}
    }

    function collectStateObjects(){
      return {
        state:{
          startWorkMinutes, endWorkMinutes, lastExerciseMinutes, lastEyeExerciseMinutes,
          breakActive, currentBreakStart, breakSegments,
          exerciseMarkers, breakAdjustMinutes, workDate,
          pendingEndWorkExport, dailyExportStatus,
          potDurationMin, potStartedAt, potAckedDone, potUsedToday,
          potPhase, potHeatingElapsedSec, potWaitingStartedAt, potWaitingElapsedSec,
          revenues, counterStart, counterEnd, privKmTotal,
          workTargetMinutes
        },
        persist:{ lastCounterEnd, notes, recentNoteSymbols, recentNoteTextBySymbol, emojiRecords }
      };
    }
    function applyStateObjects(state, persist, options={}){
      const s = state || {};
      startWorkMinutes = s.startWorkMinutes ?? null;
      endWorkMinutes = s.endWorkMinutes ?? null;
      lastExerciseMinutes = s.lastExerciseMinutes ?? null;
      lastEyeExerciseMinutes = s.lastEyeExerciseMinutes ?? null;
      breakActive = !!s.breakActive;
      currentBreakStart = s.currentBreakStart ?? null;
      breakSegments = Array.isArray(s.breakSegments) ? s.breakSegments : [];
      exerciseMarkers = Array.isArray(s.exerciseMarkers) ? s.exerciseMarkers : [];
      breakAdjustMinutes = s.breakAdjustMinutes || 0;
      workDate = s.workDate || null;
      pendingEndWorkExport = !!s.pendingEndWorkExport;
      dailyExportStatus = s.dailyExportStatus ? normalizeDailyExportStatus(s.dailyExportStatus) : buildConfirmedDailyExportStatusForCurrentState();
      potDurationMin = s.potDurationMin ?? 20;
      potStartedAt = s.potStartedAt ?? null;
      potAckedDone = !!s.potAckedDone;
      potUsedToday = !!s.potUsedToday;
      potPhase = s.potPhase || (potStartedAt !== null ? 'heating' : 'idle');
      potHeatingElapsedSec = s.potHeatingElapsedSec ?? null;
      potWaitingStartedAt = s.potWaitingStartedAt ?? null;
      potWaitingElapsedSec = s.potWaitingElapsedSec ?? null;
      workTargetMinutes = s.workTargetMinutes ?? 480;
      PROVIDERS.forEach(p => revenues[p.key] = s.revenues ? (s.revenues[p.key] || 0) : 0);
      counterStart = s.counterStart ?? null;
      counterEnd = s.counterEnd ?? null;
      privKmTotal = s.privKmTotal || 0;

      const p = persist || {};
      lastCounterEnd = p.lastCounterEnd ?? null;
      if(options.preserveSharedData !== true){
        notes = Array.isArray(p.notes) ? p.notes : [];
        recentNoteSymbols = Array.isArray(p.recentNoteSymbols) ? p.recentNoteSymbols.slice(0,50) : [];
        recentNoteTextBySymbol = (p.recentNoteTextBySymbol && typeof p.recentNoteTextBySymbol === 'object' && !Array.isArray(p.recentNoteTextBySymbol)) ? p.recentNoteTextBySymbol : {};
        emojiRecords = Array.isArray(p.emojiRecords) ? p.emojiRecords : [];
        migrateSharedRecords();
      }
      const correction = applyFinalBreakCorrectionIfNoWorkAfterBreak({ notify:true });
      syncApplyInProgress = true;
      try{ saveState(); }
      finally{ syncApplyInProgress = false; }
      return correction;
    }
    function initializeSyncTracking(){
      const comparable = stableStringify(getCurrentComparableState());
      if(!localStorage.getItem(LS_SYNC_STATE_HASH)) localStorage.setItem(LS_SYNC_STATE_HASH, comparable);
      if(!localStorage.getItem(LS_LAST_LOCAL_CHANGE_AT)) localStorage.setItem(LS_LAST_LOCAL_CHANGE_AT, '0');
      if(!localStorage.getItem(LS_LAST_VERIFIED_SYNC_HASH) && canSeedVerifiedSyncHashFromCurrentState()){
        localStorage.setItem(LS_LAST_VERIFIED_SYNC_HASH, comparable);
      }
    }
    function saveStateSilently(){
      syncApplyInProgress = true;
      try{ saveState(); }
      finally{ syncApplyInProgress = false; }
    }
    const SHARED_NOTE_FIELDS = [
      'order','text','icon','alarmTime','alerts','customOffsets','ackedAlerts',
      'postponedAtDate','postponedUntilDate','deleted','deletedAt','createdAt'
    ];
    const SHARED_EMOJI_FIELDS = [
      'emoji','order','active','rememberedText','lastUsedAt'
    ];
    function sharedNowIso(){
      return new Date().toISOString();
    }
    function createSharedRecordId(prefix){
      if(window.crypto && typeof window.crypto.randomUUID === 'function'){
        return prefix + '_' + window.crypto.randomUUID();
      }
      return prefix + '_' + getDeviceId() + '_' + Date.now().toString(36) + '_' + Math.floor(Math.random()*1e9).toString(36);
    }
    function emojiRecordId(symbol){
      const code = Array.from(String(symbol || ''))
        .map(ch=>ch.codePointAt(0).toString(16))
        .join('_');
      return 'emoji_' + (code || 'empty');
    }
    function normalizedIso(value, fallback=''){
      const raw = String(value || '').trim();
      if(!raw) return fallback;
      const ms = Date.parse(raw);
      return Number.isFinite(ms) ? new Date(ms).toISOString() : fallback;
    }
    function inferredNoteCreatedAt(id, fallback){
      const numeric = Number(id);
      if(Number.isFinite(numeric) && numeric > 946684800000 && numeric < Date.now()+86400000){
        return new Date(numeric).toISOString();
      }
      return fallback;
    }
    function normalizeSharedNote(note, index=0){
      const source = (note && typeof note === 'object' && !Array.isArray(note)) ? note : {};
      const fallbackNow = sharedNowIso();
      const id = String(source.id || createSharedRecordId('note'));
      const createdAt = normalizedIso(source.createdAt, inferredNoteCreatedAt(id, fallbackNow));
      const updatedAt = normalizedIso(source.updatedAt, createdAt);
      const alerts = Array.isArray(source.alerts)
        ? [...new Set(source.alerts.map(Number).filter(Number.isFinite))].sort((a,b)=>a-b)
        : [];
      const customOffsets = Array.isArray(source.customOffsets)
        ? [...new Set(source.customOffsets.map(Number).filter(Number.isFinite))].slice(0,8)
        : [];
      const ackedAlerts = (source.ackedAlerts && typeof source.ackedAlerts === 'object' && !Array.isArray(source.ackedAlerts))
        ? Object.keys(source.ackedAlerts).reduce((out,key)=>{
            if(source.ackedAlerts[key]) out[String(key)] = true;
            return out;
          }, {})
        : {};
      return {
        id,
        order:Number.isFinite(Number(source.order)) ? Number(source.order) : index + 1,
        text:String(source.text || ''),
        icon:trimNoteSymbol(source.icon || '') || '•',
        alarmTime:String(source.alarmTime || ''),
        alerts,
        customOffsets,
        ackedAlerts,
        postponedAtDate:String(source.postponedAtDate || ''),
        postponedUntilDate:String(source.postponedUntilDate || ''),
        deleted:source.deleted === true,
        deletedAt:source.deleted === true ? normalizedIso(source.deletedAt, updatedAt) : '',
        createdAt,
        updatedAt,
        revision:Number(source.revision || 0),
        changeSource:String(source.changeSource || 'migration')
      };
    }
    function normalizeSharedEmoji(record, index=0){
      const source = (record && typeof record === 'object' && !Array.isArray(record)) ? record : {};
      const emoji = trimNoteSymbol(source.emoji || source.symbol || '');
      return {
        id:String(source.id || emojiRecordId(emoji)),
        emoji,
        order:Number.isFinite(Number(source.order)) ? Number(source.order) : index + 1,
        active:source.active !== false,
        rememberedText:String(source.rememberedText || ''),
        lastUsedAt:normalizedIso(source.lastUsedAt, ''),
        updatedAt:normalizedIso(source.updatedAt, source.lastUsedAt ? normalizedIso(source.lastUsedAt, sharedNowIso()) : sharedNowIso()),
        revision:Number(source.revision || 0),
        changeSource:String(source.changeSource || 'migration')
      };
    }
    function activeNotes(){
      return notes.filter(note=>note && note.deleted !== true);
    }
    function syncLegacyEmojiViews(){
